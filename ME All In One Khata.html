// ===================================================================
// ACTUAL CASH FLOW STATEMENT (Indirect Method) — reads live data
// ===================================================================
function pgCFS() {
  var f = getF();
  var g = getFGrouped();

  // ── NET PROFIT ──
  var netProfit = f.np;

  // ── DEPRECIATION (accumulated dep charged this period) ──
  var depreciation = 0;
  (D.fixedAssets||[]).forEach(function(a){ depreciation += (+a.accumDep||0); });
  (D.intangibleAssets||[]).forEach(function(a){ depreciation += (+a.accumAmort||0); });

  // ── WORKING CAPITAL CHANGES ──
  // Opening values from Trial Balance (preferred) or opening object
  var openDebtors   = 0;
  var openCreditors = 0;
  var openStock     = +D.opening.stock || 0;

  // Check TB for opening debtors/creditors
  var hasTBDeb = false, hasTBCrd = false;
  (D.trialBalance||[]).forEach(function(r){
    if(r.head==='debtor'||r.head==='debtors'||r.head==='sundrydebtors'){
      openDebtors += (+r.amount||0); hasTBDeb = true;
    }
    if(r.head==='creditor'||r.head==='creditors'||r.head==='sundrycreditors'){
      openCreditors += (+r.amount||0); hasTBCrd = true;
    }
    if(r.head==='stock'||r.head==='closingstock'||r.head==='openingstock'){
      openStock += (+r.amount||0);
    }
  });
  // Fall back to opening object if not in TB
  if(!hasTBDeb) openDebtors   = +D.opening.debtors   || 0;
  if(!hasTBCrd) openCreditors = +D.opening.creditors  || 0;

  // Current values — use getF() directly for accuracy
  var closDebtors   = f.dr || 0;   // sundry debtors net balance
  var closStock     = f.cs || 0;   // closing stock
  var closCreditors = f.cr || 0;   // sundry creditors net balance

  // Expense creditors (accrued expenses payable)
  var expPayable = f.expPayable || 0;
  var openExpPayable = 0; // opening expense payable from TB
  (D.trialBalance||[]).forEach(function(r){
    if(r.head==='exppayable'||r.head==='accruedexp'||r.head==='outstandingexp'){
      openExpPayable += (+r.amount||0);
    }
  });

  // Advances paid (current assets)
  var advances = 0;
  (D.advances||[]).forEach(function(a){ if(a.type==='paid') advances += (+a.amount||0); });
  var openAdvances = 0;
  (D.trialBalance||[]).forEach(function(r){
    if(r.head==='advance'||r.head==='advancepaid') openAdvances += (+r.amount||0);
  });

  // Changes (increase in assets = negative cash; increase in liabilities = positive cash)
  var chgDebtors   = -(closDebtors   - openDebtors);    // increase in debtors = outflow
  var chgStock     = -(closStock     - openStock);       // increase in stock = outflow
  var chgAdvances  = -(advances      - openAdvances);    // advances paid = outflow
  var chgCreditors = +(closCreditors - openCreditors);   // increase in creditors = inflow
  var chgExpPayable= +(expPayable    - openExpPayable);  // increase in exp payable = inflow

  var cfOperating = netProfit + depreciation
                    + chgDebtors + chgStock + chgAdvances + chgCreditors + chgExpPayable;

  // ── INVESTING ACTIVITIES ──
  // Fixed asset purchases (outflow) — from otherAssets minus opening FA
  var openFA = 0;
  (D.trialBalance||[]).forEach(function(r){
    if(r.head==='fixedassetitem') openFA += (+r.amount||0);
  });
  var closFA = +D.otherAssets || 0;
  var faPurchases = -(closFA - openFA);  // new FA added this period = outflow
  // Asset disposal proceeds (inflow from disposed assets)
  var disposalProceeds = 0;
  (D.fixedAssets||[]).forEach(function(a){
    if(a.disposed && a.salePrice) disposalProceeds += (+a.salePrice||0);
  });
  var cfInvesting = faPurchases + disposalProceeds;

  // ── FINANCING ACTIVITIES ──
  // Opening loans — split TL and CC/OD
  var openLoans = 0; var openCcOd = 0;
  (D.trialBalance||[]).forEach(function(r){
    if(r.head==='loan') openLoans += (+r.amount||0);
  });
  // Current loans outstanding — split TL and CC/OD
  var closLoans = 0; var closCcOd = 0;
  (D.loans||[]).forEach(function(l){
    if(l.undrawn) return;
    if(isCcOdLoan&&isCcOdLoan(l)) closCcOd += (+l.outstandingBalance||0);
    else closLoans += (+l.outstandingBalance||0);
  });
  // Capital introduced (additional capital only — opening capital is in TB)
  // SINGLE SOURCE OF TRUTH: sum all cashBook entries tagged as Capital (this covers
  // BOTH entries created via the Capital page's saveCap() flow AND any manual
  // Cash/Bank entries the user typed directly with "Capital" in the description -
  // both produce identical cashBook entries, so summing cashBook avoids any
  // double counting or silent gaps regardless of how the entry was created.
  var capitalIntroduced = 0;
  (D.cashBook||[]).forEach(function(e){
    var desc = (e.description||'').toLowerCase();
    if(desc.indexOf('capital introduced')>=0 || desc.indexOf('capital reduced')>=0){
      if(e.type==='receipt') capitalIntroduced += (+e.amount||0);
      else if(e.type==='payment') capitalIntroduced -= (+e.amount||0);
    }
  });
  // Fallback for older data that never went through cashBook at all (e.g. capital
  // entered only in D.capital fields with Cash/Bank mode 'none' or pre-dating this logic)
  // BUT: if TB is posted, opening capital came from TB (not this period) — do NOT include it
  if(capitalIntroduced===0 && !D.tbPosted){
    capitalIntroduced = (+D.capital.initialCapital||0) + (+D.capital.additionalCapital||0);
  }
  // For TB-posted businesses: only count additional capital added AFTER TB posting
  // which would have CashBook entries with 'Capital Introduced' description
  // Drawings
  var drawings = 0;
  (D.drawings||[]).forEach(function(d){ drawings += (+d.amount||0); });
  // Loan receipts (net new borrowing = closing - opening loans)
  var netLoanChange = closLoans - openLoans;

  var netCcOdChange = closCcOd - openCcOd; // CC/OD net drawn is cash inflow
  var cfFinancing = netLoanChange + netCcOdChange + capitalIntroduced - drawings;

  // Opening and closing cash+bank
  var openCash = (+D.opening.cash||0) + (+D.opening.bank||0);
  // Use getBalances() directly — pure cash+bank only (CC/OD excluded)
  var balances = getBalances();
  var closCash = (balances.cb||0) + (balances.bb||0);
  var netChange = cfOperating + cfInvesting + cfFinancing;

  // ── RENDER ──
  var h = '';

  // Helper row for CFS
  function cRow(label, amount, bold, indent, isTotal) {
    var color = amount >= 0 ? '#2E7D32' : '#C62828';
    var bg = isTotal ? 'background:rgba(21,101,192,.08);' : bold ? 'background:rgba(0,0,0,.03);' : '';
    var pl = indent ? 'padding-left:20px;' : '';
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;'+bg+'border-bottom:1px solid #F0F0F0">'+
      '<span style="font-size:'+(bold?'12':'11')+'px;font-weight:'+(bold||isTotal?'700':'400')+';'+pl+'color:'+(bold||isTotal?'#1A237E':'#37474F')+'">'+esc(label)+'</span>'+
      '<span style="font-size:'+(bold?'12':'11')+'px;font-weight:'+(bold||isTotal?'700':'400')+';color:'+(isTotal?'#1565C0':bold?color:'#546E7A')+'">'+
        (amount===0?'—':fc(Math.abs(amount))+' '+(amount<0?'(-)':''))+'</span>'+
      '</div>';
  }
  function cSection(title, color) {
    return '<div style="font-weight:700;font-size:12px;padding:8px 8px 4px;background:'+color+';color:#fff;margin-top:8px;border-radius:6px 6px 0 0">'+esc(title)+'</div>';
  }

  h += '<div class="al ali" style="margin-bottom:8px">Cash Flow Statement using the <b>Indirect Method</b> — starts with Net Profit and adjusts for non-cash items and working capital changes. All figures auto-read from your recorded transactions.</div>';

  // Section A
  h += cSection('A.  CASH FLOWS FROM OPERATING ACTIVITIES', '#1565C0');
  h += '<div style="border:1px solid #BBDEFB;border-top:none;border-radius:0 0 6px 6px;margin-bottom:4px">';
  h += cRow('Net Profit (after all expenses)', netProfit, true);
  h += '<div style="padding:4px 8px;font-size:10px;color:#546E7A;font-weight:700">Add back non-cash items:</div>';
  h += cRow('Add: Depreciation & Amortization', depreciation, false, true);
  h += '<div style="padding:4px 8px;font-size:10px;color:#546E7A;font-weight:700">Working Capital Changes:</div>';
  h += cRow('Change in Debtors / Receivables'+(chgDebtors>=0?' (decreased — inflow)':' (increased — outflow)'), chgDebtors, false, true);
  h += cRow('Change in Stock / Inventory'+(chgStock>=0?' (decreased — inflow)':' (increased — outflow)'), chgStock, false, true);
  h += cRow('Change in Advances Paid'+(chgAdvances>=0?' (recovered — inflow)':' (paid — outflow)'), chgAdvances, false, true);
  h += cRow('Change in Creditors / Payables'+(chgCreditors>=0?' (increased — inflow)':' (decreased — outflow)'), chgCreditors, false, true);
  if(chgExpPayable!==0) h += cRow('Change in Expenses Payable'+(chgExpPayable>=0?' (increased — inflow)':' (decreased — outflow)'), chgExpPayable, false, true);
  h += cRow('A.  Net Cash from Operating Activities', cfOperating, true, false, true);
  h += '</div>';

  // Section B
  h += cSection('B.  CASH FLOWS FROM INVESTING ACTIVITIES', '#2E7060');
  h += '<div style="border:1px solid #C8E6C9;border-top:none;border-radius:0 0 6px 6px;margin-bottom:4px">';
  h += cRow('Purchase of Fixed Assets (Capital Expenditure)', faPurchases, false, true);
  h += cRow('Proceeds from Disposal of Assets', disposalProceeds, false, true);
  h += cRow('B.  Net Cash from Investing Activities', cfInvesting, true, false, true);
  h += '</div>';

  // Section C
  h += cSection('C.  CASH FLOWS FROM FINANCING ACTIVITIES', '#6A1428');
  h += '<div style="border:1px solid #F8BBD0;border-top:none;border-radius:0 0 6px 6px;margin-bottom:4px">';
  h += cRow('Capital Introduced by Owner', capitalIntroduced, false, true);
  h += cRow('Net Change in Loans (New Borrowings - Repayments)', netLoanChange, false, true);
  h += cRow('Drawings by Owner', -drawings, false, true);
  h += cRow('C.  Net Cash from Financing Activities', cfFinancing, true, false, true);
  h += '</div>';

  // Reconciliation
  h += '<div style="border:2px solid #1565C0;border-radius:8px;margin-top:12px;overflow:hidden">';
  h += '<div style="background:#E3F2FD;padding:6px 8px;font-weight:700;font-size:12px;color:#1565C0">RECONCILIATION</div>';
  h += cRow('Net Increase / (Decrease) in Cash  (A + B + C)', netChange, true, false, true);
  h += cRow('Add: Opening Cash & Bank Balance', openCash, false, true);
  h += cRow('Closing Cash & Bank Balance', closCash, true, false, true);
  // Tally check
  var tally = Math.abs(netChange + openCash - closCash) < 2;
  h += '<div style="padding:8px;background:'+(tally?'#E8F5E9':'#FFEBEE')+';text-align:center;font-weight:700;font-size:12px;color:'+(tally?'#2E7D32':'#C62828')+'">'+
    (tally ? '✅ Cash Flow Statement tallies with Balance Sheet!' :
             '⚠️ Difference of ₹'+fc(Math.abs(netChange+openCash-closCash))+' — check opening balances in Trial Balance')+
  '</div>';
  h += '</div>';

  // Notes
  h += '<div class="al ali" style="margin-top:12px;font-size:11px">'+
    '<b>Note:</b> Depreciation shown is accumulated dep recorded so far. '+
    'For full-year depreciation, run the Depreciation function in Capital/Loans → Fixed Assets. '+
    'Capital Introduced includes both Initial and Additional Capital entered in this period.</div>';

  h += '<div style="text-align:right;margin-top:8px">'+btn('🖨 Print Cash Flow Statement','window.print()','#546E7A')+'</div>';

  return card('Cash Flow Statement (Indirect Method) — Current Period', h);
}

// Look up HSN and GST rate by item name (fuzzy match)
function lookupHSN(itemName) {
  if(!itemName) return null;
  var name = itemName.trim().toLowerCase();
  // Exact match first
  if(HSN_MASTER[name]) return HSN_MASTER[name];
  // Partial match - check if any key is contained in item name or vice versa
  var keys = Object.keys(HSN_MASTER);
  for(var i=0; i<keys.length; i++){
    if(name.indexOf(keys[i])>=0 || keys[i].indexOf(name)>=0){
      return HSN_MASTER[keys[i]];
    }
  }
  return null;
}

// Get GST info badge for display
function gstBadge(item) {
  if(!gstEnabled()) return '';
  var hsn = item.hsnCode || (lookupHSN(item.itemName)||[])[0] || '';
  var rate = item.gstRate !== undefined ? item.gstRate : (lookupHSN(item.itemName)? +(lookupHSN(item.itemName)[1]) : '?');
  if(!hsn && rate==='?') return '';
  return '<span style="font-size:9px;background:#E8F5E9;color:#2E7D32;border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:700">'+
    (hsn?'HSN:'+hsn+' ':'')+rate+'%</span>';
}

// CUSTOM HSN MASTER — user can add/edit items not in built-in master
// Stored in D.customHSN = { 'item_name_lower': [hsn, rate, desc] }
// ===================================================================

function getCustomHSN(itemName) {
  if(!itemName || !D.customHSN) return null;
  var key = itemName.trim().toLowerCase();
  return D.customHSN[key] || null;
}

function lookupHSNFull(itemName) {
  // First check custom master (user-defined overrides built-in)
  var custom = getCustomHSN(itemName);
  if(custom) return custom;
  // Then check built-in master
  return lookupHSN(itemName);
}

function saveCustomHSN(itemName, hsnCode, gstRate, desc) {
  if(!D.customHSN) D.customHSN = {};
  var key = itemName.trim().toLowerCase();
  D.customHSN[key] = [hsnCode, String(gstRate), desc||itemName];
  // Also update the inventory item if it exists
  (D.inventory||[]).forEach(function(item){
    if(item.itemName.trim().toLowerCase() === key){
      item.hsnCode = hsnCode;
      item.gstRate  = +gstRate;
    }
  });
  sv();
}

function prefillHSNForm(name){
  window._hsnPrefill = name;
  window._hsnTab = 'add';
  renderPage();
}

function lookupHSNForm(){
  var name = gv('hsn_item');
  if(!name){toast('Enter item name first','e');return;}
  var lookup = lookupHSN(name);
  if(lookup){
    var hEl=document.getElementById('hsn_code'),
        rEl=document.getElementById('hsn_rate'),
        dEl=document.getElementById('hsn_desc');
    if(hEl) hEl.value=lookup[0];
    if(rEl) rEl.value=lookup[1];
    if(dEl) dEl.value=lookup[2];
    toast('Found in built-in master: HSN '+lookup[0]+' @ '+lookup[1]+'%');
  } else {
    toast('Not in built-in master — enter HSN code manually or search at cbic.gov.in','w');
  }
}

function saveCustomHSNFromForm(){
  var name=gv('hsn_item'), hsn=gv('hsn_code'), rate=gvn('hsn_rate'), desc=gv('hsn_desc')||name;
  if(!name){toast('Enter item name','e');return;}
  if(!hsn){toast('Enter HSN/SAC code','e');return;}
  saveCustomHSN(name, hsn, rate, desc);
  window._hsnPrefill='';
  renderPage();
  toast('HSN saved for '+name+' ('+hsn+' @ '+rate+'%)');
}

function deleteCustomHSN(key){
  confirmDialog('Remove custom HSN for "'+key+'"?', function(){
    if(D.customHSN) delete D.customHSN[key];
    sv(); renderPage(); toast('Removed');
  });
}

function searchHSNMaster(){
  window._hsnSearch = gv('hsn_sq')||'';
  renderPage();
}

function applyHSNSearch(btn){
  var name=btn.getAttribute('data-name')||'';
  var hsn=btn.getAttribute('data-hsn')||'';
  var rate=+(btn.getAttribute('data-rate')||0);
  var desc=btn.getAttribute('data-desc')||name;
  applyHSNToItem(name,hsn,rate,desc);
}
function applyHSNToItem(itemName, hsn, rate, desc){
  // Find the inventory item and update
  var found = false;
  (D.inventory||[]).forEach(function(item){
    if(item.itemName.trim().toLowerCase() === itemName.trim().toLowerCase()){
      item.hsnCode = hsn;
      item.gstRate  = +rate;
      found = true;
    }
  });
  saveCustomHSN(itemName, hsn, rate, desc);
  renderPage();
  toast('HSN '+hsn+' @ '+rate+'% applied'+(found?' to inventory item':''));
}

// ── TAX COMPUTATION HELPERS ──
function computeGrossIncome(it) {
  var f = getF();
  var businessProfit = it.useManual ? (+(it.manualProfit||0)) :
    Math.round(f.np * 365 / Math.max(1, (function(){
      var dates=[];
      D.sales.forEach(function(s){if(s.date)dates.push(s.date);});
      D.expenses.forEach(function(e){if(e.date)dates.push(e.date);});
      var earliest=dates.length?dates.reduce(function(a,b){return a<b?a:b;}):td();
      return Math.max(1,daysBetween(earliest,td()));
    })()));
  var section = it.section || 'regular';
  var presumptive = 0;
  if(section==='44ad'){
    // 8% of turnover (or 6% if digital) — use annualized sales
    var annSales = Math.round(f.ts * 365 / Math.max(1, (function(){
      var dates=[];D.sales.forEach(function(s){if(s.date)dates.push(s.date);});
      var earliest=dates.length?dates.reduce(function(a,b){return a<b?a:b;}):td();
      return Math.max(1,daysBetween(earliest,td()));
    })()));
    presumptive = Math.round(annSales * 0.08);
    businessProfit = 0; // use presumptive instead
  } else if(section==='44ada'){
    var annSales2 = Math.round(f.ts * 365 / Math.max(1,(function(){
      var dates=[];D.sales.forEach(function(s){if(s.date)dates.push(s.date);});
      var earliest=dates.length?dates.reduce(function(a,b){return a<b?a:b;}):td();
      return Math.max(1,daysBetween(earliest,td()));
    })()));
    presumptive = Math.round(annSales2 * 0.50);
    businessProfit = 0;
  }
  var salary = +(it.salaryIncome||0);
  var stdDed = salary > 0 ? Math.min(+(it.d_std||75000), 75000) : 0;
  var salaryNet = Math.max(0, salary - stdDed);
  var other  = +(it.otherIncome||0);
  var agri   = +(it.agriIncome||0);   // exempt
  var cg     = +(it.capitalGains||0); // STCG at 15%/20%
  var business = businessProfit + presumptive;
  var total  = business + salaryNet + other + cg; // agri exempt
  return {business:businessProfit, presumptive:presumptive, salary:salaryNet,
          other:other, agri:agri, cg:cg, total:total};
}

function computePresumptiveTax(it) {
  var section = it.section||'regular';
  if(section==='regular') return {applicable:false};
  var f=getF();
  var annSales=Math.round(f.ts*365/Math.max(1,(function(){
    var dates=[];D.sales.forEach(function(s){if(s.date)dates.push(s.date);});
    var earliest=dates.length?dates.reduce(function(a,b){return a<b?a:b;}):td();
    return Math.max(1,daysBetween(earliest,td()));
  })()));
  if(section==='44ad'){
    var deemed=Math.round(annSales*0.08);
    return {applicable:true,turnover:annSales,deemed:deemed,
      note:'Sec 44AD: Annualized turnover ₹'+fc(annSales)+' × 8% = Deemed Profit ₹'+fc(deemed)+'. No separate expense deduction allowed.'};
  } else {
    var deemed2=Math.round(annSales*0.50);
    return {applicable:true,turnover:annSales,deemed:deemed2,
      note:'Sec 44ADA: Gross receipts ₹'+fc(annSales)+' × 50% = Deemed Profit ₹'+fc(deemed2)+'.'};
  }
}

function getTaxConfigForAY(ay){
  // Falls back to the latest available year if the selected AY has no
  // config yet (e.g. user picked a future year before Budget rates are added).
  if(TAX_CONFIG[ay]) return TAX_CONFIG[ay];
  var years = Object.keys(TAX_CONFIG).sort();
  return TAX_CONFIG[years[years.length-1]];
}

function calcSlabTax(income, slabs) {
  var tax=0, prev=0, breakdown=[];
  slabs.forEach(function(s){
    var upper = s.upper===null ? income : Math.min(income, s.upper);
    var amount = Math.max(0, upper - prev);
    var t = Math.round(amount * s.rate / 100);
    breakdown.push({label:s.label, amount:amount, rate:s.rate, tax:t});
    tax += t;
    prev = s.upper===null ? income : s.upper;
    if(prev >= income) return;
  });
  return {tax:tax, breakdown:breakdown};
}

function applyRebateSurcharCess(baseTax, taxableIncome, regime, ay) {
  var cfg = getTaxConfigForAY(ay || (D.incomeTax && D.incomeTax.ay) || '2025-26');
  var rebate = 0;
  var rb = regime==='new' ? cfg.rebateNew : cfg.rebateOld;
  if(taxableIncome <= rb.limit) rebate = Math.min(baseTax, rb.max);
  var afterRebate = Math.max(0, baseTax - rebate);
  var surcharge = 0;
  if(taxableIncome > 5000000 && taxableIncome <= 10000000) surcharge = Math.round(afterRebate*0.10);
  else if(taxableIncome > 10000000 && taxableIncome <= 20000000) surcharge = Math.round(afterRebate*0.15);
  else if(taxableIncome > 20000000 && taxableIncome <= 50000000) surcharge = Math.round(afterRebate*0.25);
  else if(taxableIncome > 50000000) surcharge = Math.round(afterRebate*(regime==='new'?0.25:0.37));
  var cess = Math.round((afterRebate+surcharge)*cfg.cessRate);
  return {rebate:rebate, surcharge:surcharge, cess:cess, total:afterRebate+surcharge+cess};
}

function computeOldRegimeTax(it) {
  var gi = computeGrossIncome(it);
  var gender = it.gender||'male';
  var ay = (it && it.ay) || '2025-26';
  var cfg = getTaxConfigForAY(ay);
  var dc = cfg.deductionCaps;
  // 80C deductions
  var d80c = Math.min(dc.d80c_total,
    (+(it.d_lic||0))+(+(it.d_ppf||0))+(+(it.d_nsc||0))+(+(it.d_tuition||0))+(+(it.d_hlprin||0))+(+(it.d_nps80c||0)));
  var deductions = d80c +
    (dc.d80d!=null ? Math.min(+(it.d_80d||0),dc.d80d) : (+(it.d_80d||0))) +
    (dc.d80dd!=null ? Math.min(+(it.d_80dd||0),dc.d80dd) : (+(it.d_80dd||0))) +
    (+(it.d_80g||0)) +
    (dc.d80tta!=null ? Math.min(+(it.d_80tta||0),dc.d80tta) : (+(it.d_80tta||0))) +
    (+(it.d_80e||0))+
    (dc.d_hli!=null ? Math.min(+(it.d_hli||0),dc.d_hli) : (+(it.d_hli||0))) +
    (dc.d_nps!=null ? Math.min(+(it.d_nps||0),dc.d_nps) : (+(it.d_nps||0))) +
    (+(it.d_hra||0))+
    (+(it.d_other||0));
  var gti = gi.total;
  var taxableIncome = Math.max(0, gti - deductions);
  taxableIncome = Math.round(taxableIncome / 100) * 100; // round to nearest 100

  // Old regime slabs by gender/age, from config
  var slabDefs = cfg.oldRegimeSlabs[gender] || cfg.oldRegimeSlabs.male;
  var baseLimit = slabDefs[0].upper;
  var slabs = slabDefs.map(function(s, idx){
    var lbl;
    if(idx===0) lbl = 'Up to '+fc(s.upper)+(gender==='senior'||gender==='supersenior' ? ' (Exempt for '+gender+')' : ' (Basic Exemption)');
    else if(s.upper===null) lbl = 'Above '+fc(slabDefs[idx-1].upper);
    else lbl = fc(slabDefs[idx-1].upper+1)+' to '+fc(s.upper);
    return {label:lbl, upper:s.upper, rate:s.rate};
  });

  var res = calcSlabTax(taxableIncome, slabs);
  var extra = applyRebateSurcharCess(res.tax, taxableIncome, 'old', ay);
  return {gti:gti, deductions:deductions, taxableIncome:taxableIncome,
          baseTax:res.tax, slabs:res.breakdown,
          rebate:extra.rebate, surcharge:extra.surcharge, cess:extra.cess, total:extra.total,
          ayLabel:cfg.label};
}

function computeNewRegimeTax(it) {
  var gi = computeGrossIncome(it);
  var gti = gi.total;
  var ay = (it && it.ay) || '2025-26';
  var cfg = getTaxConfigForAY(ay);
  var slabs = cfg.newRegimeSlabs;
  var taxableIncome = Math.max(0, Math.round(gti/100)*100);
  var res = calcSlabTax(taxableIncome, slabs);
  var extra = applyRebateSurcharCess(res.tax, taxableIncome, 'new', ay);
  return {gti:gti, deductions:0, taxableIncome:taxableIncome,
          baseTax:res.tax, slabs:res.breakdown,
          rebate:extra.rebate, surcharge:extra.surcharge, cess:extra.cess, total:extra.total,
          ayLabel:cfg.label};
}

    }).join('');

    h += card('Items to be Consumed',

      '<div style="margin-top:8px;font-weight:700">Total Material Cost: '+fc(total)+'</div>'+
      (hasOutput ? (qtyProd>0 ? '<div style="font-size:12px;color:#546E7A">Cost per unit produced: '+fc(total/qtyProd)+'</div>' : '<div class="al ali">Enter Quantity Produced above to see cost per unit.</div>') : '')+
      inp('Notes (optional)','prod_notes','text',window._prodNotes||'')+
      btn(hasOutput?'✓ Record Production':'✓ Record Write-off','addProduction()','#2E7D32')
    );
  }

  if(D.productions && D.productions.length){
    h += card('Production Register', tbl([
      {l:'Date',k:'date'},
      {l:'Item Produced',k:'fgItemName'},
      {l:'Qty Produced',r:1,fn:function(r){return fmt(r.qtyProduced);}},
      {l:'Material Cost',r:1,fn:function(r){return fc(r.totalCost);}},
      {l:'Cost/Unit',r:1,fn:function(r){return fc(r.qtyProduced>0?r.totalCost/r.qtyProduced:0);}},
      {l:'Notes',k:'notes'},
      {l:'',fn:function(r){return btn('Delete','deleteProduction('+Q+r.id+Q+')','#C62828');}}
    ],[].concat(D.productions).reverse()));
  }

  if(D.consumptions && D.consumptions.length){
    h += card('Write-off / Usage Register', tbl([
      {l:'Date',k:'date'},
      {l:'Item',k:'itemName'},
      {l:'Qty',r:1,fn:function(r){return fmt(r.qty);}},
      {l:'Value',r:1,fn:function(r){return fc(r.amount);}},
      {l:'Notes',k:'notes'},
      {l:'',fn:function(r){return btn('Delete','deleteConsumption('+Q+r.id+Q+')','#C62828');}}
    ],[].concat(D.consumptions).reverse()));
  }
  return h;
}

// ===================================================================
// MULTI-BUSINESS MANAGER
// ===================================================================
var REGISTRY_KEY = 'mefm_registry_v1';
var ACTIVE_KEY   = 'mefm_active_v1';
var BIZ_PREFIX   = 'mefm_biz_';
var UNIFIED_KEY  = 'mfm_all_data_v1'; // Single key storing everything

// ── Unified storage helpers ──
function getAllData(){
  try{
    var raw = localStorage.getItem(UNIFIED_KEY);
    if(raw){ var d=JSON.parse(raw); if(d&&d.registry) return d; }
  }catch(e){}
  return {registry:[], active:'', businesses:{}};
}
function setAllData(obj){
  try{ localStorage.setItem(UNIFIED_KEY, JSON.stringify(obj)); }catch(e){}
}

// ── Registry helpers — all data in one unified key ──
function getRegistry(){
  try{ return getAllData().registry||[]; }catch(e){ return []; }
}
function saveRegistry(reg){
  var all = getAllData();
  all.registry = reg;
  setAllData(all);
  // Also keep legacy keys for compatibility
  try{ localStorage.setItem(REGISTRY_KEY, JSON.stringify(reg)); }catch(e){}
}
function getActiveId(){
  try{ return getAllData().active||localStorage.getItem(ACTIVE_KEY)||''; }catch(e){ return ''; }
}
function setActiveId(id){
  var all = getAllData();
  all.active = id;
  setAllData(all);
  try{ localStorage.setItem(ACTIVE_KEY, id); }catch(e){}
}

// ── Load business data by id ──
function loadBizData(id){
  try{
    // Try unified storage first
    var all = getAllData();
    if(all.businesses && all.businesses[id]) return JSON.parse(JSON.stringify(all.businesses[id]));
    // Fallback to legacy key
    var raw = localStorage.getItem(BIZ_PREFIX+id);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}

// ── Save current D to active biz slot ──
function saveBizData(id, data){
  try{
    var all = getAllData();
    if(!all.businesses) all.businesses = {};
    all.businesses[id] = data;
    setAllData(all);
    // Also keep legacy key
    try{ localStorage.setItem(BIZ_PREFIX+id, JSON.stringify(data)); }catch(e){}
  }catch(e){}
}

// ── Generate unique biz id ──
function newBizId(){
  return 'b' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
}

// ── Switch to a business by id ──
function switchBiz(id){
  // Save current data first
  try { 
    var activeId = getActiveId();
    if(activeId && typeof D !== 'undefined') saveBizData(activeId, D); 
  } catch(e){}

  // Load new business
  try {
    var data = loadBizData(id);
    if(!data){ toast('Business data not found','e'); return; }
    D = migrateData(data);
  } catch(e){
    toast('Error loading business','e'); return;
  }

  // Set active
  setActiveId(id);
  BIZ_TYPE = (D&&D.profile&&D.profile.businessType)||'Trading';

  // Update registry
  try {
    var reg = getRegistry();
    reg.forEach(function(b){ 
      if(b.id===id){ 
        b.lastOpened=new Date().toISOString().slice(0,10); 
        b.type=BIZ_TYPE; 
        b.name=(D.profile&&D.profile.businessName)||'Unnamed'; 
      } 
    });
    saveRegistry(reg);
  } catch(e){}

  // Reset all page state
  window._page = 'dashboard';
  window._latab = null; 
  window._gsttab = null; 
  window._ftab = 0; 
  window._ittab = null;
  window._captab = null;
  window._dtab = null;
  window._renameBizMode = false;
  window._deleteBizMode = false;

  // Rebuild nav and render
  try { buildNav(); } catch(e){}
  renderPage();
  toast('Switched to: '+((D.profile&&D.profile.businessName)||'Business'));
}

// ── Create a new blank business ──
function createNewBiz(type){
  // Save current
  var activeId = getActiveId();
  if(activeId) saveBizData(activeId, D);

  var id = newBizId();
  var blankD = defD();
  blankD.profile.businessType = type||'Trading';
  saveBizData(id, blankD);

  var reg = getRegistry();
  reg.push({id:id, name:'New Business', type:type||'Trading', created:new Date().toISOString().slice(0,10), lastOpened:new Date().toISOString().slice(0,10)});
  saveRegistry(reg);
  setActiveId(id);
  D = blankD;
  BIZ_TYPE = getBizType();

  window._page='profile';
  renderPage();
  toast('New business created! Fill in your details.');
}

// ── Delete a business ──
function deleteBiz(id){
  window._deleteBizId = id;
  window._deleteBizMode = true;
  renderPage();
}
function doDeleteBiz(){
  var id = window._deleteBizId;
  var reg = getRegistry();
  var biz = reg.find(function(b){return b.id===id;});
  var name = biz ? (biz.name||'this business') : 'this business';
  try{ localStorage.removeItem(BIZ_PREFIX+id); }catch(e){}
  reg = reg.filter(function(b){return b.id!==id;});
  saveRegistry(reg);
  window._deleteBizId = null;
  window._deleteBizMode = false;
  if(getActiveId()===id){
    if(reg.length>0){
      var data = loadBizData(reg[0].id);
      D = data ? migrateData(data) : defD();
      setActiveId(reg[0].id);
      BIZ_TYPE = getBizType();
    } else {
      setActiveId('');
      D = defD();
      BIZ_TYPE = 'Trading';
    }
  }
  window._page='bizmanager';
  renderPage();
  toast('Deleted: '+name);
}

// ── Rename a business ──
function renameBiz(id){
  window._renameBizId = id;
  window._renameBizMode = true;
  renderPage();
}
function doRenameBiz(){
  var id = window._renameBizId;
  var el = document.getElementById('rename_biz_input');
  if(!el) return;
  var newName = el.value.trim();
  if(!newName){ toast('Enter a name','e'); return; }
  var reg = getRegistry();
  var biz = reg.find(function(b){return b.id===id;});
  if(!biz){ toast('Not found','e'); return; }
  biz.name = newName;
  if(getActiveId()===id && D.profile){
    D.profile.businessName = newName;
    try{ saveBizData(id, D); }catch(e){}
  }
  saveRegistry(reg);
  window._renameBizId = null;
  window._renameBizMode = false;
  renderPage();
  toast('Renamed to: '+newName);
}

// ── Restore backup into a new business slot ──
function restoreAsNewBiz(jsonStr){
  try{
    var data = JSON.parse(jsonStr);
    // Save current
    var activeId = getActiveId();
    if(activeId) saveBizData(activeId, D);

    var id = newBizId();
    var migrated = migrateData(data);
    saveBizData(id, migrated);

    var reg = getRegistry();
    var bizName = (migrated.profile&&migrated.profile.businessName&&migrated.profile.businessName.trim())||'Restored Business';
    var bizType = (migrated.profile&&migrated.profile.businessType&&migrated.profile.businessType.trim())||'Trading';
    reg.push({id:id, name:bizName, type:bizType, created:new Date().toISOString().slice(0,10), lastOpened:new Date().toISOString().slice(0,10)});
    saveRegistry(reg);
    setActiveId(id);
    D = migrated;
    BIZ_TYPE = getBizType();

    window._page='dashboard';
    renderPage();
    toast('Restored: '+bizName+' — loaded successfully!');
  }catch(e){
    toast('Invalid backup JSON: '+e.message,'e');
  }
}

// ── Backup current business ──
function backupCurrentBiz(){
  try{ saveBizData(getActiveId(), D); }catch(e){}
  var name = (D.profile&&D.profile.businessName)||'backup';
  var fname = name.replace(/[^a-z0-9]/gi,'_')+'_backup.json';
  showBackupModal(JSON.stringify(D,null,2), fname);
}

function initMultiBiz(){
  // Safety: ensure localStorage is available
  try { localStorage.setItem('_test','1'); localStorage.removeItem('_test'); }
  catch(e) { D = defD(); BIZ_TYPE='Trading'; return; }

  // MIGRATION: pull legacy multi-key data into unified storage
  try {
    var all = getAllData();
    var migrated = false;
    // Scan for legacy biz keys
    var keysToCheck = [];
    try{
      for(var i=0;i<localStorage.length;i++){
        var k=localStorage.key(i);
        if(k&&k.startsWith(BIZ_PREFIX)) keysToCheck.push(k);
      }
    }catch(e){}
    keysToCheck.forEach(function(k){
      var bid = k.replace(BIZ_PREFIX,'');
      if(!all.businesses) all.businesses={};
      if(!all.businesses[bid]){
        try{
          var raw=localStorage.getItem(k);
          if(raw){ all.businesses[bid]=JSON.parse(raw); migrated=true; }
        }catch(e){}
      }
    });
    // Migrate legacy registry
    if(all.registry.length===0){
      try{
        var legReg=JSON.parse(localStorage.getItem(REGISTRY_KEY)||'[]');
        if(legReg.length>0){ all.registry=legReg; migrated=true; }
      }catch(e){}
    }
    // Migrate legacy active
    if(!all.active){
      try{
        var legActive=localStorage.getItem(ACTIVE_KEY)||'';
        if(legActive){ all.active=legActive; migrated=true; }
      }catch(e){}
    }
    // Also check original SK (single-business data)
    if(all.registry.length===0){
      try{
        var legSingle=localStorage.getItem(SK);
        if(legSingle){
          var legData=JSON.parse(legSingle);
          if(legData&&legData.profile){
            var newId=newBizId();
            if(!all.businesses) all.businesses={};
            all.businesses[newId]=legData;
            var bname=(legData.profile&&legData.profile.businessName)||'My Business';
            var btype=(legData.profile&&legData.profile.businessType)||'Trading';
            all.registry=[{id:newId,name:bname,type:btype,
              created:new Date().toISOString().slice(0,10),
              lastOpened:new Date().toISOString().slice(0,10)}];
            all.active=newId;
            migrated=true;
          }
        }
      }catch(e){}
    }
    if(migrated) setAllData(all);
  }catch(e){}

  var reg = getRegistry();
  var activeId = getActiveId();

  if(reg.length === 0){
    // First time — migrate existing single-business data
    var existingData = localStorage.getItem(SK);
    var id = newBizId();
    var data;
    if(existingData){
      try{ data = migrateData(JSON.parse(existingData)); }
      catch(e){ data = defD(); }
    } else {
      data = defD();
    }
    saveBizData(id, data);
    var bizName = (data.profile&&data.profile.businessName)||'My Business';
    var bizType = (data.profile&&data.profile.businessType)||'Trading';
    reg.push({id:id, name:bizName, type:bizType, created:new Date().toISOString().slice(0,10), lastOpened:new Date().toISOString().slice(0,10)});
    saveRegistry(reg);
    setActiveId(id);
    D = data;
  } else {
    // Load active business
    if(!activeId || !reg.find(function(b){return b.id===activeId;})){
      activeId = reg[0].id;
      setActiveId(activeId);
    }
    var data = loadBizData(activeId);
    D = data ? migrate(data) : defD();
  }
  BIZ_TYPE = getBizType();
}

          '<div style="font-size:10px;color:#90A4AE;margin-top:2px">'+esc(b.type||'Trading')+' • Created: '+esc(b.created||'')+'</div>'+
          (isActive?'<span style="font-size:10px;background:'+col+';color:#fff;border-radius:4px;padding:1px 6px;margin-top:4px;display:inline-block">● Active</span>':'')+

// DATA RECOVERY — finds all existing business data in localStorage
// ===================================================================
function recoverAllBusinesses(){
  var found = [];
  // Scan all localStorage keys
  try {
    for(var i=0; i<localStorage.length; i++){
      var key = localStorage.key(i);
      if(!key) continue;
      // Check all possible key patterns
      if(key.startsWith(BIZ_PREFIX) || key === SK || 
         key.startsWith('mefm_') || key.startsWith('mekhata_')){
        try {
          var raw = localStorage.getItem(key);
          if(!raw) continue;
          var data = JSON.parse(raw);
          // Must be a valid business object with profile
          if(data && typeof data === 'object' && data.profile){
            found.push({key:key, data:data});
          }
        } catch(e){}
      }
    }
  } catch(e){}
  return found;
}

function pgRecovery(){
  var h = '';
  var found = recoverAllBusinesses();
  var reg = getRegistry();
  
  // Find keys not already in registry
  var regKeys = reg.map(function(b){ return BIZ_PREFIX+b.id; });
  var newFound = found.filter(function(f){ 
    return f.key !== REGISTRY_KEY && f.key !== ACTIVE_KEY && 
           regKeys.indexOf(f.key) < 0;
  });
  
  if(newFound.length === 0){
    h += card('Data Recovery',
      '<div class="al als">No additional business data found. Your current data is intact.</div>'
    );
    return h;
  }
  
  h += card('Recover Business Data ('+newFound.length+' found)',
    '<div class="al alw" style="margin-bottom:10px">Found '+newFound.length+' business(es) in storage that are not showing. Tap Recover to add them back.</div>'+
    newFound.map(function(f){
      var name = (f.data.profile&&f.data.profile.businessName)||'(no name)';
      var type = (f.data.profile&&f.data.profile.businessType)||'Trading';
      var sales = 0;
      try{ (f.data.sales||[]).forEach(function(s){sales+=s.totalAmount||0;}); }catch(e){}
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px;border:1px solid #BBDEFB;border-radius:8px;margin-bottom:6px">'+
        '<div>'+
          '<div style="font-weight:700;font-size:13px">'+esc(name)+'</div>'+
          '<div style="font-size:11px;color:#546E7A">'+esc(type)+' • Sales: ₹'+Math.round(sales).toLocaleString('en-IN')+'</div>'+
          '<div style="font-size:10px;color:#90A4AE">Key: '+esc(f.key)+'</div>'+
        '</div>'+
        '<button data-rkey="'+esc(f.key)+'" onclick="recoverBiz(this.dataset.rkey)" style="padding:6px 12px;border-radius:6px;border:none;background:#2E7D32;color:#fff;font-size:12px;font-weight:700;cursor:pointer">Recover</button>'+
      '</div>';
    }).join('')+

}

function recoverBiz(key){
  try {
    var raw = localStorage.getItem(key);
    if(!raw) return;
    var data = migrateData(JSON.parse(raw));
    
    // If this key is already a BIZ_PREFIX key, just add to registry
    var bizId;
    if(key.startsWith(BIZ_PREFIX)){
      bizId = key.replace(BIZ_PREFIX,'');
    } else {
      // Copy to new biz key
      bizId = newBizId();
      saveBizData(bizId, data);
    }
    
    var reg = getRegistry();
    // Check not already there
    if(reg.find(function(b){return b.id===bizId;})) return;
    
    var name = (data.profile&&data.profile.businessName)||'Recovered Business';
    var type = (data.profile&&data.profile.businessType)||'Trading';
    reg.push({id:bizId, name:name, type:type, 
              created:new Date().toISOString().slice(0,10),
              lastOpened:new Date().toISOString().slice(0,10)});
    saveRegistry(reg);
    renderPage();
    toast('Recovered: '+name);
  } catch(e){
    toast('Recovery failed: '+e.message,'e');
  }
}

function recoverAllBiz(){
  var found = recoverAllBusinesses();
  var reg = getRegistry();
  var regKeys = reg.map(function(b){ return BIZ_PREFIX+b.id; });
  var count = 0;
  
  found.forEach(function(f){
    if(f.key === REGISTRY_KEY || f.key === ACTIVE_KEY) return;
    if(regKeys.indexOf(f.key) >= 0) return;
    
    try {
      var data = migrateData(f.data);
      var bizId;
      if(f.key.startsWith(BIZ_PREFIX)){
        bizId = f.key.replace(BIZ_PREFIX,'');
      } else {
        bizId = newBizId();
        saveBizData(bizId, data);
      }
      if(reg.find(function(b){return b.id===bizId;})) return;
      
      var name = (data.profile&&data.profile.businessName)||'Recovered Business';
      var type = (data.profile&&data.profile.businessType)||'Trading';
      reg.push({id:bizId, name:name, type:type,
                created:new Date().toISOString().slice(0,10),
                lastOpened:new Date().toISOString().slice(0,10)});
      regKeys.push(BIZ_PREFIX+bizId);
      count++;
    } catch(e){}
  });
  
  if(count > 0){
    saveRegistry(reg);
    renderPage();
    toast('Recovered '+count+' business(es)!');
  } else {
    toast('No new businesses to recover','w');
  }
}

function recordInterUnit(){
  var type    = gv('iu_type') || 'goods_out';
  var bizId   = gv('iu_biz')  || '';
  var date    = gv('iu_date') || td();
  var amt     = gvn('iu_amt');
  var desc    = gv('iu_desc') || 'Inter-unit transfer';
  var settle  = gv('iu_settle') || 'credit';

  if(!bizId){  toast('Select the other unit','e'); return; }
  if(!amt||amt<=0){ toast('Enter amount','e'); return; }

  var reg = getRegistry();
  var otherBiz = reg.find(function(b){ return b.id===bizId; });
  if(!otherBiz){ toast('Business not found','e'); return; }

  var activeId = getActiveId();
  var activeBiz = reg.find(function(b){ return b.id===activeId; });
  var activeName = activeBiz ? activeBiz.name : 'Unknown';

  var typeLabels = {
    goods_out:'Goods Sent', goods_in:'Goods Received',
    cash_out:'Cash Sent', cash_in:'Cash Received',
    expense_share:'Shared Expense'
  };

  var transferId = uid();

  // ── Record in CURRENT business ──
  if(!D.interUnit) D.interUnit = [];
  D.interUnit.push({
    id: transferId,
    date: date,
    type: type,
    typeLabel: typeLabels[type]||type,
    direction: (type==='goods_out'||type==='cash_out'||type==='expense_share')?'out':'in',
    otherBizId: bizId,
    otherBizName: otherBiz.name,
    amount: amt,
    desc: desc,
    settlement: settle,
    settled: settle !== 'credit',
    createdAt: new Date().toISOString()
  });

  // Record cash/bank movement in current biz
  var isCashOut = (type==='goods_out'&&settle==='cash')||(type==='cash_out');
  var isCashIn  = (type==='goods_in'&&settle==='cash')||(type==='cash_in');
  var isBankOut = (type==='goods_out'&&settle==='bank')||(type==='cash_out'&&settle==='bank');
  var isBankIn  = (type==='goods_in'&&settle==='bank')||(type==='cash_in'&&settle==='bank');

  var cbEntry = {
    id:uid(), date:date,
    type: (type.endsWith('_out')||type==='expense_share')?'payment':'receipt',
    mode: settle==='bank'?'bank':(settle==='cash'?'cash':'credit'),
    subMode: settle==='bank'?'bank:acc1':(settle==='cash'?'cash':'credit'),
    amount: amt,
    party: otherBiz.name,
    description: typeLabels[type]+': '+desc+' (Inter-unit with '+otherBiz.name+')'
  };
  if(settle !== 'credit') D.cashBook.push(cbEntry);

  // If credit — create debtor or creditor in current biz
  if(settle === 'credit'){
    if(type==='goods_out'||type==='cash_out'||type==='expense_share'){
      // Current biz is owed money — create debtor
      if(!D.debtors) D.debtors=[];
      D.debtors.push({id:uid(),name:otherBiz.name,amount:amt,date:date,
                      ref:'Inter-unit: '+typeLabels[type]+' - '+desc,
                      interUnit:true, transferId:transferId});
    } else {
      // Current biz owes money — create creditor
      if(!D.creditors) D.creditors=[];
      D.creditors.push({id:uid(),name:otherBiz.name,amount:amt,date:date,
                        ref:'Inter-unit: '+typeLabels[type]+' - '+desc,
                        interUnit:true, transferId:transferId});
    }
  }

  // Save current biz
  saveBizData(activeId, D);

  // ── Record in OTHER business ──
  var allData = getAllData();
  if(!allData.businesses) allData.businesses={};
  var otherData = allData.businesses[bizId] ? 
    JSON.parse(JSON.stringify(allData.businesses[bizId])) : defD();
  otherData = migrateData(otherData);

  if(!otherData.interUnit) otherData.interUnit = [];
  // Mirror entry in other biz
  var mirrorType = {
    goods_out:'goods_in', goods_in:'goods_out',
    cash_out:'cash_in', cash_in:'cash_out',
    expense_share:'expense_share'
  }[type]||type;

  otherData.interUnit.push({
    id: transferId+'_m',
    date: date,
    type: mirrorType,
    typeLabel: typeLabels[mirrorType]||mirrorType,
    direction: mirrorType.endsWith('_in')?'in':'out',
    otherBizId: activeId,
    otherBizName: activeName,
    amount: amt,
    desc: desc,
    settlement: settle,
    settled: settle !== 'credit',
    createdAt: new Date().toISOString()
  });

  // Cash/bank entry in other biz
  var otherCbEntry = {
    id:uid(), date:date,
    type: mirrorType.endsWith('_in')?'receipt':'payment',
    mode: settle==='bank'?'bank':(settle==='cash'?'cash':'credit'),
    subMode: settle==='bank'?'bank:acc1':(settle==='cash'?'cash':'credit'),
    amount: amt,
    party: activeName,
    description: typeLabels[mirrorType]+': '+desc+' (Inter-unit with '+activeName+')'
  };
  if(settle !== 'credit') otherData.cashBook.push(otherCbEntry);

  // Debtor/creditor in other biz
  if(settle === 'credit'){
    if(mirrorType==='goods_in'||mirrorType==='cash_in'){
      if(!otherData.creditors) otherData.creditors=[];
      otherData.creditors.push({id:uid(),name:activeName,amount:amt,date:date,
                                ref:'Inter-unit: '+typeLabels[mirrorType]+' - '+desc,
                                interUnit:true, transferId:transferId});
    } else {
      if(!otherData.debtors) otherData.debtors=[];
      otherData.debtors.push({id:uid(),name:activeName,amount:amt,date:date,
                              ref:'Inter-unit: '+typeLabels[mirrorType]+' - '+desc,
                              interUnit:true, transferId:transferId});
    }
  }

  // Save other biz
  allData.businesses[bizId] = otherData;
  setAllData(allData);

  window._iutab = 'ledger';
  renderPage();
  toast('Transfer recorded in both businesses! ✅');
}

function settleInterUnit(tid){
  if(!D.interUnit) return;
  var transfer = D.interUnit.find(function(t){ return t.id===tid; });
  if(!transfer) return;

  transfer.settled = true;
  transfer.settledOn = td();

  // Also add cash/bank entry for settlement
  var isOut = transfer.direction==='out';
  D.cashBook.push({
    id:uid(), date:td(),
    type: isOut?'receipt':'payment',
    mode:'cash', subMode:'cash',
    amount: transfer.amount,
    party: transfer.otherBizName,
    description: 'Settlement: '+transfer.typeLabel+' with '+transfer.otherBizName
  });

  // Clear debtor/creditor
  if(isOut){
    // Was debtor — mark receipt
    if(D.debtors){
      D.debtors.push({id:uid(),name:transfer.otherBizName,
                      amount:-transfer.amount,date:td(),
                      ref:'Settlement of inter-unit transfer'});
    }
  } else {
    if(D.creditors){
      D.creditors.push({id:uid(),name:transfer.otherBizName,
                        amount:-transfer.amount,date:td(),
                        ref:'Settlement of inter-unit transfer'});
    }
  }

  sv();
  renderPage();
  toast('Settled! Cash entry added.');
}

function cleanDuplicateBiz(){
  var reg = getRegistry();
  var allData = getAllData();
  
  // Group by business name — keep the one with most data
  var nameMap = {};
  reg.forEach(function(b){
    var name = (b.name||'').trim().toLowerCase();
    if(!name || name==='unnamed' || name==='my business') return;
    if(!nameMap[name]) nameMap[name] = [];
    nameMap[name].push(b);
  });
  
  var toRemove = [];
  Object.keys(nameMap).forEach(function(name){
    var dupes = nameMap[name];
    if(dupes.length <= 1) return;
    
    // Score each — more sales/data = better
    var scored = dupes.map(function(b){
      var data = allData.businesses ? allData.businesses[b.id] : null;
      var score = 0;
      if(data){
        score += (data.sales||[]).length * 10;
        score += (data.purchases||[]).length * 5;
        score += (data.cashBook||[]).length * 2;
        score += (data.inventory||[]).length * 3;
        score += (data.trialBalance||[]).length * 8;
      }
      return {b:b, score:score};
    });
    scored.sort(function(a,b){return b.score-a.score;});
    
    // Keep best, remove rest
    for(var i=1;i<scored.length;i++){
      toRemove.push(scored[i].b.id);
    }
  });
  
  // Also remove unnamed/blank ones if real ones exist
  var hasReal = reg.some(function(b){
    var n=(b.name||'').trim().toLowerCase();
    return n && n!=='unnamed' && n!=='my business';
  });
  if(hasReal){
    reg.forEach(function(b){
      var n=(b.name||'').trim().toLowerCase();
      if(!n || n==='unnamed' || n==='my business'){
        toRemove.push(b.id);
      }
    });
  }
  
  if(toRemove.length === 0){
    toast('No duplicates found ✅','s');
    return;
  }
  
  // Remove duplicates
  var activeId = getActiveId();
  var newReg = reg.filter(function(b){ return toRemove.indexOf(b.id)<0; });
  
  // If active was removed, switch to first remaining
  if(toRemove.indexOf(activeId)>=0 && newReg.length>0){
    setActiveId(newReg[0].id);
    var data = loadBizData(newReg[0].id);
    D = data ? migrateData(data) : defD();
    BIZ_TYPE = getBizType();
  }
  
  saveRegistry(newReg);
  renderPage();
  toast('Removed '+toRemove.length+' duplicate(s) ✅');
}

  var biz = getBizType();

  if(biz==='Manufacturing'||biz==='Trading + Manufacturing') base.push('production');
  if(biz==='Service'||biz==='Trading + Service') base.push('consumption');
  base = base.concat(['interunit','purchase','sales','expenses','cashbank','recon','emi',
    'financials','projections','analytics','loanassess','reminders',
    'gstmodule','partycodes','hsnmaster','incometax','reports','data','template','help']);
  return base;
}
var NAV_ALL = getNavAll();
var BN_PAGES = ['dashboard','sales','purchase','financials','data'];
var BN_ICONS = ['🏠','🏷️','🛒','📄','⚙️'];

function t(key) { return (window._hi ? PAGES_HI[key] : PAGES_EN[key]) || key; }

function buildNav() {
  var nb = document.getElementById('nav');
  var bb = document.getElementById('bn');
  if (!nb || !bb) return;
  var ns = '';
  var navList = getNavAll(); navList.forEach(function(p) {
    ns += '<button onclick="go(\''+p+'\')" style="padding:8px 12px;border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;color:'+(curPg===p?'#1565C0':'#546E7A')+';border-bottom:'+(curPg===p?'2px solid #1565C0':'2px solid transparent')+'">'+t(p)+'</button>';
  });
  nb.innerHTML = ns;
  var bs = '';
  BN_PAGES.forEach(function(p, i) {
    bs += '<button onclick="go(\''+p+'\')" class="'+(curPg===p?'act':'')+'"><span class="ic">'+BN_ICONS[i]+'</span>'+t(p)+'</button>';
  });
  bb.innerHTML = bs;
}

function go(pg) { curPg = pg; window._editType=null; window._editId=null; buildNav(); renderPage(); window.scrollTo(0,0); }

function renderPage() {
  try{ BIZ_TYPE = getBizType(); }catch(e){ BIZ_TYPE='Trading'; }
  var el = document.getElementById('pg');
  if (!el) return;
  var nb = document.getElementById('nav'), bb = document.getElementById('bn');
  if(isPinLockActive() || window._showPinSetup){
    if(nb) nb.innerHTML=''; if(bb) bb.innerHTML='';
    el.innerHTML = pgPinLock(!!window._showPinSetup);
    return;
  }
  if(nb && nb.innerHTML==='') buildNav();
  var fns = {dashboard:pgDash,profile:pgProf,capital:pgCap,inventory:pgInv,purchase:pgPur,sales:pgSal,expenses:pgExp,cashbank:pgCB,emi:pgEMI,recon:pgRecon,financials:pgFin,projections:pgProj,analytics:pgAna,reports:pgRep,data:pgDat,help:pgHelp,loanassess:pgLoanAssess,reminders:pgReminders,gstmodule:pgGST,partycodes:pgPartyCodes,hsnmaster:pgCustomHSN,incometax:pgIncomeTax,production:pgProduction,consumption:pgConsumption,bizmanager:pgBizManager,interunit:pgInterUnit,template:pgTemplate};
  try { el.innerHTML = (fns[curPg] || pgDash)(); }
  catch(e) { el.innerHTML = '<div class="al ald"><b>Error:</b> '+esc(e.message)+'</div>'; }
  // Update business switcher bar
  try {
    var swEl = document.getElementById('biz-switcher-wrap');
    if(swEl) swEl.innerHTML = renderBizSwitcher();
  } catch(e2){}

function loadFullApp() {
  try {
    initMultiBiz();
  } catch(e) {
    // Fallback — just load fresh data
    try {
      var raw = localStorage.getItem(SK);
      D = raw ? migrateData(JSON.parse(raw)) : defD();
    } catch(e2) {
      D = defD();
    }
    BIZ_TYPE = (D&&D.profile&&D.profile.businessType)||'Trading';
  }
  try { buildNav(); } catch(e) {}
  try { renderPage(); } catch(e) {
    var el = document.getElementById('pg');
    if(el) el.innerHTML = '<div style="padding:20px;color:#C62828"><b>Startup Error:</b> '+esc(String(e.message))+'<br><br>Please share this message to get it fixed.</div>';
  }
}

  return true;
};
