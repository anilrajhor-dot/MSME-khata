var TB_HEAD_CODES = TB_HEADS.map(function(h){return h[0];});

// Parse uploaded rows (array of row-arrays, first row = header) into D.trialBalance entries
function importTBRows(rows){
  if(!rows || rows.length<2) return {ok:false, error:'File appears empty or has no data rows.'};
  var header = rows[0].map(function(h){return String(h||'').trim();});
  // Map expected column names to indices (case-insensitive, tolerant of extra/missing columns)
  var colIdx = {};
  TB_CSV_COLUMNS.forEach(function(col){
    for(var i=0;i<header.length;i++){
      if(header[i].toLowerCase().replace(/[^a-z0-9]/g,'')===col.toLowerCase().replace(/[^a-z0-9]/g,'')){ colIdx[col]=i; break; }
    }
  });
  if(colIdx['Head']===undefined) return {ok:false, error:'Could not find a "Head" column. Please use the downloaded template.'};

  var newRows=[]; var errors=[];
  for(var r=1;r<rows.length;r++){
    var row = rows[r];
    if(!row || row.length===0) continue;
    var headRaw = String(row[colIdx['Head']]||'').trim();
    if(!headRaw) continue;
    if(/^instructions/i.test(headRaw) || /^\d+\./.test(headRaw) || /^valid head codes/i.test(headRaw) || headRaw.indexOf(' = ')>=0) continue;
    var head = headRaw.toLowerCase();
    if(TB_HEAD_CODES.indexOf(head)<0){
      errors.push('Row '+(r+1)+': unrecognized Head "'+headRaw+'" - skipped.');
      continue;
    }
    var get = function(col){ return colIdx[col]!==undefined ? row[colIdx[col]] : ''; };
    var amount = parseAmount(get('Amount'));
    var name = String(get('Name')||'').trim();
    var qty = parseAmount(get('Qty'));
    var unit = String(get('Unit')||'').trim() || 'No.';
    var cost = parseAmount(get('CostPerUnit'));
    var category = String(get('Category')||'').trim();
    var ratePct = parseAmount(get('RatePct'));
    var lifeOrTenure = parseAmount(get('UsefulLifeOrTenure'));
    var dateVal = parseAnyDate(String(get('Date')||'')) || td();

    var newRow = {head:head, label:name, side:tbHeadSide(head), amount:amount};

    if(head==='stockitem'){
      newRow.qty=qty; newRow.cost=cost; newRow.unit=unit||'No.';
      newRow.amount = qty*cost;
    }
    if(head==='fixedassetitem'){
      newRow.category = category || 'Other';
      newRow.depRate = ratePct;
      newRow.purchaseDate = dateVal;
    }
    if(head==='intangibleitem'){
      newRow.category = category || 'Other';
      newRow.usefulLife = lifeOrTenure;
      newRow.purchaseDate = dateVal;
    }
    if(head==='loan'){
      newRow.loanType = category || 'Term Loan';
      newRow.depRate = ratePct; // interest rate
      newRow.usefulLife = lifeOrTenure; // tenure months
      newRow.purchaseDate = dateVal; // sanction date
    }
    newRows.push(newRow);
  }

  if(newRows.length===0) return {ok:false, error:'No valid rows found.'+(errors.length?(' '+errors.join(' ')):'')};

  return {ok:true, rows:newRows, errors:errors};
}


// ===== MULTI-SHEET XLSX PARSER (for full Business Data Import) =====
// Parses ALL named sheets in an .xlsx, returning {SheetName: [[row],[row],...]}
async function parseXlsxAllSheets(buf){
  if(typeof DecompressionStream==='undefined') throw new Error('XLSX_UNSUPPORTED');
  var entries = parseZipEntries(buf);

  // Read workbook.xml for sheet name -> rId mapping
  if(!entries['xl/workbook.xml']) throw new Error('NO_WORKBOOK_XML');
  var wbBytes = await extractZipEntry(buf, entries['xl/workbook.xml']);
  var wbXml = bytesToStr(wbBytes);
  var sheetTags = xmlGetTagText(wbXml, 'sheets')[0] || '';
  var sheetDefs = [];
  var sheetRe = /<sheet\b[^>]*\/>/g, m;
  while((m = sheetRe.exec(sheetTags))){
    var tag = m[0];
    var nameM = tag.match(/name="([^"]*)"/);
    var ridM = tag.match(/r:id="([^"]*)"/);
    if(nameM && ridM) sheetDefs.push({name:decodeXmlEntities(nameM[1]), rid:ridM[1]});
  }

  // Read rels for rId -> target file mapping
  var ridToFile = {};
  if(entries['xl/_rels/workbook.xml.rels']){
    var relBytes = await extractZipEntry(buf, entries['xl/_rels/workbook.xml.rels']);
    var relXml = bytesToStr(relBytes);
    var relRe = /<Relationship\b[^>]*\/>/g, rm;
    while((rm = relRe.exec(relXml))){
      var rtag = rm[0];
      var idM = rtag.match(/Id="([^"]*)"/);
      var targetM = rtag.match(/Target="([^"]*)"/);
      if(idM && targetM){
        var t = targetM[1].replace(/^\/?xl\//,'').replace(/^\//,'');
        if(t.indexOf('worksheets/')!==0 && t.indexOf('/')<0) t = 'worksheets/'+t;
        ridToFile[idM[1]] = 'xl/'+t;
      }
    }
  }

  var sharedStrings = [];
  if(entries['xl/sharedStrings.xml']){
    var ssBytes = await extractZipEntry(buf, entries['xl/sharedStrings.xml']);
    sharedStrings = parseSharedStrings(bytesToStr(ssBytes));
  }

  var result = {};
  for(var i=0;i<sheetDefs.length;i++){
    var sd = sheetDefs[i];
    var file = ridToFile[sd.rid];
    if(!file || !entries[file]) continue;
    var sBytes = await extractZipEntry(buf, entries[file]);
    var sXml = bytesToStr(sBytes);
    result[sd.name] = parseSheetXml(sXml, sharedStrings);
  }
  return result;
}

// ===== BUSINESS DATA IMPORT — Trial Balance + Inventory + Fixed Assets + Loans + Partners =====
// Reads any combination of these named sheets (case-insensitive, partial match):
//   "Trial Balance" / "TrialBalance" / "TB"
//   "Inventory" / "Stock"
//   "Fixed Assets" / "FixedAssets"
//   "Loans"
//   "Partners" / "Directors" / "Members"
// Any sheet not present is simply skipped — partial uploads are fine.
function findSheetByNames(sheets, candidates){
  var keys = Object.keys(sheets);
  for(var c=0;c<candidates.length;c++){
    var want = candidates[c].toLowerCase().replace(/[^a-z0-9]/g,'');
    for(var k=0;k<keys.length;k++){
      if(keys[k].toLowerCase().replace(/[^a-z0-9]/g,'')===want) return sheets[keys[k]];
    }
  }
  return null;
}
function rowsToObjects(rows){
  if(!rows || rows.length<2) return [];
  var header = rows[0].map(function(h){return String(h||'').trim();});
  var out = [];
  var hitInstructions = false;
  for(var r=1;r<rows.length;r++){
    var row = rows[r];
    if(!row || row.length===0 || !row.some(function(c){return String(c||'').trim()!=='';})) continue;
    var firstCell = String(row[0]||'').trim();
    // Stop reading data once we hit the instructions block (matches template format:
    // a line starting with "INSTRUCTIONS", or a numbered guidance line like "1. ...")
    if(/^instructions/i.test(firstCell)) { hitInstructions = true; continue; }
    if(hitInstructions) continue;
    if(/^\d+\.\s/.test(firstCell)) continue; // numbered instruction lines even before the header is hit
    var obj = {};
    for(var c=0;c<header.length;c++){ if(header[c]) obj[header[c]] = row[c]!==undefined ? row[c] : ''; }
    out.push(obj);
  }
  return out;
}
function importFullBusinessData(sheets){
  var summary = {tb:0, inventory:0, fixedAssets:0, loans:0, partners:0, errors:[]};

  // Check if non-TB sheets are present and TB is not yet posted
  var hasNonTBSheets = findSheetByNames(sheets,['Inventory','Stock','Stock Items']) ||
                       findSheetByNames(sheets,['Fixed Assets','FixedAssets','Assets']) ||
                       findSheetByNames(sheets,['Loans','Loan']) ||
                       findSheetByNames(sheets,['Partners','Directors','Members']);
  var hasTBSheet = findSheetByNames(sheets,['Trial Balance','TrialBalance','TB','Opening Balances']);
  if(hasNonTBSheets && !hasTBSheet && !D.tbPosted){
    alert('⚠️ Opening Trial Balance Not Posted\n\nYour file contains Inventory / Fixed Assets / Loans / Partners sheets but your Opening Trial Balance has not been posted yet.\n\nPlease either:\n1. Include a \"Trial Balance\" sheet in this file, OR\n2. Post your Opening Trial Balance first (Data → Opening Trial Balance → Post to Books)\n\nThis ensures your Balance Sheet stays in balance.');
    return summary;
  }

  // 1. Trial Balance (reuses existing importTBRows logic on the matched sheet's rows)
  var tbRows = findSheetByNames(sheets, ['Trial Balance','TrialBalance','TB','Opening Balances']);
  if(tbRows && tbRows.length>1){
    var tbResult = importTBRows(tbRows);
    if(tbResult.ok){
      D.trialBalance = tbResult.rows;
      summary.tb = tbResult.rows.length;
      if(tbResult.errors.length) summary.errors = summary.errors.concat(tbResult.errors.map(function(e){return 'Trial Balance: '+e;}));
    } else {
      summary.errors.push('Trial Balance: '+tbResult.error);
    }
  }

  // 2. Inventory (Items currently held — separate from Trial Balance stockitem rows,
  //    this sheet is for the live Inventory module so items show up in Sales/Purchase dropdowns)
  var invRows = findSheetByNames(sheets, ['Inventory','Stock','Stock Items']);
  if(invRows && invRows.length>1){
    var invObjs = rowsToObjects(invRows);
    invObjs.forEach(function(o){
      var name = String(o['ItemName']||o['Item Name']||o['Name']||'').trim();
      if(!name) return;
      var existing = D.inventory.find(function(i){return i.itemName.toLowerCase()===name.toLowerCase();});
      var stock = parseAmount(o['CurrentStock']||o['Current Stock']||o['Stock']||0);
      var cost = parseAmount(o['AvgCost']||o['Avg Cost']||o['Cost']||o['Rate']||0);
      var unit = String(o['Unit']||'No.').trim()||'No.';
      var reorder = parseAmount(o['ReorderLevel']||o['Reorder Level']||0);
      if(existing){
        existing.currentStock = stock; existing.avgCost = cost; existing.unit = unit; existing.reorderLevel = reorder;
      } else {
        D.inventory.push({id:uid(), itemName:name, unit:unit, openingStock:stock, currentStock:stock,
          avgCost:cost, importedStock:0, importedAvgCost:0, reorderLevel:reorder});
      }
      summary.inventory++;
    });
  }

  // 3. Fixed Assets (live Fixed Assets register, separate from TB opening entries —
  //    use this for assets you want to track with ongoing depreciation in the app)
  var faRows = findSheetByNames(sheets, ['Fixed Assets','FixedAssets','Assets']);
  if(faRows && faRows.length>1){
    var faObjs = rowsToObjects(faRows);
    // TB FA total — used to validate we don't exceed opening FA
    var tbFATotal = (D.trialBalance||[]).filter(function(r){return r.head==='fixedassetitem'||r.head==='fixedassets'||r.head==='intangibleitem';}).reduce(function(s,r){return s+(+r.amount||0);},0);
    faObjs.forEach(function(o){
      var name = String(o['Name']||o['Asset Name']||'').trim();
      if(!name) return;
      // Skip if already exists in fixedAssets (by name) to prevent duplicates
      var alreadyExists = (D.fixedAssets||[]).some(function(f){ return f.name.toLowerCase()===name.toLowerCase(); });
      if(alreadyExists){ summary.errors.push('FA skipped (already exists): '+name); return; }
      var faCost2 = parseAmount(o['Cost']||o['Amount']||0);
      // Validate: current FA total + new item must not exceed TB FA total (if TB posted)
      if(D.tbPosted && tbFATotal>0){
        var currentFATotal = (D.fixedAssets||[]).reduce(function(s,f){return s+(+f.cost||0);},0);
        if(currentFATotal + faCost2 > tbFATotal + 0.01){
          summary.errors.push('FA skipped (exceeds TB FA total of ₹'+tbFATotal.toLocaleString("en-IN")+'): '+name+' ₹'+faCost2.toLocaleString("en-IN"));
          return;
        }
      }
      D.fixedAssets.push({
        id:uid(), name:name, category:String(o['Category']||'Other').trim(),
        cost:faCost2,
        depRate:parseAmount(o['DepRate']||o['Dep Rate']||o['RatePct']||0),
        purchaseDate: parseAnyDate(String(o['PurchaseDate']||o['Purchase Date']||o['Date']||''))||td(),
        accumDep:0, lastDepDate: parseAnyDate(String(o['PurchaseDate']||o['Purchase Date']||o['Date']||''))||td(),
        disposed:false
      });
      // Keep D.otherAssets in sync so otherAssetsExclFA() stays correct
      D.otherAssets = (+D.otherAssets||0) + faCost2;
      D.otherAssetsNotes = D.otherAssetsNotes||[];
      D.otherAssetsNotes.push({label:name+' ('+String(o['Category']||'Other').trim()+')', amount:faCost2});
      summary.fixedAssets++;
    });
  }

  // 4. Loans (live Loans register, separate from TB opening loan entries —
  //    use this for loans you want to track with EMI/interest schedules going forward)
  var loanRows = findSheetByNames(sheets, ['Loans','Loan']);
  if(loanRows && loanRows.length>1){
    var loanObjs = rowsToObjects(loanRows);
    loanObjs.forEach(function(o){
      var bank = String(o['BankName']||o['Bank Name']||o['Lender']||'').trim();
      if(!bank) return;
      D.loans.push({
        id:uid(), bankName:bank, accountNumber:String(o['AccountNumber']||o['Account Number']||'').trim(),
        loanType:String(o['LoanType']||o['Loan Type']||'Term Loan').trim(),
        amount:parseAmount(o['Amount']||o['SanctionedAmount']||0),
        rate:parseAmount(o['Rate']||o['InterestRate']||o['RatePct']||0),
        tenure:parseAmount(o['Tenure']||o['TenureMonths']||0),
        sanctionDate: parseAnyDate(String(o['SanctionDate']||o['Sanction Date']||''))||td(),
        emi:0, outstandingBalance:parseAmount(o['OutstandingBalance']||o['Outstanding']||o['Amount']||0),
        sanctionedAmount:parseAmount(o['Amount']||o['SanctionedAmount']||0),
        undrawn:false, sanctionedLimit:parseAmount(o['SanctionedLimit']||0),
        lastInterestDate: parseAnyDate(String(o['SanctionDate']||o['Sanction Date']||''))||td(),
        payments:[]
      });
      summary.loans++;
    });
  }

  // 5. Partners / Directors / Members
  var partnerRows = findSheetByNames(sheets, ['Partners','Directors','Members','Office Bearers']);
  if(partnerRows && partnerRows.length>1){
    var partnerObjs = rowsToObjects(partnerRows);
    if(!D.profile.partners) D.profile.partners = [];
    partnerObjs.forEach(function(o){
      var name = String(o['Name']||o['Full Name']||'').trim();
      if(!name) return;
      D.profile.partners.push({
        id:uid(), name:name, role:String(o['Role']||'Partner').trim(),
        share:parseAmount(o['Share']||o['SharePct']||o['Share%']||0),
        pan:String(o['PAN']||'').trim().toUpperCase(),
        din:String(o['DIN']||o['DIN/Aadhar']||o['Aadhar']||'').trim()
      });
      summary.partners++;
    });
  }

  return summary;
}

async function handleFullDataUpload(ev){
  var f=ev.target.files[0];
  if(!f) return;
  var statusEl=document.getElementById('fulldata_upload_status');
  if(statusEl) statusEl.innerHTML='<div class="al ali">Processing...</div>';
  try{
    if(!/\.xlsx?$/i.test(f.name)){
      if(statusEl) statusEl.innerHTML='<div class="al ald">Please upload an .xlsx file (download the template below to get the correct format).</div>';
      return;
    }
    if(typeof DecompressionStream==='undefined'){
      if(statusEl) statusEl.innerHTML='<div class="al ald">Your browser cannot read Excel files here. Please update your browser/iOS version.</div>';
      return;
    }
    var buf = await f.arrayBuffer();
    var sheets = await parseXlsxAllSheets(buf);
    var sheetNames = Object.keys(sheets);
    if(sheetNames.length===0){
      if(statusEl) statusEl.innerHTML='<div class="al ald">No readable sheets found in this file.</div>';
      return;
    }
    var proceed = await confirmDialogAsync('This will import data from sheets: '+sheetNames.join(', ')+'. Trial Balance (if present) will REPLACE existing opening balances. Inventory/Fixed Assets/Loans/Partners will be ADDED to existing data. Continue?');
    if(!proceed){ if(statusEl) statusEl.innerHTML=''; return; }

    var summary = importFullBusinessData(sheets);

    // If Trial Balance rows were imported successfully, auto-post them now
    // so that opening balances are set and other sheets (FA, Inventory) balance correctly
    if(summary.tb && D.trialBalance && D.trialBalance.length>0 && !D.tbPosted){
      var tbTotals = {dr:0, cr:0};
      D.trialBalance.forEach(function(r){ if(r.side==='dr') tbTotals.dr+=(+r.amount||0); else tbTotals.cr+=(+r.amount||0); });
      if(Math.abs(tbTotals.dr - tbTotals.cr) < 0.01){
        postTBExecute();
        summary.tbAutoPosted = true;
      } else {
        summary.errors.push('Trial Balance does not tally (DR '+tbTotals.dr+' vs CR '+tbTotals.cr+') — please correct and post manually via Data → Opening Trial Balance.');
      }
    }

    sv();
    var msg = 'Import complete: ';
    var parts = [];
    if(summary.tb) parts.push(summary.tb+' Trial Balance row(s)'+(summary.tbAutoPosted?' (auto-posted ✅)':''));
    if(summary.inventory) parts.push(summary.inventory+' Inventory item(s)');
    if(summary.fixedAssets) parts.push(summary.fixedAssets+' Fixed Asset(s)');
    if(summary.loans) parts.push(summary.loans+' Loan(s)');
    if(summary.partners) parts.push(summary.partners+' Partner(s)/Director(s)');
    msg += parts.length ? parts.join(', ')+'.' : 'No matching sheets found — check sheet names match the template.';
    if(summary.errors.length) msg += ' '+summary.errors.length+' warning(s).';
    if(statusEl) statusEl.innerHTML='<div class="al '+(summary.errors.length?'alw':'als')+'">'+esc(msg)+(summary.errors.length?'<br>'+summary.errors.map(esc).join('<br>'):'')+'</div>';
    renderPage();
  }catch(e){
    if(statusEl) statusEl.innerHTML='<div class="al ald">Error reading file: '+esc(e.message)+'</div>';
  }
}

async function handleTBUpload(ev){
  var f=ev.target.files[0];
  if(!f) return;
  var statusEl=document.getElementById('tb_upload_status');
  if(statusEl) statusEl.innerHTML='<div class="al ali">Processing...</div>';
  try{
    var rows;
    if(/\\.xlsx?$/i.test(f.name)){
      if(typeof DecompressionStream==='undefined'){
        if(statusEl) statusEl.innerHTML='<div class="al ald">Your browser cannot read Excel files here. Please save as CSV and upload that instead.</div>';
        return;
      }
      var buf = await f.arrayBuffer();
      rows = await parseXlsxArrayBuffer(buf);
    } else {
      var text = await f.text();
      rows = parseCSV(text);
    }
    var result = importTBRows(rows);
    if(!result.ok){
      if(statusEl) statusEl.innerHTML='<div class="al ald">'+esc(result.error)+'</div>';
      return;
    }
    if(D.trialBalance && D.trialBalance.length>0){
      var proceed = await confirmDialogAsync('This will REPLACE your '+D.trialBalance.length+' existing Trial Balance row(s) with '+result.rows.length+' row(s) from the file. Continue?');
      if(!proceed){
        if(statusEl) statusEl.innerHTML='';
        return;
      }
    }
    D.trialBalance = result.rows;
    sv();
    var msg = 'Imported '+result.rows.length+' row(s).';
    if(result.errors.length) msg += ' '+result.errors.length+' row(s) skipped (see below).';
    if(statusEl) statusEl.innerHTML='<div class="al '+(result.errors.length?'alw':'als')+'">'+esc(msg)+(result.errors.length?'<br>'+result.errors.map(esc).join('<br>'):'')+'</div>';
    renderPage();
  }catch(e){
    if(statusEl) statusEl.innerHTML='<div class="al ald">Error reading file: '+esc(e.message)+'</div>';
  }
}

// ===== UNIVERSAL DOWNLOAD/SHARE HELPER (with file:// fallback for mobile) =====
function downloadOrShow(content, filename, mimeType){
  // Try the standard Blob download first (works on desktop browsers and some mobile browsers).
  var blobWorked = false;
  try{
    var bl = new Blob([content],{type:mimeType||'text/plain'});
    var url = URL.createObjectURL(bl);
    var a = document.createElement('a');
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click();
    setTimeout(function(){if(a.parentNode)document.body.removeChild(a);URL.revokeObjectURL(url);},100);
    blobWorked = true;
  }catch(e){}

  // Regardless of whether the above worked, ALSO show a guaranteed fallback:
  // a full-screen overlay with the content in a textarea for manual copy/save.
  // This is necessary because in many mobile in-app browsers, the Blob/download
  // click is silently ignored with no visible result.
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:10001;overflow-y:auto;padding:16px';

  var title = document.createElement('div');
  title.style.cssText = 'font-size:15px;font-weight:700;color:#0D2137;margin-bottom:6px';
  title.textContent = (blobWorked?'A download was attempted: ':'')+filename;

  var instructions = document.createElement('div');
  instructions.style.cssText = 'font-size:12px;color:#546E7A;margin-bottom:10px;line-height:1.4';
  instructions.textContent = (blobWorked
    ? 'If you did not see a "Downloaded" notification or cannot find the file, use the box below instead: tap "Select All", then "Copy", then paste it into a Note or new file named "'+filename+'" and save it (Files app, email to yourself, etc.).'
    : 'Tap "Select All" below, then "Copy". Paste this into a Note or a new file named "'+filename+'" and save it somewhere safe (Files app, email to yourself, etc.).');

  var ta = document.createElement('textarea');
  ta.readOnly = true;
  ta.value = content;
  ta.style.cssText = 'width:100%;height:55vh;font-family:monospace;font-size:11px;padding:8px;box-sizing:border-box;border:1px solid #BBDEFB;border-radius:8px;white-space:pre;resize:none';

  var btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:8px;justify-content:flex-end;margin-top:10px;flex-wrap:wrap';

  var selectBtn = document.createElement('button');
  selectBtn.textContent = 'Select All';
  selectBtn.style.cssText = 'padding:9px 14px;border-radius:8px;border:1px solid #BBDEFB;background:#fff;color:#1565C0;font-size:13px;cursor:pointer';
  selectBtn.onclick = function(){ ta.focus(); ta.select(); };

  var copyBtn = document.createElement('button');
  copyBtn.textContent = 'Copy';
  copyBtn.style.cssText = 'padding:9px 14px;border-radius:8px;border:none;background:#2E7D32;color:#fff;font-size:13px;font-weight:700;cursor:pointer';
  copyBtn.onclick = function(){
    ta.focus(); ta.select();
    try{
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(content);
        toast('Copied! Now paste it into a Note or file.');
      } else if(document.execCommand && document.execCommand('copy')){
        toast('Copied! Now paste it into a Note or file.');
      } else {
        toast('Tap inside the box, Select All, then use your keyboard\'s Copy option.','w');
      }
    }catch(e){
      toast('Tap inside the box, Select All, then use your keyboard\'s Copy option.','w');
    }
  };

  var closeBtn = document.createElement('button');
  closeBtn.textContent = 'Close';
  closeBtn.style.cssText = 'padding:9px 14px;border-radius:8px;border:1px solid #BBDEFB;background:#fff;color:#546E7A;font-size:13px;cursor:pointer';
  closeBtn.onclick = function(){ document.body.removeChild(overlay); };

  btnRow.appendChild(selectBtn);
  btnRow.appendChild(copyBtn);
  btnRow.appendChild(closeBtn);

  overlay.appendChild(title);
  overlay.appendChild(instructions);
  overlay.appendChild(ta);
  overlay.appendChild(btnRow);
  document.body.appendChild(overlay);
}

// ===== PIN PRIVACY SCREEN =====
// NOTE: This is a casual privacy screen, NOT real security/encryption.
// Data remains in plain localStorage; this only deters casual access (e.g. someone
// picking up the phone). A determined person with technical access can bypass it.
function simpleHash(str){
  var h1 = 0x811c9dc5, h2 = 0x1000193;
  for(var i=0;i<str.length;i++){
    var c = str.charCodeAt(i);
    h1 = (h1 ^ c) * 0x01000193; h1 = h1 >>> 0;
    h2 = (h2 + c) * 0x9e3779b1; h2 = h2 >>> 0;
  }
  return h1.toString(16)+h2.toString(16);
}

var _pinUnlocked = false;
var _pinEntry = '';

function isPinLockActive(){
  return D && D.security && D.security.pinEnabled && D.security.pinHash && !_pinUnlocked;
}

function pgPinLock(isSetup){
  var title = isSetup ? 'Set a PIN' : 'Enter PIN';
  var sub = isSetup
    ? 'Choose a 4-6 digit PIN to lock this app. This is a privacy screen only - it does not encrypt your data.'
    : 'Enter your PIN to continue.';
  var dots = '';
  for(var i=0;i<6;i++){
    dots += '<span style="display:inline-block;width:16px;height:16px;margin:0 4px;border-radius:50%;border:2px solid #1565C0;background:'+(i<_pinEntry.length?'#1565C0':'transparent')+'"></span>';
  }
  var keys = ['1','2','3','4','5','6','7','8','9','OK','0','BS'];
  var keypad = '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:18px auto">';
  keys.forEach(function(k){
    var label = k, action;
    if(k==='BS'){ label='⌫'; action='pinBackspace()'; }
    else if(k==='OK'){ label='OK'; action='pinDone()'; }
    else { action="pinPress('"+k+"')"; }
    keypad += '<button onclick="'+action+'" style="padding:16px;font-size:20px;border-radius:12px;border:1px solid #BBDEFB;background:#fff;cursor:pointer">'+label+'</button>';
  });
  keypad += '</div>';

  var errMsg = window._pinError ? '<div class="al ald" style="margin:10px auto;max-width:280px">'+esc(window._pinError)+'</div>' : '';
  var forgot = !isSetup ? '<div style="text-align:center;margin-top:14px"><button onclick="pinForgot()" style="background:none;border:none;color:#C62828;font-size:12px;text-decoration:underline;cursor:pointer">Forgot PIN?</button></div>' : '';

  return '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center">'+
    '<div style="font-size:40px;margin-bottom:8px">🔒</div>'+
    '<h2 style="margin:0 0 6px">'+title+'</h2>'+
    '<p style="font-size:12px;color:#546E7A;max-width:280px;margin:0 0 16px">'+sub+'</p>'+
    '<div>'+dots+'</div>'+
    errMsg+
    keypad+
    (isSetup ? '<div style="font-size:11px;color:#90A4AE;max-width:280px">Step '+(window._pinSetupStep===2?'2 of 2 - re-enter to confirm':'1 of 2')+'</div>' : '')+
    forgot+
    '</div>';
}

function pinPress(d){
  window._pinError='';
  if(_pinEntry.length<6) _pinEntry += d;
  renderPage();
}
function pinBackspace(){
  window._pinError='';
  _pinEntry = _pinEntry.slice(0,-1);
  renderPage();
}
function pinDone(){
  if(_pinEntry.length<4){ window._pinError='PIN must be at least 4 digits.'; renderPage(); return; }
  pinSubmit();
}
function pinSubmit(){
  if(window._showPinSetup){
    if(_pinEntry.length<4){ window._pinError='PIN must be at least 4 digits.'; renderPage(); return; }
    if(!window._pinSetupStep){
      window._pinSetupFirst = _pinEntry;
      _pinEntry='';
      window._pinSetupStep=2;
      renderPage();
      return;
    }
    if(_pinEntry !== window._pinSetupFirst){
      window._pinError='PINs did not match. Try again.';
      _pinEntry=''; window._pinSetupStep=null; window._pinSetupFirst=null;
      renderPage();
      return;
    }
    D.security = {pinEnabled:true, pinHash:simpleHash(_pinEntry)};
    sv();
    _pinUnlocked = true;
    _pinEntry=''; window._pinSetupStep=null; window._pinSetupFirst=null; window._pinError=''; window._showPinSetup=false;
    toast('PIN set!');
    renderPage();
    return;
  }
  if(simpleHash(_pinEntry)===D.security.pinHash){
    _pinUnlocked = true;
    _pinEntry=''; window._pinError='';
    renderPage();
  } else {
    window._pinError='Incorrect PIN. Try again.';
    _pinEntry='';
    renderPage();
  }
}
function pinForgot(){
  D.security = {pinEnabled:false, pinHash:''};
  sv();
  _pinUnlocked = true;
  _pinEntry=''; window._pinError='';
  toast('PIN removed.');
  renderPage();
}

function startPinSetup(){
  window._pinSetupStep=null; window._pinSetupFirst=null; window._pinError=''; _pinEntry='';
  window._showPinSetup = true;
  renderPage();
}
function removePinFromSettings(){
  D.security = {pinEnabled:false, pinHash:''};
  sv();
  toast('PIN removed.');
  renderPage();
}

// ===== MULTI-ITEM BILL / INVOICE =====
function getKnownCustomers(){
  var seen={}, names=[];
  D.sales.forEach(function(s){
    if(s.customerName && !seen[s.customerName]){ seen[s.customerName]=true; names.push(s.customerName); }
  });
  return names.sort();
}

function loadCustomerSalesIntoCart(){
  var cust = window._billCustomer || getBillCustomerName();
  var date = window._billDate || gv('bc_date');
  if(!cust){ toast('Enter or select a customer name first','e'); return; }
  if(!date){ toast('Select a date first','e'); return; }
  var matches = D.sales.filter(function(s){ return s.customerName===cust && s.date===date && !s.billNo; });
  if(matches.length===0){ toast('No matching sales found for '+cust+' on '+date,'e'); return; }
  window._billCart = window._billCart || [];
  matches.forEach(function(s){
    var item=null; for(var i=0;i<D.inventory.length;i++) if(D.inventory[i].id===s.itemId){item=D.inventory[i];break;}
    window._billCart.push({
      itemId:s.itemId, itemName:s.itemName, unit:s.unit, qty:s.qty, price:s.sellingPrice, amount:s.totalAmount,
      avgCost:item?item.avgCost:0, fromSaleId:s.id
    });
  });
  toast('Loaded '+matches.length+' item(s) from existing sales.');
  renderPage();
}

  );

  // Add item row
  var selId = window._billItem || '';
  var selItem=null; for(i=0;i<D.inventory.length;i++) if(D.inventory[i].id===selId) selItem=D.inventory[i];
  h += card('Add Item to Bill',
    sl('Item','bc_item',iOpts,selId)+
    g2(inp('Quantity','bc_qty','number',window._billQty||''),inp('Price per Unit (₹)','bc_price','number',selItem?selItem.sellingPrice||'':(window._billPrice||'')))+
    btn('+ Add to Bill','addToBillCart()','#2E7D32')
  );

  // Cart table
  if(cart.length){
    var total=0;
    var hasLoadedItems=false, hasNewItems=false;
    var rows = cart.map(function(c,idx){
      total += c.amount;
      if(c.fromSaleId) hasLoadedItems=true; else hasNewItems=true;
      var tag = c.fromSaleId ? ' <span style="font-size:10px;color:#2E7D32">(from existing sale)</span>' : '';
      return '<tr><td style="padding:6px 4px">'+esc(c.itemName)+tag+'</td><td style="padding:6px 4px;text-align:right">'+fmt(c.qty)+' '+esc(c.unit)+'</td><td style="padding:6px 4px;text-align:right">'+fc(c.price)+'</td><td style="padding:6px 4px;text-align:right">'+fc(c.amount)+'</td><td style="padding:6px 4px;text-align:center"><button onclick="removeFromBillCart('+idx+')" style="background:none;border:none;color:#C62828;font-weight:700;cursor:pointer">✕</button></td></tr>';
    }).join('');
    h += card('Bill Items',
      '<table style="width:100%;font-size:12px;border-collapse:collapse">'+
      '<tr style="font-weight:700;color:#546E7A;border-bottom:1px solid #ECEFF1"><td style="padding:6px 4px">Item</td><td style="padding:6px 4px;text-align:right">Qty</td><td style="padding:6px 4px;text-align:right">Rate</td><td style="padding:6px 4px;text-align:right">Amount</td><td></td></tr>'+
      rows+
      '<tr style="font-weight:700;border-top:2px solid #1565C0"><td colspan="3" style="padding:8px 4px">TOTAL</td><td style="padding:8px 4px;text-align:right">'+fc(total)+'</td><td></td></tr>'+
      '</table>'
    );

    var paymentNote = '';
    if(hasLoadedItems && !hasNewItems){
      paymentNote = '<div class="al ali">All items above were already recorded as sales (their cash/credit postings are unchanged). Payment Mode below is not needed - just tap Generate Bill to create the invoice.</div>';
    } else if(hasLoadedItems && hasNewItems){
      paymentNote = '<div class="al ali">Payment Mode below applies only to the NEW item(s) added; items marked "(from existing sale)" keep their original payment recording.</div>';
    }
    h += card('Payment',
      paymentNote+
      sl('Payment Mode','bc_mode',[{v:'cash',l:'Cash'},{v:'bank',l:'Bank/UPI'},{v:'credit',l:'Credit (add to Debtor balance)'}],window._billMode||'cash')+
      btn('🧾 Generate Bill','generateBill()','#1565C0')+' '+
      btn('Clear Cart','clearBillCart()','#C62828')
    );
  } else {
    h += '<div class="al ali">No items added yet.</div>';
  }

  return h;
}

// Get the currently chosen bill customer name, whether from the dropdown (existing customer) or the new-customer text field
function getBillCustomerName(){
  var sel = gv('bc_custsel');
  if(sel && sel!=='__new__') return sel;
  return gv('bc_cust');
}
function onBillCustomerSelChange(){
  var sel = gv('bc_custsel');
  window._billCustomerSel = sel;
  if(sel!=='__new__') window._billCustomer = sel;
  else window._billCustomer = '';
  renderPage();
}
function addToBillCart(){
  var iid=gv('bc_item'), qty=gvn('bc_qty'), price=gvn('bc_price');
  window._billCustomer = getBillCustomerName();
  window._billCustomerSel = gv('bc_custsel') || window._billCustomerSel;
  window._billDate = gv('bc_date');
  if(!iid){toast('Select an item','e');return;}
  if(!qty||!price){toast('Enter quantity and price','e');return;}
  var item=null; for(var i=0;i<D.inventory.length;i++) if(D.inventory[i].id===iid){item=D.inventory[i];break;}
  if(!item) return;
  if(qty>item.currentStock){toast('Insufficient stock! Available: '+fmt(item.currentStock),'e');return;}
  window._billCart = window._billCart || [];
  // check available stock considering items already in cart for same item
  var alreadyInCart=0;
  window._billCart.forEach(function(c){ if(c.itemId===iid) alreadyInCart += c.qty; });
  if(qty+alreadyInCart>item.currentStock){toast('Insufficient stock for total quantity! Available: '+fmt(item.currentStock),'e');return;}
  window._billCart.push({itemId:iid, itemName:item.itemName, unit:item.unit, qty:qty, price:price, amount:qty*price, avgCost:item.avgCost});
  window._billItem=''; window._billQty=''; window._billPrice='';
  renderPage();
}
function removeFromBillCart(idx){
  window._billCart.splice(idx,1);
  renderPage();
}
function clearBillCart(){
  confirmDialog('Clear all items from this bill?', function(){
    window._billCart=[];
    renderPage();
  });
}

function generateBill(){
  var cart = window._billCart||[];
  if(cart.length===0){toast('Add at least one item','e');return;}
  var cust = window._billCustomer || getBillCustomerName();
  if(!cust){toast('Enter customer name','e');return;}
  var date = window._billDate || gv('bc_date') || td();
  var mode = gv('bc_mode');

  var billNo = 'INV-' + String(D.nextBillNo).padStart(4,'0');
  D.nextBillNo++;

  var total=0;
  var items=[];
  var newSaleTotal=0, newSaleMode=mode;
  cart.forEach(function(c){
    var item=null; for(var i=0;i<D.inventory.length;i++) if(D.inventory[i].id===c.itemId){item=D.inventory[i];break;}
    var tot=c.amount;
    total += tot;
    items.push({itemName:c.itemName, unit:c.unit, qty:c.qty, price:c.price, amount:tot});

    if(c.fromSaleId){
      // This item was loaded from an EXISTING sale entry - just tag it with the bill number,
      // do not re-record stock/cash movements (already posted when that sale was made).
      var existing=null; for(var j=0;j<D.sales.length;j++) if(D.sales[j].id===c.fromSaleId){existing=D.sales[j];break;}
      if(existing) existing.billNo = billNo;
    } else {
      // New item being sold now - record as a normal sale
      if(!item) return;
      var cogs=c.qty*item.avgCost, gp=tot-cogs, pct=+(tot>0?((gp/tot)*100).toFixed(1):0);
      D.sales.push({id:uid(),date:date,customerName:cust,itemId:c.itemId,itemName:item.itemName,unit:item.unit,qty:c.qty,sellingPrice:c.price,totalAmount:tot,cogs:cogs,grossProfit:gp,profitPct:pct,paymentMode:mode,billNo:billNo});
      item.currentStock -= c.qty;
      newSaleTotal += tot;
    }
  });

  // Only post NEW cash/debtor movements for items that were not already recorded as sales
  if(newSaleTotal>0){
    if(newSaleMode==='credit'){
      addDebtor(cust, newSaleTotal, date, 'Bill '+billNo);
    } else {
      postCB(newSaleMode, 'receipt', newSaleTotal, cust, 'Bill '+billNo, date);
    }
  }

  // Auto-read GST rate from inventory item
  var billGstRate = 0;
  if(gstEnabled()){
    var billGstOverride = gvn('bill_gst');
    if(billGstOverride!==undefined && billGstOverride!==null && document.getElementById('bill_gst')){
      billGstRate = billGstOverride;
    } else {
      // Try to read from first item in cart
      if(window._billCart && window._billCart.length>0){
        var firstItem=null;
        for(var bi=0;bi<D.inventory.length;bi++){
          if(D.inventory[bi].id===window._billCart[0].itemId){firstItem=D.inventory[bi];break;}
        }
        if(firstItem && firstItem.gstRate!==undefined) billGstRate=firstItem.gstRate;
        else { var lu=lookupHSN(window._billCart[0].itemName); if(lu) billGstRate=+lu[1]; }
      }
    }
  }
  var billGstType = (D.gst&&D.gst.supplyType)||'intra';
  var bill = {id:uid(), billNo:billNo, date:date, customerName:cust, items:items, totalAmount:total, paymentMode:mode, gstRate:billGstRate, gstType:billGstType};
  D.bills.push(bill);

  window._billCart=[]; window._billCustomer=''; window._billCustomerSel=''; window._billDate=''; window._billItem=''; window._billQty=''; window._billPrice='';
  sv();
  toast('Bill '+billNo+' generated!');
  showBillInvoice(bill.id);
}

function billShareText(bill){
  var p = D.profile;
  var lines=['Invoice '+bill.billNo+' - '+(p.businessName||''),'Date: '+bill.date,'Bill To: '+bill.customerName,''];
  bill.items.forEach(function(it){ lines.push(it.itemName+' x '+fmt(it.qty)+' '+it.unit+' @ '+fc(it.price)+' = '+fc(it.amount)); });
  if(bill.gstRate&&bill.gstRate>0){
    var gstAmt=Math.round(bill.totalAmount*bill.gstRate/100);
    lines.push('GST ('+bill.gstRate+'%): '+fc(gstAmt));
    lines.push('Grand Total: '+fc(bill.totalAmount+gstAmt));
  } else {
    lines.push('TOTAL: '+fc(bill.totalAmount));
  }
  return lines.join('\n');
}

function shareBillEmail(billId){

  if(!bill)return;

function copyBillText(billId){
  var bill=null; for(var i=0;i<D.bills.length;i++) if(D.bills[i].id===billId){bill=D.bills[i];break;}
  if(!bill)return;
  var text = billShareText(bill);
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text);
      toast('Bill details copied! Paste into WhatsApp, SMS, or email.');
    } else {
      // Fallback: use a temporary textarea + execCommand
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position='fixed'; ta.style.left='-9999px';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      var ok = document.execCommand && document.execCommand('copy');
      document.body.removeChild(ta);
      if(ok) toast('Bill details copied! Paste into WhatsApp, SMS, or email.');
      else toast('Could not copy automatically. Please select and copy the invoice text manually.','w');
    }
  }catch(e){
    toast('Could not copy automatically. Please select and copy the invoice text manually.','w');
  }
}

// ===== BANK LOAN ASSESSMENT MODULE =====
// Calculates WC limit eligibility using Turnover Method (Nayak) and Cash Flow Method (Tandon / Operating Cycle)
// Computes DSCR, projected P&L and Balance Sheet for 2 years
// Works with live data from D (the app's data object)

function pgLoanAssess() {
  var tab = window._latab || 'inputs';
  var h = '<div class="tabs">';
  h += '<button class="'+(tab==='inputs'?'act':'')+'" onclick="window._latab=\'inputs\';renderPage()">Loan Details</button>';
  h += '<button class="'+(tab==='projections'?'act':'')+'" onclick="window._latab=\'projections\';renderPage()">Projections</button>';
  h += '<button class="'+(tab==='wclimit'?'act':'')+'" onclick="window._latab=\'wclimit\';renderPage()">WC Limit</button>';
  h += '<button class="'+(tab==='dscr'?'act':'')+'" onclick="window._latab=\'dscr\';renderPage()">DSCR</button>';
  h += '<button class="'+(tab==='bepirr'?'act':'')+'" onclick="window._latab=\'bepirr\';renderPage()">BEP / IRR</button>';
  h += '<button class="'+(tab==='projcfs'?'act':'')+'" onclick="window._latab=\'projcfs\';renderPage()">Proj. Cash Flow</button>';
  h += '</div>';

  // Load saved assumptions or defaults
  var la = D.loanAssessment || {};
  var ccLimit   = +(la.ccLimit   || 0);
  var tlAmount  = +(la.tlAmount  || 0);
  var ccRate    = +(la.ccRate    || 8);
  var tlRate    = +(la.tlRate    || 9);
  var tlTenure  = +(la.tlTenure  || 36);
  var salesGrowth = +(la.salesGrowth || 20);
  var stockDays   = +(la.stockDays   || 30);
  var debtorDays  = +(la.debtorDays  || 30);
  var creditorDays= +(la.creditorDays|| 30);
  var expGrowth   = +(la.expGrowth   || 10);

    : getLABase();
  var la2 = getLAProjections(base, ccLimit, tlAmount, ccRate, tlRate, tlTenure, salesGrowth, expGrowth, stockDays, debtorDays, creditorDays);

  if (tab === 'projections') {

  if (tab === 'dscr') {

    }
    var emiAnnual = la2.emi * 12;

      '<tr><td style="padding:5px 8px;color:#546E7A">CC Interest</td><td style="text-align:right;padding:5px 8px;color:#546E7A">'+fc(la2.ccInt1)+'</td><td style="text-align:right;padding:5px 8px;color:#546E7A">'+fc(la2.ccInt2)+'</td></tr>'+
      '<tr style="background:rgba(0,0,0,.04)"><td style="padding:5px 8px;font-weight:700">Total Debt Service (B)</td><td style="text-align:right;padding:5px 8px;font-weight:700">'+fc(debtSvc1)+'</td><td style="text-align:right;padding:5px 8px;font-weight:700">'+fc(debtSvc2)+'</td></tr>'+
      '<tr style="background:rgba(21,101,192,.08)"><td style="padding:5px 8px;font-weight:700;color:#1565C0">DSCR (A÷B)</td><td style="text-align:right;padding:5px 8px;font-weight:700;color:'+(dscr1>=1.5?'#2E7D32':'#C62828')+'">'+dscr1.toFixed(2)+'</td><td style="text-align:right;padding:5px 8px;font-weight:700;color:'+(dscr2>=1.5?'#2E7D32':'#C62828')+'">'+dscr2.toFixed(2)+'</td></tr>'+

    h += card('Assessment Summary',

    // DSCR Reasons
    var dscrReasons = [];

    } else if(dscr1 >= 1.5 && dscr2 >= 1.5) {

    } else if(dscr1 < 1.5 && dscr2 >= 1.5) {
      dscrReasons.push({type:'alw', title:'DSCR Improves in Year 2 — Marginal Year 1', body:'Year 1 DSCR ('+dscr1.toFixed(2)+') is below 1.50 but Year 2 ('+dscr2.toFixed(2)+') recovers. Bank may consider with a moratorium on principal for the first year, or slightly reduced loan amount.'});
    } else if(avgDscr >= 1.25) {
      dscrReasons.push({type:'alw', title:'Below Minimum DSCR — Review Required', body:'Average DSCR of '+avgDscr.toFixed(2)+' is below the required 1.50. Suggest: (a) Reduce loan demand, (b) Increase projected sales, or (c) Reduce operating expenses to improve cash accrual.'});
    } else {
      dscrReasons.push({type:'ald', title:'Weak DSCR — Loan Repayment at Risk', body:'DSCR of '+avgDscr.toFixed(2)+' indicates the business cannot generate sufficient cash to service the proposed loan. Strongly recommend revising the loan structure before submitting the proposal.'});
    }
    if(la2.emi > 0) dscrReasons.push({type:'ali', title:'TL EMI Obligation', body:'Monthly EMI of '+fc(la2.emi)+' (annual '+fc(la2.emi*12)+') must be maintained regularly. Ensure sufficient cash flow month-on-month. Suggest maintaining a 2-month EMI reserve in the bank account.'});
    if(ccLimit > 0) dscrReasons.push({type:'ali', title:'CC Interest Obligation', body:'Annual CC interest estimated at '+fc(la2.ccInt1)+' (Year 1) assuming full utilization at '+ccRate+'% p.a. Actual interest depends on drawing level — keeping drawings within actual need reduces interest cost.'});

    dscrReasons.forEach(function(r){
      h += '<div class="al '+r.type+'" style="margin-bottom:10px"><div class="alt">'+r.title+'</div><div style="margin-top:4px;font-size:12px;line-height:1.6">'+r.body+'</div></div>';
    });
    h += '<div style="text-align:right">'+btn('🖨 Print DSCR Report','window.print()','#546E7A')+'</div>';
    return h;
  }

  if (tab === 'bepirr') {
    // Check if projections are available
    if(la2.s1 <= 0){
      h += card('BEP / IRR — Data Required',
        '<div class="al alw">To calculate Break Even Point and IRR, please first:</div>'+
        '<ol style="font-size:13px;line-height:2;padding-left:20px">'+
        '<li>Go to <b>Loan Details</b> tab and enter CC/TL amounts and Sales Growth %</li>'+
        '<li>For a new business, toggle to <b>New Unit</b> mode and enter projected sales and costs</li>'+
        '<li>Tap <b>Save & Calculate</b></li>'+
        '<li>Come back to this tab</li>'+
        '</ol>'
      );
      return h;
    }
    // ── BEP & IRR ──
    var bepSales = la2.s1, bepCogs = la2.c1, bepExp = la2.e1;
    var bepInt = la2.ccInt1 + la2.tlInt1;
    // Fixed Costs = Expenses + Interest (these do not vary with sales)
    var fixedCosts = bepExp + bepInt;
    // Variable Costs = COGS (varies with sales)
    var vcRatio = bepSales > 0 ? bepCogs / bepSales : 0;
    // Contribution = Sales - Variable Costs; P/V Ratio = Contribution/Sales
    var pvRatio = 1 - vcRatio;
    // BEP (Sales value) = Fixed Costs / P/V Ratio
    var bepValue = pvRatio > 0 ? Math.round(fixedCosts / pvRatio) : 0;
    var bepPct = bepSales > 0 ? (bepValue / bepSales * 100) : 0;
    var marginOfSafety = bepSales - bepValue;
    var mosPct = bepSales > 0 ? (marginOfSafety / bepSales * 100) : 0;

    h += card('Break Even Point (BEP) — Year 1',
      '<div class="al ali" style="margin-bottom:8px">BEP is the sales level at which the business makes neither profit nor loss. Sales above BEP = profit zone. Calculated as: Fixed Costs ÷ P/V Ratio (Contribution/Sales).</div>'+
      '<div style="overflow-x:auto"><table><thead><tr>'+
      '<th style="text-align:left">Particulars</th><th style="text-align:right">Amount</th></tr></thead><tbody>'+
      '<tr><td style="padding:5px 8px">Projected Sales (Year 1)</td><td style="text-align:right;padding:5px 8px">'+fc(bepSales)+'</td></tr>'+
      '<tr><td style="padding:5px 8px;color:#546E7A;padding-left:18px">Less: Variable Costs (COGS)</td><td style="text-align:right;padding:5px 8px;color:#546E7A">'+fc(bepCogs)+'</td></tr>'+
      '<tr style="background:rgba(0,0,0,.04)"><td style="padding:5px 8px;font-weight:700">Contribution</td><td style="text-align:right;padding:5px 8px;font-weight:700">'+fc(bepSales-bepCogs)+'</td></tr>'+
      '<tr><td style="padding:5px 8px;color:#546E7A">P/V Ratio (Contribution ÷ Sales)</td><td style="text-align:right;padding:5px 8px;color:#546E7A">'+(pvRatio*100).toFixed(1)+'%</td></tr>'+
      '<tr><td style="padding:5px 8px;font-weight:700">Fixed Costs (Expenses + Interest)</td><td style="text-align:right;padding:5px 8px;font-weight:700">'+fc(fixedCosts)+'</td></tr>'+
      '<tr><td style="padding:5px 8px;color:#546E7A;padding-left:18px">  Operating Expenses</td><td style="text-align:right;padding:5px 8px;color:#546E7A">'+fc(bepExp)+'</td></tr>'+
      '<tr><td style="padding:5px 8px;color:#546E7A;padding-left:18px">  Loan Interest</td><td style="text-align:right;padding:5px 8px;color:#546E7A">'+fc(bepInt)+'</td></tr>'+
      '</tbody></table></div>'+
      '<div class="kg" style="margin-top:12px">'+
      '<div class="ki"><div class="kl">BEP (Sales Value)</div><div class="kv" style="color:#C62828">'+fc(bepValue)+'</div></div>'+
      '<div class="ki"><div class="kl">BEP as % of Projected Sales</div><div class="kv" style="color:'+(bepPct<70?'#2E7D32':'#C62828')+'">'+bepPct.toFixed(1)+'%</div></div>'+
      '<div class="ki"><div class="kl">Margin of Safety</div><div class="kv" style="color:#2E7D32">'+fc(marginOfSafety)+'</div></div>'+
      '<div class="ki"><div class="kl">Margin of Safety %</div><div class="kv" style="color:#2E7D32">'+mosPct.toFixed(1)+'%</div></div>'+
      '</div>'+
      '<div class="al '+(bepPct < 70 ? 'als' : bepPct < 90 ? 'alw' : 'ald')+'" style="margin-top:8px">'+
      (bepPct < 70
        ? '✅ BEP is '+bepPct.toFixed(0)+'% of projected sales — good margin of safety. Even if sales fall, the business can still cover costs.'
        : bepPct < 90
          ? '⚠️ BEP is '+bepPct.toFixed(0)+'% of sales. Limited margin of safety — business needs to achieve close to projected sales to remain profitable.'
          : '❌ BEP exceeds 90% of projected sales. Very little margin of safety. Reduce fixed costs or improve contribution margin before submitting loan proposal.')+
      '</div>'
    );

    // ── IRR ──
    // Investment = Own Capital + Total Loan
    var totalCapital = (+(D.capital&&D.capital.initialCapital)||0) + (+(D.capital&&D.capital.additionalCapital)||0);
    var totalLoan = tlAmount + ccLimit;
    var totalInvestment = totalCapital + totalLoan;
    // Cash flows: Year 0 = -totalInvestment, Year 1 = NP+Dep+Interest (EBITDA), Year 2 = same, terminal = ~3x Y2
    var cf0 = -totalInvestment;
    var cf1 = la2.ebit1;   // EBITDA Year 1
    var cf2 = la2.ebit2;   // EBITDA Year 2
    var cf3 = la2.ebit2 * 1.2; // Year 3 estimate (20% growth)

    // IRR via Newton-Raphson
    function npv(rate, cfs) {
      return cfs.reduce(function(acc, cf, t) { return acc + cf / Math.pow(1+rate, t); }, 0);
    }
    function calcIRR(cfs) {
      var rate = 0.2;
      for(var i=0;i<100;i++){
        var n = npv(rate, cfs);
        var dn = cfs.reduce(function(acc,cf,t){ return t>0 ? acc - t*cf/Math.pow(1+rate,t+1) : acc; }, 0);
        if(Math.abs(dn) < 1e-10) break;
        var newRate = rate - n/dn;
        if(newRate < -0.99) newRate = -0.99;
        rate = newRate;
        if(Math.abs(n) < 0.01) break;
      }
      return isNaN(rate) ? null : rate;
    }
    var cfs = [cf0, cf1, cf2, cf3];
    var irr = totalInvestment > 0 && cf1 > 0 ? calcIRR(cfs) : null;
    var irrPct = irr !== null ? irr * 100 : null;
    var npvAt12 = totalInvestment > 0 ? Math.round(npv(0.12, cfs)) : 0; // NPV at 12% hurdle rate

    h += card('Internal Rate of Return (IRR)',
      '<div class="al ali" style="margin-bottom:8px">IRR is the annualized rate of return on total investment (Owner Capital + Loan). Cash flows used: Year 0 = Total Investment outflow, Years 1-3 = EBITDA (operating cash generation). IRR > Cost of Capital means the project is viable.</div>'+
      '<div style="overflow-x:auto"><table><thead><tr>'+
      '<th style="text-align:left">Year</th><th style="text-align:right">Cash Flow</th><th style="text-align:left;padding-left:12px">Remarks</th>'+
      '</tr></thead><tbody>'+
      '<tr><td style="padding:5px 8px">Year 0</td><td style="text-align:right;padding:5px 8px;color:#C62828">'+fc(cf0)+'</td><td style="padding:5px 8px 5px 12px;font-size:11px;color:#546E7A">Total Investment (Capital + Loan)</td></tr>'+
      '<tr><td style="padding:5px 8px">Year 1</td><td style="text-align:right;padding:5px 8px;color:#2E7D32">+'+fc(cf1)+'</td><td style="padding:5px 8px 5px 12px;font-size:11px;color:#546E7A">EBITDA (NP + Interest)</td></tr>'+
      '<tr><td style="padding:5px 8px">Year 2</td><td style="text-align:right;padding:5px 8px;color:#2E7D32">+'+fc(cf2)+'</td><td style="padding:5px 8px 5px 12px;font-size:11px;color:#546E7A">EBITDA Year 2</td></tr>'+
      '<tr><td style="padding:5px 8px">Year 3</td><td style="text-align:right;padding:5px 8px;color:#2E7D32">+'+fc(cf3)+'</td><td style="padding:5px 8px 5px 12px;font-size:11px;color:#546E7A">Estimated (20% growth on Yr 2)</td></tr>'+
      '</tbody></table></div>'+
      '<div class="kg" style="margin-top:12px">'+
      '<div class="ki"><div class="kl">Total Investment</div><div class="kv">'+fc(totalInvestment)+'</div></div>'+
      '<div class="ki"><div class="kl">IRR</div><div class="kv" style="color:'+(irrPct!==null?(irrPct>12?'#2E7D32':irrPct>8?'#E65100':'#C62828'):'#546E7A')+';font-size:20px;font-weight:700">'+(irrPct!==null?irrPct.toFixed(1)+'%':'N/A')+'</div></div>'+
      '<div class="ki"><div class="kl">NPV @ 12% Hurdle Rate</div><div class="kv" style="color:'+(npvAt12>=0?'#2E7D32':'#C62828')+'">'+fc(npvAt12)+'</div></div>'+
      '<div class="ki"><div class="kl">Cost of Borrowing</div><div class="kv" style="color:#546E7A">~'+(ccRate||9).toFixed(1)+'% p.a.</div></div>'+
      '</div>'+
      (irrPct !== null
        ? '<div class="al '+(irrPct>12?'als':irrPct>8?'alw':'ald')+'" style="margin-top:8px">'+
          (irrPct > 12
            ? '✅ IRR of '+irrPct.toFixed(1)+'% exceeds the 12% hurdle rate. The investment generates good returns and can service the loan comfortably.'
            : irrPct > 8
              ? '⚠️ IRR of '+irrPct.toFixed(1)+'% is moderate. Returns are adequate but improve sales or margins for a stronger proposal.'
              : '❌ IRR of '+irrPct.toFixed(1)+'% is below acceptable levels. Revise projections — increase sales, reduce costs, or reduce loan amount.')+
          '</div>'
        : '<div class="al alw" style="margin-top:8px">Unable to compute IRR — ensure loan amounts and projections are entered in Loan Details tab.</div>')+
      '<div style="text-align:right;margin-top:8px">'+btn('🖨 Print BEP / IRR','window.print()','#546E7A')+'</div>'
    );
    return h;
  }

  if (tab === 'projcfs') {
    if(la2.s1 <= 0){
      h += card('Projected Cash Flow — Data Required',
        '<div class="al alw">Enter loan details and projected sales in <b>Loan Details</b> tab first, then tap Save & Calculate.</div>'
      );
      return h;
    }

    // ── YEAR 1 & YEAR 2 PROJECTED CFS (Indirect Method) ──
    var dep = 0; // depreciation on existing assets (accumDep) + TL-funded new assets
    (D.fixedAssets||[]).forEach(function(a){ dep += (+a.accumDep||0); });
    // Approximate dep on TL-funded new assets (assume 10% on TL amount)
    var newFADep = tlAmount > 0 ? Math.round(tlAmount * 0.10) : 0;

    // Working capital changes using holding period assumptions
    // Year 1
    var wc_stock_y1  = la2.c1 * stockDays / 365;
    var wc_debtor_y1 = la2.s1 * debtorDays / 365;
    var wc_cred_y1   = la2.c1 * creditorDays / 365;
    var wc_gap_y1    = wc_stock_y1 + wc_debtor_y1 - wc_cred_y1;
    // Opening WC = current actual balances
    var g = getFGrouped();
    var open_wc = (g.sundryDebtors||0) + (g.closStock||0) - (g.sundryCreditors||0);
    var delta_wc_y1 = -(wc_gap_y1 - open_wc); // increase in WC = outflow

    // Year 2
    var wc_stock_y2  = la2.c2 * stockDays / 365;
    var wc_debtor_y2 = la2.s2 * debtorDays / 365;
    var wc_cred_y2   = la2.c2 * creditorDays / 365;
    var wc_gap_y2    = wc_stock_y2 + wc_debtor_y2 - wc_cred_y2;
    var delta_wc_y2  = -(wc_gap_y2 - wc_gap_y1);

    // Operating CF
    var cf_op_y1 = la2.np1 + dep + newFADep - delta_wc_y1;
    var cf_op_y2 = la2.np2 + dep + newFADep - delta_wc_y2;

    // Investing CF (TL used for fixed asset purchase = outflow in Year 1)
    var cf_inv_y1 = tlAmount > 0 ? -tlAmount : 0;
    var cf_inv_y2 = 0;

    // Financing CF
    // Year 1: new CC + new TL inflows, EMI principal outflow
    var tl_prin_y1 = Math.max(0, Math.round(la2.emi * 12 - la2.tlInt1));
    var cf_fin_y1  = ccLimit + tlAmount - tl_prin_y1;
    // Year 2: only EMI principal outflow (no new loans)
    var tl_prin_y2 = Math.max(0, Math.round(la2.emi * 12 - la2.tlInt2));
    var cf_fin_y2  = -tl_prin_y2;

    // Net change
    var net_y1 = cf_op_y1 + cf_inv_y1 + cf_fin_y1;
    var net_y2 = cf_op_y2 + cf_inv_y2 + cf_fin_y2;

    // Opening cash (current actual)
    var open_cash = (g.cash||0) + (g.bank||0);
    var close_y1  = open_cash + net_y1;
    var close_y2  = close_y1  + net_y2;

    // ── RENDER ──
    function cfRow(label, y1, y2, bold, indent, isTotal) {
      var bg = isTotal ? 'background:rgba(21,101,192,.08)' : bold ? 'background:rgba(0,0,0,.03)' : '';
      var pl = indent ? 'padding-left:20px' : '';

      var fw = bold || isTotal ? '700' : '400';
      function fmt_amt(v) {
        if(v===0) return '<span style="color:#9E9E9E">—</span>';
        return '<span style="color:'+(v>=0?'#2E7D32':'#C62828')+'">'+(v<0?'(':'')+fc(Math.abs(v))+(v<0?')':'')+'</span>';
      }
      return '<tr style="'+bg+'">'+
        '<td style="padding:5px 8px;font-size:'+fs+'px;font-weight:'+fw+';'+pl+'">'+esc(label)+'</td>'+
        '<td style="text-align:right;padding:5px 8px;font-size:'+fs+'px;font-weight:'+fw+'">'+fmt_amt(y1)+'</td>'+

        '</tr>';
    }
    function cfSection(title) {
      return '<tr style="background:#37474F"><td colspan="3" style="padding:6px 8px;font-weight:700;font-size:12px;color:#fff">'+esc(title)+'</td></tr>';
    }

    var tbl = '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">'+
      '<thead><tr>'+
      '<th style="text-align:left;padding:6px 8px;background:#1565C0;color:#fff;font-size:11px">Particulars</th>'+
      '<th style="text-align:right;padding:6px 8px;background:#1565C0;color:#fff;font-size:11px">Year 1 (₹)</th>'+
      '<th style="text-align:right;padding:6px 8px;background:#1565C0;color:#fff;font-size:11px">Year 2 (₹)</th>'+
      '</tr></thead><tbody>';

    // Section A
    tbl += cfSection('A.  CASH FLOWS FROM OPERATING ACTIVITIES');
    tbl += cfRow('Net Profit after Interest', la2.np1, la2.np2, true);
    tbl += cfRow('Add: Depreciation & Amortization', dep+newFADep, dep+newFADep, false, true);
    tbl += cfRow('Changes in Working Capital', -delta_wc_y1, -delta_wc_y2, false, true);
    tbl += '<tr style="background:rgba(0,0,0,.03)"><td style="padding:4px 8px 4px 28px;font-size:10px;color:#546E7A">Increase in Debtors/Stock</td>'+
           '<td style="text-align:right;padding:4px 8px;font-size:10px;color:#546E7A">'+fc(wc_gap_y1)+'</td>'+
           '<td style="text-align:right;padding:4px 8px;font-size:10px;color:#546E7A">'+fc(wc_gap_y2)+'</td></tr>';
    tbl += cfRow('A.  Net Cash from Operating Activities', cf_op_y1, cf_op_y2, true, false, true);

    // Section B
    tbl += cfSection('B.  CASH FLOWS FROM INVESTING ACTIVITIES');
    tbl += cfRow('Purchase of Fixed Assets (from Term Loan)', cf_inv_y1, cf_inv_y2, false, true);
    tbl += cfRow('B.  Net Cash from Investing Activities', cf_inv_y1, cf_inv_y2, true, false, true);

    // Section C
    tbl += cfSection('C.  CASH FLOWS FROM FINANCING ACTIVITIES');
    tbl += cfRow('New CC Limit Sanctioned', ccLimit, 0, false, true);
    tbl += cfRow('New Term Loan Received', tlAmount, 0, false, true);
    tbl += cfRow('TL Principal Repayment (EMI)', -tl_prin_y1, -tl_prin_y2, false, true);
    tbl += cfRow('C.  Net Cash from Financing Activities', cf_fin_y1, cf_fin_y2, true, false, true);

// Get annualized base figures from actual data
function getLABase() {
  var la = D.loanAssessment || {};
  // New unit mode: return manual figures directly (no annualization needed)
  if(la.useManual && (+la.manualSales||0) > 0) {
    var ms = +la.manualSales||0, mcp = la.manualCogsP !== undefined ? +la.manualCogsP : 70, me = +la.manualExp||0;
    var mc = Math.round(ms*mcp/100), mg = ms-mc, mn = mg-me;
    return {sales:ms, cogs:mc, gp:mg, exp:me, np:mn, days:365, isManual:true};
  }
  var f = getF();
  var pp = D.priorPeriod || {};
  // Current period actuals
  var curSales = f.ts, curCogs = f.os + f.tp - f.cs, curExp = f.te;
  // Prior period
  var priorSales = (pp.enabled && pp.sales) ? pp.sales : 0;
  var priorCogs  = (pp.enabled && pp.cogs)  ? pp.cogs  : 0;
  var priorExp   = 0;
  if(pp.enabled && pp.expenseByCat) {
    for(var k in pp.expenseByCat) priorExp += (+pp.expenseByCat[k]||0);
  }
  // Estimate days: find earliest transaction date
  var dates = [];
  D.sales.forEach(function(s){if(s.date)dates.push(s.date);});
  D.purchases.forEach(function(p){if(p.date)dates.push(p.date);});
  D.expenses.forEach(function(e){if(e.date)dates.push(e.date);});
  var earliest = dates.length ? dates.reduce(function(a,b){return a<b?a:b;}) : td();
  var curDays = Math.max(1, daysBetween(earliest, td()));
  // Prior period days
  var priorDays = 0;
  if(pp.enabled && pp.fromDate && pp.toDate) {
    priorDays = Math.max(0, daysBetween(pp.fromDate, pp.toDate));
  }
  var totalDays = curDays + priorDays;
  var totalSales = curSales + priorSales;
  var totalCogs  = curCogs  + priorCogs;
  var totalExp   = curExp   + priorExp;
  // Annualize
  var factor = totalDays > 0 ? 365/totalDays : 1;
  var sales = Math.round(totalSales * factor);
  var cogs  = Math.round(totalCogs  * factor);
  var gp    = sales - cogs;
  var exp   = Math.round(totalExp   * factor);
  var np    = gp - exp;
  return {sales:sales, cogs:cogs, gp:gp, exp:exp, np:np, days:totalDays};
}

// Compute projections from base + assumptions
function getLAProjections(base, ccLimit, tlAmount, ccRate, tlRate, tlTenure, salesGrowth, expGrowth, stockDays, debtorDays, creditorDays) {
  var cogsRatio = base.sales > 0 ? base.cogs/base.sales : 0.7;
  // Year 1
  var s1 = Math.round(base.sales * (1 + salesGrowth/100));
  var c1 = Math.round(s1 * cogsRatio);
  var g1 = s1 - c1;
  var e1 = Math.round(base.exp * (1 + expGrowth/100));
  var ebit1 = g1 - e1;
  var ccInt1 = ccLimit > 0 ? Math.round(ccLimit * ccRate/100) : 0;
  var tlInt1 = tlAmount > 0 ? Math.round(tlAmount * tlRate/100) : 0;
  var np1 = ebit1 - ccInt1 - tlInt1;
  // EMI
  var emi = tlAmount > 0 && tlTenure > 0 ? calcEMI(tlAmount, tlRate, tlTenure) : 0;
  // Year 2
  var tlPrinY1 = Math.max(0, emi*12 - tlInt1);
  var tlObY2 = Math.max(0, tlAmount - tlPrinY1);
  var s2 = Math.round(s1 * (1 + salesGrowth/100));
  var c2 = Math.round(s2 * cogsRatio);
  var g2 = s2 - c2;
  var e2 = Math.round(e1 * (1 + expGrowth/100));
  var ebit2 = g2 - e2;
  var ccInt2 = ccLimit > 0 ? Math.round(ccLimit * ccRate/100) : 0;
  var tlInt2 = tlObY2 > 0 ? Math.round(tlObY2 * tlRate/100) : 0;
  var np2 = ebit2 - ccInt2 - tlInt2;
  return {s1:s1,c1:c1,g1:g1,e1:e1,ebit1:ebit1,ccInt1:ccInt1,tlInt1:tlInt1,np1:np1,
          s2:s2,c2:c2,g2:g2,e2:e2,ebit2:ebit2,ccInt2:ccInt2,tlInt2:tlInt2,np2:np2,
          emi:emi, tlObY2:tlObY2};
}

function pgReminders(){
  var creditDays = +(D.settings&&D.settings.creditDays)||30;
  var h = '';

  h += card('Reminder Settings',
    '<div style="font-size:11px;color:#546E7A;margin-bottom:8px">Set the global credit period. Any debtor whose outstanding amount is older than this many days will appear in the overdue list.</div>'+
    g2(inp('Credit Period (days)','rem_days','number',creditDays),''+
       '<div class="fg"><label>&nbsp;</label>'+btn('💾 Save','saveReminderSettings()','#2E7D32')+'</div>')
  );

  // Build overdue list
  var today = td();
  var dList = debtorBalances();
  var overdue = [], upcoming = [];
  var dateMap = {};
  D.debtors.forEach(function(d){
    if(d.amount>0&&d.date){ if(!dateMap[d.name]||d.date<dateMap[d.name]) dateMap[d.name]=d.date; }
  });

  dList.forEach(function(d){
    if(d.balance<=0) return;
    var date = dateMap[d.name]||today;
    var age  = daysBetween(date, today);
    var daysOverdue = age - creditDays;
    if(daysOverdue>0) overdue.push({name:d.name,balance:d.balance,date:date,age:age,daysOverdue:daysOverdue});
    else upcoming.push({name:d.name,balance:d.balance,date:date,age:age,daysLeft:(-daysOverdue)});
  });

  // Sort by most overdue first
  overdue.sort(function(a,b){return b.daysOverdue-a.daysOverdue;});

  if(overdue.length===0&&upcoming.length===0){
    h+=card('Debtor Status','<div class="al als">✅ No outstanding debtors at this time.</div>');
    return h;
  }

  if(overdue.length>0){
    h+=card('⚠️ Overdue Debtors ('+overdue.length+')',
      '<div class="al alw" style="margin-bottom:10px">These customers have not paid within the '+creditDays+'-day credit period. Tap the share button to send a payment reminder.</div>'+

          '</div>'+
              '<div style="color:#C62828;font-size:13px;font-weight:700">'+fc(d.balance)+' due</div>'+
              '<div style="font-size:11px;color:#546E7A">Outstanding since '+esc(d.date)+' &bull; <span style="color:#C62828;font-weight:700">'+d.daysOverdue+' days overdue</span></div>'+
            '</div>'+
          '</div>'+
          '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">'+
            '<a href="'+waUrl+'" target="_blank" style="padding:8px 14px;border-radius:7px;background:#25D366;color:#fff;font-size:12px;font-weight:700;text-decoration:none">📲 WhatsApp</a>'+
            '<button onclick="copyReminderMsg('+JSON.stringify(d.name)+','+JSON.stringify(d)+')\" style="padding:8px 14px;border-radius:7px;background:#1565C0;color:#fff;font-size:12px;font-weight:700;border:none;cursor:pointer">📋 Copy</button>'+
            '<a href="mailto:?subject=Payment+Reminder&body='+encodeURIComponent(msg)+'" style="padding:8px 14px;border-radius:7px;background:#546E7A;color:#fff;font-size:12px;font-weight:700;text-decoration:none">✉️ Email</a>'+
          '</div>'+
        '</div>';
      }).join('')
    );
  }

  if(upcoming.length>0){
    h+=card('✅ Within Credit Period ('+upcoming.length+')',
      upcoming.map(function(d){
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F0F0F0">'+
          '<div><div style="font-weight:700">'+esc(d.name)+'</div>'+

function buildReminderMsg(d){

    'Dear *'+d.name+(pid?' ('+pid+')':''+'*,'),
    '',
    'This is a gentle reminder that your payment of *'+fc(d.balance)+'* to *'+biz+'* is overdue by *'+d.daysOverdue+' days*.',

    '',
    'For queries, contact: '+esc(p.mobile||''),

    'Thank you,',
    biz
  ];

function copyReminderMsg(name, d){
  var msg = buildReminderMsg(d);
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(msg).then(function(){ toast('Reminder copied! Paste in WhatsApp/SMS.'); });
  } else {
    var ta=document.createElement('textarea'); ta.value=msg;
    ta.style.position='fixed'; ta.style.left='-9999px';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('Reminder copied! Paste in WhatsApp/SMS.');
  }
}

function autoFillAllHSN(){
  if(!D.inventory) return;
  var filled=0, notFound=[];
  D.inventory.forEach(function(item){
    if(!item.hsnCode){
      var lookup=lookupHSNFull(item.itemName);
      if(lookup){
        item.hsnCode=lookup[0];
        item.gstRate=+lookup[1];
        filled++;
      } else {
        notFound.push(item.itemName);
      }
    }
  });
  sv(); renderPage();
  var msg='HSN/GST filled for '+filled+' item(s).';
  if(notFound.length) msg+=' Not found: '+notFound.slice(0,5).join(', ')+(notFound.length>5?' and '+(notFound.length-5)+' more':'')+'  — update these manually in HSN/SAC Master.';
  toast(msg, filled>0?'s':'w');
}

function enableGST(){
  if(!D.gst) D.gst={};
  D.gst.enabled=true; D.gst.type='regular'; D.gst.defaultRate=18; D.gst.supplyType='intra';
  sv(); renderPage(); toast('GST module enabled!');
}
function disableGST(){
  confirmDialog('Disable GST module? GST data will be preserved but GST fields will be hidden from bills.',function(){
    if(D.gst) D.gst.enabled=false;
    sv(); renderPage(); toast('GST module disabled.');
  });
}
function saveGSTSetup(){
  if(!D.gst) D.gst={enabled:true};
  D.gst.gstin      = gv('gst_gstin')||'';
  D.gst.type       = gv('gst_type')||'regular';
  D.gst.stateCode  = gv('gst_state')||'';
  D.gst.defaultRate= gvn('gst_defrate')||18;
  D.gst.supplyType = gv('gst_supply')||'intra';
  sv(); renderPage(); toast('GST settings saved!');
}

function computeGSTSummary(){
  var outputGST=0,cgst=0,sgst=0,igst=0,itc=0,taxableValue=0;
  D.sales.forEach(function(s){
    if(s.gstRate&&s.gstRate>0){
      var tax=Math.round(s.totalAmount*s.gstRate/100);
      taxableValue+=s.totalAmount;
      outputGST+=tax;
      if(s.gstType==='inter'){igst+=tax;}else{cgst+=tax/2;sgst+=tax/2;}
    }
  });
  D.purchases.forEach(function(p){
    if(p.gstRate&&p.gstRate>0) itc+=Math.round(p.amount*p.gstRate/100);
  });
  return {outputGST:Math.round(outputGST),cgst:Math.round(cgst),sgst:Math.round(sgst),igst:Math.round(igst),itc:Math.round(itc),taxableValue:Math.round(taxableValue)};
}

function computeGSTR1(){
  var byRate={};
  D.sales.forEach(function(s){
    if(!s.gstRate||s.gstRate<=0) return;
    var r=s.gstRate; if(!byRate[r]) byRate[r]={rate:r,taxable:0,cgst:0,sgst:0,igst:0};
    var tax=Math.round(s.totalAmount*r/100);
    byRate[r].taxable+=s.totalAmount;
    if(s.gstType==='inter') byRate[r].igst+=tax;
    else {byRate[r].cgst+=tax/2; byRate[r].sgst+=tax/2;}
  });
  var result=[];
  for(var rk in byRate) result.push(byRate[rk]);
  result.sort(function(a,b){return a.rate-b.rate;});
  return result;
}

function buildGSTRows(bill){
  if(!gstEnabled()||!bill.gstRate||bill.gstRate<=0) return '';
  var g=D.gst||{};
  var taxableTotal=bill.totalAmount;
  var totalGST=Math.round(taxableTotal*bill.gstRate/100);
  var grandTotal=taxableTotal+totalGST;
  if(g.supplyType==='inter'){

      '<td style="padding:6px;border:1px solid #ddd;text-align:right">'+fc(totalGST)+'</td></tr>'+

      '<td style="padding:8px;border:1px solid #ddd;text-align:right">'+fc(grandTotal)+'</td></tr>';

// ===== PARTY CODE SYSTEM =====
// Each unique buyer/supplier gets a short unique code (CUST-XXXXX or SUPP-XXXXX)
// This helps distinguish two parties with the same name
// Stored in D.partyCodes = { "Ramesh:customer": "CUST-A1B2C", "Ramesh:supplier": "SUPP-D3E4F" }

function getPartyCode(name, type) {
  // type = 'customer' or 'supplier'
  if (!name) return '';
  if (!D.partyCodes) D.partyCodes = {};
  var key = name.trim().toLowerCase() + ':' + type;
  if (!D.partyCodes[key]) {
    var prefix = type === 'customer' ? 'CUST' : 'SUPP';
    D.partyCodes[key] = prefix + '-' + Math.random().toString(36).toUpperCase().slice(2,7);
    sv();
  }
  return D.partyCodes[key];
}

function partyCodeBadge(code) {
  if (!code) return '';
  return '<span style="font-size:9px;background:#E3F2FD;color:#1565C0;border-radius:4px;padding:1px 5px;font-weight:700;letter-spacing:0.5px;margin-left:4px">'+esc(code)+'</span>';
}

function pgPartyCodes() {
  var h = '';
  var pc = D.partyCodes || {};
  var customers = [], suppliers = [];
  for (var k in pc) {
    var parts = k.split(':');

    if (type === 'customer') customers.push({name:name, code:pc[k]});
    else suppliers.push({name:name, code:pc[k]});
  }
  customers.sort(function(a,b){return a.name.localeCompare(b.name);});
  suppliers.sort(function(a,b){return a.name.localeCompare(b.name);});

  h += card('Party Code Directory',
    '<div class="al ali" style="margin-bottom:8px">Every buyer and supplier gets a unique Party Code automatically when first recorded. Use this code to distinguish parties with the same name in your registers and receipts.</div>'+
