<script>
var SK = 'mefm_uni_v10';
var D;
if(typeof window._prodCart==='undefined') window._prodCart=[];
var curPg='dashboard';
var lastSale=null;
var _BIZ_TYPE_DEFAULT='Trading';
function getBizType(){ try{ return (typeof D!=='undefined'&&D&&D.profile&&D.profile.businessType)||_BIZ_TYPE_DEFAULT; }catch(e){ return _BIZ_TYPE_DEFAULT; } }
var BIZ_TYPE=_BIZ_TYPE_DEFAULT; // will be refreshed on every render;

function defD(){
  return {
    profile:{businessName:'',ownerName:'',mobile:'',mobileExtended:false,address:'',businessType:gv('p_bt')||BIZ_TYPE,businessStage:'existing',udyam:'',gst:'',pan:'',tan:''},
    capital:{initialCapital:0,additionalCapital:0},
    loans:[],
    bankAccounts:[{id:'acc1',name:'Bank Account 1'}],
    inventory:[],
    purchases:[],
    sales:[],
    expenses:[],
    cashBook:[],
    debtors:[],
    creditors:[],
    opening:{cash:0,bank:0,stock:0,debtors:0,creditors:0,capital:0,takenOn:null},
    trialBalance:[],
    tbPosted:false,
    tbPostedOn:null,
    otherAssets:0,
    otherLiab:0,
    otherAssetsNotes:[],
    otherLiabNotes:[],
    fixedAssets:[],
    intangibleAssets:[],
    otherAssetItems:[],
    otherLiabItems:[],
    priorPeriod:{enabled:false,fromDate:'',toDate:'',sales:0,cogs:0,expenseByCat:{}},
    drawings:[],
    advances:[],
    security:{pinEnabled:false,pinHash:''},
    bills:[],
    nextBillNo:1,
    expenseCategories:['Rent','Electricity','Salary','Transportation','Telephone','Fuel','Repair','Marketing','Interest Payment','Miscellaneous'],
    settings:{creditDays:30},
    partyCodes:{},
    customHSN:{},
    incomeTax:{ay:'2025-26',taxpayerType:'individual',gender:'male',section:'regular',useManual:false},
    gst:{enabled:false,gstin:'',type:'regular',defaultRate:18,supplyType:'intra',stateCode:''},
    loanAssessment:{ccLimit:300000,tlAmount:100000,ccRate:8,tlRate:9,tlTenure:36,salesGrowth:20,stockDays:30,debtorDays:30,creditorDays:30,expGrowth:10,marginPctTurnover:25,marginPctTandon:25,useManual:false,manualSales:0,manualCogsP:70,manualExp:0}
  };
}
// Shared migration: ensures all fields exist on a loaded/imported data object, mutates and returns d
function migrateData(d){
  if(!d.debtors)d.debtors=[];
  if(!d.creditors)d.creditors=[];
  if(!d.opening)d.opening={cash:0,bank:0,stock:0,debtors:0,creditors:0,capital:0,takenOn:null};
  if(!d.trialBalance)d.trialBalance=[];
  if(d.tbPosted===undefined)d.tbPosted=false;
  if(d.tbPostedOn===undefined)d.tbPostedOn=null;
  if(d.otherAssets===undefined)d.otherAssets=0;
  if(d.otherLiab===undefined)d.otherLiab=0;
  if(!d.otherAssetsNotes)d.otherAssetsNotes=[];
  if(!d.otherLiabNotes)d.otherLiabNotes=[];
  if(!d.profile)d.profile={businessName:'',ownerName:'',mobile:'',address:'',businessType:'Trading',constitution:'Individual',commencementDate:'',udyam:'',gst:'',pan:'',tan:''};
  if(d.profile.mobileExtended===undefined)d.profile.mobileExtended=false;
  if(!d.profile.constitution)d.profile.constitution='Individual';
  if(!d.profile.partners)d.profile.partners=[];
  if(!d.expenseCategories)d.expenseCategories=['Rent','Electricity','Salary','Transportation','Telephone','Fuel','Repair','Marketing','Interest Payment','Miscellaneous'];
  if(d.expenseCategories.indexOf('Interest Payment')<0)d.expenseCategories.push('Interest Payment');
  if(!d.projAssumptions)d.projAssumptions=null;
  if(!d.fixedAssets)d.fixedAssets=[];
  if(!d.intangibleAssets)d.intangibleAssets=[];
  if(!d.otherAssetItems)d.otherAssetItems=[];
  if(!d.otherLiabItems)d.otherLiabItems=[];
  if(!d.priorPeriod)d.priorPeriod={enabled:false,fromDate:'',toDate:'',sales:0,cogs:0,expenseByCat:{}};
  if(!d.profile.businessStage) d.profile.businessStage = 'existing';
  if(!d.security) d.security = {pinEnabled:false,pinHash:''};
  if(!d.bills) d.bills=[];
  if(!d.nextBillNo) d.nextBillNo=1;
  if(!d.bankAccounts || d.bankAccounts.length===0){
    d.bankAccounts=[{id:'acc1',name:'Bank Account 1'}];
  }
  if(!d.cashBook)d.cashBook=[];
  for(var bi=0;bi<d.cashBook.length;bi++){ if(d.cashBook[bi].mode==='bank' && !d.cashBook[bi].bankAccountId) d.cashBook[bi].bankAccountId='acc1'; }
  if(!d.loans)d.loans=[];
  for(var i=0;i<d.loans.length;i++){if(!d.loans[i].loanType)d.loans[i].loanType='Term Loan';if(!d.loans[i].payments)d.loans[i].payments=[];if(d.loans[i].lastInterestDate===undefined)d.loans[i].lastInterestDate=d.loans[i].sanctionDate;if(d.loans[i].accountNumber===undefined)d.loans[i].accountNumber='';if(d.loans[i].undrawn===undefined)d.loans[i].undrawn=false;if(d.loans[i].sanctionedAmount===undefined)d.loans[i].sanctionedAmount=d.loans[i].outstandingBalance;}
  if(!d.drawings)d.drawings=[];
  if(!d.advances)d.advances=[];
  if(!d.inventory)d.inventory=[];
  for(var ii=0;ii<d.inventory.length;ii++){
    if(d.inventory[ii].importedStock===undefined) d.inventory[ii].importedStock=0;
    if(d.inventory[ii].importedAvgCost===undefined) d.inventory[ii].importedAvgCost=0;
  }
  if(!d.sales)d.sales=[];
  for(var si=0;si<d.sales.length;si++){ if(d.sales[si].isExport===undefined) d.sales[si].isExport=false; }
  if(!d.purchases)d.purchases=[];
  for(var pi=0;pi<d.purchases.length;pi++){ if(d.purchases[pi].isImported===undefined) d.purchases[pi].isImported=false; }
  // Classify existing creditor entries: those created from credit Expenses (ref starts with
  // "Expense: ") are "Expenses Payable", everything else (purchases on credit, opening balances,
  // manual entries) remains "Sundry Creditors". This separates the two on the Balance Sheet.
  if(!d.creditors)d.creditors=[];
  for(var ci=0;ci<d.creditors.length;ci++){
    if(d.creditors[ci].type===undefined){
      d.creditors[ci].type = (d.creditors[ci].ref && d.creditors[ci].ref.indexOf('Expense: ')===0) ? 'expense' : 'supplier';
    }
  }
  // One-time correction: older versions subtracted applied depreciation/amortization from
  // D.otherAssets AS WELL AS reducing the asset's net book value via accumDep/accumAmort,
  // double-counting the reduction on the Balance Sheet. Add back the accumulated amounts once.
  if(!d._depCorrectionApplied){
    var addBack = 0;
    (d.fixedAssets||[]).forEach(function(a){ addBack += (+a.accumDep||0); });
    (d.intangibleAssets||[]).forEach(function(a){ addBack += (+a.accumAmort||0); });
    if(addBack>0) d.otherAssets = (+d.otherAssets||0) + addBack;
    d._depCorrectionApplied = true;
  }
  if(!d.loanAssessment) d.loanAssessment={ccLimit:0,tlAmount:0,ccRate:8,tlRate:9,tlTenure:36,salesGrowth:20,stockDays:0,debtorDays:0,creditorDays:0,expGrowth:10,marginPctTurnover:25,marginPctTandon:25};
  if(d.loanAssessment && d.loanAssessment.marginPctTurnover===undefined) d.loanAssessment.marginPctTurnover=25;
  if(d.loanAssessment && d.loanAssessment.marginPctTandon===undefined) d.loanAssessment.marginPctTandon=25;
  if(d.loanAssessment && d.loanAssessment.useManual===undefined) d.loanAssessment.useManual=false;
  if(!d.settings) d.settings={creditDays:30};
  if(!d.partyCodes) d.partyCodes={};
  if(!d.customHSN) d.customHSN={};
  if(!d.incomeTax) d.incomeTax={ay:'2025-26',taxpayerType:'individual',gender:'male',section:'regular',useManual:false};
  // Auto-fill HSN/GST on existing inventory items if GST is enabled
  if(d.gst && d.gst.enabled && d.inventory){
    d.inventory.forEach(function(item){
      if(!item.hsnCode && !item.gstRate){
        // Check if it's defined in our HSN_MASTER (will be checked at runtime)
        // We store a flag so we know to look up at runtime
        item._needsHSNLookup = true;
      }
    });
  }
  if(!d.gst) d.gst={enabled:false,gstin:'',type:'regular',defaultRate:18,supplyType:'intra',stateCode:''};
  if(d.loanAssessment && d.loanAssessment.manualSales===undefined) d.loanAssessment.manualSales=0;
  if(d.loanAssessment && d.loanAssessment.manualCogsP===undefined) d.loanAssessment.manualCogsP=70;
  if(d.loanAssessment && d.loanAssessment.manualExp===undefined) d.loanAssessment.manualExp=0;
  return d;
}
function ld(){
  // Multi-biz: handled by initMultiBiz
  return defD();
}
function sv(){
  try{
    var activeId = getActiveId();
    if(activeId){
      saveBizData(activeId, D);
      var reg = getRegistry();
      var biz = reg.find(function(b){return b.id===activeId;});
      if(biz){
        biz.name = (D.profile&&D.profile.businessName)||biz.name||'Unnamed';
        biz.type = (D.profile&&D.profile.businessType)||biz.type||'Trading';
        saveRegistry(reg);
      }
    } else {
      localStorage.setItem(SK, JSON.stringify(D));
    }
  }catch(e){}
}
function fmt(n,d){d=d||0;if(isNaN(n))return'0';return Number(n).toLocaleString('en-IN',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fc(n){return'₹'+fmt(n,2);}
function td(){return new Date().toISOString().split('T')[0];}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function gv(id){var e=document.getElementById(id);return e?e.value:'';}
function gvn(id){var v=gv(id);return v===''?0:+v;}

// ===== CORE POSTING FUNCTIONS =====
// Post a cash/bank/upi transaction (credit mode does NOT touch cashBook)
// Find the single CC or OD loan account (Phase 1: auto-select only if exactly one exists)
function findCCODAccount(type){
  var label = type==='cc' ? 'Cash Credit (CC)' : 'Overdraft (OD)';
  var matches = D.loans.filter(function(l){ return l.loanType===label; });
  if(matches.length===1) return matches[0];
  return null;
}
// Returns ALL CC or OD loan accounts (there may be more than one).
function findCCODAccounts(type){
  var label = type==='cc' ? 'Cash Credit (CC)' : 'Overdraft (OD)';
  return D.loans.filter(function(l){ return l.loanType===label; });
}
// Given a mode string, returns the matching CC/OD loan account, or null.
// Supports both the new 'cc:<loanId>' / 'od:<loanId>' format (for when there
// are multiple CC/OD accounts) and the legacy plain 'cc' / 'od' format
// (used when there is exactly one such account, including old cashbook entries).
function ccodAccountForMode(mode){
  if(!mode) return null;
  if(mode==='cc' || mode==='od'){
    return findCCODAccount(mode);
  }
  if(mode.indexOf('cc:')===0 || mode.indexOf('od:')===0){
    var loanId = mode.slice(mode.indexOf(':')+1);
    for(var i=0;i<D.loans.length;i++) if(D.loans[i].id===loanId) return D.loans[i];
  }
  return null;
}
// Pre-check before recording a transaction with mode cc/od or cc:<id>/od:<id>: returns true if OK, shows toast and returns false if not.
function validateCCOD(mode){
  if(!mode) return true; // null/undefined mode is not CC/OD
  var isCcOd = mode==='cc'||mode==='od'||mode.indexOf('cc:')===0||mode.indexOf('od:')===0;
  if(!isCcOd) return true;
  var type = (mode==='cc'||mode.indexOf('cc:')===0) ? 'cc' : 'od';
  var label = type==='cc' ? 'Cash Credit (CC)' : 'Overdraft (OD)';
  var acct = ccodAccountForMode(mode);
  if(acct) return true;
  var matches = findCCODAccounts(type);
  if(matches.length>1){
    toast('Please select a specific '+label+' account from the dropdown.','e');
  } else {
    toast('No '+label+' account set up. Add one via Capital/Loans → Add Loan (Loan Type: '+label+'), or Trial Balance.','e');
  }
  return false;
}
function postCB(mode,type,amount,party,desc,date){
  if(mode==='credit'||!amount)return;
  if(!mode)return; // null mode guard
  var isCcOd = mode==='cc'||mode==='od'||mode.indexOf('cc:')===0||mode.indexOf('od:')===0;
  if(isCcOd){
    var acct = ccodAccountForMode(mode);
    if(!acct) return; // validateCCOD() should have caught this before recording
    if(type==='payment'){
      // Drawing from CC/OD increases utilization (outstanding)
      acct.outstandingBalance = (+acct.outstandingBalance||0) + amount;
    } else {
      // Receipt credited to CC/OD reduces utilization
      acct.outstandingBalance = (+acct.outstandingBalance||0) - amount;
    }
    // Also record in the cashbook (subMode 'cc'/'od'/'cc:id'/'od:id') so the Transaction
    // Register and account statements show this movement against the CC/OD account.
    D.cashBook.push({id:uid(),date:date||td(),type:type,mode:mode,subMode:mode,amount:amount,party:party||'',description:desc||'',loanId:acct.id});
    sv();
    return;
  }
  var cbMode, bankAccountId;
  if(mode.indexOf('bank:')===0){
    cbMode='bank'; bankAccountId=mode.slice(5);
  } else if(mode==='upi'){
    cbMode='bank'; bankAccountId=(D.bankAccounts&&D.bankAccounts[0])?D.bankAccounts[0].id:'acc1';
  } else if(mode==='bank'){
    // legacy: plain 'bank' with no account specified - default to first account
    cbMode='bank'; bankAccountId=(D.bankAccounts&&D.bankAccounts[0])?D.bankAccounts[0].id:'acc1';
  } else {
    cbMode='cash';
  }
  var entry={id:uid(),date:date||td(),type:type,mode:cbMode,subMode:mode,amount:amount,party:party||'',description:desc||''};
  if(cbMode==='bank') entry.bankAccountId=bankAccountId;
  D.cashBook.push(entry);
}
// ── TB GUARD HELPERS ──────────────────────────────────────────────────────
// Rule 1: Block entry if Trial Balance not yet posted
function requireTBPosted(){
  if(D.tbPosted) return true;
  confirmDialog(
    '⚠️ Opening Trial Balance Not Posted\n\n'+
    'You must enter and post your Opening Trial Balance before adding individual items here.\n\n'+
    'Go to: Data → Opening Trial Balance → enter your opening balances → Post to Books.\n\n'+
    'This ensures your Balance Sheet stays in balance.',
    function(){ go('data'); window._dtab='trial'; renderPage(); }
  );
  return false;
}
// Rule 2: Check that individual items total matches the corresponding TB head total
// heads: array of TB head codes to sum; currentTotal: sum of items entered so far (BEFORE adding new item); newItemAmt: amount being added; label: display name
function checkTBHeadMatch(heads, afterTotal, label){
  var tbTotal = 0;
  (D.trialBalance||[]).forEach(function(r){ if(heads.indexOf(r.head)>=0) tbTotal+=(+r.amount||0); });
  if(tbTotal===0) return true; // no TB entry for this head — allow freely
  if(Math.abs(afterTotal - tbTotal) < 0.01) return true;
  var diff = afterTotal - tbTotal;
  var msg = '⚠️ ' + label + ' Mismatch with Trial Balance\n\n' +
    'Trial Balance total for this head: ₹' + tbTotal.toLocaleString('en-IN') + '\n' +
    'Your entries now total:            ₹' + afterTotal.toLocaleString('en-IN') + '\n' +
    'Difference:                        ₹' + Math.abs(diff).toLocaleString('en-IN') +
    (diff > 0 ? ' (entries EXCEED Trial Balance)' : ' (entries are SHORT of Trial Balance)') + '\n\n' +
    'Please reconcile so that your individual item entries match the Trial Balance total exactly. ' +
    'Otherwise your Balance Sheet will not tally.';
  alert(msg);
  return false;
}
// ──────────────────────────────────────────────────────────────────────────
function addDebtor(name,amount,date,ref){
  if(!amount)return;
  D.debtors.push({id:uid(),name:name||'Customer',amount:amount,date:date||td(),ref:ref||''});
}
function addCreditor(name,amount,date,ref,type){
  if(!amount)return;
  D.creditors.push({id:uid(),name:name||'Supplier',amount:amount,date:date||td(),ref:ref||'',type:type||'supplier'});
}
function getBalances(){
  var cb=0,bb=0,i,x;
  for(i=0;i<D.cashBook.length;i++){
    x=D.cashBook[i];
    if(!x.mode) continue; // guard: skip entries with missing mode (data migration safety)
    if(x.mode==='cc'||x.mode==='od'||x.mode.indexOf('cc:')===0||x.mode.indexOf('od:')===0) continue; // CC/OD movements are tracked via loan.outstandingBalance, not cash/bank totals
    var amt=x.type==='receipt'?x.amount:-x.amount;
    if(x.mode==='cash')cb+=amt;else bb+=amt;
  }
  cb+=(+D.opening.cash||0);
  bb+=(+D.opening.bank||0);
  return {cb:cb,bb:bb};
}
// Per-bank-account balances. Opening D.opening.bank is attributed to the first account (acc1).
// Resolves a payment mode ('cash','bank','bank:<id>','upi') to its current balance.
// Returns null for credit/cc/od modes (no cash/bank balance check applicable).
function getModeBalance(mode){
  if(!mode || mode==='credit') return null;
  var isCcOd = mode==='cc'||mode==='od'||mode.indexOf('cc:')===0||mode.indexOf('od:')===0;
  if(isCcOd) return null;
  if(mode==='cash') return getBalances().cb;
  var accts = getBankAccountBalances();
  if(mode.indexOf('bank:')===0){
    var aid=mode.slice(5);
    for(var i=0;i<accts.length;i++) if(accts[i].id===aid) return accts[i].balance;
    return accts[0]?accts[0].balance:0;
  }
  if(mode==='upi'||mode==='bank'){
    return accts[0]?accts[0].balance:0;
  }
  return null;
}
// Shows a confirmation if `mode` is a cash/bank mode and paying `amount` would make
// that account's balance negative. Calls onProceed() if the user confirms (or if no
// warning is needed). Does nothing further if the user cancels.
function confirmIfNegative(mode, amount, onProceed){
  var bal = getModeBalance(mode);
  if(bal===null){ onProceed(); return; }
  var after = bal - amount;
  if(after >= -0.005){ onProceed(); return; }
  var label = mode==='cash' ? 'Cash' : 'Bank';
  confirmDialog('This will result in a negative '+label+' balance of '+fc(after)+' (current balance: '+fc(bal)+'). Do you want to proceed anyway?', onProceed);
}
function getBankAccountBalances(){
  var accts = D.bankAccounts && D.bankAccounts.length ? D.bankAccounts : [{id:'acc1',name:'Bank Account 1'}];
  var balances = {};
  for(var i=0;i<accts.length;i++) balances[accts[i].id]=0;
  for(i=0;i<D.cashBook.length;i++){
    var x=D.cashBook[i];
    if(x.mode!=='bank') continue;
    var aid = x.bankAccountId || accts[0].id;
    var amt = x.type==='receipt'?x.amount:-x.amount;
    if(balances[aid]===undefined) balances[aid]=0;
    balances[aid]+=amt;
  }
  if(accts[0]) balances[accts[0].id] = (balances[accts[0].id]||0) + (+D.opening.bank||0);
  return accts.map(function(a){return {id:a.id,name:a.name,accountNumber:a.accountNumber||'',balance:balances[a.id]||0};});
}
function totalDebtors(){
  var t=0,i,hasTBEntry=false;
  for(i=0;i<D.debtors.length;i++){t+=D.debtors[i].amount;if(D.debtors[i].fromTB||D.debtors[i].ref==='Opening Trial Balance')hasTBEntry=true;}
  if(!hasTBEntry) t += (+D.opening.debtors||0);
  return t;
}
function totalCreditors(){
  var t=0,i,hasTBEntry=false;
  for(i=0;i<D.creditors.length;i++){
    if((D.creditors[i].type||'supplier')!=='supplier') continue;
    t+=D.creditors[i].amount;
    if(D.creditors[i].fromTB||D.creditors[i].ref==='Opening Trial Balance')hasTBEntry=true;
  }
  if(!hasTBEntry) t += (+D.opening.creditors||0);
  return t;
}
function totalExpensesPayable(){
  var t=0,i;
  for(i=0;i<D.creditors.length;i++){
    if((D.creditors[i].type||'supplier')==='expense') t+=D.creditors[i].amount;
  }
  return t;
}
// Combined total of Sundry Creditors + Expenses Payable - used in Balance Sheet totals
function totalCreditorsAndExpensesPayable(){
  return totalCreditors() + totalExpensesPayable();
}
// Aggregate debtor/creditor entries by party name into running balances
function debtorBalances(){
  var m={},order=[],i;
  for(i=0;i<D.debtors.length;i++){
    var nm=D.debtors[i].name||'Customer';
    if(m[nm]===undefined){m[nm]=0;order.push(nm);}
    m[nm]+=D.debtors[i].amount;
  }
  if((+D.opening.debtors||0)>0 && order.length===0){
    m['(Opening Balance)']=(+D.opening.debtors||0);order.push('(Opening Balance)');
  }
  var out=[];for(i=0;i<order.length;i++)if(Math.abs(m[order[i]])>0.005)out.push({name:order[i],balance:m[order[i]]});
  return out;
}
function creditorBalances(){
  var m={},order=[],i;
  for(i=0;i<D.creditors.length;i++){
    if((D.creditors[i].type||'supplier')!=='supplier') continue;
    var nm=D.creditors[i].name||'Supplier';
    if(m[nm]===undefined){m[nm]=0;order.push(nm);}
    m[nm]+=D.creditors[i].amount;
  }
  if((+D.opening.creditors||0)>0 && order.length===0){
    m['(Opening Balance)']=(+D.opening.creditors||0);order.push('(Opening Balance)');
  }
  var out=[];for(i=0;i<order.length;i++)if(Math.abs(m[order[i]])>0.005)out.push({name:order[i],balance:m[order[i]]});
  return out;
}
function expensesPayableBalances(){
  var m={},order=[],i;
  for(i=0;i<D.creditors.length;i++){
    if((D.creditors[i].type||'supplier')!=='expense') continue;
    var nm=D.creditors[i].name||'Expense';
    if(m[nm]===undefined){m[nm]=0;order.push(nm);}
    m[nm]+=D.creditors[i].amount;
  }
  var out=[];for(i=0;i<order.length;i++)if(Math.abs(m[order[i]])>0.005)out.push({name:order[i],balance:m[order[i]]});
  return out;
}

function calcEMI(p,r,n){var m=r/1200;if(m===0)return p/n;return p*m*Math.pow(1+m,n)/(Math.pow(1+m,n)-1);}
function daysBetween(d1,d2){var a=new Date(d1),b=new Date(d2);return Math.max(0,Math.round((b-a)/86400000));}
// Provisional interest accrued since lastInterestDate, on outstandingBalance, at annual rate
function loanAccruedInterest(loan){
  var from=loan.lastInterestDate||loan.sanctionDate||td();
  var days=daysBetween(from,td());
  var rate=(+loan.rate||0)/100;
  return loan.outstandingBalance * rate * days / 365;
}

function getF(){
  var ts=0,tc=0,os=0,tp=0,cs=0,te=0,cap=0,ltl=0,stl=0,i;
  var bal=getBalances(),cb=bal.cb,bb=bal.bb;
  var salesByType={cash:0,credit:0,export:0};
  for(i=0;i<D.sales.length;i++){
    ts+=D.sales[i].totalAmount;tc+=(D.sales[i].cogs||0);
    var s=D.sales[i];
    if(s.isExport) salesByType.export+=s.totalAmount;
    else if(s.paymentMode==='credit') salesByType.credit+=s.totalAmount;
    else salesByType.cash+=s.totalAmount;
  }
  var csIndig=0, csImp=0;
  for(i=0;i<D.inventory.length;i++){csIndig+=D.inventory[i].currentStock*D.inventory[i].avgCost; csImp+=(D.inventory[i].importedStock||0)*(D.inventory[i].importedAvgCost||0);}
  cs = csIndig+csImp;
  os=(+D.opening.stock||0);
  var purchasesByType={indigenous:0,imported:0};
  for(i=0;i<D.purchases.length;i++){
    tp+=D.purchases[i].amount;
    if(D.purchases[i].isImported) purchasesByType.imported+=D.purchases[i].amount;
    else purchasesByType.indigenous+=D.purchases[i].amount;
  }
  for(i=0;i<D.expenses.length;i++)te+=D.expenses[i].amount;
  cap=(D.capital.initialCapital||0)+(D.capital.additionalCapital||0)+((D.capital.initialCapital||0)===0?(+D.opening.capital||0):0);
  var totalDrawings=0;(D.drawings||[]).forEach(function(d){totalDrawings+=(+d.amount||0);});cap-=totalDrawings;
  for(i=0;i<D.loans.length;i++)ltl+=(+D.loans[i].outstandingBalance||0);
  var gp=ts-(os+tp-cs);
  var dr=totalDebtors(),cr=totalCreditors(),expPayable=totalExpensesPayable();
  // Advances: amounts paid/received in advance, net of any adjustments already recorded.
  var advToSuppliers=0, advPrepaidExp=0, advFromCustomers=0;
  (D.advances||[]).forEach(function(a){
    var amt=(+a.amount||0);
    if(amt<=0) return;
    if(a.type==='paid' && a.category==='supplier') advToSuppliers+=amt;
    else if(a.type==='paid' && a.category==='expense') advPrepaidExp+=amt;
    else if(a.type==='received') advFromCustomers+=amt;
  });
  var oa=(+D.otherAssets||0), ol=(+D.otherLiab||0);
  return{ts:ts,tc:tc,os:os,tp:tp,cs:cs,csIndig:csIndig,csImp:csImp,gp:gp,te:te,np:gp-te,cap:cap,ltl:ltl,stl:stl,cb:cb,bb:bb,dr:dr,cr:cr,expPayable:expPayable,oa:oa,ol:ol,salesByType:salesByType,purchasesByType:purchasesByType,advToSuppliers:advToSuppliers,advPrepaidExp:advPrepaidExp,advFromCustomers:advFromCustomers};
}
function isCcOdLoan(l){ return l.loanType==='Cash Credit (CC)' || l.loanType==='Overdraft (OD)'; }
// Net block of Fixed Assets + Intangibles (book value)
function fixedAssetsNetTotal(){
  var net=0;
  (D.fixedAssets||[]).forEach(function(a){ if(!a.disposed) net += (+a.cost||0) - (+a.accumDep||0); });
  (D.intangibleAssets||[]).forEach(function(a){ if(!a.disposed) net += (+a.cost||0) - (+a.accumAmort||0); });
  return net;
}
// "Other Assets" excluding Fixed Assets/Intangibles cost (true non-current other assets)
function otherAssetsExclFA(){
  var faCost=0; (D.fixedAssets||[]).forEach(function(a){ faCost+=(+a.cost||0); });
  var iaCost=0; (D.intangibleAssets||[]).forEach(function(a){ iaCost+=(+a.cost||0); });
  return Math.max(0, (+D.otherAssets||0) - faCost - iaCost);
}
// Grouped Balance Sheet figures: Owned Funds / Term Liabilities / Current Liabilities / Other Current Liabilities
// and Fixed Assets / Current Assets / Other Non-Current Assets, with Net Working Capital
function getFGrouped(){
  var f=getF();
  var termLoans=0, stBorrowings=0;
  for(var i=0;i<D.loans.length;i++){
    var l=D.loans[i], ob=(+l.outstandingBalance||0);
    if(isCcOdLoan(l)) stBorrowings+=ob; else termLoans+=ob;
  }
  var fixedAssetsNet = fixedAssetsNetTotal();
  var otherNonCurrentAssets = otherAssetsExclFA();

  var ownedFunds = f.cap + f.np;
  var currentLiab = f.cr + f.expPayable + f.advFromCustomers + stBorrowings + f.ol;
  var currentAssets = f.cs + f.cb + f.bb + f.dr + f.advToSuppliers + f.advPrepaidExp;
  var totalLiab = ownedFunds + termLoans + currentLiab;
  var totalAssets = fixedAssetsNet + currentAssets + otherNonCurrentAssets;
  var nwc = currentAssets - currentLiab;

  return {
    ownedFunds:ownedFunds, termLoans:termLoans, currentLiab:currentLiab, otherCurrentLiab:f.ol,
    sundryCreditors:f.cr, expensesPayable:f.expPayable, stBorrowings:stBorrowings,
    advToSuppliers:f.advToSuppliers, advPrepaidExp:f.advPrepaidExp, advFromCustomers:f.advFromCustomers,
    fixedAssetsNet:fixedAssetsNet, currentAssets:currentAssets, otherNonCurrentAssets:otherNonCurrentAssets,
    closingStock:f.cs, closingStockIndig:f.csIndig, closingStockImp:f.csImp, cashBank:f.cb+f.bb, debtors:f.dr,
    sundryDebtors:f.dr, sundryCreditors:f.cr,
    totalLiab:totalLiab, totalAssets:totalAssets, nwc:nwc, diff:totalLiab-totalAssets
  };
}

      matches.forEach(function(m){

function addDrawing(){
  var date=gv('dw_d')||td(), amt=gvn('dw_a'), mode=gv('dw_m')||'cash', remarks=gv('dw_r')||'';
  if(!amt || amt<=0){toast('Enter the amount to withdraw','e');return;}
  confirmIfNegative(mode, amt, function(){
    postCB(mode,'payment',amt,'Owner','Drawings'+(remarks?' - '+remarks:''),date);
    // NOTE: Drawings is tracked separately in D.drawings[] and already reduces
    // Owner's Capital correctly via f.cap = initialCapital + additionalCapital + opening.capital - drawings.
    // Do NOT also subtract from additionalCapital here - that double-counts the reduction
    // and corrupts the Cash Flow Statement's "Capital Introduced" line (a separate, distinct
    // Financing Activity from "Drawings"). This was a real bug - fixed.
    D.drawings = D.drawings || [];
    var partnerId = gv('d_partner')||'';
  var partnerName = '';
  if(partnerId){
    var pp=(D.profile.partners||[]).find(function(p){return p.id===partnerId;});
    if(pp) partnerName=pp.name;
  }
  D.drawings.push({id:uid(),date:date,amount:amt,mode:mode,remarks:remarks,partnerId:partnerId,partnerName:partnerName});
    sv();
    window._captab='drawings';
    renderPage();
    toast('Withdrawal recorded - '+fc(amt)+' debited from Capital.');
  });
}
function deleteDrawing(id){

    if(idx<0)return;

function saveCap(){
  if(!requireTBPosted()) return;
  var partners = D.profile.partners||[];
  var constitution = D.profile.constitution||'Individual';
  var isMultiOwner = constitution!=='Individual' && constitution!=='Sole Proprietorship' && constitution!=='';
  var mode = gv('c_mode');
  var delta = 0;
  var capPartnerId = gv('c_partner')||'';
  var capPartnerName = '';

  if(isMultiOwner && partners.length>0){
    // NEW explicit flow: c_new = amount being added right now (not a running total)
    delta = gvn('c_new');
    if(delta===0){ toast('Enter the amount to add','e'); return; }
    if(!capPartnerId){ toast('Please select which partner/director/member is introducing this capital','e'); return; }
    if(capPartnerId){
      var cpp=(D.profile.partners||[]).find(function(p){return p.id===capPartnerId;});
      if(cpp) capPartnerName=cpp.name;
      if(!D.capital.partnerCapital) D.capital.partnerCapital={};
      D.capital.partnerCapital[capPartnerId] = (D.capital.partnerCapital[capPartnerId]||0) + delta;
    }
    if(delta>0 && mode!=='none'){
      postCB(mode,'receipt',delta,capPartnerName||'Owner','Capital Introduced'+(capPartnerName?' by '+capPartnerName:''),td());
    } else if(delta<0 && mode!=='none'){
      postCB(mode,'payment',-delta,capPartnerName||'Owner','Capital Reduced'+(capPartnerName?' by '+capPartnerName:''),td());
    }
    D.capital.initialCapital = (D.capital.initialCapital||0) + (delta>0?delta:0);
    if(delta<0) D.capital.additionalCapital = (D.capital.additionalCapital||0) + delta;
  } else {
    // Original flow for Individual/Sole Proprietorship - unchanged
    var oldInit = D.capital.initialCapital||0;
    var oldAdd = D.capital.additionalCapital||0;
    var newInit = gvn('c_i');
    var newAdd = gvn('c_a');
    var deltaInit = newInit - oldInit;
    var deltaAdd = newAdd - oldAdd;
    delta = deltaInit + deltaAdd;
    if(delta>0 && mode!=='none'){
      var label = deltaInit>0 && deltaAdd>0 ? 'Initial + Additional Capital Introduced' : (deltaInit>0 ? 'Initial Capital Introduced' : 'Additional Capital Introduced');
      postCB(mode,'receipt',delta,'Owner',label,td());
    } else if(delta<0 && mode!=='none'){
      postCB(mode,'payment',-delta,'Owner','Capital Reduced / Drawings',td());
    }
    D.capital.initialCapital = newInit;
    D.capital.additionalCapital = newAdd;
  }

  sv();renderPage();toast('Capital saved'+(capPartnerName?' for '+capPartnerName:'')+'!');
}

// Remove a loan record entirely. Use this to correct mistakes (e.g. a loan entered
// as fully disbursed when it was actually sanctioned-but-undrawn) - then re-add it
// correctly via "+ Add Loan". Any related interest/repayment expense entries already
// posted are NOT reversed automatically; review Reports if needed.
// Returns true if a drawing entry's mode ('cc'/'od'/'cc:<id>'/'od:<id>') refers to the given loan account.
function ccodDrawingMatchesLoan(d, loan){
  var type = loan.loanType==='Cash Credit (CC)' ? 'cc' : 'od';
  if(d.mode===type+':'+loan.id) return true;
  if(d.mode===type){
    // Legacy plain 'cc'/'od': only matches if this is the SOLE account of that type
    // (i.e. it was unambiguous at the time it was recorded).
    return findCCODAccounts(type).length===1 && findCCODAccounts(type)[0].id===loan.id;
  }
  return false;
}
function deleteLoan(id){
  var loan=null; for(var i=0;i<D.loans.length;i++) if(D.loans[i].id===id) loan=D.loans[i];
  if(!loan){toast('Loan not found','e');return;}
  var hasPayments = (loan.payments||[]).length>0;
  var isCcOd = isCcOdLoan(loan);
  var ccOdDrawingsCount = isCcOd ? (D.drawings||[]).filter(function(d){return ccodDrawingMatchesLoan(d,loan);}).length : 0;
  var msg = 'Remove this loan record ('+loan.bankName+', '+loan.loanType+')? '+
    'This will also remove all related entries: the original disbursement/drawdown'+
    (hasPayments?', all '+(loan.payments||[]).length+' repayment(s) and any associated interest expense entries':'')+
    (ccOdDrawingsCount>0?', and '+ccOdDrawingsCount+' Drawings entry/entries recorded against this account (Owner Capital will be restored)':'')+
    ', restoring your Cash/Bank balances and the Balance Sheet to what they would be if this loan had never been added. This cannot be undone.';
  confirmDialog(msg, function(){
    var party = loan.bankName, lt = loan.loanType;
    if(isCcOd){
      // CC/OD: remove every cashbook entry tagged with this loan's id (drawings and repayments)
      D.cashBook = D.cashBook.filter(function(x){ return x.loanId!==loan.id; });
      // Any "Drawings" entries recorded against this CC/OD account (mode 'cc'/'od') also need
      // their effect on Owner's Capital reversed, since the CC/OD liability they were drawn
      // against no longer exists.
      var ccOdMode = loan.loanType==='Cash Credit (CC)' ? 'cc' : 'od';
      var keptDrawings=[];
      (D.drawings||[]).forEach(function(d){
        if(ccodDrawingMatchesLoan(d,loan)){
          D.capital.additionalCapital = (D.capital.additionalCapital||0) + d.amount;
        } else {
          keptDrawings.push(d);
        }
      });
      D.drawings = keptDrawings;
    } else {
      // Term/other loans: remove disbursement, drawdown, and repayment cashbook entries by
      // matching party + description (the same pattern used elsewhere to link entries to loans,
      // since these entries do not carry a loanId).
      var descsToRemove = [
        'Loan Disbursed / CC-OD Drawn - '+lt,
        'Loan Drawdown - '+lt,
        'Loan Repayment - '+lt
      ];
      D.cashBook = D.cashBook.filter(function(x){
        if(x.party!==party) return true;
        return descsToRemove.indexOf(x.description)<0;
      });
      // Remove interest expense entries recorded against this loan's repayments
      var interestRemark = 'Interest on '+party+' loan';
      D.expenses = D.expenses.filter(function(e){
        return !(e.category==='Interest Payment' && e.remarks===interestRemark);
      });
    }
    D.loans = D.loans.filter(function(l){return l.id!==id;});
    sv();renderPage();toast('Loan and all related entries removed.');
  });
}
function addLoan(){
  var b=gv('l_b'),a=gvn('l_a'),lt=gv('l_type');
  if(!b){toast('Enter Lender Name','e');return;}
  var isCcOd = (lt==='Cash Credit (CC)' || lt==='Overdraft (OD)');
  if(!isCcOd && !a){toast('Enter Loan Amount','e');return;}
  var acctnum=gv('l_acctnum').trim();
  if(!acctnum){toast('Enter the Loan/CC/OD Account Number','e');return;}
  var r=gvn('l_r'),n=isCcOd?0:gvn('l_t'),e=(!isCcOd && r && n)?calcEMI(a,r,n):0;
  var obRaw=gv('l_ob');
  var ob;
  if(isCcOd){
    // CC/OD: Outstanding Balance is the amount CURRENTLY UTILIZED. 0 is valid (nothing drawn yet).
    ob = obRaw===''?0:+obRaw;
  } else {
    // Term/other loans: if left blank, default Outstanding = Loan Amount (fresh disbursement)
    ob = obRaw===''?a:+obRaw;
  }
  var lim=gvn('l_lim')||0;
  var disb=gv('l_disb');
  var loanAmt = isCcOd ? lim : a; // for CC/OD, "amount" of the facility is the sanctioned limit
  var recvRaw=gv('l_recv');
  var recv = recvRaw===''?ob:+recvRaw; // defaults to Outstanding Balance if left blank, but can be set to 0
  if(disb==='none') recv=0; // "Don't add to Cash/Bank" means nothing has actually been received yet

  // If a term/other loan has been sanctioned but NOTHING has been drawn/received yet (recv===0 while ob>0),
  // treat it as "Sanctioned - Not Yet Drawn": keep it out of the Balance Sheet liabilities (outstandingBalance=0)
  // until a drawdown is recorded. The sanctioned amount is kept in sanctionedAmount for reference.
  var undrawn = (!isCcOd && ob>0 && recv===0);
  var loan={id:uid(),bankName:b,accountNumber:acctnum,loanType:lt,amount:loanAmt,rate:r,tenure:n,sanctionDate:gv('l_d')||td(),emi:+e.toFixed(2),
    outstandingBalance: undrawn ? 0 : ob,
    sanctionedAmount: ob,
    undrawn: undrawn,
    sanctionedLimit:isCcOd?lim:0,lastInterestDate:gv('l_d')||td(),payments:[]};
  D.loans.push(loan);
  if(disb!=='none' && recv>0){
    postCB(disb,'receipt',recv,b,'Loan Disbursed / CC-OD Drawn - '+lt,gv('l_d')||td());
  }
  sv();window._captab='overview';renderPage();
  toast(undrawn ? 'Loan recorded as sanctioned (not yet drawn) - it will not appear on the Balance Sheet until drawn.' : 'Loan added!');
}
// Record a drawdown against a previously "sanctioned, not yet drawn" loan: activates it on the Balance Sheet
function drawdownLoan(id){
  var loan=null; for(var i=0;i<D.loans.length;i++) if(D.loans[i].id===id) loan=D.loans[i];
  if(!loan){toast('Loan not found','e');return;}
  var amt = gvn('dd_amt_'+id);
  if(!amt || amt<=0){toast('Enter the drawdown amount','e');return;}
  var mode = gv('dd_mode_'+id) || 'bank';
  var date = gv('dd_date_'+id) || td();
  loan.outstandingBalance = (+loan.outstandingBalance||0) + amt;
  if(loan.outstandingBalance > 0.5) loan.undrawn = false; // any drawdown removes it from the 'awaiting drawdown' list
  loan.lastInterestDate = date;
  if(mode!=='none'){
    postCB(mode,'receipt',amt,loan.bankName,'Loan Drawdown - '+loan.loanType,date);
  }
  sv();renderPage();toast('Drawdown of '+fc(amt)+' recorded.');
}

function allRepayments(){
  var out=[];
  for(var i=0;i<D.loans.length;i++){
    var l=D.loans[i];
    for(var j=0;j<(l.payments||[]).length;j++){
      var p=l.payments[j];
      out.push({date:p.date,bank:l.bankName,amount:p.amount,principal:p.principal,interest:p.interest});
    }
  }
  out.sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  return out;
}

function autoSplitRepay(){
  var lid=gv('rp_loan');
  if(!lid)return;
  var loan=null;for(var i=0;i<D.loans.length;i++)if(D.loans[i].id===lid)loan=D.loans[i];
  if(!loan)return;
  var amt=gvn('rp_amt');
  var accrued=loanAccruedInterest(loan);
  var interest=Math.min(amt,accrued);
  var principal=Math.max(0,amt-interest);
  var ri=document.getElementById('rp_int'); if(ri)ri.value=interest?interest.toFixed(2):'';
  var rp=document.getElementById('rp_prin'); if(rp)rp.value=principal?principal.toFixed(2):'';
}

function recordRepay(){
  var lid=gv('rp_loan');
  if(!lid){toast('Select a loan','e');return;}
  var loan=null;for(var i=0;i<D.loans.length;i++)if(D.loans[i].id===lid)loan=D.loans[i];
  if(!loan)return;
  var amt=gvn('rp_amt');
  if(!amt){toast('Enter payment amount','e');return;}
  var prin=gvn('rp_prin'),intr=gvn('rp_int');
  if(prin+intr<=0){prin=amt;intr=0;}
  var mode=gv('rp_mode');
  var date=gv('rp_d')||td();
  confirmIfNegative(mode, amt, function(){
    loan.outstandingBalance=Math.max(0,loan.outstandingBalance-prin);
    loan.lastInterestDate=date;
    loan.payments.push({date:date,amount:amt,principal:prin,interest:intr});
    // Post cash/bank out
    postCB(mode,'payment',amt,loan.bankName,'Loan Repayment - '+loan.loanType,date);
    // Interest portion -> expense
    if(intr>0){
      D.expenses.push({id:uid(),date:date,category:'Interest Payment',amount:intr,remarks:'Interest on '+loan.bankName+' loan',paymentMode:mode});
    }
    sv();renderPage();toast('Repayment recorded!');
  });
}

// Draws 'q' units from an item's stock, indigenous first then imported.
// Returns {cogs: total cost of goods drawn, fromIndig: qty drawn from indigenous pool, fromImp: qty drawn from imported pool}
// and mutates item.currentStock/item.importedStock accordingly.
// Non-mutating preview of drawStock - used to compute COGS/breakdown before validation passes.
// Inverse of restoreStock: removes exactly fromIndig/fromImp units, reconstructing the
// pre-restore average cost via weighted-average subtraction. Used to roll back a
// restoreStock() call when an edit operation needs to abort after reversing.
function drawStockExact(item, fromIndig, fromImp, indigCostEach, impCostEach){
  if(fromIndig>0){
    var tq=item.currentStock-fromIndig;
    var tv=item.currentStock*item.avgCost - fromIndig*indigCostEach;
    item.currentStock=Math.max(0,tq); item.avgCost = item.currentStock>0 ? Math.max(0,tv)/item.currentStock : 0;
  }
  if(fromImp>0){
    var itq=(item.importedStock||0)-fromImp;
    var itv=(item.importedStock||0)*(item.importedAvgCost||0) - fromImp*impCostEach;
    item.importedStock=Math.max(0,itq); item.importedAvgCost = item.importedStock>0 ? Math.max(0,itv)/item.importedStock : 0;
  }
}
function drawStockPreview(item, q){
  var fromIndig = Math.min(q, item.currentStock);
  var fromImp = q - fromIndig;
  if(fromImp > (item.importedStock||0)) fromImp = item.importedStock||0;
  var cogs = fromIndig*item.avgCost + fromImp*(item.importedAvgCost||0);
  return {cogs:cogs, fromIndig:fromIndig, fromImp:fromImp};
}
function drawStock(item, q){
  var fromIndig = Math.min(q, item.currentStock);
  var fromImp = q - fromIndig;
  if(fromImp > (item.importedStock||0)) fromImp = item.importedStock||0; // shouldn't happen if total-stock check passed
  var cogs = fromIndig*item.avgCost + fromImp*(item.importedAvgCost||0);
  item.currentStock -= fromIndig;
  item.importedStock = (item.importedStock||0) - fromImp;
  return {cogs:cogs, fromIndig:fromIndig, fromImp:fromImp};
}
// Reverses a drawStock(): adds qty back to the pools it was drawn from, at the same
// per-unit cost it was drawn at (cogs/qty for that pool), via weighted-average add-back.
function restoreStock(item, fromIndig, fromImp, indigCostEach, impCostEach){
  if(fromIndig>0){
    var tq=item.currentStock+fromIndig, tv=item.currentStock*item.avgCost + fromIndig*indigCostEach;
    item.currentStock=tq; item.avgCost = tq>0 ? tv/tq : 0;
  }
  if(fromImp>0){
    var itq=(item.importedStock||0)+fromImp, itv=(item.importedStock||0)*(item.importedAvgCost||0) + fromImp*impCostEach;
    item.importedStock=itq; item.importedAvgCost = itq>0 ? itv/itq : 0;
  }
}

// Age-wise debtor analysis
function ageWiseDebtors() {
  var today = td();
  var dList = debtorBalances();
  if (!dList || dList.length === 0) return '';

  // Build age buckets using debtor transaction dates
  var buckets = {'0-30':[],'31-60':[],'61-90':[],'90+':[]};
  var bucketTotals = {'0-30':0,'31-60':0,'61-90':0,'90+':0};

  // Map debtor names to their earliest outstanding date
  var dateMap = {};
  D.debtors.forEach(function(d) {
    if (d.amount > 0 && d.date) {
      if (!dateMap[d.name] || d.date < dateMap[d.name]) dateMap[d.name] = d.date;
    }
  });

  dList.forEach(function(d) {
    if (d.balance <= 0) return;
    var date = dateMap[d.name] || today;
    var age = daysBetween(date, today);
    var bucket = age <= 30 ? '0-30' : age <= 60 ? '31-60' : age <= 90 ? '61-90' : '90+';
    buckets[bucket].push({name:d.name, balance:d.balance, age:age});
    bucketTotals[bucket] += d.balance;
  });

  var total = dList.reduce(function(s,d){return s+(d.balance>0?d.balance:0);},0);
  var hasAged = bucketTotals['61-90'] > 0 || bucketTotals['90+'] > 0;

  var h2 = '<div style="margin-top:12px">';
  h2 += '<div style="font-weight:700;font-size:13px;margin-bottom:8px;color:#37474F">Age-wise Debtor Analysis</div>';
  h2 += '<div style="overflow-x:auto"><table><thead><tr>'+
    '<th style="text-align:left">Age Bucket</th>'+
    '<th style="text-align:left">Debtors</th>'+
    '<th style="text-align:right">Amount</th>'+
    '<th style="text-align:right">% of Total</th>'+
    '</tr></thead><tbody>';

  var colors = {'0-30':'#2E7D32','31-60':'#F57F17','61-90':'#E65100','90+':'#C62828'};
  ['0-30','31-60','61-90','90+'].forEach(function(b) {
    var names = buckets[b].map(function(x){return x.name+'('+x.age+'d)';}).join(', ');
    var amt = bucketTotals[b];
    var pct = total > 0 ? (amt/total*100).toFixed(1) : '0.0';
    h2 += '<tr>'+
      '<td style="padding:5px 8px;font-weight:700;color:'+colors[b]+'">'+b+' days</td>'+
      '<td style="padding:5px 8px;font-size:11px;color:#546E7A">'+(names||'—')+'</td>'+

function addAdvance(){
  var date=gv('adv_d')||td(), amt=gvn('adv_a'), typeSel=gv('adv_type'), party=gv('adv_party')||'', mode=gv('adv_mode')||'cash', notes=gv('adv_notes')||'';
  if(!amt || amt<=0){toast('Enter the advance amount','e');return;}
  if(!party){toast('Enter the party name','e');return;}
  var type, category;
  if(typeSel==='paid_supplier'){ type='paid'; category='supplier'; }
  else if(typeSel==='paid_expense'){ type='paid'; category='expense'; }
  else { type='received'; category='customer'; }
  if(mode==='credit'){toast('Advances must be paid/received via Cash, Bank, UPI, CC or OD - not Credit','e');return;}
  if(!validateCCOD(mode)) return;

  var desc = (type==='paid'?'Advance Paid to ':'Advance Received from ')+party+(notes?' - '+notes:'');
  if(type==='paid'){
    postCB(mode,'payment',amt,party,desc,date);
  } else {
    postCB(mode,'receipt',amt,party,desc,date);
  }
  D.advances = D.advances || [];
  var refCode = 'ADV-'+Date.now().toString(36).toUpperCase().slice(-5);
  D.advances.push({id:uid(),date:date,type:type,category:category,party:party,amount:amt,mode:mode,notes:notes,refCode:refCode});
  sv();window._advMode=null;renderPage();
  toast('Advance recorded.');
}
function deleteAdvance(id){
  confirmDialog('Delete this advance? This reverses the original cash/bank entry. If any part of it was already adjusted, that adjustment record will also be removed - make sure this matches your records.', function(){
    var idx=-1,i;for(i=0;i<D.advances.length;i++)if(D.advances[i].id===id){idx=i;break;}
    if(idx<0)return;
    var adv=D.advances[idx];
    var desc = (adv.type==='paid'?'Advance Paid to ':'Advance Received from ')+adv.party+(adv.notes?' - '+adv.notes:'');
    if(adv.type==='paid'){
      reverseCB(adv.mode,'payment',adv.amount,desc);
    } else {
      reverseCB(adv.mode,'receipt',adv.amount,desc);
    }
    D.advances.splice(idx,1);
    sv();renderPage();toast('Advance deleted, balance reversed.');
  });
}
function addTransfer(){
  var date=gv('tr_d')||td(), amt=gvn('tr_a'), from=gv('tr_from'), to=gv('tr_to'), ds=gv('tr_ds')||'';
  if(!amt || amt<=0){toast('Enter the transfer amount','e');return;}

  var desc = 'Transfer'+(ds?' - '+ds:'')+' ('+modeLabel(from)+' \u2192 '+modeLabel(to)+')';

// Human-readable label for a cash/bank mode value, used in transfer descriptions
function modeLabel(mode){
  if(mode==='cash') return 'Cash';
  if(mode && mode.indexOf('bank:')===0){
    var accId=mode.slice(5);
    for(var i=0;i<(D.bankAccounts||[]).length;i++) if(D.bankAccounts[i].id===accId) return D.bankAccounts[i].name;
    return 'Bank';
  }
  return mode;
}
function addCB(){
  var a=gvn('cb_a'),ds=gv('cb_ds'),m=gv('cb_m');

  if(cbMode==='bank') entry.bankAccountId=bankAccountId;

  sv();go('cashbank');toast('Added!');
}

function calcEMI2(){var p=gvn('em_p'),r=gvn('em_r'),n=gvn('em_t');if(!p||!n)return;var e=calcEMI(p,r,n),tot=e*n;var el=document.getElementById('emi_res');if(el)el.innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;margin-top:8px"><div style="background:#E8F5E9;border-radius:8px;padding:9px"><div style="font-size:10px;color:#546E7A">Monthly EMI</div><div style="font-size:16px;font-weight:800;color:#2E7D32">'+fc(e)+'</div></div><div style="background:#FFEBEE;border-radius:8px;padding:9px"><div style="font-size:10px;color:#546E7A">Total Interest</div><div style="font-size:16px;font-weight:800;color:#C62828">'+fc(tot-p)+'</div></div><div style="background:#E8EAF6;border-radius:8px;padding:9px"><div style="font-size:10px;color:#546E7A">Total Payment</div><div style="font-size:16px;font-weight:800;color:#5C6BC0">'+fc(tot)+'</div></div></div>';}

function pgAna(){
  var f=getF(),i,tl=f.ltl,ca=f.cs+f.cb+f.bb+f.dr;
  var gp=f.ts>0?((f.gp/f.ts)*100).toFixed(1):0,np=f.ts>0?((f.np/f.ts)*100).toFixed(1):0;
  var de=f.cap>0?(tl/f.cap).toFixed(2):'--',cr=f.cr>0?(ca/f.cr).toFixed(2):'--',wc=ca-f.cr;
  var kpis=[['GP %',gp+'%',+gp>=20?'#2E7D32':'#E65100'],['NP %',np+'%',+np>=10?'#2E7D32':'#C62828'],['D/E Ratio',de,+de>2?'#C62828':'#2E7D32'],['Curr Ratio',cr,+cr>=1.5?'#2E7D32':'#E65100'],['Wkg Capital',fc(wc),wc>=0?'#2E7D32':'#C62828'],['ROCE',f.cap>0?((f.np/f.cap)*100).toFixed(1)+'%':'--',+f.np>0?'#2E7D32':'#C62828']];
  var h=card('Key Indicators','<div class="kg">'+kpis.map(function(k){return'<div class="ki"><div class="kl">'+k[0]+'</div><div class="kv" style="color:'+k[2]+'">'+k[1]+'</div></div>';}).join('')+'</div>');
  var j,ct=[];for(i=0;i<D.expenseCategories.length;i++){var cv=0;for(j=0;j<D.expenses.length;j++)if(D.expenses[j].category===D.expenseCategories[i])cv+=D.expenses[j].amount;if(cv>0)ct.push({l:D.expenseCategories[i].slice(0,6),v:cv});}
  if(ct.length)h+=card('Expense Breakdown',bar(ct,'#C62828',55));
  var im={};for(i=0;i<D.sales.length;i++){var sk=D.sales[i].itemName;im[sk]=(im[sk]||0)+D.sales[i].totalAmount;}
  var ta2=[];for(sk in im)ta2.push({l:sk.slice(0,8),v:im[sk]});ta2.sort(function(a,b){return b.v-a.v;});
  if(ta2.length)h+=card('Top Items by Sales',bar(ta2.slice(0,5),'#2E7D32',55));

  // Sales Analysis: breakdown of total sales by Cash/Bank, Credit, and Export
  var st=f.salesByType||{cash:0,credit:0,export:0};
  if(f.ts>0){
    var pct=function(v){return f.ts>0?((v/f.ts)*100).toFixed(1):'0.0';};
    var rows='';
    if(st.cash>0) rows+=fsr('Cash/Bank Sales',st.cash,0,1)+'<div style="font-size:10px;color:#90A4AE;padding:0 8px 4px 16px">'+pct(st.cash)+'% of total sales</div>';
    if(st.credit>0) rows+=fsr('Credit Sales',st.credit,0,1)+'<div style="font-size:10px;color:#90A4AE;padding:0 8px 4px 16px">'+pct(st.credit)+'% of total sales</div>';
    if(st.export>0) rows+=fsr('Export Sales',st.export,0,1)+'<div style="font-size:10px;color:#90A4AE;padding:0 8px 4px 16px">'+pct(st.export)+'% of total sales</div>';
    rows+=fsr('TOTAL SALES',f.ts,1,0,1);
    h+=card('Sales Analysis (Cash / Credit / Export)',rows);
    var salesBars=[];
    if(st.cash>0) salesBars.push({l:'Cash/Bank',v:st.cash});
    if(st.credit>0) salesBars.push({l:'Credit',v:st.credit});
    if(st.export>0) salesBars.push({l:'Export',v:st.export});
    if(salesBars.length>1) h+=card('Sales Mix',bar(salesBars,'#5B5BD6',55));
  }

  // Purchase Analysis: breakdown of total purchases by Indigenous / Imported
  var pt=f.purchasesByType||{indigenous:0,imported:0};
  if(f.tp>0){
    var pctp=function(v){return f.tp>0?((v/f.tp)*100).toFixed(1):'0.0';};
    var prows='';
    if(pt.indigenous>0) prows+=fsr('Indigenous Purchases',pt.indigenous,0,1)+'<div style="font-size:10px;color:#90A4AE;padding:0 8px 4px 16px">'+pctp(pt.indigenous)+'% of total purchases</div>';
    if(pt.imported>0) prows+=fsr('Imported Purchases',pt.imported,0,1)+'<div style="font-size:10px;color:#90A4AE;padding:0 8px 4px 16px">'+pctp(pt.imported)+'% of total purchases</div>';
    prows+=fsr('TOTAL PURCHASES',f.tp,1,0,1);
    h+=card('Purchase Analysis (Indigenous / Imported)',prows);
    var purchaseBars=[];
    if(pt.indigenous>0) purchaseBars.push({l:'Indigenous',v:pt.indigenous});
    if(pt.imported>0) purchaseBars.push({l:'Imported',v:pt.imported});
    if(purchaseBars.length>1) h+=card('Purchase Mix',bar(purchaseBars,'#E65100',55));
  }
  return h;
}

function pgDat(){
  var tab=window._dtab||'overview';

  var showTrial = !isNew || D.tbPosted || (D.trialBalance && D.trialBalance.length>0);

    h+='<div class="al ali"><div class="alt">New Business Setup</div><p>Since this is a new business, you don\'t need a Trial Balance. Just go to <b>Capital/Loans → Capital</b> and enter your <b>Initial Capital</b> (how much you\'re starting with, and whether it\'s in Cash or Bank). Then start recording your Sales, Purchases, and Expenses as they happen.</p><p style="margin-top:6px">If you do have prior balances to enter later (e.g. you took a loan before starting, or have opening stock), change "Business Stage" to "Existing business" in <b>Profile</b> to access Trial Balance.</p></div>';

function expDat(){

function showBackupModal(content, filename){
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:9999;overflow-y:auto;padding:14px';

  var title = document.createElement('div');
  title.style.cssText = 'font-size:15px;font-weight:700;color:#0D2137;margin-bottom:6px';
  title.textContent = 'Backup file: '+filename;

  var instructions = document.createElement('div');
  instructions.style.cssText = 'font-size:12px;color:#546E7A;margin-bottom:10px;line-height:1.5';
  instructions.innerHTML = 'This is your full data backup as text. To save it as a file:<br>'+
    '1. Tap <b>Select All</b>, then <b>Copy</b> below.<br>'+
    '2. Open your <b>Notes</b> or <b>Files</b> app, create a new note/file, and <b>Paste</b>.<br>'+
    '3. Save/name it (e.g. "'+filename+'"). Keep it somewhere safe - this is what you\'ll restore from later.';

  var ta = document.createElement('textarea');
  ta.readOnly = true;
  ta.value = content;
  ta.style.cssText = 'width:100%;height:55vh;font-family:monospace;font-size:11px;padding:8px;box-sizing:border-box;border:1px solid #BBDEFB;border-radius:8px;white-space:pre;resize:none';

  var btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:8px;justify-content:flex-end;margin-top:10px;flex-wrap:wrap';

  var selectBtn = document.createElement('button');
  selectBtn.textContent = 'Select All';
  selectBtn.style.cssText = 'padding:9px 14px;border-radius:8px;border:1px solid #BBDEFB;background:#fff;color:#1565C0;font-size:13px;cursor:pointer';
  selectBtn.onclick = function(){ ta.focus(); ta.select(); };

function tbTotalsHtml(){

  }
  var diff = totDr - totCr;
  var totalsHtml = '';
  totalsHtml += '<div style="display:flex;justify-content:space-between;font-weight:700;font-size:14px;padding:6px 0"><span>Total Debit</span><span>'+fc(totDr)+'</span></div>';

  if(tb.length===0){
    totalsHtml += '<div class="al ali">Add items to see tally status.</div>';
  } else if(Math.abs(diff) < 0.01){
    totalsHtml += '<div class="al als"><div class="alt">Trial Balance Tallies!</div><p>Debit = Credit. You can now post these to the books.</p></div>';

  }
  return card('Totals', totalsHtml);

  html += '<div style="display:flex;justify-content:space-between;align-items:center">'+sideChip+'<button onclick="delTBRow('+i+')" style="background:none;border:none;color:#C62828;font-weight:700;cursor:pointer;font-size:18px">Delete</button></div>';
  html += '</div>';
  return html;
}

function addTBRow(){
  if(!D.trialBalance) D.trialBalance=[];
  D.trialBalance.push({head:'cash',label:'',side:'dr',amount:0});
  sv(); renderPage();
}
function delTBRow(i){
  D.trialBalance.splice(i,1);
  sv(); renderPage();
}
// field: 1=head, 2=amount, 3=label
function tbUpdate(i,field,val){
  var row = D.trialBalance[i];
  if(!row) return;
  if(field===1){
    row.head = val;
    row.side = tbHeadSide(val);
    if(val==='stockitem'){
      if(row.qty===undefined)row.qty=0;
      if(row.cost===undefined)row.cost=0;
      if(!row.unit)row.unit='No.';
      row.amount = (+row.qty||0)*(+row.cost||0);
    }
    sv(); renderPage();
  } else if(field===2){
    row.amount = (val==='') ? 0 : (+val);
    sv();
    updateTBTotals();
  } else if(field===3){
    row.label = val;
    sv();
  } else if(field===4){
    row.qty = (val==='') ? 0 : (+val);
    row.amount = (+row.qty||0)*(+row.cost||0);
    sv();
    var amtEl=document.getElementById('tb_amt_'+i);
    if(amtEl) amtEl.value = row.amount || '';
    updateTBTotals();
  } else if(field===5){
    row.cost = (val==='') ? 0 : (+val);
    row.amount = (+row.qty||0)*(+row.cost||0);
    sv();
    var amtEl2=document.getElementById('tb_amt_'+i);
    if(amtEl2) amtEl2.value = row.amount || '';
    updateTBTotals();
  } else if(field===6){
    row.unit = val;
    sv();
  } else if(field===7){
    if(row.head==='loan') row.loanType = val;
    else row.category = val;
    sv();
  } else if(field===8){
    if(row.head==='intangibleitem') row.usefulLife = (val==='') ? 0 : (+val);
    else row.depRate = (val==='') ? 0 : (+val);
    sv();
  } else if(field===9){
    if(row.head==='loan') row.usefulLife = (val==='') ? 0 : (+val); // tenure (months)
    else row.purchaseDate = val;
    sv();
  } else if(field===10){
    row.purchaseDate = val; // loan sanction date
    sv();
  } else if(field===11){
    row.sanctionedLimit = (val==='') ? 0 : (+val);
    sv();
  }
}

function postTB(){
  var tb = D.trialBalance || [];
  var totDr=0, totCr=0, i;
  for(i=0;i<tb.length;i++){
    if(tb[i].side==='dr') totDr += (+tb[i].amount||0);
    else totCr += (+tb[i].amount||0);
  }
  if(Math.abs(totDr-totCr) >= 0.01){ toast('Trial Balance does not tally','e'); return; }
  if(tb.length===0){ toast('Add at least one item','e'); return; }
  confirmDialog('Post Trial Balance to books? Opening balances will be set. Use Reset to undo if needed.', function(){ postTBExecute(); });
}
function postTBExecute(){
  var tb = D.trialBalance || [];
  var i;
  var open = {cash:0,bank:0,stock:0,debtors:0,creditors:0,capital:0,takenOn:td()};
  D.otherAssetsNotes = D.otherAssetsNotes || [];
  D.otherLiabNotes = D.otherLiabNotes || [];

  for(i=0;i<tb.length;i++){
    var r = tb[i], amt = +r.amount||0;
    if(amt<=0) continue;
    if(r.head==='cash'){ open.cash += amt; }
    else if(r.head==='bank'){ open.bank += amt; }
    else if(r.head==='stock'){
      open.stock += amt;
      if(D.inventory.length===0){
        D.inventory.push({id:uid(),itemName:'Opening Stock (General)',unit:'Lot',openingStock:1,currentStock:1,avgCost:amt,reorderLevel:0,fromTB:true});
      }
    }
    else if(r.head==='stockitem'){
      open.stock += amt;
      var qty=(+r.qty||0), cost=(+r.cost||0);
      if(qty>0){
        var existing=findOrCreateItem(r.label||'Item',r.unit||'No.');
        var wasNew = (existing.currentStock===0 && existing.avgCost===0 && existing.openingStock===0);
        existing.currentStock = (existing.currentStock||0) + qty;
        existing.avgCost = cost;
        existing.openingStock = (existing.openingStock||0) + qty;
        if(!existing.unit || existing.unit==='No.')existing.unit = r.unit||existing.unit;
        if(wasNew) existing.fromTB = true;
      }
    }
    else if(r.head==='debtors'){
      open.debtors += amt;
      D.debtors.push({id:uid(),name:r.label||'Customer',amount:amt,date:td(),ref:'Opening Trial Balance'});
    }
    else if(r.head==='fixedassets'){
      D.otherAssets = (+D.otherAssets||0) + amt;
      if(r.label) D.otherAssetsNotes.push({label:r.label,amount:amt});
      else D.otherAssetsNotes.push({label:tbHeadLabel(r.head),amount:amt});
    }
    else if(r.head==='fixedassetitem'){
      D.fixedAssets = D.fixedAssets || [];
      D.fixedAssets.push({
        id:uid(), name:r.label||'Asset', category:r.category||'Other',
        cost:amt, depRate:(+r.depRate||0), purchaseDate:r.purchaseDate||td(),
        accumDep:0, lastDepDate:r.purchaseDate||td(), disposed:false, fromTB:true
      });
      D.otherAssets = (+D.otherAssets||0) + amt;
      D.otherAssetsNotes.push({label:(r.label||'Asset')+' ('+(r.category||'')+')',amount:amt});
    }
    else if(r.head==='intangibleitem'){
      D.intangibleAssets = D.intangibleAssets || [];
      D.intangibleAssets.push({
        id:uid(), name:r.label||'Asset', category:r.category||'Other',
        cost:amt, usefulLife:(+r.usefulLife||0), purchaseDate:r.purchaseDate||td(),
        accumAmort:0, lastAmortDate:r.purchaseDate||td(), disposed:false, fromTB:true
      });
      D.otherAssets = (+D.otherAssets||0) + amt;
      D.otherAssetsNotes.push({label:(r.label||'Asset')+' ('+(r.category||'')+')',amount:amt});
    }
    else if(r.head==='otherassets'){
      D.otherAssets = (+D.otherAssets||0) + amt;
      var oaLabel = r.label || tbHeadLabel(r.head);
      D.otherAssetsNotes.push({label:oaLabel,amount:amt});
      D.otherAssetItems = D.otherAssetItems || [];
      D.otherAssetItems.push({id:uid(),name:oaLabel,amount:amt,date:r.purchaseDate||td(),fromTB:true});
    }
    else if(r.head==='capital'){ open.capital += amt; }
    else if(r.head==='loan'){
      var lType=r.loanType||'Term Loan', lRate=(+r.depRate||0), lTenure=(+r.usefulLife||0), lDate=r.purchaseDate||td();
      var isCcOdTB = (lType==='Cash Credit (CC)' || lType==='Overdraft (OD)');
      var lEmi = (!isCcOdTB && lRate>0 && lTenure>0) ? calcEMI(amt,lRate,lTenure) : 0;
      D.loans.push({id:uid(),bankName:r.label||'Existing Loan',loanType:lType,amount:amt,rate:lRate,tenure:isCcOdTB?0:lTenure,sanctionDate:lDate,emi:lEmi,outstandingBalance:amt,sanctionedLimit:isCcOdTB?(+r.sanctionedLimit||0):0,lastInterestDate:lDate,payments:[],fromTB:true});
    }
    else if(r.head==='creditors'){
      open.creditors += amt;
      D.creditors.push({id:uid(),name:r.label||'Supplier',amount:amt,date:td(),ref:'Opening Trial Balance'});
    }
    else if(r.head==='otherliab'){
      D.otherLiab = (+D.otherLiab||0) + amt;
      var olLabel = r.label || tbHeadLabel(r.head);
      D.otherLiabNotes.push({label:olLabel,amount:amt});
      D.otherLiabItems = D.otherLiabItems || [];
      D.otherLiabItems.push({id:uid(),name:olLabel,amount:amt,date:r.purchaseDate||td(),fromTB:true});
    }
  }

  D.opening = open;
  D.tbPosted = true;
  D.tbPostedOn = td();
  sv();
  go('dashboard');
  toast('Trial Balance posted! Balance Sheet updated.');
}

function resetTB(){
  confirmDialog('Edit Trial Balance? This un-posts your Trial Balance so you can correct it: it removes the opening debtors, creditors, loans, fixed assets, and inventory items that were auto-created from it, and clears opening balances. Your Trial Balance ROWS themselves are kept exactly as entered, so you can edit and re-post. Manual entries you made afterward (sales, purchases, expenses etc.) are not affected. If a Trial Balance item was added to an existing inventory item, only the added quantity/value will be reversed.', function(){
    D.debtors = D.debtors.filter(function(x){ return x.ref!=='Opening Trial Balance'; });
    D.creditors = D.creditors.filter(function(x){ return x.ref!=='Opening Trial Balance'; });
    D.loans = D.loans.filter(function(l){ return !l.fromTB; });
    D.fixedAssets = (D.fixedAssets||[]).filter(function(a){ return !a.fromTB; });
    D.intangibleAssets = (D.intangibleAssets||[]).filter(function(a){ return !a.fromTB; });
    D.otherAssetItems = (D.otherAssetItems||[]).filter(function(a){ return !a.fromTB; });
    D.otherLiabItems = (D.otherLiabItems||[]).filter(function(a){ return !a.fromTB; });
    var tb = D.trialBalance || [];
    for(var i=0;i<tb.length;i++){
      var r=tb[i];
      if(r.head==='stockitem' && (+r.qty||0)>0){
        var nm=(r.label||'Item').trim().toLowerCase();
        for(var j=0;j<D.inventory.length;j++){
          if(D.inventory[j].itemName.toLowerCase()===nm){
            D.inventory[j].currentStock=Math.max(0,(D.inventory[j].currentStock||0)-(+r.qty||0));
            D.inventory[j].openingStock=Math.max(0,(D.inventory[j].openingStock||0)-(+r.qty||0));
          }
        }
      }
    }
    D.inventory = D.inventory.filter(function(it){
      return !(it.fromTB && it.currentStock<=0);
    });
    D.opening = {cash:0,bank:0,stock:0,debtors:0,creditors:0,capital:0,takenOn:null};
    D.otherAssets = 0;
    D.otherLiab = 0;
    D.otherAssetsNotes = [];
    D.otherLiabNotes = [];
    D.tbPosted = false;
    D.tbPostedOn = null;
    sv();
    renderPage();
    toast('Trial Balance unposted - edit your rows below and tap Post to Books when ready.');
  });
}

function deleteCashBookEntry(id){
  var entry = (D.cashBook||[]).find(function(e){ return e.id===id; });
  if(!entry){ toast('Entry not found','e'); return; }
  // Reverse any linked effects: if this was a capital entry tied to a partner, reverse that too
  if(entry.description && D.capital && D.capital.partnerCapital){
    // best-effort: if description mentions a partner name, we leave partnerCapital as-is;
    // user should also adjust Capital page if this was a partner capital entry.
  }

// ---- helpers to reverse cash/bank or debtor/creditor effects ----
// Reverses the cash-book / CC/OD effect of a previous postCB() call.
// For cc/od modes, paymentMode must be passed via the 'mode' param so we know which loan to adjust.
function reverseCB(mode,type,amount,desc){
  var isCcOd = mode && (mode==='cc'||mode==='od'||mode.indexOf('cc:')===0||mode.indexOf('od:')===0);
  if(isCcOd){
    var acct = ccodAccountForMode(mode);
    if(!acct) return false;
    if(type==='payment'){
      acct.outstandingBalance = Math.max(0,(+acct.outstandingBalance||0) - amount);
    } else {
      acct.outstandingBalance = (+acct.outstandingBalance||0) + amount;
    }
    sv();
    return true;
  }
  return removeCashBookEntry(type,amount,desc);
}
function removeCashBookEntry(type,amount,desc){
  for(var i=D.cashBook.length-1;i>=0;i--){
    var x=D.cashBook[i];
    if(x.type===type && Math.abs(x.amount-amount)<0.005 && x.description===desc){
      D.cashBook.splice(i,1);return true;
    }
  }
  return false;
}
function removeDebtorByRef(ref,amount){
  for(var i=D.debtors.length-1;i>=0;i--){
    if(D.debtors[i].ref===ref && Math.abs(D.debtors[i].amount-amount)<0.005){D.debtors.splice(i,1);return true;}
  }
  return false;
}
function removeCreditorByRef(ref,amount){
  for(var i=D.creditors.length-1;i>=0;i--){
    if(D.creditors[i].ref===ref && Math.abs(D.creditors[i].amount-amount)<0.005){D.creditors.splice(i,1);return true;}
  }
  return false;
}

// ===== SALES =====
// Reverses an advance settlement: if the advance record still exists (partial settlement),
// adds the amount back to it. If it was fully consumed and removed, re-creates it.
// originalRecord: the sale/purchase/expense record being deleted, used to recover
// party/date/notes if the advance needs to be re-created.
function restoreAdvance(advanceId, amount, type, category, party, originalRecord){
  if(!advanceId) return;
  for(var i=0;i<(D.advances||[]).length;i++){
    if(D.advances[i].id===advanceId){
      D.advances[i].amount = (+D.advances[i].amount||0) + amount;
      return;
    }
  }
  // Advance was fully consumed and removed - re-create it
  D.advances = D.advances || [];
  D.advances.push({
    id:advanceId, date:(originalRecord&&originalRecord.date)||td(), type:type, category:category,
    party:party||(originalRecord&&(originalRecord.customerName||originalRecord.supplierName||originalRecord.remarks))||'Restored Advance',
    amount:amount, mode:'cash', notes:'Restored after deleting linked entry'
  });
}
function deleteSale(id){
  confirmDialog('Delete this sale? Stock and balances will be reversed.', function(){
    var idx=-1,i;for(i=0;i<D.sales.length;i++)if(D.sales[i].id===id){idx=i;break;}
    if(idx<0)return;
    var s=D.sales[idx];
    var item=null;for(i=0;i<D.inventory.length;i++)if(D.inventory[i].id===s.itemId)item=D.inventory[i];
    if(item){
      if(s.fromIndig===undefined){
        // legacy sale record (pre-import-tracking): restore entirely to indigenous pool
        var rate = s.qty>0 ? (s.cogs||0)/s.qty : item.avgCost;
        restoreStock(item, s.qty, 0, rate, 0);
      } else {
        restoreStock(item, s.fromIndig||0, s.fromImp||0, s.indigCostEach||0, s.impCostEach||0);
      }
    }
    if(s.paymentMode==='credit')removeDebtorByRef('Sale: '+s.itemName,s.totalAmount);
    else if(s.paymentMode==='advance'){
      restoreAdvance(s.advanceId,s.totalAmount,'received','customer',s.customerName,s);
    }
    else reverseCB(s.paymentMode,'receipt',s.totalAmount,'Sale: '+s.itemName);
    D.sales.splice(idx,1);
    sv();renderPage();toast('Sale deleted, stock and balance reversed.');
  });
}

function saveEditSale(id){
  var idx=-1,i;for(i=0;i<D.sales.length;i++)if(D.sales[i].id===id){idx=i;break;}
  if(idx<0)return;
  var old=D.sales[idx];
  var newMode=gv('es_m');
  if(newMode!=='credit' && !validateCCOD(newMode)) return;
  var oldItem=null;for(i=0;i<D.inventory.length;i++)if(D.inventory[i].id===old.itemId)oldItem=D.inventory[i];
  var oldFromIndig, oldFromImp, oldIndigCost, oldImpCost;
  if(old.fromIndig===undefined){
    oldFromIndig = old.qty; oldFromImp = 0;
    oldIndigCost = old.qty>0 ? (old.cogs||0)/old.qty : (oldItem?oldItem.avgCost:0);
    oldImpCost = 0;
  } else {
    oldFromIndig = old.fromIndig||0; oldFromImp = old.fromImp||0;
    oldIndigCost = old.indigCostEach||0; oldImpCost = old.impCostEach||0;
  }
  if(oldItem) restoreStock(oldItem, oldFromIndig, oldFromImp, oldIndigCost, oldImpCost);
  if(old.paymentMode==='credit')removeDebtorByRef('Sale: '+old.itemName,old.totalAmount);
  else if(old.paymentMode==='advance')restoreAdvance(old.advanceId,old.totalAmount,'received','customer',old.customerName,old);
  else reverseCB(old.paymentMode,'receipt',old.totalAmount,'Sale: '+old.itemName);

  var iid=gv('es_i'),q=gvn('es_q'),p=gvn('es_p'),c2=gv('es_c'),date=gv('es_d')||td(),mode=gv('es_m');
  var item=null;for(i=0;i<D.inventory.length;i++)if(D.inventory[i].id===iid)item=D.inventory[i];
  if(!item||!c2||!q||!p){
    // restore old state since we reversed it
    if(oldItem) drawStockExact(oldItem, oldFromIndig, oldFromImp, oldIndigCost, oldImpCost);
    if(old.paymentMode==='credit')addDebtor(old.customerName,old.totalAmount,old.date,'Sale: '+old.itemName);
    else if(old.paymentMode==='advance'){
      for(var ai=0;ai<(D.advances||[]).length;ai++) if(D.advances[ai].id===old.advanceId) D.advances[ai].amount = (+D.advances[ai].amount||0) - old.totalAmount;
    }
    else postCB(old.paymentMode,'receipt',old.totalAmount,old.customerName,'Sale: '+old.itemName,old.date);
    toast('Fill all fields','e');return;
  }
  var newTotalAvail = item.currentStock + (item.importedStock||0);
  if(q>newTotalAvail){
    if(oldItem) drawStockExact(oldItem, oldFromIndig, oldFromImp, oldIndigCost, oldImpCost);
    if(old.paymentMode==='credit')addDebtor(old.customerName,old.totalAmount,old.date,'Sale: '+old.itemName);
    else if(old.paymentMode==='advance'){
      for(var ai2=0;ai2<(D.advances||[]).length;ai2++) if(D.advances[ai2].id===old.advanceId) D.advances[ai2].amount = (+D.advances[ai2].amount||0) - old.totalAmount;
    }
    else postCB(old.paymentMode,'receipt',old.totalAmount,old.customerName,'Sale: '+old.itemName,old.date);
    toast('Insufficient stock for edited quantity','e');return;
  }
  var draw=drawStockPreview(item,q);
  var tot=q*p,cogs=draw.cogs,gp=tot-cogs,pct=+(tot>0?((gp/tot)*100).toFixed(1):0);
  D.sales[idx]={id:id,date:date,customerName:c2,itemId:iid,itemName:item.itemName,unit:item.unit,qty:q,sellingPrice:p,totalAmount:tot,cogs:cogs,grossProfit:gp,profitPct:pct,paymentMode:mode,fromIndig:draw.fromIndig,fromImp:draw.fromImp,indigCostEach:item.avgCost,impCostEach:item.importedAvgCost||0};
  drawStock(item,q);
  if(mode==='credit')addDebtor(c2,tot,date,'Sale: '+item.itemName);
  else postCB(mode,'receipt',tot,c2,'Sale: '+item.itemName,date);
  sv();cancelEdit();toast('Sale updated!');
}

// ===== PURCHASE =====
function deletePurchase(id){
  confirmDialog('Delete this purchase? Stock and balances will be reversed (average cost may shift).', function(){
    var idx=-1,i;for(i=0;i<D.purchases.length;i++)if(D.purchases[i].id===id){idx=i;break;}
    if(idx<0)return;
    var p=D.purchases[idx];
    var item=null;for(i=0;i<D.inventory.length;i++)if(D.inventory[i].id===p.itemId)item=D.inventory[i];
    if(item){
      if(p.isImported){
        var itotalVal=(item.importedStock||0)*(item.importedAvgCost||0) - p.amount;
        var inewQty=(item.importedStock||0) - p.qty;
        item.importedStock=Math.max(0,inewQty);
        item.importedAvgCost=item.importedStock>0?Math.max(0,itotalVal)/item.importedStock:0;
      } else {
        var totalVal=item.currentStock*item.avgCost - p.amount;
        var newQty=item.currentStock - p.qty;
        item.currentStock=Math.max(0,newQty);
        item.avgCost=item.currentStock>0?Math.max(0,totalVal)/item.currentStock:0;
      }
    }
    if(p.paymentMode==='credit')removeCreditorByRef('Purchase: '+p.itemName,p.amount);
    else if(p.paymentMode==='advance'){
      restoreAdvance(p.advanceId,p.amount,'paid','supplier',p.supplierName,p);
    }
    else reverseCB(p.paymentMode,'payment',p.amount,'Purchase: '+p.itemName);
    D.purchases.splice(idx,1);
    sv();renderPage();toast('Purchase deleted, stock and balance reversed.');
  });
}
function editPurchaseForm(p){
  var iOpts=[];for(var i=0;i<D.inventory.length;i++)iOpts.push({v:D.inventory[i].id,l:D.inventory[i].itemName+' ('+D.inventory[i].unit+')'});
  return card('Edit Purchase',
    g2(inp('Date','ep_d','date',p.date),inp('Supplier','ep_s','text',p.supplierName))+
    sl('Item','ep_i',iOpts,p.itemId)+
    g2(inp('Qty','ep_q','number',p.qty),inp('Rate (per unit)','ep_r','number',p.rate))+
    payModeSel('ep_m',p.paymentMode||'cash')+
    '<label style="font-size:12px;color:#546E7A;display:flex;align-items:center;gap:6px;margin-bottom:8px"><input type="checkbox" id="ep_import" '+(p.isImported?'checked':'')+' style="width:auto"> This is an Imported purchase (sourced from outside India)</label>'+
    btn('Save Changes','saveEditPurchase('+Q+p.id+Q+')','#2E7D32')+' '+btn('Cancel','cancelEdit()','#546E7A')
  );
}
function saveEditPurchase(id){
  var idx=-1,i;for(i=0;i<D.purchases.length;i++)if(D.purchases[i].id===id){idx=i;break;}
  if(idx<0)return;
  var old=D.purchases[idx];
  var newMode=gv('ep_m');
  if(newMode!=='credit' && !validateCCOD(newMode)) return;
  var oldItem=null;for(i=0;i<D.inventory.length;i++)if(D.inventory[i].id===old.itemId)oldItem=D.inventory[i];
  var savedStock=null,savedCost=null,savedImpStock=null,savedImpCost=null;
  if(oldItem){
    savedStock=oldItem.currentStock; savedCost=oldItem.avgCost;
    savedImpStock=oldItem.importedStock||0; savedImpCost=oldItem.importedAvgCost||0;
    if(old.isImported){
      var itotalVal=(oldItem.importedStock||0)*(oldItem.importedAvgCost||0) - old.amount;
      var inewQty=(oldItem.importedStock||0) - old.qty;
      oldItem.importedStock=Math.max(0,inewQty);
      oldItem.importedAvgCost=oldItem.importedStock>0?Math.max(0,itotalVal)/oldItem.importedStock:0;
    } else {
      var totalVal=oldItem.currentStock*oldItem.avgCost - old.amount;
      var newQty=oldItem.currentStock - old.qty;
      oldItem.currentStock=Math.max(0,newQty);
      oldItem.avgCost=oldItem.currentStock>0?Math.max(0,totalVal)/oldItem.currentStock:0;
    }
  }
  if(old.paymentMode==='credit')removeCreditorByRef('Purchase: '+old.itemName,old.amount);
  else if(old.paymentMode==='advance')restoreAdvance(old.advanceId,old.amount,'paid','supplier',old.supplierName,old);
  else reverseCB(old.paymentMode,'payment',old.amount,'Purchase: '+old.itemName);

  var iid=gv('ep_i'),q=gvn('ep_q'),r=gvn('ep_r'),s2=gv('ep_s'),date=gv('ep_d')||td(),mode=gv('ep_m');
  var item=null;for(i=0;i<D.inventory.length;i++)if(D.inventory[i].id===iid)item=D.inventory[i];
  if(!item||!s2||!q||!r){
    if(oldItem){oldItem.currentStock=savedStock;oldItem.avgCost=savedCost;oldItem.importedStock=savedImpStock;oldItem.importedAvgCost=savedImpCost;}
    if(old.paymentMode==='credit')addCreditor(old.supplierName,old.amount,old.date,'Purchase: '+old.itemName);
    else if(old.paymentMode==='advance'){
      for(var api=0;api<(D.advances||[]).length;api++) if(D.advances[api].id===old.advanceId) D.advances[api].amount = (+D.advances[api].amount||0) - old.amount;
    }
    else postCB(old.paymentMode,'payment',old.amount,old.supplierName,'Purchase: '+old.itemName,old.date);
    toast('Fill all fields','e');return;
  }
  var isImported = document.getElementById('ep_import') ? document.getElementById('ep_import').checked : false;
  var amt=q*r;
  if(isImported){
    var ntq=(item.importedStock||0)+q, ntv=(item.importedStock||0)*(item.importedAvgCost||0)+amt;
    item.importedStock=ntq;item.importedAvgCost=ntq>0?ntv/ntq:r;
  } else {
    var tq=item.currentStock+q,tv2=item.currentStock*item.avgCost+amt;
    item.currentStock=tq;item.avgCost=tq>0?tv2/tq:r;
  }
  D.purchases[idx]={id:id,date:date,supplierName:s2,itemId:item.id,itemName:item.itemName,qty:q,rate:r,amount:amt,paymentMode:mode,isImported:isImported};
  if(mode==='credit')addCreditor(s2,amt,date,'Purchase: '+item.itemName);
  else postCB(mode,'payment',amt,s2,'Purchase: '+item.itemName,date);
  sv();cancelEdit();toast('Purchase updated!');
}
