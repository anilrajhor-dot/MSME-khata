// Shared migration: ensures all fields exist on a loaded/imported data object, mutates and returns d
function migrateData(d){
  if(!d.debtors)d.debtors=[];
  if(!d.creditors)d.creditors=[];
  if(!d.opening)d.opening={cash:0,bank:0,stock:0,debtors:0,creditors:0,capital:0,takenOn:null};
  if(!d.trialBalance)d.trialBalance=[];
  if(d.tbPosted===undefined)d.tbPosted=false;
  if(d.tbPostedOn===undefined)d.tbPostedOn=null;
  if(d.otherAssets===undefined)d.otherAssets=0;
  if(d.otherLiab===undefined)d.otherLiab=0;
  if(!d.otherAssetsNotes)d.otherAssetsNotes=[];
  if(!d.otherLiabNotes)d.otherLiabNotes=[];
  if(!d.profile)d.profile={businessName:'',ownerName:'',mobile:'',address:'',businessType:BIZ_TYPE,constitution:'Individual',commencementDate:'',udyam:'',gst:'',pan:'',tan:''};
  if(d.profile.mobileExtended===undefined)d.profile.mobileExtended=false;
  if(!d.profile.constitution)d.profile.constitution='Individual';
  if(!d.profile.partners)d.profile.partners=[];
  if(!d.expenseCategories)d.expenseCategories=['Rent','Electricity','Salary','Transportation','Telephone','Fuel','Repair','Marketing','Interest Payment','Miscellaneous'];
  if(d.expenseCategories.indexOf('Interest Payment')<0)d.expenseCategories.push('Interest Payment');
  if(!d.projAssumptions)d.projAssumptions=null;
  if(!d.fixedAssets)d.fixedAssets=[];
  if(!d.intangibleAssets)d.intangibleAssets=[];
  if(!d.otherAssetItems)d.otherAssetItems=[];
  if(!d.otherLiabItems)d.otherLiabItems=[];
  if(!d.priorPeriod)d.priorPeriod={enabled:false,fromDate:'',toDate:'',sales:0,cogs:0,expenseByCat:{}};
  if(!d.profile.businessStage) d.profile.businessStage = 'new';
  if(!d.security) d.security = {pinEnabled:false,pinHash:''};
  if(!d.bills) d.bills=[];
  if(!d.nextBillNo) d.nextBillNo=1;
  if(!d.bankAccounts || d.bankAccounts.length===0){
    d.bankAccounts=[{id:'acc1',name:'Bank Account 1'}];
  }
  if(!d.cashBook)d.cashBook=[];
  for(var bi=0;bi<d.cashBook.length;bi++){ if(d.cashBook[bi].mode==='bank' && !d.cashBook[bi].bankAccountId) d.cashBook[bi].bankAccountId='acc1'; }
  if(!d.loans)d.loans=[];
  for(var i=0;i<d.loans.length;i++){if(!d.loans[i].loanType)d.loans[i].loanType='Term Loan';if(!d.loans[i].payments)d.loans[i].payments=[];if(d.loans[i].lastInterestDate===undefined)d.loans[i].lastInterestDate=d.loans[i].sanctionDate;if(d.loans[i].accountNumber===undefined)d.loans[i].accountNumber='';if(d.loans[i].undrawn===undefined)d.loans[i].undrawn=false;if(d.loans[i].sanctionedAmount===undefined)d.loans[i].sanctionedAmount=d.loans[i].outstandingBalance;}
  if(!d.drawings)d.drawings=[];
  if(!d.advances)d.advances=[];
  if(!d.inventory)d.inventory=[];
  for(var ii=0;ii<d.inventory.length;ii++){
    if(d.inventory[ii].importedStock===undefined) d.inventory[ii].importedStock=0;
    if(d.inventory[ii].importedAvgCost===undefined) d.inventory[ii].importedAvgCost=0;
  }
  if(!d.sales)d.sales=[];
  for(var si=0;si<d.sales.length;si++){ if(d.sales[si].isExport===undefined) d.sales[si].isExport=false; }
  if(!d.purchases)d.purchases=[];
  for(var pi=0;pi<d.purchases.length;pi++){ if(d.purchases[pi].isImported===undefined) d.purchases[pi].isImported=false; }
  // Classify existing creditor entries: those created from credit Expenses (ref starts with
  // "Expense: ") are "Expenses Payable", everything else (purchases on credit, opening balances,
  // manual entries) remains "Sundry Creditors". This separates the two on the Balance Sheet.
  if(!d.creditors)d.creditors=[];
  for(var ci=0;ci<d.creditors.length;ci++){
    if(d.creditors[ci].type===undefined){
      d.creditors[ci].type = (d.creditors[ci].ref && d.creditors[ci].ref.indexOf('Expense: ')===0) ? 'expense' : 'supplier';
    }
  }
  // One-time correction: older versions subtracted applied depreciation/amortization from
  // D.otherAssets AS WELL AS reducing the asset's net book value via accumDep/accumAmort,
  // double-counting the reduction on the Balance Sheet. Add back the accumulated amounts once.
  if(!d._depCorrectionApplied){
    var addBack = 0;
    (d.fixedAssets||[]).forEach(function(a){ addBack += (+a.accumDep||0); });
    (d.intangibleAssets||[]).forEach(function(a){ addBack += (+a.accumAmort||0); });
    if(addBack>0) d.otherAssets = (+d.otherAssets||0) + addBack;
    d._depCorrectionApplied = true;
  }
  if(!d.loanAssessment) d.loanAssessment={ccLimit:0,tlAmount:0,ccRate:8,tlRate:9,tlTenure:36,salesGrowth:20,stockDays:0,debtorDays:0,creditorDays:0,expGrowth:10,marginPctTurnover:25,marginPctTandon:25};
  if(d.loanAssessment && d.loanAssessment.marginPctTurnover===undefined) d.loanAssessment.marginPctTurnover=25;
  if(d.loanAssessment && d.loanAssessment.marginPctTandon===undefined) d.loanAssessment.marginPctTandon=25;
  if(d.loanAssessment && d.loanAssessment.useManual===undefined) d.loanAssessment.useManual=false;
  if(!d.settings) d.settings={creditDays:30,defaultMargin:20};
  if(d.settings.defaultMargin===undefined) d.settings.defaultMargin=20;
  if(!d.partyCodes) d.partyCodes={};
  if(!d.customHSN) d.customHSN={};
  if(!d.incomeTax) d.incomeTax={ay:'2025-26',taxpayerType:'individual',gender:'male',section:'regular',useManual:false};
  // Auto-fill HSN/GST on existing inventory items if GST is enabled
  if(d.gst && d.gst.enabled && d.inventory){
    d.inventory.forEach(function(item){
      if(!item.hsnCode && !item.gstRate){
        // Check if it's defined in our HSN_MASTER (will be checked at runtime)
        // We store a flag so we know to look up at runtime
        item._needsHSNLookup = true;
      }
    });
  }
  if(!d.gst) d.gst={enabled:false,gstin:'',type:'regular',defaultRate:18,supplyType:'intra',stateCode:''};
  if(d.loanAssessment && d.loanAssessment.manualSales===undefined) d.loanAssessment.manualSales=0;
  if(d.loanAssessment && d.loanAssessment.manualCogsP===undefined) d.loanAssessment.manualCogsP=70;
  if(d.loanAssessment && d.loanAssessment.manualExp===undefined) d.loanAssessment.manualExp=0;
  return d;
}

function fmt(n,d){d=d||0;if(isNaN(n))return'0';return Number(n).toLocaleString('en-IN',{minimumFractionDigits:d,maximumFractionDigits:d});}

// ===== CORE POSTING FUNCTIONS =====
// Post a cash/bank/upi transaction (credit mode does NOT touch cashBook)
// Find the single CC or OD loan account (Phase 1: auto-select only if exactly one exists)
function findCCODAccount(type){
  var label = type==='cc' ? 'Cash Credit (CC)' : 'Overdraft (OD)';
  var matches = D.loans.filter(function(l){ return l.loanType===label; });
  if(matches.length===1) return matches[0];
  return null;
}
// Returns ALL CC or OD loan accounts (there may be more than one).
function findCCODAccounts(type){
  var label = type==='cc' ? 'Cash Credit (CC)' : 'Overdraft (OD)';
  return D.loans.filter(function(l){ return l.loanType===label; });
}
// Given a mode string, returns the matching CC/OD loan account, or null.
// Supports both the new 'cc:<loanId>' / 'od:<loanId>' format (for when there
// are multiple CC/OD accounts) and the legacy plain 'cc' / 'od' format
// (used when there is exactly one such account, including old cashbook entries).
function ccodAccountForMode(mode){
  if(!mode) return null;
  if(mode==='cc' || mode==='od'){
    return findCCODAccount(mode);
  }
  if(mode.indexOf('cc:')===0 || mode.indexOf('od:')===0){
    var loanId = mode.slice(mode.indexOf(':')+1);
    for(var i=0;i<D.loans.length;i++) if(D.loans[i].id===loanId) return D.loans[i];
  }
  return null;
}
// Pre-check before recording a transaction with mode cc/od or cc:<id>/od:<id>: returns true if OK, shows toast and returns false if not.
function validateCCOD(mode){
  if(!mode) return true; // null/undefined mode is not CC/OD
  var isCcOd = mode==='cc'||mode==='od'||mode.indexOf('cc:')===0||mode.indexOf('od:')===0;
  if(!isCcOd) return true;
  var type = (mode==='cc'||mode.indexOf('cc:')===0) ? 'cc' : 'od';
  var label = type==='cc' ? 'Cash Credit (CC)' : 'Overdraft (OD)';
  var acct = ccodAccountForMode(mode);
  if(acct) return true;
  var matches = findCCODAccounts(type);
  if(matches.length>1){
    toast('Please select a specific '+label+' account from the dropdown.','e');
  } else {
    toast('No '+label+' account set up. Add one via Capital/Loans → Add Loan (Loan Type: '+label+'), or Trial Balance.','e');
  }
  return false;
}
function postCB(mode,type,amount,party,desc,date){
  if(mode==='credit'||!amount)return;
  if(!mode)return; // null mode guard
  var isCcOd = mode==='cc'||mode==='od'||mode.indexOf('cc:')===0||mode.indexOf('od:')===0;
  if(isCcOd){
    var acct = ccodAccountForMode(mode);
    if(!acct) return; // validateCCOD() should have caught this before recording
    if(type==='payment'){
      // Drawing from CC/OD increases utilization (outstanding)
      acct.outstandingBalance = (+acct.outstandingBalance||0) + amount;
    } else {
      // Receipt credited to CC/OD reduces utilization
      acct.outstandingBalance = (+acct.outstandingBalance||0) - amount;
    }
    // Also record in the cashbook (subMode 'cc'/'od'/'cc:id'/'od:id') so the Transaction
    // Register and account statements show this movement against the CC/OD account.
    D.cashBook.push({id:uid(),date:date||td(),type:type,mode:mode,subMode:mode,amount:amount,party:party||'',description:desc||'',loanId:acct.id});
    sv();
    return;
  }
  var cbMode, bankAccountId;
  if(mode.indexOf('bank:')===0){
    cbMode='bank'; bankAccountId=mode.slice(5);
  } else if(mode==='upi'){
    cbMode='bank';
    // Route UPI to the designated UPI bank account (set in Settings)
    var _upiAccId=(D.settings&&D.settings.defaultUPIAccount)||'';
    if(_upiAccId && D.bankAccounts && D.bankAccounts.find(function(a){return a.id===_upiAccId;})){
      bankAccountId=_upiAccId;
    } else {
      bankAccountId=(D.bankAccounts&&D.bankAccounts[0])?D.bankAccounts[0].id:'acc1';
    }
  } else if(mode==='bank'){
    // legacy: plain 'bank' with no account specified - default to first account
    cbMode='bank'; bankAccountId=(D.bankAccounts&&D.bankAccounts[0])?D.bankAccounts[0].id:'acc1';
  } else {
    cbMode='cash';
  }
  var entry={id:uid(),date:date||td(),type:type,mode:cbMode,subMode:mode,amount:amount,party:party||'',description:desc||''};
  if(cbMode==='bank') entry.bankAccountId=bankAccountId;
  D.cashBook.push(entry);
}



// ── BARCODE SCANNER ──────────────────────────────────────────────────────────
var _scanTarget=null,_scanStream=null,_quaggaLoaded=false,_nativeScanInterval=null;

// Toggle scanner (optional feature)
function toggleBarcodeScanner(){
  window._barcodeEnabled=!window._barcodeEnabled;
  try{localStorage.setItem('mefm_barcode_enabled',window._barcodeEnabled?'1':'0');}catch(e){}
  renderPage();
  toast('Barcode Scanner '+(window._barcodeEnabled?'Enabled':'Disabled'));
}
(function(){
  try{var p=localStorage.getItem('mefm_barcode_enabled');window._barcodeEnabled=(p===null)?false:(p==='1');}
  catch(e){window._barcodeEnabled=false;}
})();

function barcodeBtn(target){
  if(!window._barcodeEnabled) return '';
  var html='<button onclick="openScanner(\'' + target + '\')" ';
  html+='style="width:100%;padding:8px;background:linear-gradient(135deg,#1B5E20,#2E7D32);';
  html+='color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;';
  html+='cursor:pointer;margin-bottom:8px">📷 Scan Barcode / QR Code</button>';
  return html;
}

function openScanner(target){
  _scanTarget=target;
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    toast('Camera not available','e'); return;
  }
  var overlay=document.createElement('div');
  overlay.id='barcode-overlay';

function startCamera(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
  .then(function(stream){
    _scanStream=stream;
    var video=document.getElementById('scan-video');
    if(video){video.srcObject=stream;video.play();}
    setScanStatus('Camera ready — point at barcode');
    if(window.BarcodeDetector){setScanStatus('Native scanner active ⚡');startNativeDetector(video);}
    else loadQuagga();
  }).catch(function(err){setScanStatus('Camera error: '+err.message);});
}

function setScanStatus(msg){var el=document.getElementById('scan-status');if(el)el.textContent=msg;}

function startNativeDetector(video){
  var detector=new BarcodeDetector({formats:['ean_13','ean_8','code_128','qr_code','upc_a','upc_e']});
  _nativeScanInterval=setInterval(function(){
    if(!video||video.readyState<2) return;
    detector.detect(video).then(function(results){
      if(results&&results.length){clearInterval(_nativeScanInterval);processBarcode(results[0].rawValue);}
    }).catch(function(){});
  },300);
}

function loadQuagga(){
  setScanStatus('Loading scanner library...');
  if(_quaggaLoaded){startQuagga();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js';
  s.onload=function(){_quaggaLoaded=true;startQuagga();};
  s.onerror=function(){setScanStatus('Use manual entry below');};
  document.head.appendChild(s);
}

function startQuagga(){
  if(typeof Quagga==='undefined'){setScanStatus('Use manual entry below');return;}
  Quagga.init({
    inputStream:{name:'Live',type:'LiveStream',target:document.getElementById('scan-video'),constraints:{facingMode:'environment'}},
    decoder:{readers:['ean_reader','ean_8_reader','code_128_reader','upc_reader']},locate:true
  },function(err){
    if(err){setScanStatus('Use manual entry below');return;}
    Quagga.start();
    Quagga.onDetected(function(r){if(r&&r.codeResult){Quagga.stop();processBarcode(r.codeResult.code);}});
  });
}

function closeScanner(){
  if(_scanStream){_scanStream.getTracks().forEach(function(t){t.stop();});_scanStream=null;}
  if(_nativeScanInterval){clearInterval(_nativeScanInterval);_nativeScanInterval=null;}
  try{if(typeof Quagga!=='undefined')Quagga.stop();}catch(e){}
  var o=document.getElementById('barcode-overlay');if(o)o.remove();
  _scanTarget=null;
}

function processBarcode(code){
  if(!code||!code.trim()){toast('No barcode','e');return;}
  closeScanner();
  var found=null;
  for(var i=0;i<D.inventory.length;i++){
    if(D.inventory[i].barcode&&D.inventory[i].barcode===code){found=D.inventory[i];break;}
  }
  if(found){
    toast('Found: '+found.itemName+' ✅');
    if(_scanTarget==='purchase'){window._purItem=found.id;go('purchase');}
    else{window._salItem=found.id;go('sales');}
  } else {
    showBarcodeAssign(code);
  }
}

// Rule 1: Block entry if Trial Balance not yet posted
function requireTBPosted(){
  // New business does NOT need Trial Balance — bypass completely
  if(D.profile && D.profile.businessStage==='new') return true;
  if(D.tbPosted) return true;
  confirmDialog(
    '⚠️ Opening Trial Balance Not Posted\n\n'+
    'You must enter and post your Opening Trial Balance before adding individual items here.\n\n'+
    'Go to: Data → Opening Trial Balance → enter your opening balances → Post to Books.\n\n'+
    'This ensures your Balance Sheet stays in balance.\n\n'+
    'Tip: If this is a NEW business with no prior balances, go to Profile and change Business Stage to "New Business".',
    function(){ go('data'); window._dtab='trial'; renderPage(); }
  );
  return false;
}
// Rule 2: Check that individual items total matches the corresponding TB head total
// heads: array of TB head codes to sum; currentTotal: sum of items entered so far (BEFORE adding new item); newItemAmt: amount being added; label: display name
function checkTBHeadMatch(heads, afterTotal, label){
  var tbTotal = 0;
  (D.trialBalance||[]).forEach(function(r){ if(heads.indexOf(r.head)>=0) tbTotal+=(+r.amount||0); });
  if(tbTotal===0) return true; // no TB entry for this head — allow freely
  if(Math.abs(afterTotal - tbTotal) < 0.01) return true;
  var diff = afterTotal - tbTotal;
  var msg = '⚠️ ' + label + ' Mismatch with Trial Balance\n\n' +
    'Trial Balance total for this head: ₹' + tbTotal.toLocaleString('en-IN') + '\n' +
    'Your entries now total:            ₹' + afterTotal.toLocaleString('en-IN') + '\n' +
    'Difference:                        ₹' + Math.abs(diff).toLocaleString('en-IN') +
    (diff > 0 ? ' (entries EXCEED Trial Balance)' : ' (entries are SHORT of Trial Balance)') + '\n\n' +
    'Please reconcile so that your individual item entries match the Trial Balance total exactly. ' +
    'Otherwise your Balance Sheet will not tally.';
  alert(msg);
  return false;
}

function addDebtor(name,amount,date,ref){
  if(!amount)return;
  D.debtors.push({id:uid(),name:name||'Customer',amount:amount,date:date||td(),ref:ref||''});
}
function addCreditor(name,amount,date,ref,type){
  if(!amount)return;
  D.creditors.push({id:uid(),name:name||'Supplier',amount:amount,date:date||td(),ref:ref||'',type:type||'supplier'});
}
function getBalances(){
  var cb=0,bb=0,i,x;
  for(i=0;i<D.cashBook.length;i++){
    x=D.cashBook[i];
    if(!x.mode) continue; // guard: skip entries with missing mode (data migration safety)
    if(x.mode==='cc'||x.mode==='od'||x.mode.indexOf('cc:')===0||x.mode.indexOf('od:')===0) continue; // CC/OD movements are tracked via loan.outstandingBalance, not cash/bank totals
    var amt=x.type==='receipt'?x.amount:-x.amount;
    if(x.mode==='cash')cb+=amt;else bb+=amt;
  }
  cb+=(+D.opening.cash||0);
  bb+=(+D.opening.bank||0);
  return {cb:cb,bb:bb};
}
// Per-bank-account balances. Opening D.opening.bank is attributed to the first account (acc1).
// Resolves a payment mode ('cash','bank','bank:<id>','upi') to its current balance.
// Returns null for credit/cc/od modes (no cash/bank balance check applicable).
function getModeBalance(mode){
  if(!mode || mode==='credit') return null;
  var isCcOd = mode==='cc'||mode==='od'||mode.indexOf('cc:')===0||mode.indexOf('od:')===0;
  if(isCcOd) return null;
  if(mode==='cash') return getBalances().cb;
  var accts = getBankAccountBalances();
  if(mode.indexOf('bank:')===0){
    var aid=mode.slice(5);
    for(var i=0;i<accts.length;i++) if(accts[i].id===aid) return accts[i].balance;
    return accts[0]?accts[0].balance:0;
  }
  if(mode==='upi'||mode==='bank'){
    return accts[0]?accts[0].balance:0;
  }
  return null;
}
// Shows a confirmation if `mode` is a cash/bank mode and paying `amount` would make
// that account's balance negative. Calls onProceed() if the user confirms (or if no
// warning is needed). Does nothing further if the user cancels.
function confirmIfNegative(mode, amount, onProceed){
  var bal = getModeBalance(mode);
  if(bal===null){ onProceed(); return; }
  var after = bal - amount;
  if(after >= -0.005){ onProceed(); return; }
  var label = mode==='cash' ? 'Cash' : 'Bank';
  confirmDialog('This will result in a negative '+label+' balance of '+fc(after)+' (current balance: '+fc(bal)+'). Do you want to proceed anyway?', onProceed);
}
function getBankAccountBalances(){
  var accts = D.bankAccounts && D.bankAccounts.length ? D.bankAccounts : [{id:'acc1',name:'Bank Account 1'}];
  var balances = {};
  for(var i=0;i<accts.length;i++) balances[accts[i].id]=0;
  for(i=0;i<D.cashBook.length;i++){
    var x=D.cashBook[i];
    if(x.mode!=='bank') continue;
    var aid = x.bankAccountId || accts[0].id;
    var amt = x.type==='receipt'?x.amount:-x.amount;
    if(balances[aid]===undefined) balances[aid]=0;
    balances[aid]+=amt;
  }
  if(accts[0]) balances[accts[0].id] = (balances[accts[0].id]||0) + (+D.opening.bank||0);
  return accts.map(function(a){return {id:a.id,name:a.name,accountNumber:a.accountNumber||'',balance:balances[a.id]||0};});
}
function totalDebtors(){
  var t=0,i,hasTBEntry=false;
  for(i=0;i<D.debtors.length;i++){t+=D.debtors[i].amount;if(D.debtors[i].fromTB||D.debtors[i].ref==='Opening Trial Balance')hasTBEntry=true;}
  if(!hasTBEntry) t += (+D.opening.debtors||0);
  return t;
}
function totalCreditors(){
  var t=0,i,hasTBEntry=false;
  for(i=0;i<D.creditors.length;i++){
    if((D.creditors[i].type||'supplier')!=='supplier') continue;
    t+=D.creditors[i].amount;
    if(D.creditors[i].fromTB||D.creditors[i].ref==='Opening Trial Balance')hasTBEntry=true;
  }
  if(!hasTBEntry) t += (+D.opening.creditors||0);
  return t;
}
function totalExpensesPayable(){
  var t=0,i;
  for(i=0;i<D.creditors.length;i++){
    if((D.creditors[i].type||'supplier')==='expense') t+=D.creditors[i].amount;
  }
  return t;
}
// Combined total of Sundry Creditors + Expenses Payable - used in Balance Sheet totals
function totalCreditorsAndExpensesPayable(){
  return totalCreditors() + totalExpensesPayable();
}
// Aggregate debtor/creditor entries by party name into running balances
function debtorBalances(){
  var m={},order=[],i;
  for(i=0;i<D.debtors.length;i++){
    var nm=D.debtors[i].name||'Customer';
    if(m[nm]===undefined){m[nm]=0;order.push(nm);}
    m[nm]+=D.debtors[i].amount;
  }
  if((+D.opening.debtors||0)>0 && order.length===0){
    m['(Opening Balance)']=(+D.opening.debtors||0);order.push('(Opening Balance)');
  }
  var out=[];for(i=0;i<order.length;i++)if(Math.abs(m[order[i]])>0.005)out.push({name:order[i],balance:m[order[i]]});
  return out;
}
function creditorBalances(){
  var m={},order=[],i;
  for(i=0;i<D.creditors.length;i++){
    if((D.creditors[i].type||'supplier')!=='supplier') continue;
    var nm=D.creditors[i].name||'Supplier';
    if(m[nm]===undefined){m[nm]=0;order.push(nm);}
    m[nm]+=D.creditors[i].amount;
  }
  if((+D.opening.creditors||0)>0 && order.length===0){
    m['(Opening Balance)']=(+D.opening.creditors||0);order.push('(Opening Balance)');
  }
  var out=[];for(i=0;i<order.length;i++)if(Math.abs(m[order[i]])>0.005)out.push({name:order[i],balance:m[order[i]]});
  return out;
}
function expensesPayableBalances(){
  var m={},order=[],i;
  for(i=0;i<D.creditors.length;i++){
    if((D.creditors[i].type||'supplier')!=='expense') continue;
    var nm=D.creditors[i].name||'Expense';
    if(m[nm]===undefined){m[nm]=0;order.push(nm);}
    m[nm]+=D.creditors[i].amount;
  }
  var out=[];for(i=0;i<order.length;i++)if(Math.abs(m[order[i]])>0.005)out.push({name:order[i],balance:m[order[i]]});
  return out;
}

// ===== LOAN HELPERS =====
function calcEMI(p,r,n){var m=r/1200;if(m===0)return p/n;return p*m*Math.pow(1+m,n)/(Math.pow(1+m,n)-1);}
function daysBetween(d1,d2){var a=new Date(d1),b=new Date(d2);return Math.max(0,Math.round((b-a)/86400000));}
// Provisional interest accrued since lastInterestDate, on outstandingBalance, at annual rate
function loanAccruedInterest(loan){
  var from=loan.lastInterestDate||loan.sanctionDate||td();
  var days=daysBetween(from,td());
  var rate=(+loan.rate||0)/100;
  return loan.outstandingBalance * rate * days / 365;
}

  else el='<input type="'+type+'" '+s+' value="'+esc(dispVal!=null?String(dispVal):'')+'" placeholder="'+esc(ph)+'"'+(isNum?' inputmode="decimal"':'')+(listId?' list="'+listId+'"':'')+'>';
  return '<div class="fg">'+(lbl?'<label>'+esc(lbl)+'</label>':'')+el+'</div>';
}
function sl(lbl,id,opts,val){

  return '<div class="fg">'+(lbl?'<label>'+esc(lbl)+'</label>':'')+'<select '+s+'>'+oh+'</select></div>';

function g3(a,b,c){return '<div class="g3">'+a+b+c+'</div>';}

function payModeSel(id,val){

// ===== FINANCIAL SUMMARY =====
function getF(){
  var ts=0,tc=0,os=0,tp=0,cs=0,te=0,cap=0,ltl=0,stl=0,i;
  var bal=getBalances(),cb=bal.cb,bb=bal.bb;
  var salesByType={cash:0,credit:0,export:0};
  for(i=0;i<D.sales.length;i++){
    ts+=D.sales[i].totalAmount;tc+=(D.sales[i].cogs||0);
    var s=D.sales[i];
    if(s.isExport) salesByType.export+=s.totalAmount;
    else if(s.paymentMode==='credit') salesByType.credit+=s.totalAmount;
    else salesByType.cash+=s.totalAmount;
  }
  var csIndig=0, csImp=0;
  for(i=0;i<D.inventory.length;i++){csIndig+=D.inventory[i].currentStock*D.inventory[i].avgCost; csImp+=(D.inventory[i].importedStock||0)*(D.inventory[i].importedAvgCost||0);}
  cs = csIndig+csImp;
  os=(+D.opening.stock||0);
  var purchasesByType={indigenous:0,imported:0};
  for(i=0;i<D.purchases.length;i++){
    tp+=D.purchases[i].amount;
    if(D.purchases[i].isImported) purchasesByType.imported+=D.purchases[i].amount;
    else purchasesByType.indigenous+=D.purchases[i].amount;
  }
  for(i=0;i<D.expenses.length;i++)te+=D.expenses[i].amount;
  cap=(D.capital.initialCapital||0)+(D.capital.additionalCapital||0)+((D.capital.initialCapital||0)===0?(+D.opening.capital||0):0);
  var totalDrawings=0;(D.drawings||[]).forEach(function(d){totalDrawings+=(+d.amount||0);});cap-=totalDrawings;
  for(i=0;i<D.loans.length;i++)ltl+=(+D.loans[i].outstandingBalance||0);
  var gp=ts-(os+tp-cs);
  var dr=totalDebtors(),cr=totalCreditors(),expPayable=totalExpensesPayable();
  // Advances: amounts paid/received in advance, net of any adjustments already recorded.
  var advToSuppliers=0, advPrepaidExp=0, advFromCustomers=0;
  (D.advances||[]).forEach(function(a){
    var amt=(+a.amount||0);
    if(amt<=0) return;
    if(a.type==='paid' && a.category==='supplier') advToSuppliers+=amt;
    else if(a.type==='paid' && a.category==='expense') advPrepaidExp+=amt;
    else if(a.type==='received') advFromCustomers+=amt;
  });
  var oa=(+D.otherAssets||0), ol=(+D.otherLiab||0);
  return{ts:ts,tc:tc,os:os,tp:tp,cs:cs,csIndig:csIndig,csImp:csImp,gp:gp,te:te,np:gp-te,cap:cap,ltl:ltl,stl:stl,cb:cb,bb:bb,dr:dr,cr:cr,expPayable:expPayable,oa:oa,ol:ol,salesByType:salesByType,purchasesByType:purchasesByType,advToSuppliers:advToSuppliers,advPrepaidExp:advPrepaidExp,advFromCustomers:advFromCustomers};
}

function getBS(){
  // Returns Balance Sheet totals using same logic as Financials → Balance Sheet
  var f=getF();
  var fa=fixedAssetsNetTotal();
  var oa=otherAssetsExclFA();
  var cs=f.cs, dr=f.dr, cb=f.cb, bb=f.bb;
  var adv=(f.advToSuppliers||0)+(f.advPrepaidExp||0);
  var advFromCust=f.advFromCustomers||0;
  var expPayable=f.expPayable||0;

  // ASSETS
  var totalCurrentAssets=cs+dr+adv+cb+bb;
  var totalAssets=fa+oa+totalCurrentAssets;

  // LIABILITIES
  var np=f.np;
  var p1=(D.capital.initialCapital||0);
  var p2=(D.capital.additionalCapital||0);
  var totalDrawings=(D.drawings||[]).reduce(function(s,d){return s+(+d.amount||0);},0);
  var netCap=p1+p2-totalDrawings+np;
  var loans=f.ltl||0;
  var cred=f.cr||0;
  var currentLiab=cred+advFromCust+expPayable;
  var totalLiab=netCap+loans+currentLiab+(f.ol||0);

  return {
    totalAssets:totalAssets,
    totalLiab:totalLiab,
    diff:totalAssets-totalLiab,
    currentAssets:totalCurrentAssets,
    currentLiab:currentLiab,
    netCap:netCap,
    loans:loans
  };
}

function isCcOdLoan(l){ return l.loanType==='Cash Credit (CC)' || l.loanType==='Overdraft (OD)'; }
// Net block of Fixed Assets + Intangibles (book value)
function fixedAssetsNetTotal(){
  var net=0;
  (D.fixedAssets||[]).forEach(function(a){ if(!a.disposed) net += (+a.cost||0) - (+a.accumDep||0); });
  (D.intangibleAssets||[]).forEach(function(a){ if(!a.disposed) net += (+a.cost||0) - (+a.accumAmort||0); });
  return net;
}
// "Other Assets" excluding Fixed Assets/Intangibles cost (true non-current other assets)
function otherAssetsExclFA(){
  var faCost=0; (D.fixedAssets||[]).forEach(function(a){ faCost+=(+a.cost||0); });
  var iaCost=0; (D.intangibleAssets||[]).forEach(function(a){ iaCost+=(+a.cost||0); });
  return Math.max(0, (+D.otherAssets||0) - faCost - iaCost);
}
// Grouped Balance Sheet figures: Owned Funds / Term Liabilities / Current Liabilities / Other Current Liabilities
// and Fixed Assets / Current Assets / Other Non-Current Assets, with Net Working Capital
function getFGrouped(){
  var f=getF();
  var termLoans=0, stBorrowings=0;
  for(var i=0;i<D.loans.length;i++){
    var l=D.loans[i], ob=(+l.outstandingBalance||0);
    if(isCcOdLoan(l)) stBorrowings+=ob; else termLoans+=ob;
  }
  var fixedAssetsNet = fixedAssetsNetTotal();
  var otherNonCurrentAssets = otherAssetsExclFA();

  var ownedFunds = f.cap + f.np;
  var currentLiab = f.cr + f.expPayable + f.advFromCustomers + stBorrowings + f.ol;
  var currentAssets = f.cs + f.cb + f.bb + f.dr + f.advToSuppliers + f.advPrepaidExp;
  var totalLiab = ownedFunds + termLoans + currentLiab;
  var totalAssets = fixedAssetsNet + currentAssets + otherNonCurrentAssets;
  var nwc = currentAssets - currentLiab;

  return {
    ownedFunds:ownedFunds, termLoans:termLoans, currentLiab:currentLiab, otherCurrentLiab:f.ol,
    sundryCreditors:f.cr, expensesPayable:f.expPayable, stBorrowings:stBorrowings,
    advToSuppliers:f.advToSuppliers, advPrepaidExp:f.advPrepaidExp, advFromCustomers:f.advFromCustomers,
    fixedAssetsNet:fixedAssetsNet, currentAssets:currentAssets, otherNonCurrentAssets:otherNonCurrentAssets,
    closingStock:f.cs, closingStockIndig:f.csIndig, closingStockImp:f.csImp, cashBank:f.cb+f.bb, debtors:f.dr,
    sundryDebtors:f.dr, sundryCreditors:f.cr,
    totalLiab:totalLiab, totalAssets:totalAssets, nwc:nwc, diff:totalLiab-totalAssets
  };
}

      '<b>Step 4:</b> Look for any duplicate expense or purchase entry<br>'+
      '<b>Step 5:</b> Go to <b>Capital/Loans</b> → check if loan was received in bank<br>'+
      '<b>Hindi:</b> Cash/Bank menu → कोई entry ज़्यादा या duplicate तो नहीं? Loan bank में जमा हुई?'+
      '</div></div>':'') +

      // Negative Stock
      (res.checks.some(function(c){return c.name==='No Negative Stock'&&!c.pass;})?
      '<div style="background:#FFEBEE;border-left:4px solid #C62828;border-radius:6px;padding:10px;margin-bottom:8px">'+
      '<div style="font-size:12px;font-weight:800;color:#C62828;margin-bottom:6px">❌ Negative Stock — How to Fix</div>'+
      '<div style="font-size:11px;color:#37474F;line-height:1.9">'+
      '<b>Step 1:</b> Go to <b>Inventory</b> — find item showing negative stock (red color)<br>'+
      '<b>Step 2:</b> Go to <b>Sales</b> — find sale entries for that item<br>'+
      '<b>Step 3:</b> Check if sold quantity is more than purchased quantity<br>'+
      '<b>Step 4:</b> Either: (a) Add a Purchase entry for that item, OR (b) Reduce sale quantity<br>'+
      '<b>Step 5:</b> For opening stock in existing business: go to <b>Data → Opening Stock</b><br>'+
      '<b>Hindi:</b> Inventory → negative stock item खोजें → Purchase add करें या Sale quantity घटाएं'+
      '</div></div>':'') +

      // Closing Stock mismatch
      (res.checks.some(function(c){return c.name==='Closing Stock Consistent'&&!c.pass;})?
      '<div style="background:#FFF3E0;border-left:4px solid #E65100;border-radius:6px;padding:10px;margin-bottom:8px">'+
      '<div style="font-size:12px;font-weight:800;color:#E65100;margin-bottom:6px">⚠️ Closing Stock Mismatch — How to Fix</div>'+
      '<div style="font-size:11px;color:#37474F;line-height:1.9">'+
      '<b>Step 1:</b> Go to <b>Inventory</b> — check all item stocks and cost prices<br>'+
      '<b>Step 2:</b> Go to <b>Reports → Stock Report</b> — verify item-wise values<br>'+
      '<b>Step 3:</b> Check if any purchase was NOT linked to an inventory item<br>'+
      '<b>Step 4:</b> For existing business: check <b>Data → Opening Stock</b> values<br>'+
      '<b>Hindi:</b> Inventory → har item ka stock aur cost verify karein. Purchase kisi item se linked hai?'+
      '</div></div>':'') +

      // Debtors
      (res.checks.some(function(c){return c.name==='Debtors Reconcile'&&!c.pass;})?
      '<div style="background:#FFF3E0;border-left:4px solid #E65100;border-radius:6px;padding:10px;margin-bottom:8px">'+
      '<div style="font-size:12px;font-weight:800;color:#E65100;margin-bottom:6px">⚠️ Debtors Too High — How to Fix</div>'+
      '<div style="font-size:11px;color:#37474F;line-height:1.9">'+
      '<b>Step 1:</b> Go to <b>Capital/Loans → Debtors</b> — list all outstanding debtors<br>'+
      '<b>Step 2:</b> Check if any debtor has already paid but not updated<br>'+
      '<b>Step 3:</b> If collected: go to <b>Cash/Bank → Add Receipt</b> from that debtor<br>'+
      '<b>Step 4:</b> Then update debtor balance: Capital/Loans → Debtors → edit entry → reduce amount<br>'+
      '<b>Step 5:</b> Check for duplicate debtor entries for same customer<br>'+
      '<b>Hindi:</b> Debtors list check करें → जिसने payment कर दी उसको Cash/Bank में receipt add करें → debtor balance घटाएं'+
      '</div></div>':'') +

      // Creditors
      (res.checks.some(function(c){return c.name==='Creditors Reconcile'&&!c.pass;})?
      '<div style="background:#FFF3E0;border-left:4px solid #E65100;border-radius:6px;padding:10px;margin-bottom:8px">'+
      '<div style="font-size:12px;font-weight:800;color:#E65100;margin-bottom:6px">⚠️ Creditors Too High — How to Fix</div>'+
      '<div style="font-size:11px;color:#37474F;line-height:1.9">'+
      '<b>Step 1:</b> Go to <b>Capital/Loans → Creditors</b> — list all outstanding creditors<br>'+
      '<b>Step 2:</b> Check if any supplier was paid but not recorded<br>'+
      '<b>Step 3:</b> If paid: add a payment in <b>Cash/Bank → Add Payment</b> to supplier<br>'+
      '<b>Step 4:</b> Update creditor balance: Capital/Loans → Creditors → edit → reduce amount<br>'+
      '<b>Hindi:</b> Creditors list check करें → जिस supplier को payment कर दी उसे Cash/Bank में payment add करें → creditor balance घटाएं'+
      '</div></div>':'') +

      // Loans
      (res.checks.some(function(c){return c.name==='Loan Balances Correct'&&!c.pass;})?
      '<div style="background:#FFEBEE;border-left:4px solid #C62828;border-radius:6px;padding:10px;margin-bottom:8px">'+
      '<div style="font-size:12px;font-weight:800;color:#C62828;margin-bottom:6px">❌ Loan Balance Error — How to Fix</div>'+
      '<div style="font-size:11px;color:#37474F;line-height:1.9">'+
      '<b>Step 1:</b> Go to <b>Capital/Loans → Loans</b> — open the loan with error<br>'+
      '<b>Step 2:</b> Check Sanctioned Amount — correct it to match bank letter<br>'+
      '<b>Step 3:</b> Check Outstanding Balance — it cannot exceed sanctioned amount<br>'+
      '<b>Step 4:</b> Outstanding = Sanctioned − Amount repaid so far<br>'+
      '<b>Step 5:</b> If EMI payments made, record them in Loans → Payment History<br>'+
      '<b>Hindi:</b> Capital/Loans → Loans → Sanctioned Amount aur Outstanding Amount verify karein. EMI payments record hain?'+
      '</div></div>':'') +

      // Duplicate Bills
      (res.checks.some(function(c){return c.name==='No Duplicate Voucher Nos.'&&!c.pass;})?
      '<div style="background:#FFEBEE;border-left:4px solid #C62828;border-radius:6px;padding:10px;margin-bottom:8px">'+
      '<div style="font-size:12px;font-weight:800;color:#C62828;margin-bottom:6px">❌ Duplicate Bill Numbers — How to Fix</div>'+
      '<div style="font-size:11px;color:#37474F;line-height:1.9">'+
      '<b>Step 1:</b> Go to <b>Reports → Bills tab</b> — find duplicate numbers<br>'+
      '<b>Step 2:</b> Tap on each duplicate bill to edit<br>'+
      '<b>Step 3:</b> Change bill number to next available number (e.g. INV/2026-27/005)<br>'+
      '<b>Step 4:</b> Each bill must have a unique number for GST compliance<br>'+
      '<b>Hindi:</b> Reports → Bills → duplicate number वाले bills खोजें → bill number change करें (unique रखें)'+
      '</div></div>':'') +

      // Expired Stock
      (res.checks.some(function(c){return c.name==='No Expired Stock'&&!c.pass;})?
      '<div style="background:#FFEBEE;border-left:4px solid #C62828;border-radius:6px;padding:10px;margin-bottom:8px">'+
      '<div style="font-size:12px;font-weight:800;color:#C62828;margin-bottom:6px">❌ Expired Stock — How to Fix</div>'+
      '<div style="font-size:11px;color:#37474F;line-height:1.9">'+
      '<b>Step 1:</b> Go to <b>Inventory</b> — find expired items (shown in red alerts)<br>'+
      '<b>Step 2:</b> Physically verify and remove expired goods from shop<br>'+
      '<b>Step 3:</b> Go to <b>Expenses</b> → Add entry → Category: Miscellaneous/Loss → Amount = value of expired goods<br>'+
      '<b>Step 4:</b> Go to <b>Inventory → edit item</b> → reduce Current Stock to 0<br>'+
      '<b>Step 5:</b> Update expiry date for new stock<br>'+
      '<b>Hindi:</b> Expired item → Expenses में loss record करें → Inventory में stock = 0 करें → नई expiry date डालें'+
      '</div></div>':'') +

      // General Tips
      '<div style="background:#E3F2FD;border-radius:6px;padding:10px;margin-top:6px">'+
      '<div style="font-size:11px;font-weight:700;color:#1565C0;margin-bottom:6px">💡 General Tips for Good Health Score / अच्छे score के लिए</div>'+
      '<div style="font-size:11px;color:#37474F;line-height:1.8">'+
      '• Enter every sale, purchase and expense on the SAME DAY (रोज़ entry करें)<br>'+
      '• Always select correct Payment Mode: Cash / Bank / UPI / Credit<br>'+
      '• When you receive a loan — select "Bank Account" as disbursement mode<br>'+
      '• Record Drawings whenever owner takes personal money<br>'+
      '• Run Health Check every week — catch errors early<br>'+
      '• Target score: <b>90%+</b> every month before seeing Financials<br>'+
      '<span style="color:#546E7A;font-size:10px">हर sale/purchase/expense की entry रोज़ करें। Loan bank में आए तो "Bank Account" select करें। हर हफ्ते Health Check चलाएं।</span>'+
      '</div></div>'
    );
  }

  // ── Run again button at bottom ──
  h+='<div style="text-align:center;margin-top:8px;margin-bottom:16px">'+
    '<button onclick="runHealthCheck()" style="padding:12px 28px;background:#2E7D32;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer">🔍 Run Check Again</button>'+
  '</div>';

  return h;
}

function runHealthCheck(){
  var checks=[];
  var now=new Date();
  // All data access wrapped in try-catch to prevent any single error from crashing health check

  // ── Pre-fetch all values safely ──
  var _f={ts:0,tp:0,te:0,cs:0,cb:0,bb:0,dr:0,cr:0,np:0,gp:0,ltl:0,cap:0};
  try{ _f=getF(); }catch(e){}
  var _bs={totalAssets:0,totalLiab:0,diff:0};
  try{ _bs=getBS(); }catch(e){}

  var _loans=0; try{_loans=D.loans.reduce(function(s,l){return s+(l.outstandingBalance||0);},0);}catch(e){}
  var _draw=0;  try{_draw=D.drawings.reduce(function(s,d){return s+(d.amount||0);},0);}catch(e){}
  var _drs=0;   try{_drs=D.debtors.reduce(function(s,d){return s+(d.amount||0);},0);}catch(e){}
  var _cred=0;  try{_cred=D.creditors.reduce(function(s,c){return s+(c.amount||0);},0);}catch(e){}
  var _ts=_f.ts||0, _te=_f.te||0, _cs=_f.cs||0, _np=_f.np||0;

  // ── CHECK 1: Trial Balance ──
  try{
    if(D.tbPosted&&D.trialBalance&&D.trialBalance.length){
      var tbDR=D.trialBalance.filter(function(t){return t.side==='dr';}).reduce(function(s,t){return s+(t.amount||0);},0);
      var tbCR=D.trialBalance.filter(function(t){return t.side==='cr';}).reduce(function(s,t){return s+(t.amount||0);},0);
      var tbDiff=Math.abs(tbDR-tbCR);
      checks.push({name:'Trial Balance Tallies',
        pass:tbDiff<1,warn:tbDiff>=1&&tbDiff<500,
        detail:tbDiff<1?'DR = CR = '+fc(Math.round(tbDR))+' ✅':
          'DR = '+fc(Math.round(tbDR))+' | CR = '+fc(Math.round(tbCR))+' | Difference = '+fc(Math.round(tbDiff)),
        fix:tbDiff>=1?'Go to Data → Opening Trial Balance and correct the difference. Check Capital or Loan entries.':''});
    } else if(D.profile.businessStage==='existing'&&!D.tbPosted){
      checks.push({name:'Trial Balance',pass:false,warn:true,
        detail:'Existing business — Opening Trial Balance not yet posted',
        fix:'Go to Data → Opening Trial Balance → enter all balances → Post to Books'});
    } else {
      checks.push({name:'Trial Balance',pass:true,warn:false,
        detail:'New business — Trial Balance not required ✅',fix:''});
    }
  }catch(e){checks.push({name:'Trial Balance',pass:false,warn:true,detail:'Error: '+e.message,fix:'Check your browser console for details.'});}

  // ── CHECK 2: Balance Sheet — using getBS() same as Financials ──
  try{
    var _bsDiff=Math.abs(_bs.totalAssets-_bs.totalLiab);
    checks.push({name:'Balance Sheet Balances',
      pass:_bsDiff<10,warn:_bsDiff>=10&&_bsDiff<1000,
      detail:_bsDiff<10?
        'Assets = Liabilities = '+fc(Math.round(_bs.totalAssets))+' ✅':
        'Difference = '+fc(Math.round(_bsDiff))+
        ' | Assets = '+fc(Math.round(_bs.totalAssets))+
        ' | Liabilities = '+fc(Math.round(_bs.totalLiab)),
      fix:_bsDiff>=10?
        'Difference found. Check: (1) Loan disbursement — did loan amount reach bank? '+
        '(2) Additional capital — entered correctly? '+
        '(3) Drawings — all recorded? '+
        '(4) Go to Financials → Balance Sheet to see the detailed view.':''});
  }catch(e){checks.push({name:'Balance Sheet',pass:false,warn:true,detail:'Error: '+e.message,fix:'Reload app and try again.'});}

  // ── CHECK 3: Cash & Bank Position ──
  try{
    var _cash=_f.cb||0, _bank=_f.bb||0;
    var _cashOk=_cash>=-10, _bankOk=_bank>=-10; // allow small float rounding
    checks.push({name:'Cash & Bank Position',
      pass:_cashOk&&_bankOk,warn:false,
      detail:(_cashOk&&_bankOk)?
        'Cash: '+fc(Math.round(_cash))+' | Bank: '+fc(Math.round(_bank))+' ✅':
        (_cash<-10?'⚠️ Cash balance negative: '+fc(Math.round(_cash))+' — check entries. ':'')+
        (_bank<-10?'⚠️ Bank balance negative: '+fc(Math.round(_bank)):''),
      fix:(!_cashOk||!_bankOk)?
        'Possible causes: (1) More cash expenses than cash receipts+opening cash '+
        '(2) Purchase paid in cash but not in budget '+
        '(3) Check Cash Book entries in Cash/Bank menu':''});
  }catch(e){checks.push({name:'Cash & Bank Position',pass:false,warn:true,detail:'Error: '+e.message,fix:''});}

  // ── CHECK 4: No Negative Stock ──
  try{
    var _negStock=D.inventory.filter(function(i){return (i.currentStock||0)<-1||(i.importedStock||0)<-1;});
    checks.push({name:'No Negative Stock',
      pass:_negStock.length===0,warn:false,
      detail:_negStock.length===0?
        'All '+D.inventory.length+' items have valid stock levels ✅':
        _negStock.length+' item(s) with negative stock: '+
        _negStock.map(function(i){return i.itemName+'('+Math.round(i.currentStock||0)+' '+i.unit+')';}).join(', '),
      fix:_negStock.length?
        'You have sold more than available stock. '+
        'Go to Inventory → check each item stock. '+
        'Then check Sales entries — reduce qty or add Purchase first.':''});
  }catch(e){checks.push({name:'No Negative Stock',pass:false,warn:true,detail:'Error: '+e.message,fix:''});}

  // ── CHECK 5: Closing Stock Consistent ──
  try{
    var _invVal=D.inventory.reduce(function(s,x){
      return s+((x.currentStock||0)*(x.avgCost||0)+(x.importedStock||0)*(x.importedAvgCost||0));
    },0);
    var _fVal=_f.cs||0;
    var _stockDiff=Math.abs(_invVal-_fVal);
    checks.push({name:'Closing Stock Consistent',
      pass:_stockDiff<200,warn:_stockDiff>=200&&_stockDiff<2000,
      detail:_stockDiff<200?
        'Inventory value = '+fc(Math.round(_invVal))+' ✅':
        'Inventory: '+fc(Math.round(_invVal))+
        ' | Financials: '+fc(Math.round(_fVal))+
        ' | Diff: '+fc(Math.round(_stockDiff)),
      fix:_stockDiff>=200?
        'Possible cause: Opening stock not entered, or some purchases not linked to an inventory item. '+
        'Check Data → Opening Stock and all Purchase entries.':''});
  }catch(e){checks.push({name:'Closing Stock',pass:false,warn:true,detail:'Error: '+e.message,fix:''});}

  // ── CHECK 6: Debtors Reconciliation ──
  try{
    var _creditSales=D.sales.filter(function(s){return s.paymentMode==='credit';})
      .reduce(function(t,s){return t+(s.totalAmount||0);},0);
    // Also consider TB debtors (prior year) — they are valid
    var _tbDr=0;
    if(D.tbPosted&&D.trialBalance){
      D.trialBalance.forEach(function(t){if(t.head==='debtors'&&t.side==='dr')_tbDr+=(t.amount||0);});
    }
    var _totalValidCredit=_creditSales+_tbDr;
    var _debtWarn=_drs>_totalValidCredit*1.5&&_totalValidCredit>0&&_drs>5000;
    checks.push({name:'Debtors Reconcile',
      pass:!_debtWarn,warn:_debtWarn,
      detail:'Total Debtors: '+fc(Math.round(_drs))+
        ' | Credit Sales: '+fc(Math.round(_creditSales))+
        (_tbDr>0?' + TB Opening: '+fc(Math.round(_tbDr)):'')+ 
        (_debtWarn?' — Debtors seem high':' ✅'),
      fix:_debtWarn?
        'Debtors balance is higher than credit sales. '+
        'Check if: (1) Some collections have been received but not recorded '+
        '(2) Debtor entry duplicated '+
        '(3) Go to Capital/Loans → Debtors and verify each entry.':''});
  }catch(e){checks.push({name:'Debtors',pass:false,warn:true,detail:'Error: '+e.message,fix:''});}

  // ── CHECK 7: Creditors Reconciliation ──
  try{
    var _creditPurch=D.purchases.filter(function(p){return p.paymentMode==='credit';})
      .reduce(function(t,p){return t+(p.amount||0);},0);
    var _tbCr=0;
    if(D.tbPosted&&D.trialBalance){
      D.trialBalance.forEach(function(t){if(t.head==='creditors'&&t.side==='cr')_tbCr+=(t.amount||0);});
    }
    var _totalValidCredit2=_creditPurch+_tbCr;
    var _credWarn=_cred>_totalValidCredit2*1.5&&_totalValidCredit2>0&&_cred>5000;
    checks.push({name:'Creditors Reconcile',
      pass:!_credWarn,warn:_credWarn,
      detail:'Total Creditors: '+fc(Math.round(_cred))+
        ' | Credit Purchases: '+fc(Math.round(_creditPurch))+
        (_tbCr>0?' + TB Opening: '+fc(Math.round(_tbCr)):'')+
        (_credWarn?' — Creditors seem high':' ✅'),
      fix:_credWarn?
        'Creditors balance is higher than credit purchases. '+
        'Check if: (1) Some supplier payments made but not recorded '+
        '(2) Creditor entry duplicated '+
        '(3) Go to Capital/Loans → Creditors and verify each entry.':''});
  }catch(e){checks.push({name:'Creditors',pass:false,warn:true,detail:'Error: '+e.message,fix:''});}

  // ── CHECK 8: Loan Balances ──
  try{
    var _loanOk=true, _loanDetail='', _loanList=[];
    D.loans.forEach(function(l){
      var ob=+(l.outstandingBalance||0), sa=+(l.sanctionedAmount||0);
      if(ob<0){_loanOk=false;_loanDetail+=l.lender+': negative balance. ';}
      else if(sa>0&&ob>sa*1.05){_loanOk=false;_loanDetail+=l.lender+': balance ('+fc(ob)+') exceeds sanctioned ('+fc(sa)+'). ';}
      else _loanList.push(l.lender+': '+fc(ob)+' outstanding');
    });
    checks.push({name:'Loan Balances Correct',
      pass:_loanOk,warn:false,
      detail:_loanOk?
        (D.loans.length===0?'No loans — nothing to check ✅':
          D.loans.length+' loan(s) | Total outstanding: '+fc(Math.round(_loans))+' ✅'):
        _loanDetail,
      fix:!_loanOk?
        'Check Loan entries: (1) Outstanding balance cannot exceed sanctioned amount '+
        '(2) Outstanding cannot be negative '+
        '(3) Go to Capital/Loans → Loans and correct the entry.':''});
  }catch(e){checks.push({name:'Loan Balances',pass:false,warn:true,detail:'Error: '+e.message,fix:''});}

  // ── CHECK 9: Duplicate Voucher Numbers ──
  try{
    var _bills=D.bills||[];
    var _billNos=_bills.map(function(b){return b.billNo;}).filter(Boolean);
    var _dupBills=_billNos.filter(function(n,i){return _billNos.indexOf(n)!==i;});
    checks.push({name:'No Duplicate Voucher Nos.',
      pass:_dupBills.length===0,warn:false,
      detail:_dupBills.length===0?
        _bills.length+' bill(s) checked — all numbers unique ✅':
        'Duplicate bill numbers: '+[...new Set(_dupBills)].join(', '),
      fix:_dupBills.length?
        'Go to Reports → Bills and edit duplicate numbers. '+
        'Each bill must have a unique number for audit trail.':''});
  }catch(e){checks.push({name:'Duplicate Vouchers',pass:false,warn:true,detail:'Error: '+e.message,fix:''});}

  // ── CHECK 10: Expired Stock ──
  try{
    var _expiredItems=[], _nearExpiry=[], _hasExpiry=false;
    D.inventory.forEach(function(inv){
      if(!inv.expiryDate) return;
      _hasExpiry=true;
      var expDate=new Date(inv.expiryDate);
      if(isNaN(expDate.getTime())) return;
      var daysLeft=Math.round((expDate-now)/86400000);
      var tot=(inv.currentStock||0)+(inv.importedStock||0);
      if(tot>0){
        if(daysLeft<0) _expiredItems.push(inv.itemName+' ('+Math.abs(daysLeft)+' days ago)');
        else if(daysLeft<=30) _nearExpiry.push(inv.itemName+' ('+daysLeft+' days left)');
      }
    });
    checks.push({name:'No Expired Stock',
      pass:_expiredItems.length===0,warn:_nearExpiry.length>0,
      detail:_expiredItems.length>0?
        '❌ EXPIRED items in stock: '+_expiredItems.join(', '):
        _nearExpiry.length>0?
          '⚠️ Near expiry — take action: '+_nearExpiry.join(', '):
          (_hasExpiry?'All items within expiry date ✅':'No expiry dates set — optional for non-perishable items ✅'),
      fix:_expiredItems.length?
        'Remove expired items: Go to Inventory → edit item → reduce stock to 0 → record as loss in Expenses (category: Loss/Wastage).':''});
  }catch(e){checks.push({name:'Expired Stock',pass:false,warn:true,detail:'Error: '+e.message,fix:''});}

  // ── CATEGORY SCORES — by check NAME not index ──
  function findCheck(name){
    var exact=checks.find(function(c){return c.name===name;});
    if(exact) return exact;
    var partial=checks.find(function(c){return c.name.indexOf(name)>=0||name.indexOf(c.name)>=0;});
    return partial||null;
  }
  function score(names){
    var arr=names.map(findCheck).filter(function(c){return c!==null;});
    if(!arr.length) return 100;
    var p=arr.filter(function(c){return c.pass;}).length;
    var w=arr.filter(function(c){return !c.pass&&c.warn;}).length;
    return Math.round((p*100+w*50)/arr.length);
  }

  var categories=[
    {label:'Accounting Accuracy',  score:score(['Balance Sheet Balances','Trial Balance','Trial Balance Tallies','Loan Balances Correct','No Duplicate Voucher Nos.'])},
    {label:'Inventory Accuracy',   score:score(['No Negative Stock','Closing Stock Consistent','No Expired Stock'])},
    {label:'Cash & Bank',          score:score(['Cash & Bank Position'])},
    {label:'Data Integrity',       score:score(['Debtors Reconcile','Creditors Reconcile'])},
  ];

  window._healthResult={checks:checks,categories:categories};
  renderPage();
  toast('✅ Health Check Complete — '+checks.filter(function(c){return c.pass;}).length+'/'+checks.length+' checks passed');
}

function loadDemoForPractice(filename){
  if(!confirm('Load demo data for today\'s practice?\n\nThis will:\n1. Load the demo business data\n2. You can then add today\'s purchases/sales/expenses\n3. Balance Sheet will tally correctly\n\nक्या आप practice के लिए demo data load करना चाहते हैं?')) return;
  var url='https://anilrajhor-dot.github.io/MSME-khata/'+filename+'.json?v='+Date.now();
  toast('Loading demo data for practice... ⏳');
  fetch(url).then(function(r){return r.json();}).then(function(data){
    // Load the base data
    Object.assign(D,data);
    // Store the demo baseline so we can track user's new entries
    D._demoBaseline = {
      salesCount: data.sales.length,
      purchasesCount: data.purchases.length,
      expensesCount: data.expenses.length,
      loadedAt: new Date().toISOString(),
      filename: filename
    };
    sv();
    window._trainSection='';
    renderPage();
    go('dashboard');
    toast('✅ Demo loaded! Now add today\'s purchases/sales/expenses. BS will tally.');
  }).catch(function(){
    toast('Could not load. Check internet connection.','e');
  });
}

// ── RELOAD DEMO: Fresh reload keeping only user's new entries ──────
function reloadDemoKeepEntries(filename){
  if(!D._demoBaseline||D._demoBaseline.filename!==filename){
    toast('Please use "Load Demo" first to establish baseline','e');
    return;
  }
  if(!confirm('Reload fresh demo data?\n\nThis will:\n1. Reload the original demo data\n2. Keep only YOUR new entries (added today)\n3. Demo entries will be reset to original\n\nYour new purchase/sale/expense entries will be preserved.\n\nक्या आप demo data reload करना चाहते हैं?')) return;
  
  var baseline=D._demoBaseline;
  // Save user's new entries (added after demo was loaded)
  var userSales=D.sales.slice(baseline.salesCount);
  var userPurchases=D.purchases.slice(baseline.purchasesCount);
  var userExpenses=D.expenses.slice(baseline.expensesCount);
  
  var url='https://anilrajhor-dot.github.io/MSME-khata/'+filename+'.json?v='+Date.now();
  toast('Reloading demo data... ⏳');
  fetch(url).then(function(r){return r.json();}).then(function(data){
    Object.assign(D,data);
    // Re-apply user's entries on top
    D.sales=D.sales.concat(userSales);
    D.purchases=D.purchases.concat(userPurchases);
    D.expenses=D.expenses.concat(userExpenses);
    D._demoBaseline={
      salesCount:data.sales.length,
      purchasesCount:data.purchases.length,
      expensesCount:data.expenses.length,
      loadedAt:new Date().toISOString(),
      filename:filename,
      userEntries:{sales:userSales.length,purchases:userPurchases.length,expenses:userExpenses.length}
    };
    // Recalculate inventory stock from all entries
    sv();
    renderPage();
    go('dashboard');
    var msg='✅ Reloaded! Your '+userSales.length+' sales, '+userPurchases.length+' purchases, '+userExpenses.length+' expenses preserved.';
    toast(msg);
  }).catch(function(){
    toast('Could not reload. Check internet connection.','e');
  });
}

// ── Show how many entries user has added on top of demo ───────────
function getDemoEntryCount(){
  if(!D._demoBaseline) return null;
  var b=D._demoBaseline;
  return {
    sales: D.sales.length - b.salesCount,
    purchases: D.purchases.length - b.purchasesCount,
    expenses: D.expenses.length - b.expensesCount,
    filename: b.filename,
    loadedAt: b.loadedAt
  };

// ── Q10: GST Liability ──────────────────────────────────────────────
function analyseGSTLiability(){
  var gstEnabled=D.gst&&D.gst.enabled;
  if(!gstEnabled){
    return '<b>📋 GST Analysis</b><br><br>'+
      '<div style="background:#E3F2FD;border-radius:8px;padding:10px">'+
      'GST is not enabled for this business.<br><br>'+
      '<b>GST registration jaruri hai agar:</b><br>'+
      '• Annual turnover > ₹40 lakh (goods) ya ₹20 lakh (services)<br>'+
      '• Interstate sales karte hain<br>'+
      '• E-commerce platform pe bechte hain<br><br>'+
      '<b>GST enable karne ke liye:</b> Profile → GST Module → Enable → GSTIN enter karein'+
      '</div>';
  }
  // Calculate output GST (collected from customers)
  var outputGST=0, inputGST=0;
  var gstBySlab={};
  D.sales.forEach(function(s){
    var inv=D.inventory.find(function(i){return i.id===s.itemId;});
    var rate=inv&&inv.gstRate?inv.gstRate:(D.gst.defaultRate||5);
    var gst=Math.round((s.totalAmount||0)*rate/(100+rate));
    outputGST+=gst;
    gstBySlab[rate]=(gstBySlab[rate]||{out:0,inp:0});
    gstBySlab[rate].out+=gst;
  });
  D.purchases.forEach(function(p){
    var inv=D.inventory.find(function(i){return i.id===p.itemId;});
    var rate=inv&&inv.gstRate?inv.gstRate:(D.gst.defaultRate||5);
    var gst=Math.round((p.amount||0)*rate/(100+rate));
    inputGST+=gst;
    gstBySlab[rate]=(gstBySlab[rate]||{out:0,inp:0});
    gstBySlab[rate].inp=(gstBySlab[rate].inp||0)+gst;
  });
  var netGST=outputGST-inputGST;

  var reply='<b>📋 GST Liability Analysis</b><br>';
  reply+='GSTIN: '+esc(D.gst.gstin||'Not entered')+'<br><br>';
  reply+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">';
  reply+='<div style="background:#FFEBEE;border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:#546E7A">Output GST<br>(Collected)</div><div style="font-size:14px;font-weight:700;color:#C62828">'+fc(outputGST)+'</div></div>';
  reply+='<div style="background:#E8F5E9;border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:#546E7A">Input GST<br>(Paid)</div><div style="font-size:14px;font-weight:700;color:#2E7D32">'+fc(inputGST)+'</div></div>';
  reply+='<div style="background:'+(netGST>0?'#FFEBEE':'#E8F5E9')+'border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:#546E7A">Net Payable/<br>Refund</div><div style="font-size:14px;font-weight:700;color:'+(netGST>0?'#C62828':'#2E7D32')+'">'+fc(Math.abs(netGST))+'</div></div>';
  reply+='</div>';
  reply+='<b>💡 GST Return Filing:</b><br>';
  reply+='• GSTR-1: Sales details — file by 11th of next month<br>';
  reply+='• GSTR-3B: Summary return — file by 20th of next month<br>';
  reply+='• Net GST payable: '+fc(netGST)+(netGST>0?' — deposit before filing':' — claim refund or carry forward')+'<br><br>';
  reply+='<b>GST Module:</b> Reports → GST Module mein detailed GSTR-1 aur GSTR-3B data milega.';
  return reply;
}

// ── Q11: Working Capital Assessment ────────────────────────────────
function analyseWorkingCapital(){
  var _bs={}; try{_bs=getBS();}catch(e){}
  var ca=_bs.currentAssets||0, cl=_bs.currentLiab||0;
  var nwc=ca-cl;
  var _f={}; try{_f=getF();}catch(e){}
  var monthlyPurch=0, monthlySales=0;
  var now=new Date();
  var currMo=now.getFullYear()+'-'+(now.getMonth()<9?'0':'')+(now.getMonth()+1);
  D.purchases.forEach(function(p){if(p.date&&p.date.indexOf(currMo)===0)monthlyPurch+=p.amount||0;});
  D.sales.forEach(function(s){if(s.date&&s.date.indexOf(currMo)===0)monthlySales+=s.totalAmount||0;});
  var stockDays=monthlySales>0?Math.round((_f.cs||0)/monthlySales*30):0;
  var debtorDays=monthlySales>0?Math.round((_f.dr||0)/monthlySales*30):0;
  var creditorDays=monthlyPurch>0?Math.round((_f.cr||0)/monthlyPurch*30):0;
  var operatingCycle=stockDays+debtorDays-creditorDays;

  var reply='<b>💼 Working Capital Assessment</b><br><br>';
  reply+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">';
  reply+='<div style="background:#E3F2FD;border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:#546E7A">Current Assets</div><div style="font-size:13px;font-weight:700;color:#1565C0">'+fc(ca)+'</div></div>';
  reply+='<div style="background:#FFEBEE;border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:#546E7A">Current Liabilities</div><div style="font-size:13px;font-weight:700;color:#C62828">'+fc(cl)+'</div></div>';
  reply+='<div style="background:'+(nwc>=0?'#E8F5E9':'#FFEBEE')+';border-radius:8px;padding:8px;text-align:center;grid-column:span 2"><div style="font-size:9px;color:#546E7A">Net Working Capital (NWC)</div><div style="font-size:16px;font-weight:900;color:'+(nwc>=0?'#2E7D32':'#C62828')+'">'+fc(nwc)+'</div><div style="font-size:9px;color:#546E7A">'+(nwc>=0?'✅ Positive — Good':'❌ Negative — Needs attention')+'</div></div>';
  reply+='</div>';
  reply+='<b>📅 Working Capital Cycle:</b><br>';
  reply+='• Stock holding days: '+stockDays+' days<br>';
  reply+='• Debtor collection days: '+debtorDays+' days<br>';
  reply+='• Creditor payment days: '+creditorDays+' days<br>';
  reply+='• Operating Cycle: '+operatingCycle+' days '+(operatingCycle<=30?'✅ Good':operatingCycle<=60?'⚠️ Moderate':'❌ Too long')+'<br><br>';
  reply+='<b>💡 Improvement Tips / सुधार के तरीके:</b><br>';
  if(stockDays>30) reply+='• Stock zyada time reh raha hai ('+stockDays+' days) — slow moving items identify karein<br>';
  if(debtorDays>20) reply+='• Debtors jaldi collect karein — '+debtorDays+' days mein collection honi chahiye<br>';
  if(creditorDays<15) reply+='• Suppliers se zyada credit lein — currently sirf '+creditorDays+' days credit mil raha hai<br>';
  if(nwc<0) reply+='• NWC negative hai — urgent: term loan se working capital improve karein ya CC limit lein<br>';
  reply+='• Bank Loan Assessment menu mein Working Capital Loan calculate kar sakte hain';
  return reply;
}

// ── Q13: Seasonal Sales Pattern ────────────────────────────────────
function analyseSeasonalPattern(){
  var moData={};
  D.sales.forEach(function(s){
    if(!s.date) return;
    var mo=s.date.slice(0,7);
    moData[mo]=(moData[mo]||0)+(s.totalAmount||0);
  });
  var months=Object.keys(moData).sort();
  if(months.length<2){
    return '📊 <b>Seasonal Pattern</b><br><br>Kum se kum 2 months ka data chahiye pattern dekhne ke liye. Zyada entries karein!';
  }
  var values=months.map(function(m){return moData[m];});
  var avg=values.reduce(function(s,v){return s+v;},0)/values.length;
  var maxMo=months[values.indexOf(Math.max.apply(null,values))];
  var minMo=months[values.indexOf(Math.min.apply(null,values))];

  var reply='<b>📅 Seasonal Sales Pattern</b><br><br>';
  // Bar chart using text
  reply+='<div style="margin-bottom:10px">';
  var maxVal=Math.max.apply(null,values)||1;
  months.forEach(function(m,i){
    var pct=Math.round(values[i]/maxVal*100);
    var moName=new Date(m+'-01').toLocaleString('default',{month:'short',year:'2-digit'});
    var color=values[i]>=avg*1.1?'#2E7D32':values[i]<avg*0.9?'#C62828':'#1565C0';

      '<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:1px">'+

      '<div style="background:#E0E0E0;height:8px;border-radius:4px">'+
        '<div style="background:'+color+';height:8px;border-radius:4px;width:'+pct+'%"></div>'+
      '</div>'+
    '</div>';
  });
  reply+='</div>';
  reply+='<b>📊 Insights:</b><br>';
  reply+='• Best month: <b>'+new Date(maxMo+'-01').toLocaleString('default',{month:'long',year:'numeric'})+'</b> ('+fc(moData[maxMo])+')<br>';
  reply+='• Weakest month: <b>'+new Date(minMo+'-01').toLocaleString('default',{month:'long',year:'numeric'})+'</b> ('+fc(moData[minMo])+')<br>';

  reply+='• Best month mein extra stock rakho — demand zyada hoti hai<br>';

  reply+='• Bank loan ke liye: peak season se pehle working capital lao';
  return reply;

// ── Q14: Top Customers Analysis ────────────────────────────────────
function analyseTopCustomers(){
  var custMap={};
  D.sales.forEach(function(s){
    var c=s.customer||'Walk-in';
    if(!custMap[c]) custMap[c]={name:c,sales:0,gp:0,txns:0,credit:0,cash:0};
    custMap[c].sales+=s.totalAmount||0;
    custMap[c].gp+=s.grossProfit||0;
    custMap[c].txns++;
    if(s.paymentMode==='credit') custMap[c].credit+=s.totalAmount||0;
    else custMap[c].cash+=s.totalAmount||0;
  });
  var custs=Object.values(custMap).sort(function(a,b){return b.sales-a.sales;});
  var totalSales=custs.reduce(function(s,c){return s+c.sales;},0);
  var top5=custs.slice(0,5);

  var reply='<b>👤 Top Customer Analysis</b><br><br>';
  if(!custs.length){
    return reply+'Sales entries mein customer names darj karein — analysis milega.';
  }
  reply+='<b>🏆 Top 5 Customers by Sales:</b><br>';
  top5.forEach(function(c,i){
    var pct=totalSales>0?Math.round(c.sales/totalSales*100):0;
    var gpPct=c.sales>0?Math.round(c.gp/c.sales*100):0;
    reply+='<div style="background:#F5F5F5;border-radius:6px;padding:6px 8px;margin-bottom:5px">';
    reply+='<div style="display:flex;justify-content:space-between"><b>'+(i+1)+'. '+esc(c.name)+'</b><span style="color:#1565C0;font-weight:700">'+fc(c.sales)+'</span></div>';
    reply+='<div style="font-size:10px;color:#546E7A">'+c.txns+' purchases | GP: '+gpPct+'% | '+pct+'% of total sales | '+
      (c.credit>0?'Credit: '+fc(c.credit):'All cash/UPI')+'</div>';
    reply+='</div>';
  });

  // Credit risk customers
  var highCredit=custs.filter(function(c){return c.credit>c.sales*0.5&&c.sales>5000;});
  if(highCredit.length){
    reply+='<br><b>⚠️ High Credit Risk Customers:</b><br>';
    highCredit.forEach(function(c){
      reply+='• '+esc(c.name)+': '+fc(c.credit)+' on credit ('+Math.round(c.credit/c.sales*100)+'% of their purchases)<br>';
    });
  }
  reply+='<br><b>💡 Strategy:</b><br>';
  reply+='• Top customer ko special discount ya credit dein — loyalty maintain karein<br>';

  reply+='• Cash customers ko small discount dein — credit risk kam hoga<br>';
  reply+='• Ek customer pe zyada depend mat karo — diversify karein';
  return reply;
}

// ── Q15: Expense Control Advice ────────────────────────────────────
function analyseExpenseControl(){
  var _f={}; try{_f=getF();}catch(e){}
  var ts=_f.ts||0;
  var expCat={};
  D.expenses.forEach(function(e){
    var cat=e.category||'Other';
    expCat[cat]=(expCat[cat]||{total:0,fixed:false});
    expCat[cat].total+=e.amount||0;
    if(['Rent','Salary'].indexOf(cat)>=0) expCat[cat].fixed=true;
  });
  var totalExp=Object.values(expCat).reduce(function(s,e){return s+e.total;},0);
  var fixedExp=Object.values(expCat).filter(function(e){return e.fixed;}).reduce(function(s,e){return s+e.total;},0);
  var varExp=totalExp-fixedExp;
  var cats=Object.entries(expCat).sort(function(a,b){return b[1].total-a[1].total;});
  var budget=D.budget||{};

  var reply='<b>💸 Expense Control Report</b><br><br>';
  reply+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">';
  reply+='<div style="background:#FFEBEE;border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:#546E7A">Total Expenses</div><div style="font-size:13px;font-weight:700;color:#C62828">'+fc(totalExp)+'</div></div>';
  reply+='<div style="background:#FFF3E0;border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:#546E7A">Fixed</div><div style="font-size:13px;font-weight:700;color:#E65100">'+fc(fixedExp)+'</div></div>';
  reply+='<div style="background:#E3F2FD;border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:#546E7A">Variable</div><div style="font-size:13px;font-weight:700;color:#1565C0">'+fc(varExp)+'</div></div>';
  reply+='</div>';
  reply+='Expenses as % of Sales: '+(ts>0?Math.round(totalExp/ts*100)+'%':'N/A')+'<br><br>';

  reply+='<b>📊 Category-wise + Budget vs Actual:</b><br>';
  cats.forEach(function(c){
    var budgetAmt=budget[c[0].toLowerCase()]||budget[c[0]]||0;
    var variance=budgetAmt>0?c[1].total-budgetAmt:0;
    reply+='<div style="display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid #F0F0F0">';
    reply+='<span>'+(c[1].fixed?'🔒':'🔄')+' '+c[0]+'</span>';
    reply+='<span>'+fc(c[1].total)+(budgetAmt>0?' <span style="color:'+(variance>0?'#C62828':'#2E7D32')+'">'+(variance>0?'▲ +':'▼ ')+fc(Math.abs(variance))+'</span>':'')+'</span>';
    reply+='</div>';
  });

  reply+='<br><b>💡 Cost Reduction Tips:</b><br>';
  if(fixedExp>totalExp*0.6) reply+='• Fixed expenses '+Math.round(fixedExp/totalExp*100)+'% of total — difficult to cut. Focus on variable expenses.<br>';
  var topVar=cats.filter(function(c){return !c[1].fixed;});
  if(topVar.length) reply+='• Biggest variable expense: '+topVar[0][0]+' ('+fc(topVar[0][1].total)+') — kya reduce ho sakta hai?<br>';
  reply+='• 🔒 Fixed expenses (Rent/Salary) = every month same<br>';
  reply+='• 🔄 Variable expenses = control kar sakte hain<br>';
  reply+='• Budget set karein (Reports → Budget vs Actual) aur monthly compare karein';
  return reply;
}

// ── Q17: Stock Turnover Ratio ───────────────────────────────────────
function analyseStockTurnover(){
  var _f={}; try{_f=getF();}catch(e){}
  var cs=_f.cs||0;
  var totalCOGS=D.sales.reduce(function(s,x){return s+(x.cogs||0);},0);
  var os=D.opening.stock||0;
  var avgStock=(os+cs)/2||cs;
  var stockTurnover=avgStock>0?totalCOGS/avgStock:0;
  var daysToSell=stockTurnover>0?Math.round(365/stockTurnover/4):0; // 3 months data

  var reply='<b>📦 Stock Turnover Analysis</b><br><br>';
  reply+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">';
  reply+='<div style="background:#E3F2FD;border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:#546E7A">Closing Stock Value</div><div style="font-size:13px;font-weight:700;color:#1565C0">'+fc(Math.round(cs))+'</div></div>';
  reply+='<div style="background:#E8F5E9;border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:#546E7A">Total COGS</div><div style="font-size:13px;font-weight:700;color:#2E7D32">'+fc(Math.round(totalCOGS))+'</div></div>';
  reply+='<div style="background:#FFF3E0;border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:#546E7A">Stock Turnover Ratio</div><div style="font-size:16px;font-weight:900;color:#E65100">'+stockTurnover.toFixed(1)+'x</div></div>';
  reply+='<div style="background:'+(daysToSell<=30?'#E8F5E9':daysToSell<=60?'#FFF3E0':'#FFEBEE')+';border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:#546E7A">Days to Sell Stock</div><div style="font-size:16px;font-weight:900;color:'+(daysToSell<=30?'#2E7D32':daysToSell<=60?'#E65100':'#C62828')+'">'+daysToSell+' days</div></div>';
  reply+='</div>';

  // Item-wise turnover
  var itemTurn=D.inventory.map(function(inv){
    var sold=D.sales.filter(function(s){return s.itemId===inv.id;}).reduce(function(t,s){return t+(s.cogs||0);},0);
    var avgS=((inv.openingStock||0)*inv.avgCost+(inv.currentStock||0)*inv.avgCost)/2;
    return {name:inv.itemName,turnover:avgS>0?sold/avgS:0,stock:inv.currentStock||0,unit:inv.unit};
  }).sort(function(a,b){return b.turnover-a.turnover;});

  if(itemTurn.length){
    reply+='<b>📊 Item-wise Turnover:</b><br>';
    itemTurn.slice(0,5).forEach(function(it){
      var color=it.turnover>=2?'#2E7D32':it.turnover>=1?'#E65100':'#C62828';
      var label=it.turnover>=2?'Fast':it.turnover>=1?'Moderate':'Slow';
      reply+='• '+esc(it.name)+': <span style="color:'+color+';font-weight:700">'+it.turnover.toFixed(1)+'x</span> ('+label+')<br>';
    });
  }
  reply+='<br><b>💡 Benchmarks:</b><br>';
  reply+='• Grocery: 8-12x per year ✅<br>';
  reply+='• Textile: 3-5x per year ✅<br>';
  reply+='• Manufacturing: 4-6x per year ✅<br>';
  reply+='• Low turnover = zyada paisa stock mein bandh — fast sellers pe focus karein';
  return reply;
}
