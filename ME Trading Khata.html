  if(q.indexOf('profit')>=0&&(q.indexOf('reduc')>=0||q.indexOf('low')>=0||q.indexOf('why')>=0||q.indexOf('fall')>=0||q.indexOf('less')>=0))
    return analyseWhyProfitReduced();
  if(q.indexOf('reorder')>=0||q.indexOf('stock')>=0&&q.indexOf('order')>=0||q.indexOf('buy')>=0||q.indexOf('purchase')>=0&&q.indexOf('should')>=0)
    return analyseReorderNeeded();
  if(q.indexOf('late')>=0||q.indexOf('overdue')>=0||q.indexOf('pay')>=0&&q.indexOf('customer')>=0||q.indexOf('collect')>=0||q.indexOf('debtor')>=0)
    return analyseLatePayers();
  if(q.indexOf('increase')>=0&&q.indexOf('profit')>=0||q.indexOf('improve')>=0||q.indexOf('grow')>=0||q.indexOf('better')>=0)
    return analyseHowToIncreaseProfit();
  if(q.indexOf('predict')>=0||q.indexOf('next month')>=0||q.indexOf('forecast')>=0||q.indexOf('agle mahine')>=0)
    return analyseNextMonthSales();
  if(q.indexOf('cash')>=0||q.indexOf('paisa')>=0&&q.indexOf('kitna')>=0||q.indexOf('balance')>=0)
    return analyseCashPosition();
  if(q.indexOf('best')>=0&&(q.indexOf('item')>=0||q.indexOf('product')>=0)||q.indexOf('top')>=0&&q.indexOf('sell')>=0||q.indexOf('most profit')>=0)
    return analyseBestItems();
  if(q.indexOf('health')>=0||q.indexOf('business')>=0&&(q.indexOf('kaise')>=0||q.indexOf('how')>=0)||q.indexOf('summary')>=0||q.indexOf('overall')>=0)
    return analyseBusinessHealth();
  if(q.indexOf('expense')>=0||q.indexOf('kharch')>=0||q.indexOf('cost')>=0)
    return analyseExpenses();

  // Default — general business summary
  return analyseBusinessHealth();
}

// ── Q1: Why has profit reduced? ──────────────────────────────
function analyseWhyProfitReduced(){
  var now=new Date();
  var months=[];
  for(var i=2;i>=0;i--){
    var dt=new Date(); dt.setMonth(dt.getMonth()-i);
    var k=dt.getFullYear()+'-'+(dt.getMonth()<9?'0':'')+(dt.getMonth()+1);
    var lb=dt.toLocaleString('default',{month:'long',year:'numeric'});
    var ms=0,mc=0,me=0;
    D.sales.forEach(function(s){if(s.date&&s.date.indexOf(k)===0){ms+=s.totalAmount||0;mc+=s.cogs||0;}});
    D.expenses.forEach(function(e){if(e.date&&e.date.indexOf(k)===0)me+=e.amount||0;});
    months.push({label:lb,key:k,sales:ms,cogs:mc,gp:ms-mc,exp:me,np:ms-mc-me});
  }

  var reply='<b>📊 Profit Analysis (Last 3 Months)</b><br><br>';

  // Month-wise table
  reply+='<table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:10px">';
  reply+='<tr style="background:#1565C0;color:#fff"><td style="padding:4px 6px">Month</td><td style="padding:4px 6px;text-align:right">Sales</td><td style="padding:4px 6px;text-align:right">GP</td><td style="padding:4px 6px;text-align:right">Exp</td><td style="padding:4px 6px;text-align:right">NP</td></tr>';
  months.forEach(function(m,i){
    var bg=i%2?'#F5F5F5':'#fff';
    var npColor=m.np>=0?'#2E7D32':'#C62828';
    reply+='<tr style="background:'+bg+'"><td style="padding:4px 6px">'+m.label+'</td>'+
      '<td style="padding:4px 6px;text-align:right">'+fc(m.sales)+'</td>'+
      '<td style="padding:4px 6px;text-align:right;color:'+(m.gp>=0?'#2E7D32':'#C62828')+'">'+fc(m.gp)+'</td>'+
      '<td style="padding:4px 6px;text-align:right;color:#E65100">'+fc(m.exp)+'</td>'+
      '<td style="padding:4px 6px;text-align:right;font-weight:700;color:'+npColor+'">'+fc(m.np)+'</td>'+
    '</tr>';
  });
  reply+='</table>';

  // Find trend
  var reasons=[];
  if(months.length>=2){
    var curr=months[months.length-1], prev=months[months.length-2];
    if(curr.sales<prev.sales) reasons.push('📉 Sales reduced by '+fc(prev.sales-curr.sales)+' vs last month');
    if(curr.exp>prev.exp) reasons.push('📈 Expenses increased by '+fc(curr.exp-prev.exp)+' vs last month');
    if(curr.cogs>0&&curr.sales>0&&prev.cogs>0&&prev.sales>0){
      var currGPpct=curr.gp/curr.sales*100, prevGPpct=prev.gp/prev.sales*100;
      if(currGPpct<prevGPpct-3) reasons.push('📦 Gross Profit % fell from '+prevGPpct.toFixed(1)+'% to '+currGPpct.toFixed(1)+'% — check purchase rates or sale prices');
    }
  }

  // Expense breakdown — biggest expense
  var expCat={};
  D.expenses.forEach(function(e){expCat[e.category||'Other']=(expCat[e.category||'Other']||0)+e.amount;});
  var topExp=Object.entries(expCat).sort(function(a,b){return b[1]-a[1];}).slice(0,3);

  if(reasons.length){
    reply+='<b>🔍 Reasons Found:</b><br>';
    reasons.forEach(function(r){reply+='• '+r+'<br>';});
    reply+='<br>';
  }

  reply+='<b>💸 Top Expenses:</b><br>';
  topExp.forEach(function(e){reply+='• '+e[0]+': '+fc(e[1])+'<br>';});
  reply+='<br>';

  // Suggestions
  reply+='<b>💡 Suggestions / सुझाव:</b><br>';
  if(months[months.length-1]&&months[months.length-1].sales<10000) reply+='• Sales bahut kam hai — daily 5+ customers target karein<br>';
  reply+='• High expense items review karein — kya reduce ho sakta hai?<br>';
  reply+='• Credit sales se collections karein — cash flow improve hoga<br>';
  reply+='• Top selling items ka margin check karein — agar kam hai to badhayein';

  return reply;
}

// ── Q2: Which products to reorder? ──────────────────────────
function analyseReorderNeeded(){
  var now=new Date();
  var t30=new Date(); t30.setDate(t30.getDate()-30);
  var t30str=t30.toISOString().slice(0,10);
  var salesVel={};
  D.sales.forEach(function(s){if(s.date>=t30str)salesVel[s.itemName]=(salesVel[s.itemName]||0)+(s.qty||0);});

  var outStock=[], below=[], ok=[], fastLow=[];
  D.inventory.forEach(function(inv){
    var tot=(inv.currentStock||0)+(inv.importedStock||0);
    var vel=salesVel[inv.itemName]||0;
    var daysLeft=vel>0?Math.round(tot/vel*30):999;
    if(tot===0&&inv.avgCost>0) outStock.push({name:inv.itemName,vel:vel,unit:inv.unit,cost:inv.avgCost});
    else if(inv.reorderLevel&&tot<=inv.reorderLevel) below.push({name:inv.itemName,stock:tot,reorder:inv.reorderLevel,vel:vel,days:daysLeft,unit:inv.unit,cost:inv.avgCost});
    else if(vel>5&&daysLeft<=15) fastLow.push({name:inv.itemName,stock:tot,vel:vel,days:daysLeft,unit:inv.unit,cost:inv.avgCost});
    else if(tot>0) ok.push({name:inv.itemName,stock:tot,unit:inv.unit});
  });

  var reply='<b>🛒 Reorder Recommendations</b><br><br>';

  if(outStock.length){
    reply+='<div style="background:#FFEBEE;border-radius:6px;padding:8px;margin-bottom:8px">';
    reply+='<b style="color:#C62828">🚫 OUT OF STOCK — Order Immediately!</b><br>';
    outStock.forEach(function(i){
      var sugQty=(i.vel||10)*2;
      reply+='• <b>'+esc(i.name)+'</b> — Suggest order: '+sugQty+' '+esc(i.unit)+' | Est. cost: '+fc(sugQty*i.cost)+'<br>';
    });
    reply+='</div>';
  }

  if(below.length){
    reply+='<div style="background:#FFF3E0;border-radius:6px;padding:8px;margin-bottom:8px">';
    reply+='<b style="color:#E65100">⚠️ Below Reorder Level — Order Soon</b><br>';
    below.forEach(function(i){
      var sugQty=Math.max(i.reorder*2-i.stock,i.reorder);
      reply+='• <b>'+esc(i.name)+'</b> — Stock: '+i.stock+' | Reorder at: '+i.reorder+' | Stock lasts: '+(i.days<999?i.days+' days':'unknown')+'<br>';
      reply+='  Suggest: Order '+sugQty+' '+esc(i.unit)+' | Cost: '+fc(sugQty*i.cost)+'<br>';
    });
    reply+='</div>';
  }

  if(fastLow.length){
    reply+='<div style="background:#E3F2FD;border-radius:6px;padding:8px;margin-bottom:8px">';
    reply+='<b style="color:#1565C0">📦 Fast Moving — Will Finish in 15 Days</b><br>';
    fastLow.forEach(function(i){
      reply+='• <b>'+esc(i.name)+'</b> — Stock: '+i.stock+' '+esc(i.unit)+' | Selling '+i.vel+'/month | '+(i.days)+' days left<br>';
    });
    reply+='</div>';
  }

  if(!outStock.length&&!below.length&&!fastLow.length){
    reply+='<div style="background:#E8F5E9;border-radius:6px;padding:8px">';
    reply+='✅ <b>All items have adequate stock!</b><br>';
    reply+='Koi immediate reorder required nahi hai.<br>';
    ok.slice(0,5).forEach(function(i){reply+='• '+esc(i.name)+': '+i.stock+' '+esc(i.unit)+'<br>';});
    reply+='</div>';
  }

  reply+='<br><b>💡 Tip:</b> Inventory menu mein Reorder Level set karein — automatic alerts aayenge.';
  return reply;
}

// ── Q3: Which customers are paying late? ────────────────────
function analyseLatePayers(){
  var creditDays=+(D.settings&&D.settings.creditDays)||30;
  var now=new Date();
  var overdue=[],dueSoon=[],onTime=[];

  D.debtors.forEach(function(dr){
    if(!dr.amount||dr.amount<=0) return;
    var dueDate=new Date(dr.date); dueDate.setDate(dueDate.getDate()+creditDays);
    var daysOverdue=Math.round((now-dueDate)/86400000);
    if(daysOverdue>0) overdue.push({name:dr.name,amount:dr.amount,days:daysOverdue,ref:dr.ref||''});
    else if(daysOverdue>-4) dueSoon.push({name:dr.name,amount:dr.amount,days:-daysOverdue,ref:dr.ref||''});
    else onTime.push({name:dr.name,amount:dr.amount,days:-daysOverdue});
  });

  overdue.sort(function(a,b){return b.amount-a.amount;});
  var totalOverdue=overdue.reduce(function(s,d){return s+d.amount;},0);
  var totalDr=D.debtors.reduce(function(s,d){return s+(d.amount||0);},0);

  var reply='<b>👤 Customer Payment Analysis</b><br>';
  reply+='Total Debtors: '+fc(totalDr)+' | Credit Period: '+creditDays+' days<br><br>';

  if(overdue.length){
    reply+='<div style="background:#FFEBEE;border-radius:6px;padding:8px;margin-bottom:8px">';
    reply+='<b style="color:#C62828">🔴 OVERDUE — Total: '+fc(totalOverdue)+'</b><br>';
    overdue.forEach(function(d){
      reply+='• <b>'+esc(d.name)+'</b>: '+fc(d.amount)+' — <span style="color:#C62828;font-weight:700">'+d.days+' days overdue!</span>';
      if(d.ref) reply+=' ('+esc(d.ref)+')';
      reply+='<br>';
    });
    reply+='</div>';
    reply+='<b>📞 Action — Inhe abhi call karein:</b><br>';
    overdue.slice(0,3).forEach(function(d){reply+='• '+esc(d.name)+' ke liye '+fc(d.amount)+' collect karein<br>';});
    reply+='<br>';
  }

  if(dueSoon.length){
    reply+='<div style="background:#FFF3E0;border-radius:6px;padding:8px;margin-bottom:8px">';
    reply+='<b style="color:#E65100">🟡 DUE IN 3 DAYS</b><br>';
    dueSoon.forEach(function(d){reply+='• '+esc(d.name)+': '+fc(d.amount)+' — due in '+d.days+' days<br>';});
    reply+='</div>';
  }

  if(onTime.length&&!overdue.length&&!dueSoon.length){
    reply+='<div style="background:#E8F5E9;border-radius:6px;padding:8px">';
    reply+='✅ <b>Sab customers time pe pay kar rahe hain!</b><br>';
    onTime.forEach(function(d){reply+='• '+esc(d.name)+': '+fc(d.amount)+' — '+d.days+' days remaining<br>';});
    reply+='</div>';
  }

  if(!D.debtors.length||totalDr===0){
    reply='✅ <b>Koi outstanding debtor nahi hai!</b><br>Sab customers ne payment kar di hai. Bahut achha!';
  }

  reply+='<br><b>💡 Tip:</b> Credit period kam karein (currently '+creditDays+' days) — cash flow improve hoga.';
  return reply;
}

// ── Q4: How to increase profit? ─────────────────────────────
function analyseHowToIncreaseProfit(){
  var f=getF();
  var ts=f.ts,tp_v=0,te=f.te||0,gp=f.gp,np=f.np;
  D.purchases.forEach(function(p){tp_v+=p.amount||0;});
  var gpPct=ts>0?gp/ts*100:0;

  // Find best margin items
  var iMap={};
  D.sales.forEach(function(s){
    if(!s.itemName) return;
    if(!iMap[s.itemName]) iMap[s.itemName]={sales:0,gp:0,qty:0};
    iMap[s.itemName].sales+=s.totalAmount||0;
    iMap[s.itemName].gp+=s.grossProfit||0;
    iMap[s.itemName].qty+=s.qty||0;
  });
  var items=Object.entries(iMap).map(function(e){return{name:e[0],sales:e[1].sales,gp:e[1].gp,gpPct:e[1].sales>0?e[1].gp/e[1].sales*100:0};});
  var topMargin=items.sort(function(a,b){return b.gpPct-a.gpPct;}).slice(0,3);
  var lowMargin=items.filter(function(i){return i.gpPct<15&&i.sales>0;}).slice(0,3);
  var expCat={};
  D.expenses.forEach(function(e){expCat[e.category||'Other']=(expCat[e.category||'Other']||0)+e.amount;});
  var topExp=Object.entries(expCat).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
  var creditSales=D.sales.filter(function(s){return s.paymentMode==='credit';}).reduce(function(t,s){return t+(s.totalAmount||0);},0);
  var creditPct=ts>0?creditSales/ts*100:0;

  var reply='<b>📈 How to Increase Profit</b><br>';
  reply+='Current: Sales='+fc(ts)+' | GP='+gpPct.toFixed(1)+'% | NP='+fc(np)+'<br><br>';

  reply+='<b>✅ What you can do — Aap kya kar sakte hain:</b><br><br>';

    reply+=n+++'. <b>High Margin Items zyada bechein</b><br>';
    reply+='Yeh items mein sabse zyada profit hai:<br>';
    topMargin.forEach(function(i){reply+='   • '+esc(i.name)+': '+i.gpPct.toFixed(1)+'% margin — isko promote karein<br>';});
    reply+='<br>';
  }

  // 2. Fix low margin items
  if(lowMargin.length){
    reply+=n+++'. <b>Low Margin Items ka price badhayein</b><br>';
    lowMargin.forEach(function(i){reply+='   • '+esc(i.name)+': sirf '+i.gpPct.toFixed(1)+'% margin — price ya margin badhayein<br>';});
    reply+='<br>';
  }

  // 3. Reduce expenses
  if(topExp.length){
    reply+=n+++'. <b>Biggest expenses control karein</b><br>';
    topExp.forEach(function(e){reply+='   • '+e[0]+': '+fc(e[1])+' — kya isko reduce kar sakte hain?<br>';});
    reply+='<br>';
  }

  // 4. Reduce credit sales
  if(creditPct>30){
    reply+=n+++'. <b>Credit sales kam karein</b> (currently '+creditPct.toFixed(0)+'% credit)<br>';
    reply+='   Cash/UPI sales se cash flow better hota hai. Discount offer karein cash payment pe.<br><br>';
  }

  // 5. Reorder slow items
  reply+=n+++'. <b>Dead stock se chutkara payein</b><br>';
  reply+='   Jo items 90 din se nahi biki — sale price pe bechein, paise release karein.<br><br>';

  reply+=n+++'. <b>Upselling karein</b><br>';
  reply+='   Jab customer kuch kharide — related item bhi suggest karein (e.g. Rice ke saath Dal ya Oil).<br><br>';

  reply+=n+++'. <b>Regular customers ko reward karein</b><br>';
  reply+='   Loyal customers ko special price ya credit — wo zyada kharidenge.<br><br>';

  reply+='<b>🎯 Target:</b> GP% ko '+Math.ceil(gpPct+5)+'% tak le jaayein — NP mein '+fc(ts*(gpPct+5-gpPct)/100)+' ki improvement hogi.';
  return reply;
}

// ── Q5: Predict next month's sales ──────────────────────────
function analyseNextMonthSales(){
  var now=new Date();
  var months=[];
  for(var i=2;i>=0;i--){
    var dt=new Date(); dt.setMonth(dt.getMonth()-i);
    var k=dt.getFullYear()+'-'+(dt.getMonth()<9?'0':'')+(dt.getMonth()+1);

    months.push({key:k,sales:ms,month:dt.toLocaleString('default',{month:'long'})});
  }

  var nextDt=new Date(); nextDt.setMonth(nextDt.getMonth()+1);
  var nextMonth=nextDt.toLocaleString('default',{month:'long',year:'numeric'});

  // Calculate trend
  var validMonths=months.filter(function(m){return m.sales>0;});
  var predicted=0,growth=0,method='';

  if(validMonths.length>=2){
    var last=validMonths[validMonths.length-1].sales;
    var prev=validMonths[validMonths.length-2].sales;
    growth=prev>0?(last-prev)/prev*100:0;
    var avgGrowth=growth;
    if(validMonths.length===3&&validMonths[0].sales>0){
      var g1=(validMonths[1].sales-validMonths[0].sales)/validMonths[0].sales*100;
      avgGrowth=(g1+growth)/2;
    }
    predicted=Math.round(last*(1+avgGrowth/100));
    method='Based on '+validMonths.length+'-month trend (avg growth: '+(avgGrowth>=0?'+':'')+avgGrowth.toFixed(1)+'%/month)';
  } else if(validMonths.length===1){
    predicted=Math.round(validMonths[0].sales*1.1);
    method='Based on current month + 10% growth assumption';
  } else {
    return '📊 <b>Prediction ke liye insufficient data</b><br>Kuch sales entries karein — 2-3 months baad accurate prediction milegi.';
  }

  var pessimistic=Math.round(predicted*0.85);
  var optimistic=Math.round(predicted*1.15);

  var reply='<b>🔮 Sales Prediction — '+nextMonth+'</b><br><br>';
  reply+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">';
  reply+='<div style="background:#FFEBEE;border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:#546E7A">Pessimistic</div><div style="font-size:14px;font-weight:700;color:#C62828">'+fc(pessimistic)+'</div></div>';
  reply+='<div style="background:#E8F5E9;border-radius:8px;padding:10px;text-align:center;border:2px solid #2E7D32"><div style="font-size:9px;color:#546E7A">Expected</div><div style="font-size:16px;font-weight:900;color:#2E7D32">'+fc(predicted)+'</div></div>';
  reply+='<div style="background:#E3F2FD;border-radius:8px;padding:8px;text-align:center"><div style="font-size:9px;color:#546E7A">Optimistic</div><div style="font-size:14px;font-weight:700;color:#1565C0">'+fc(optimistic)+'</div></div>';
  reply+='</div>';

  reply+='<b>📈 Historical Data:</b><br>';
  months.forEach(function(m){
    reply+='• '+m.month+': '+fc(m.sales)+'<br>';
  });
  reply+='• '+nextMonth+' (predicted): <b>'+fc(predicted)+'</b><br><br>';

  reply+='<i style="font-size:10px;color:#90A4AE">'+method+'</i><br><br>';

  reply+='<b>💡 Sales '+nextMonth+' mein badhane ke liye:</b><br>';
  reply+='• Week 1: Low stock items reorder karein<br>';
  reply+='• Week 2: Top customers ko special offers dein<br>';
  reply+='• Week 3: Dead stock clear sale karein<br>';
  reply+='• Week 4: Next month ke liye stock plan karein';

  return reply;
}

// ── Q6: Cash Position ────────────────────────────────────────
function analyseCashPosition(){
  var f=getF();
  var totalCash=f.cb+f.bb;
  var monthlyExp=0,monthlySales=0;
  var now=new Date();
  var currMo=now.getFullYear()+'-'+(now.getMonth()<9?'0':'')+(now.getMonth()+1);
  D.expenses.forEach(function(e){if(e.date&&e.date.indexOf(currMo)===0)monthlyExp+=e.amount||0;});
  D.sales.forEach(function(s){if(s.date&&s.date.indexOf(currMo)===0)monthlySales+=s.totalAmount||0;});
  var overdueDr=0;
  var creditDays2=+(D.settings&&D.settings.creditDays)||30;
  D.debtors.forEach(function(d){
    if(d.amount>0&&d.date){
      var due=new Date(d.date);due.setDate(due.getDate()+creditDays2);
      if(due<now) overdueDr+=d.amount;
    }
  });
  var emiTotal=D.loans.reduce(function(s,l){return s+(l.emi&&l.emi>0?l.emi:0);},0);
  var monthsRunway=monthlyExp>0?totalCash/monthlyExp:999;

  var reply='<b>💰 Cash Position Analysis</b><br><br>';

  reply+='<div style="background:#E8F5E9;border-radius:8px;padding:10px;text-align:center"><div style="font-size:10px;color:#546E7A">Bank Balance</div><div style="font-size:16px;font-weight:700;color:#2E7D32">'+fc(f.bb)+'</div></div>';
  reply+='</div>';
  reply+='<div style="background:'+(totalCash>monthlyExp?'#E8F5E9':'#FFEBEE')+';border-radius:8px;padding:10px;text-align:center;margin-bottom:10px">';
  reply+='<div style="font-size:11px;color:#546E7A">Total Cash + Bank</div>';
  reply+='<div style="font-size:22px;font-weight:900;color:'+(totalCash>monthlyExp?'#2E7D32':'#C62828')+'">'+fc(totalCash)+'</div>';
  reply+='<div style="font-size:10px;color:#546E7A">'+Math.round(monthsRunway*10)/10+' months of expenses can be covered</div>';
  reply+='</div>';

  reply+='<b>📋 This Month Summary:</b><br>';
  reply+='• Sales collected: '+fc(monthlySales)+'<br>';
  reply+='• Expenses paid: '+fc(monthlyExp)+'<br>';
  if(emiTotal>0) reply+='• Monthly EMI: '+fc(emiTotal)+'<br>';
  if(overdueDr>0) reply+='• Overdue to collect: <span style="color:#C62828;font-weight:700">'+fc(overdueDr)+'</span><br>';

  reply+='<b>💡 Cash Flow Improve Karne Ke Upay:</b><br>';
  if(overdueDr>0) reply+='• Turant '+fc(overdueDr)+' overdue collections karein<br>';
  if(f.cb>50000) reply+='• Cash mein zyada rakh rahe hain — bank mein deposit karein (safer + interest)<br>';
  if(monthlyExp>monthlySales*0.8) reply+='• Expenses bahut zyada hain vs sales — control zaruri hai<br>';

// ── Q7: Best selling / profitable items ─────────────────────
function analyseBestItems(){
  var iMap={};
  D.sales.forEach(function(s){
    if(!s.itemName||s.itemId==='__service__') return;
    if(!iMap[s.itemName]) iMap[s.itemName]={name:s.itemName,sales:0,gp:0,qty:0,txns:0};
    iMap[s.itemName].sales+=s.totalAmount||0;
    iMap[s.itemName].gp+=s.grossProfit||0;
    iMap[s.itemName].qty+=s.qty||0;
    iMap[s.itemName].txns++;
  });
  // Service entries
  var svcMap={};
  D.sales.forEach(function(s){
    if(s.itemId!=='__service__') return;
    var svc=s.itemName||'Service';
    if(!svcMap[svc]) svcMap[svc]={name:svc,sales:0,gp:0,cnt:0};
    svcMap[svc].sales+=s.totalAmount||0;
    svcMap[svc].gp+=s.grossProfit||0;
    svcMap[svc].cnt++;
  });

  var items=Object.values(iMap).sort(function(a,b){return b.sales-a.sales;});
  var byProfit=Object.values(iMap).sort(function(a,b){return b.gp-a.gp;});
  var byMargin=Object.values(iMap).filter(function(i){return i.sales>0;}).sort(function(a,b){return b.gp/b.sales-a.gp/a.sales;});
  var svcItems=Object.values(svcMap).sort(function(a,b){return b.sales-a.sales;});

  var reply='<b>🏆 Best Items Analysis</b><br><br>';

  if(items.length){
    reply+='<b>📦 Top 5 by Sales Value:</b><br>';
    items.slice(0,5).forEach(function(i,idx){
      reply+=(idx+1)+'. <b>'+esc(i.name)+'</b> — '+fc(i.sales)+' ('+i.qty+' units, '+i.txns+' sales)<br>';
    });
    reply+='<br>';
    reply+='<b>💰 Most Profitable Items (by Gross Profit):</b><br>';
    byProfit.slice(0,5).forEach(function(i,idx){
      var gpPct=i.sales>0?Math.round(i.gp/i.sales*100):0;
      reply+=(idx+1)+'. <b>'+esc(i.name)+'</b> — Profit: '+fc(i.gp)+' ('+gpPct+'% margin)<br>';
    });
    reply+='<br>';
    if(byMargin.length){
      reply+='<b>📊 Highest Margin % Items:</b><br>';
      byMargin.slice(0,3).forEach(function(i,idx){
        var gpPct=Math.round(i.gp/i.sales*100);
        reply+=(idx+1)+'. '+esc(i.name)+': <b>'+gpPct+'%</b> margin<br>';
      });
      reply+='<br>';
    }
  }

  if(svcItems.length){
    reply+='<b>🔧 Top Services:</b><br>';
    svcItems.slice(0,5).forEach(function(s,idx){
      reply+=(idx+1)+'. '+esc(s.name)+' — '+fc(s.sales)+' ('+s.cnt+' times)<br>';
    });
    reply+='<br>';
  }

  if(!items.length&&!svcItems.length){
    reply='📊 Abhi tak koi sales entry nahi hai. Sales record karne ke baad analysis milegi.';
    return reply;
  }

  reply+='<b>💡 Strategy:</b><br>';
  if(byMargin.length) reply+='• '+esc(byMargin[0].name)+' mein sabse zyada margin hai — isko push karein<br>';
  if(items.length) reply+='• '+esc(items[0].name)+' sabse zyada bikta hai — stock kabhi khatam mat hone dein<br>';
  reply+='• Low margin items pe suppliers se better rates negotiate karein';

  return reply;
}

// ── Q8: Overall Business Health ─────────────────────────────
function analyseBusinessHealth(){
  var f=getF();
  var ts=f.ts,gp=f.gp,np=f.np;
  var gpPct=ts>0?gp/ts*100:0;
  var npPct=ts>0?np/ts*100:0;
  var totalCash=f.cb+f.bb;
  var totalDr=f.dr;
  var loans=f.ltl;
  var cs=f.cs;

  // Score calculation
  var scores=[];
  scores.push({name:'Sales Activity',score:ts>0?Math.min(100,ts/5000):0,weight:20});
  scores.push({name:'Gross Profit %',score:gpPct>=30?100:gpPct>=20?80:gpPct>=10?60:gpPct>0?40:20,weight:25});
  scores.push({name:'Net Profit %',score:npPct>=10?100:npPct>=5?80:npPct>=0?60:npPct>=-5?40:20,weight:25});
  scores.push({name:'Cash Position',score:totalCash>f.te*2?100:totalCash>f.te?80:totalCash>0?60:30,weight:15});
  scores.push({name:'Stock Health',score:cs>0?80:60,weight:15});

  var overall=Math.round(scores.reduce(function(s,sc){return s+sc.score*sc.weight/100;},0));
  var overallColor=overall>=75?'#2E7D32':overall>=50?'#E65100':'#C62828';
  var overallLabel=overall>=75?'🟢 Healthy':overall>=50?'🟡 Needs Attention':'🔴 Needs Urgent Action';

  var reply='<b>🏥 Business Health Summary</b><br><br>';
  reply+='<div style="text-align:center;background:'+(overall>=75?'#E8F5E9':overall>=50?'#FFF3E0':'#FFEBEE')+';border-radius:10px;padding:12px;margin-bottom:10px">';
  reply+='<div style="font-size:36px;font-weight:900;color:'+overallColor+'">'+overall+'%</div>';
  reply+='<div style="font-size:13px;font-weight:700;color:'+overallColor+'">'+(overall>=75?'🟢 Healthy Business':overall>=50?'🟡 Needs Attention':'🔴 Needs Urgent Action')+'</div>';
  reply+='</div>';

  reply+='<b>📊 Key Metrics:</b><br>';
  reply+='• Total Sales: '+fc(ts)+'<br>';
  reply+='• Gross Profit: '+fc(gp)+' ('+gpPct.toFixed(1)+'%)<br>';
  reply+='• Net Profit: <span style="color:'+(np>=0?'#2E7D32':'#C62828')+';font-weight:700">'+fc(np)+' ('+npPct.toFixed(1)+'%)</span><br>';
  reply+='• Cash+Bank: '+fc(totalCash)+'<br>';
  reply+='• Debtors Outstanding: '+fc(totalDr)+'<br>';
  reply+='• Stock Value: '+fc(cs)+'<br>';
  reply+='• Loan Outstanding: '+fc(loans)+'<br><br>';

  // Strengths
  var strengths=[];
  if(gpPct>=25) strengths.push('Good gross margins ('+gpPct.toFixed(1)+'%)');
  if(totalCash>50000) strengths.push('Healthy cash position');
  if(np>0) strengths.push('Business is profitable');
  if(totalDr<ts*0.2) strengths.push('Low credit risk');

  // Issues
  var issues=[];
  if(gpPct<15) issues.push('Gross margin bahut kam hai ('+gpPct.toFixed(1)+'%) — purchase cost ya sale price check karein');
  if(np<0) issues.push('Business mein loss ho raha hai — expenses control karein');
  if(totalCash<10000) issues.push('Cash position weak hai — collections karein');
  if(totalDr>ts*0.3) issues.push('Zyada credit diya hua hai ('+fc(totalDr)+') — collection tez karein');
  if(loans>ts) issues.push('Loan zyada hai vs sales — repayment plan review karein');

  if(strengths.length){
    reply+='<b>✅ Strengths:</b><br>';
    strengths.forEach(function(s){reply+='• '+s+'<br>';});
    reply+='<br>';
  }
  if(issues.length){
    reply+='<b>⚠️ Issues to Fix:</b><br>';
    issues.forEach(function(s){reply+='• '+s+'<br>';});
    reply+='<br>';
  }

  reply+='<b>💡 Top 3 Actions:</b><br>';
  if(issues.length>=1) reply+='1. '+issues[0]+'<br>';
  else reply+='1. Sales aur badhayein — target '+fc(ts*1.2)+'/month<br>';
  reply+='2. Monthly Health Check run karein — 90%+ score target karein<br>';
  reply+='3. Budget set karein (Reports → Budget vs Actual) aur track karein';

  return reply;
}

function askAI(quickQ){
  var input=document.getElementById('ai-input');
  var question=(quickQ||'')+(input?input.value.trim():'');
  if(!question){toast('Please enter a question','e');return;}
  if(input) input.value='';

  // Build business context from actual data
  var f=getF();
  var ts=D.sales.reduce(function(s,x){return s+(x.totalAmount||0);},0);
  var tp=D.purchases.reduce(function(s,x){return s+(x.amount||0);},0);
  var te=D.expenses.reduce(function(s,x){return s+(x.amount||0);},0);
  var cs=D.inventory.reduce(function(s,x){return s+((x.currentStock||0)*(x.avgCost||0))+((x.importedStock||0)*(x.importedAvgCost||0));},0);
  var np=ts-tp+cs-te;

  // Top items by sales
  var iMap={};
  D.sales.forEach(function(s){if(s.itemName){if(!iMap[s.itemName])iMap[s.itemName]={sales:0,profit:0,qty:0};iMap[s.itemName].sales+=s.totalAmount||0;iMap[s.itemName].profit+=s.grossProfit||0;iMap[s.itemName].qty+=s.qty||0;}});
  var topItems=Object.entries(iMap).sort(function(a,b){return b[1].sales-a[1].sales;}).slice(0,5).map(function(e){return e[0]+': Sales='+Math.round(e[1].sales)+', GP='+Math.round(e[1].profit);}).join('; ');

  // Overdue debtors
  var creditDays2=+(D.settings&&D.settings.creditDays)||30;
  var overdueCount=0,overdueAmt=0;
  D.debtors.forEach(function(d){
    if(d.amount>0&&d.date){var due=new Date(d.date);due.setDate(due.getDate()+creditDays2);if(due<new Date()){overdueCount++;overdueAmt+=d.amount;}}
  });

  // Low stock items
  var lowStockItems=D.inventory.filter(function(inv){
    var tot=(inv.currentStock||0)+(inv.importedStock||0);
    return inv.reorderLevel&&tot<=inv.reorderLevel;
  }).map(function(inv){return inv.itemName+' ('+((inv.currentStock||0)+(inv.importedStock||0))+' '+inv.unit+')';}).join(', ');

  // Monthly trend (last 3 months)
  var now3=new Date();
  var moTrend=[];
  for(var mi3=2;mi3>=0;mi3--){
    var d3=new Date();d3.setMonth(d3.getMonth()-mi3);
    var k3=d3.getFullYear()+'-'+(d3.getMonth()<9?'0':'')+(d3.getMonth()+1);
    var ms3=0;D.sales.forEach(function(s){if(s.date&&s.date.indexOf(k3)===0)ms3+=s.totalAmount||0;});
    moTrend.push(d3.toLocaleString('default',{month:'short'})+':'+Math.round(ms3));
  }

  var systemPrompt='You are a friendly, practical business advisor for Indian MSME businesses. '+
    'You have access to the following REAL data from '+esc(D.profile.businessName||'this business')+':\n\n'+
    'Business: '+esc(D.profile.businessName)+' | Type: '+esc(D.profile.businessType)+' | Constitution: '+esc(D.profile.constitution)+'\n'+
    'Financial Summary:\n'+
    '- Total Sales: Rs.'+Math.round(ts)+'\n'+
    '- Total Purchases: Rs.'+Math.round(tp)+'\n'+
    '- Total Expenses: Rs.'+Math.round(te)+'\n'+
    '- Closing Stock Value: Rs.'+Math.round(cs)+'\n'+
    '- Net Profit: Rs.'+Math.round(np)+' ('+(ts>0?Math.round(np/ts*100):0)+'%)\n'+
    '- Cash in Hand: Rs.'+Math.round(f.cb)+'\n'+
    '- Bank Balance: Rs.'+Math.round(f.bb)+'\n'+
    '- Total Debtors: Rs.'+Math.round(f.dr)+'\n'+
    '- Total Creditors: Rs.'+Math.round(f.cr)+'\n'+
    '- Loan Outstanding: Rs.'+Math.round(f.ltl)+'\n'+
    'Top 5 Items by Sales: '+topItems+'\n'+
    'Overdue Collections: '+overdueCount+' customers, Rs.'+Math.round(overdueAmt)+'\n'+
    'Low/Out of Stock: '+(lowStockItems||'None')+'\n'+
    'Monthly Sales Trend: '+moTrend.join(' → ')+'\n\n'+
    'Give practical, specific advice in simple English and Hindi mixed (Hinglish is fine). '+
    'Be concise — max 150 words. Give numbered actionable steps where possible. '+
    'Address the user as "aap" respectfully. Use Rs. for amounts.';

  // Add user message to history
  _aiHistory.push({role:'user',content:question});
  renderPage();

  // Scroll chat to bottom
  setTimeout(function(){var chat=document.getElementById('ai-chat');if(chat)chat.scrollTop=chat.scrollHeight;},100);

  // Show typing indicator
  _aiHistory.push({role:'assistant',content:'<i style="color:#90A4AE">Thinking... ⏳</i>'});
  renderPage();
  setTimeout(function(){var chat=document.getElementById('ai-chat');if(chat)chat.scrollTop=chat.scrollHeight;},100);

  // Build messages for API
  var msgs=[{role:'user',content:question}];
  if(_aiHistory.length>3){
    // Include last few exchanges for context
    var hist=_aiHistory.slice(-6,-2).filter(function(m){return m.content.indexOf('Thinking')<0;});
    msgs=hist.concat([{role:'user',content:question}]);
  }

  // Get proxy URL from settings
  var proxyUrl=(D.settings&&D.settings.aiProxyUrl)||'';
  if(!proxyUrl){
    // Use Smart Offline AI — works without internet!
    _aiHistory=_aiHistory.filter(function(m){return m.content.indexOf('Thinking')<0;});
    _aiHistory.push({role:'assistant',content:smartAIAnswer(question)});
    renderPage();
    setTimeout(function(){var chat=document.getElementById('ai-chat');if(chat)chat.scrollTop=chat.scrollHeight;},100);
    return;
  }
  var endpoint=proxyUrl.replace(/\/+$/,'')+'/api/chat';
  fetch(endpoint,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:400,
      system:systemPrompt,
      messages:msgs
    })
  }).then(function(res){return res.json();})
  .then(function(data){
    var reply='Sorry, could not get response. Please try again.';
    if(data&&data.content&&data.content[0]&&data.content[0].text){
      reply=data.content[0].text;
    } else if(data&&data.error){
      reply='❌ Error: '+data.error.message+'<br><small>Check your proxy URL in Data → AI Advisor Settings</small>';
    }
    _aiHistory=_aiHistory.filter(function(m){return m.content.indexOf('Thinking')<0;});
    _aiHistory.push({role:'assistant',content:reply.replace(/\n/g,'<br>')});
    renderPage();
    setTimeout(function(){var chat=document.getElementById('ai-chat');if(chat)chat.scrollTop=chat.scrollHeight;},100);
  })
  .catch(function(err){
    _aiHistory=_aiHistory.filter(function(m){return m.content.indexOf('Thinking')<0;});
    _aiHistory.push({role:'assistant',content:'❌ Connection failed.<br>Check: 1) Internet connection 2) Proxy URL in Data → AI Advisor Settings<br><small>'+err.message+'</small>'});
    renderPage();
  });
}

function pgDash(){
  var f=getF(),i,j,td2=td();
  var now=new Date();
  var todayStr=td2;
  // Week start (Monday)
  var wkStart=new Date(now); wkStart.setDate(now.getDate()-((now.getDay()+6)%7)); wkStart.setHours(0,0,0,0);
  var wkStartStr=wkStart.toISOString().slice(0,10);
  // Month
  var moStr=now.getFullYear()+'-'+(now.getMonth()<9?'0':'')+(now.getMonth()+1);
  // Year (financial year Apr-Mar)
  var fyYear=now.getMonth()>=3?now.getFullYear():now.getFullYear()-1;
  var fyStart=fyYear+'-04-01';

  // ── Sales aggregation ──
  var todaySales=0,weekSales=0,monthSales=0,yearSales=0;
  var todayPurch=0,todayExp=0;
  var itemSalesMap={};  // for top-10
  var itemProfitMap={}; // for top-10 profitable
  for(i=0;i<D.sales.length;i++){
    var s=D.sales[i];
    var amt=s.totalAmount||0, gp=s.grossProfit||0;
    if(s.date===todayStr){todaySales+=amt;}
    if(s.date>=wkStartStr&&s.date<=todayStr) weekSales+=amt;
    if(s.date&&s.date.indexOf(moStr)===0) monthSales+=amt;
    if(s.date>=fyStart) yearSales+=amt;
    // Item aggregation
    var iname=s.itemName||'Other';
    if(!itemSalesMap[iname]) itemSalesMap[iname]={name:iname,sales:0,profit:0,qty:0};
    itemSalesMap[iname].sales+=amt;
    itemSalesMap[iname].profit+=gp;
    itemSalesMap[iname].qty+=(s.qty||0);
  }
  for(i=0;i<D.purchases.length;i++) if(D.purchases[i].date===todayStr) todayPurch+=D.purchases[i].amount;
  for(i=0;i<D.expenses.length;i++) if(D.expenses[i].date===todayStr) todayExp+=D.expenses[i].amount;

  // ── Cash position ──
  var cashPos=f.cb; // today's cash from getF()
  var bankPos=f.bb;

  // ── Low stock alerts ──
  var lowStock=[],outStock=[],nearStock=[];
  for(i=0;i<D.inventory.length;i++){
    var inv=D.inventory[i];
    var totStk=(inv.currentStock||0)+(inv.importedStock||0);
    if(totStk===0&&inv.avgCost>0) outStock.push(inv);
    else if(inv.reorderLevel&&totStk<=inv.reorderLevel) lowStock.push({item:inv,pct:totStk/inv.reorderLevel});
    else if(inv.reorderLevel&&totStk<=inv.reorderLevel*1.5) nearStock.push(inv);
  }

  // ── Today's pending work ──
  var creditDays=+(D.settings&&D.settings.creditDays)||30;
  var overdueDebtors=[],dueSoonDebtors=[];
  var dMap={};
  (D.debtors||[]).forEach(function(d){if(d.amount>0&&d.date){if(!dMap[d.name]||d.date<dMap[d.name].date)dMap[d.name]=d;}});
  Object.values(dMap).forEach(function(d){
    if(d.amount<=0)return;
    var due=new Date(d.date);due.setDate(due.getDate()+creditDays);
    var dueStr=due.toISOString().slice(0,10);
    var daysLeft=Math.round((due-new Date())/(86400000));
    if(daysLeft<0) overdueDebtors.push({name:d.name,amount:d.amount,days:-daysLeft});
    else if(daysLeft<=3) dueSoonDebtors.push({name:d.name,amount:d.amount,days:daysLeft});
  });
  var emiDue=[];
  (D.loans||[]).forEach(function(l){
    if(!l.outstandingBalance||l.outstandingBalance<=0||!l.emi) return;
    var ltype=l.loanType||'';
    if(ltype.indexOf('CC')>=0||ltype.indexOf('Cash Credit')>=0) return;
    var pays=l.payments||[];
    var lastStr=pays.length>0?pays.reduce(function(a,b){return a.date>b.date?a:b;}).date:(l.lastInterestDate||l.sanctionDate||'');
    if(!lastStr) return;
    var nextDue=new Date(lastStr);nextDue.setMonth(nextDue.getMonth()+1);
    var daysLeft=Math.round((nextDue-new Date())/(86400000));
    if(daysLeft<=5) emiDue.push({lender:l.lender,emi:l.emi,daysLeft:daysLeft});
  });

  // ── Monthly trend (last 6 months) ──
  var mo=[],k2,ms2,me2,d2,lb2;
  for(i=5;i>=0;i--){
    d2=new Date();d2.setMonth(d2.getMonth()-i);
    k2=d2.getFullYear()+'-'+(d2.getMonth()<9?'0':'')+(d2.getMonth()+1);
    lb2=d2.toLocaleString('default',{month:'short'});
    ms2=0;me2=0;
    for(j=0;j<D.sales.length;j++) if(D.sales[j].date&&D.sales[j].date.indexOf(k2)===0) ms2+=D.sales[j].totalAmount;
    for(j=0;j<D.expenses.length;j++) if(D.expenses[j].date&&D.expenses[j].date.indexOf(k2)===0) me2+=D.expenses[j].amount;
    mo.push({l:lb2,s:ms2,e:me2});
  }

  // ── Top 10 selling items ──
  var topSales=Object.values(itemSalesMap).sort(function(a,b){return b.sales-a.sales;}).slice(0,10);
  var topProfit=Object.values(itemSalesMap).sort(function(a,b){return b.profit-a.profit;}).slice(0,10);
  var maxSale=topSales.length?topSales[0].sales:1;
  var maxProfit=topProfit.length?Math.max(topProfit[0].profit,1):1;

  var h='';

  // ── Business header ──
  if(D.profile.businessName){
    h+='<div style="background:linear-gradient(135deg,#1565C0,#0D47A1);color:#fff;border-radius:12px;padding:12px 14px;margin-bottom:10px">'+
      '<div style="font-size:16px;font-weight:800">'+esc(D.profile.businessName)+'</div>'+
      '<div style="font-size:11px;opacity:.85">'+esc(D.profile.ownerName)+' • '+esc(D.profile.businessType)+(D.profile.natureOfBusiness?' • '+D.profile.natureOfBusiness:'')+
        ' • FY'+now.getFullYear()+'</div>'+
    '</div>';
  }

  // ── TODAY'S WORK PENDING ──
  var pendingItems=overdueDebtors.length+dueSoonDebtors.length+emiDue.length+outStock.length+lowStock.length;
  if(pendingItems>0){
    h+='<div style="background:#FFF3E0;border-left:4px solid #E65100;border-radius:8px;padding:10px 12px;margin-bottom:10px">';
    h+='<div style="font-size:13px;font-weight:800;color:#E65100;margin-bottom:6px">📋 Today\'s Pending Work ('+pendingItems+')</div>';
    if(overdueDebtors.length){
      h+='<div style="font-size:11px;font-weight:700;color:#C62828;margin-bottom:3px">🔴 Overdue Collections:</div>';
      overdueDebtors.slice(0,3).forEach(function(d){h+='<div style="font-size:11px;color:#37474F;margin-left:8px">• '+esc(d.name)+': '+fc(d.amount)+' ('+d.days+' days overdue) <button onclick="go(\'reminders\')" style="font-size:9px;padding:1px 6px;background:#C62828;color:#fff;border:none;border-radius:4px;cursor:pointer">Remind</button></div>';});
      if(overdueDebtors.length>3) h+='<div style="font-size:10px;color:#C62828;margin-left:8px">+ '+(overdueDebtors.length-3)+' more overdue</div>';
    }
    if(dueSoonDebtors.length){
      h+='<div style="font-size:11px;font-weight:700;color:#E65100;margin-top:4px;margin-bottom:3px">🟡 Due in 3 days:</div>';
      dueSoonDebtors.forEach(function(d){h+='<div style="font-size:11px;color:#37474F;margin-left:8px">• '+esc(d.name)+': '+fc(d.amount)+' ('+d.days+' days left)</div>';});
    }
    if(emiDue.length){
      h+='<div style="font-size:11px;font-weight:700;color:#1565C0;margin-top:4px;margin-bottom:3px">🏦 EMI Due:</div>';
      emiDue.forEach(function(l){h+='<div style="font-size:11px;color:#37474F;margin-left:8px">• '+esc(l.lender)+': '+fc(l.emi)+(l.daysLeft<0?' OVERDUE':' in '+l.daysLeft+' days')+'</div>';});
    }
    if(outStock.length){
      h+='<div style="font-size:11px;font-weight:700;color:#C62828;margin-top:4px;margin-bottom:3px">🚫 Out of Stock:</div>';
      outStock.slice(0,3).forEach(function(inv){h+='<div style="font-size:11px;color:#37474F;margin-left:8px">• '+esc(inv.itemName)+'</div>';});
    }
    if(lowStock.length){
      h+='<div style="font-size:11px;font-weight:700;color:#E65100;margin-top:4px;margin-bottom:3px">⚠️ Low Stock - Reorder:</div>';
      lowStock.slice(0,3).forEach(function(l){h+='<div style="font-size:11px;color:#37474F;margin-left:8px">• '+esc(l.item.itemName)+': '+fmt((l.item.currentStock||0)+(l.item.importedStock||0))+' '+esc(l.item.unit)+' (reorder at '+l.item.reorderLevel+')</div>';});
    }
    h+='</div>';
  }

  // ── SALES SUMMARY CARDS ──
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">';
  h+=salesCard('Today','📅',todaySales,'#1565C0');
  h+=salesCard('This Week','📆',weekSales,'#2E7D32');
  h+=salesCard('This Month','🗓️',monthSales,'#E65100');
  h+=salesCard('This Year','📊',yearSales,'#6A1B9A');
  h+='</div>';

  // ── DAILY CASH POSITION ──
  h+='<div style="background:#E3F2FD;border-radius:10px;padding:10px 14px;margin-bottom:10px">';
  h+='<div style="font-size:12px;font-weight:700;color:#1565C0;margin-bottom:6px">💰 Daily Cash Position</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">';
  h+='<div style="text-align:center"><div style="font-size:9px;color:#546E7A">Cash in Hand</div><div style="font-size:14px;font-weight:700;color:#1565C0">'+fc(cashPos)+'</div></div>';
  h+='<div style="text-align:center"><div style="font-size:9px;color:#546E7A">Bank Balance</div><div style="font-size:14px;font-weight:700;color:#2E7D32">'+fc(bankPos)+'</div></div>';
  h+='<div style="text-align:center"><div style="font-size:9px;color:#546E7A">Total Cash+Bank</div><div style="font-size:15px;font-weight:800;color:#1565C0">'+fc(cashPos+bankPos)+'</div></div>';
  h+='</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px;border-top:1px solid #BBDEFB;padding-top:6px">';
  h+='<div style="text-align:center"><div style="font-size:9px;color:#546E7A">Today Sales</div><div style="font-size:12px;font-weight:700;color:#2E7D32">+'+fc(todaySales)+'</div></div>';
  h+='<div style="text-align:center"><div style="font-size:9px;color:#546E7A">Today Purchase</div><div style="font-size:12px;font-weight:700;color:#E65100">-'+fc(todayPurch)+'</div></div>';
  h+='<div style="text-align:center"><div style="font-size:9px;color:#546E7A">Today Expenses</div><div style="font-size:12px;font-weight:700;color:#C62828">-'+fc(todayExp)+'</div></div>';
  h+='</div></div>';

  // ── KEY METRICS ──
  h+='<div class="sg" style="margin-bottom:10px">';
  h+=sc('Net Profit',fc(f.np),f.np>=0?'#2E7D32':'#C62828',f.ts>0?((f.np/f.ts)*100).toFixed(1)+'% NP':'');
  h+=sc('Stock Value',fc(f.cs),'#FF8F00','');
  h+=sc('Debtors',fc(f.dr),'#00897B','Receivable');
  h+=sc('Creditors',fc(f.cr),'#D84315','Payable');
  h+=sc('Loan Outstanding',fc(f.ltl),'#7B1FA2','');
  h+=sc('Gross Profit',fc(f.gp),f.gp>=0?'#2E7D32':'#C62828',f.ts>0?((f.gp/f.ts)*100).toFixed(1)+'% GP':'');
  h+='</div>';

  // ── LOW STOCK ALERTS ──
  if(outStock.length||lowStock.length||nearStock.length){
    h+='<div style="margin-bottom:10px">';
    h+='<div style="font-size:12px;font-weight:700;color:#37474F;margin-bottom:6px">📦 Stock Alerts</div>';
    outStock.forEach(function(inv){
      h+='<div style="background:#FFEBEE;border-left:4px solid #C62828;border-radius:6px;padding:7px 10px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center">'+
        '<div><div style="font-size:12px;font-weight:700;color:#C62828">🚫 '+esc(inv.itemName)+'</div><div style="font-size:10px;color:#546E7A">OUT OF STOCK — Reorder immediately!</div></div>'+
        '<button onclick="go(\'purchase\')" style="padding:4px 8px;background:#C62828;color:#fff;border:none;border-radius:6px;font-size:10px;cursor:pointer">Buy Now</button>'+
      '</div>';
    });
    lowStock.forEach(function(l){
      var totStk=(l.item.currentStock||0)+(l.item.importedStock||0);
      var pct=Math.round(totStk/l.item.reorderLevel*100);
      h+='<div style="background:#FFF3E0;border-left:4px solid #E65100;border-radius:6px;padding:7px 10px;margin-bottom:4px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center">'+
          '<div><div style="font-size:12px;font-weight:700;color:#E65100">⚠️ '+esc(l.item.itemName)+'</div>'+
          '<div style="font-size:10px;color:#546E7A">Stock: '+fmt(totStk)+' '+esc(l.item.unit)+' | Reorder at: '+l.item.reorderLevel+'</div></div>'+
          '<button onclick="go(\'purchase\')" style="padding:4px 8px;background:#E65100;color:#fff;border:none;border-radius:6px;font-size:10px;cursor:pointer">Reorder</button>'+
        '</div>'+
        '<div style="background:#E0E0E0;height:4px;border-radius:2px;margin-top:4px">'+
          '<div style="background:#E65100;height:4px;border-radius:2px;width:'+Math.min(pct,100)+'%"></div>'+
        '</div>'+
        '<div style="font-size:9px;color:#E65100;margin-top:2px">'+pct+'% of reorder level</div>'+
      '</div>';
    });
    nearStock.forEach(function(inv){
      var totStk=(inv.currentStock||0)+(inv.importedStock||0);
      h+='<div style="background:#FFFDE7;border-left:4px solid #F9A825;border-radius:6px;padding:6px 10px;margin-bottom:4px">'+
        '<div style="font-size:11px;font-weight:700;color:#F9A825">🟡 '+esc(inv.itemName)+': '+fmt(totStk)+' '+esc(inv.unit)+' (near reorder)</div>'+
      '</div>';
    });
    h+='</div>';
  }

  // ── TOP 10 SELLING ITEMS ──
  if(topSales.length){
    h+='<div style="margin-bottom:10px">';
    h+='<div style="font-size:12px;font-weight:700;color:#37474F;margin-bottom:6px">🏆 Top Selling Items</div>';
    topSales.forEach(function(it,idx){
      var pct=Math.round(it.sales/maxSale*100);
      h+='<div style="margin-bottom:5px">'+
        '<div style="display:flex;justify-content:space-between;font-size:11px">'+
          '<span><b style="color:#1565C0">'+(idx+1)+'.</b> '+esc(it.name)+'</span>'+
          '<span style="font-weight:700">'+fc(it.sales)+'</span>'+
        '</div>'+
        '<div style="background:#E3F2FD;height:6px;border-radius:3px;margin-top:2px">'+
          '<div style="background:linear-gradient(90deg,#1565C0,#42A5F5);height:6px;border-radius:3px;width:'+pct+'%"></div>'+
        '</div>'+
      '</div>';
    });
    h+='</div>';
  }

  // ── TOP 10 PROFITABLE ITEMS ──
  if(topProfit.length&&topProfit[0].profit>0){
    h+='<div style="margin-bottom:10px">';
    h+='<div style="font-size:12px;font-weight:700;color:#37474F;margin-bottom:6px">💰 Most Profitable Items</div>';
    topProfit.filter(function(it){return it.profit>0;}).forEach(function(it,idx){
      var pct=Math.round(it.profit/maxProfit*100);
      var gpPct=it.sales>0?Math.round(it.profit/it.sales*100):0;
      h+='<div style="margin-bottom:5px">'+
        '<div style="display:flex;justify-content:space-between;font-size:11px">'+
          '<span><b style="color:#2E7D32">'+(idx+1)+'.</b> '+esc(it.name)+'</span>'+
          '<span style="font-weight:700;color:#2E7D32">'+fc(it.profit)+' <span style="font-size:9px;font-weight:400">('+gpPct+'%)</span></span>'+
        '</div>'+
        '<div style="background:#E8F5E9;height:6px;border-radius:3px;margin-top:2px">'+
          '<div style="background:linear-gradient(90deg,#2E7D32,#66BB6A);height:6px;border-radius:3px;width:'+pct+'%"></div>'+
        '</div>'+
      '</div>';
    });
    h+='</div>';
  }

  // ── MONTHLY TREND CHART ──
  var maxMoSales=Math.max.apply(null,mo.map(function(m){return m.s;}));
  var maxMoExp=Math.max.apply(null,mo.map(function(m){return m.e;}));
  var maxMo=Math.max(maxMoSales,maxMoExp,1);
  h+='<div style="background:#fff;border-radius:10px;border:1px solid #E0E0E0;padding:10px;margin-bottom:10px">';
  h+='<div style="font-size:12px;font-weight:700;color:#37474F;margin-bottom:8px">📈 Monthly Trend (Last 6 Months)</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px;align-items:end;height:80px">';
  mo.forEach(function(m){
    var sh=m.s>0?Math.max(Math.round(m.s/maxMo*70),4):2;
    var eh=m.e>0?Math.max(Math.round(m.e/maxMo*70),4):2;

function toggleOpeningLock(lock){
  D.profile.openingDateLocked = lock;

function handleLogoUpload(input){
  var file = input.files[0];
  if(!file) return;
  if(file.size > 500000){ toast('Logo too large — please use an image under 500KB','e'); return; }
  var reader = new FileReader();
  reader.onload = function(e){
    D.profile.businessLogo = e.target.result;
    sv();
    toast('✅ Logo uploaded');
    renderPage();
  };
  reader.readAsDataURL(file);
}
function removeLogo(){
  D.profile.businessLogo = '';
  sv();
  toast('Logo removed');
  renderPage();
}

function saveProf(){
  try{
    var mobExtEl=document.getElementById('p_mobext');
    var ext = mobExtEl ? mobExtEl.checked : false;
    var mobile=gv('p_mob');
    if(!ext && mobile && mobile.length!==10){toast('Mobile number must be 10 digits, or check "Allow longer number"','e');return;}
    var existingPartners = (D.profile && Array.isArray(D.profile.partners)) ? D.profile.partners : [];
    var newStage=gv('p_stage')||'new';
    var oldStage=D.profile.businessStage||'existing';
    var hasTB=D.tbPosted||(D.trialBalance&&D.trialBalance.length>0);
    var doSaveProfile=function(){
      var oldLogo=D.profile.businessLogo||'';
      var oldLock=D.profile.openingDateLocked||false;
      D.profile={businessName:gv('p_bn'),ownerName:gv('p_on'),mobile:mobile,mobileExtended:ext,address:gv('p_addr'),businessType:BIZ_TYPE,businessStage:newStage,constitution:gv('p_const'),commencementDate:gv('p_cd'),udyam:gv('p_ud'),gst:gv('p_gst'),pan:gv('p_pan'),tan:gv('p_tan'),shopLicenseNo:gv('p_shoplic')||'',fssaiNo:gv('p_fssai')||'',email:gv('p_email')||'',natureOfBusiness:gv('p_nature')||'retail',defaultBankAccount:gv('p_defbank')||'',defaultPaymentMode:gv('p_defpay')||'cash',businessLogo:oldLogo,openingDateLocked:oldLock,partners:existingPartners};
      // If switching to new business, clear TB opening data
      if(newStage==='new' && oldStage!=='new' && hasTB){
        D.trialBalance=[];D.tbPosted=false;D.tbPostedOn=null;
        D.opening={cash:0,bank:0,stock:0,debtors:0,creditors:0,capital:0,takenOn:null};
        D.fixedAssets=(D.fixedAssets||[]).filter(function(f){return !f.fromTB;});
        D.loans=(D.loans||[]).filter(function(l){return !l.fromTB;});
        D.debtors=(D.debtors||[]).filter(function(d){return !d.fromTB;});
        D.creditors=(D.creditors||[]).filter(function(c){return !c.fromTB;});
        D.inventory=(D.inventory||[]).filter(function(i){return !i.fromTB;});
        D.otherAssets=(D.fixedAssets||[]).reduce(function(s,f){return s+(+f.cost||0);},0);
        toast('Profile saved. Opening balances cleared for New Business. 🌱');
      } else { toast('Saved!'); }
      sv();renderPage();
    };
    if(newStage==='new' && oldStage!=='new' && hasTB){
      confirmDialog('⚠️ Switching to New Business will clear all Opening Trial Balance data.\n\nYour transactions (sales, purchases, expenses) will be kept.\n\nProceed?', doSaveProfile);
    } else { doSaveProfile(); }
  }catch(e){
    toast('Could not save profile: '+e.message,'e');
  }
}

function calcLEMI(){
  var p=gvn('l_a'),r=gvn('l_r'),n=gvn('l_t');
  var el=document.getElementById('lemip');
  if(!el)return;
  if(!p||!n){el.innerHTML='<div class="al alw">Enter Loan Amount and Tenure to calculate EMI.</div>';return;}
  var e=calcEMI(p,r,n);
  el.innerHTML='<div class="al als"><b>EMI: '+fc(e)+'</b>'+(r?' | Total Interest (approx): '+fc(e*n-p):'')+'</div>';
}

// ===== DRAWINGS (Owner withdrawals from Capital) =====
// A dedicated entry for the owner withdrawing money from the business for personal use.
// This debits (reduces) Owner's Capital on the Balance Sheet and credits Cash/Bank/CC/OD/UPI
// by the withdrawn amount, via the same cashbook mechanism used elsewhere.
function drawingModeSel(id,val){
  var opts=[{v:'cash',l:'Cash in Hand'}];
  var accts = D.bankAccounts && D.bankAccounts.length ? D.bankAccounts : [{id:'acc1',name:'Bank Account 1'}];
  for(var i=0;i<accts.length;i++) opts.push({v:'bank:'+accts[i].id,l:'Bank - '+accts[i].name+(accts[i].accountNumber?' (A/c '+accts[i].accountNumber+')':'')});
  ['cc','od'].forEach(function(type){
    var label = type==='cc' ? 'Cash Credit (CC)' : 'Overdraft (OD)';

function saveCap(){
  if(!requireTBPosted()) return;
  var partners = D.profile.partners||[];
  var constitution = D.profile.constitution||'Individual';
  var isMultiOwner = constitution!=='Individual' && constitution!=='Sole Proprietorship' && constitution!=='';
  var mode = gv('c_mode');
  var delta = 0;
  var capPartnerId = gv('c_partner')||'';
  var capPartnerName = '';

  if(isMultiOwner && partners.length>0){
    // NEW explicit flow: c_new = amount being added right now (not a running total)
    delta = gvn('c_new');
    if(delta===0){ toast('Enter the amount to add','e'); return; }
    if(!capPartnerId){ toast('Please select which partner/director/member is introducing this capital','e'); return; }
    if(capPartnerId){
      var cpp=(D.profile.partners||[]).find(function(p){return p.id===capPartnerId;});
      if(cpp) capPartnerName=cpp.name;
      if(!D.capital.partnerCapital) D.capital.partnerCapital={};
      D.capital.partnerCapital[capPartnerId] = (D.capital.partnerCapital[capPartnerId]||0) + delta;
    }
    if(delta>0 && mode!=='none'){
      postCB(mode,'receipt',delta,capPartnerName||'Owner','Capital Introduced'+(capPartnerName?' by '+capPartnerName:''),td());
    } else if(delta<0 && mode!=='none'){
      postCB(mode,'payment',-delta,capPartnerName||'Owner','Capital Reduced'+(capPartnerName?' by '+capPartnerName:''),td());
    }
    D.capital.initialCapital = (D.capital.initialCapital||0) + (delta>0?delta:0);
    if(delta<0) D.capital.additionalCapital = (D.capital.additionalCapital||0) + delta;
  } else {
    // Original flow for Individual/Sole Proprietorship - unchanged
    var oldInit = D.capital.initialCapital||0;
    var oldAdd = D.capital.additionalCapital||0;
    var newInit = gvn('c_i');
    var newAdd = gvn('c_a');
    var deltaInit = newInit - oldInit;
    var deltaAdd = newAdd - oldAdd;
    delta = deltaInit + deltaAdd;
    if(delta>0 && mode!=='none'){
      var label = deltaInit>0 && deltaAdd>0 ? 'Initial + Additional Capital Introduced' : (deltaInit>0 ? 'Initial Capital Introduced' : 'Additional Capital Introduced');
      postCB(mode,'receipt',delta,'Owner',label,td());
    } else if(delta<0 && mode!=='none'){
      postCB(mode,'payment',-delta,'Owner','Capital Reduced / Drawings',td());
    }
    D.capital.initialCapital = newInit;
    D.capital.additionalCapital = newAdd;
  }

  sv();renderPage();toast('Capital saved'+(capPartnerName?' for '+capPartnerName:'')+'!');
}

// Remove a loan record entirely. Use this to correct mistakes (e.g. a loan entered
// as fully disbursed when it was actually sanctioned-but-undrawn) - then re-add it
// correctly via "+ Add Loan". Any related interest/repayment expense entries already
// posted are NOT reversed automatically; review Reports if needed.
// Returns true if a drawing entry's mode ('cc'/'od'/'cc:<id>'/'od:<id>') refers to the given loan account.
function ccodDrawingMatchesLoan(d, loan){
  var type = loan.loanType==='Cash Credit (CC)' ? 'cc' : 'od';
  if(d.mode===type+':'+loan.id) return true;
  if(d.mode===type){
    // Legacy plain 'cc'/'od': only matches if this is the SOLE account of that type
    // (i.e. it was unambiguous at the time it was recorded).
    return findCCODAccounts(type).length===1 && findCCODAccounts(type)[0].id===loan.id;
  }
  return false;
}
function deleteLoan(id){
  var loan=null; for(var i=0;i<D.loans.length;i++) if(D.loans[i].id===id) loan=D.loans[i];
  if(!loan){toast('Loan not found','e');return;}
  var hasPayments = (loan.payments||[]).length>0;
  var isCcOd = isCcOdLoan(loan);
  var ccOdDrawingsCount = isCcOd ? (D.drawings||[]).filter(function(d){return ccodDrawingMatchesLoan(d,loan);}).length : 0;
  var msg = 'Remove this loan record ('+loan.bankName+', '+loan.loanType+')? '+
    'This will also remove all related entries: the original disbursement/drawdown'+
    (hasPayments?', all '+(loan.payments||[]).length+' repayment(s) and any associated interest expense entries':'')+
    (ccOdDrawingsCount>0?', and '+ccOdDrawingsCount+' Drawings entry/entries recorded against this account (Owner Capital will be restored)':'')+
    ', restoring your Cash/Bank balances and the Balance Sheet to what they would be if this loan had never been added. This cannot be undone.';
  confirmDialog(msg, function(){
    var party = loan.bankName, lt = loan.loanType;
    if(isCcOd){
      // CC/OD: remove every cashbook entry tagged with this loan's id (drawings and repayments)
      D.cashBook = D.cashBook.filter(function(x){ return x.loanId!==loan.id; });
      // Any "Drawings" entries recorded against this CC/OD account (mode 'cc'/'od') also need
      // their effect on Owner's Capital reversed, since the CC/OD liability they were drawn
      // against no longer exists.
      var ccOdMode = loan.loanType==='Cash Credit (CC)' ? 'cc' : 'od';
      var keptDrawings=[];
      (D.drawings||[]).forEach(function(d){
        if(ccodDrawingMatchesLoan(d,loan)){
          D.capital.additionalCapital = (D.capital.additionalCapital||0) + d.amount;
        } else {
          keptDrawings.push(d);
        }
      });
      D.drawings = keptDrawings;
    } else {
      // Term/other loans: remove disbursement, drawdown, and repayment cashbook entries by
      // matching party + description (the same pattern used elsewhere to link entries to loans,
      // since these entries do not carry a loanId).
      var descsToRemove = [
        'Loan Disbursed / CC-OD Drawn - '+lt,
        'Loan Drawdown - '+lt,
        'Loan Repayment - '+lt
      ];
      D.cashBook = D.cashBook.filter(function(x){
        if(x.party!==party) return true;
        return descsToRemove.indexOf(x.description)<0;
      });
      // Remove interest expense entries recorded against this loan's repayments
      var interestRemark = 'Interest on '+party+' loan';
      D.expenses = D.expenses.filter(function(e){
        return !(e.category==='Interest Payment' && e.remarks===interestRemark);
      });
    }
    D.loans = D.loans.filter(function(l){return l.id!==id;});
    sv();renderPage();toast('Loan and all related entries removed.');
  });
}
function addLoan(){
  var b=gv('l_b'),a=gvn('l_a'),lt=gv('l_type');
  if(!b){toast('Enter Lender Name','e');return;}
  var isCcOd = (lt==='Cash Credit (CC)' || lt==='Overdraft (OD)');
  if(!isCcOd && !a){toast('Enter Loan Amount','e');return;}
  var acctnum=gv('l_acctnum').trim();
  if(!acctnum){toast('Enter the Loan/CC/OD Account Number','e');return;}
  var r=gvn('l_r'),n=isCcOd?0:gvn('l_t'),e=(!isCcOd && r && n)?calcEMI(a,r,n):0;
  var obRaw=gv('l_ob');
  var ob;
  if(isCcOd){
    // CC/OD: Outstanding Balance is the amount CURRENTLY UTILIZED. 0 is valid (nothing drawn yet).
    ob = obRaw===''?0:+obRaw;
  } else {
    // Term/other loans: if left blank, default Outstanding = Loan Amount (fresh disbursement)
    ob = obRaw===''?a:+obRaw;
  }
  var lim=gvn('l_lim')||0;
  var disb=gv('l_disb');
  var loanAmt = isCcOd ? lim : a; // for CC/OD, "amount" of the facility is the sanctioned limit
  var recvRaw=gv('l_recv');
  var recv = recvRaw===''?ob:+recvRaw; // defaults to Outstanding Balance if left blank, but can be set to 0
  if(disb==='none') recv=0; // "Don't add to Cash/Bank" means nothing has actually been received yet

  // If a term/other loan has been sanctioned but NOTHING has been drawn/received yet (recv===0 while ob>0),
  // treat it as "Sanctioned - Not Yet Drawn": keep it out of the Balance Sheet liabilities (outstandingBalance=0)
  // until a drawdown is recorded. The sanctioned amount is kept in sanctionedAmount for reference.
  var undrawn = (!isCcOd && ob>0 && recv===0);
  var loan={id:uid(),bankName:b,accountNumber:acctnum,loanType:lt,amount:loanAmt,rate:r,tenure:n,sanctionDate:gv('l_d')||td(),emi:+e.toFixed(2),
    outstandingBalance: undrawn ? 0 : ob,
    sanctionedAmount: ob,
    undrawn: undrawn,
    sanctionedLimit:isCcOd?lim:0,lastInterestDate:gv('l_d')||td(),payments:[]};
  D.loans.push(loan);
  if(disb!=='none' && recv>0){
    postCB(disb,'receipt',recv,b,'Loan Disbursed / CC-OD Drawn - '+lt,gv('l_d')||td());
  }
  sv();window._captab='overview';renderPage();
  toast(undrawn ? 'Loan recorded as sanctioned (not yet drawn) - it will not appear on the Balance Sheet until drawn.' : 'Loan added!');
}
// Record a drawdown against a previously "sanctioned, not yet drawn" loan: activates it on the Balance Sheet
function drawdownLoan(id){
  var loan=null; for(var i=0;i<D.loans.length;i++) if(D.loans[i].id===id) loan=D.loans[i];
  if(!loan){toast('Loan not found','e');return;}
  var amt = gvn('dd_amt_'+id);
  if(!amt || amt<=0){toast('Enter the drawdown amount','e');return;}
  var mode = gv('dd_mode_'+id) || 'bank';
  var date = gv('dd_date_'+id) || td();
  loan.outstandingBalance = (+loan.outstandingBalance||0) + amt;
  if(loan.outstandingBalance > 0.5) loan.undrawn = false; // any drawdown removes it from the 'awaiting drawdown' list
  loan.lastInterestDate = date;
  if(mode!=='none'){
    postCB(mode,'receipt',amt,loan.bankName,'Loan Drawdown - '+loan.loanType,date);
  }
  sv();renderPage();toast('Drawdown of '+fc(amt)+' recorded.');
}

function allRepayments(){

function autoSplitRepay(){
  var lid=gv('rp_loan');
  if(!lid)return;
  var loan=null;for(var i=0;i<D.loans.length;i++)if(D.loans[i].id===lid)loan=D.loans[i];
  if(!loan)return;
  var amt=gvn('rp_amt');
  var accrued=loanAccruedInterest(loan);
  var interest=Math.min(amt,accrued);
  var principal=Math.max(0,amt-interest);
  var ri=document.getElementById('rp_int'); if(ri)ri.value=interest?interest.toFixed(2):'';
  var rp=document.getElementById('rp_prin'); if(rp)rp.value=principal?principal.toFixed(2):'';

function recordRepay(){
  var lid=gv('rp_loan');
  if(!lid){toast('Select a loan','e');return;}
  var loan=null;for(var i=0;i<D.loans.length;i++)if(D.loans[i].id===lid)loan=D.loans[i];
  if(!loan)return;
  var amt=gvn('rp_amt');
  if(!amt){toast('Enter payment amount','e');return;}
  var prin=gvn('rp_prin'),intr=gvn('rp_int');
  if(prin+intr<=0){prin=amt;intr=0;}
  var mode=gv('rp_mode');
  var date=gv('rp_d')||td();
  confirmIfNegative(mode, amt, function(){
    loan.outstandingBalance=Math.max(0,loan.outstandingBalance-prin);
    loan.lastInterestDate=date;
    loan.payments.push({date:date,amount:amt,principal:prin,interest:intr});
    // Post cash/bank out
    postCB(mode,'payment',amt,loan.bankName,'Loan Repayment - '+loan.loanType,date);
    // Interest portion -> expense
    if(intr>0){
      D.expenses.push({id:uid(),date:date,category:'Interest Payment',amount:intr,remarks:'Interest on '+loan.bankName+' loan',paymentMode:mode});
    }
    sv();renderPage();toast('Repayment recorded!');
  });
}

  // ── FAST/SLOW/DEAD STOCK ──
  var today2=new Date(), thirtyDays=30, ninetyDays=90;
  var t30=new Date(today2); t30.setDate(t30.getDate()-thirtyDays);
  var t90=new Date(today2); t90.setDate(t90.getDate()-ninetyDays);
  var t30Str=t30.toISOString().slice(0,10);
  var t90Str=t90.toISOString().slice(0,10);
  var salesIn30={}, salesIn90={};
  D.sales.forEach(function(s){
    if(s.date>=t30Str){salesIn30[s.itemName]=(salesIn30[s.itemName]||0)+(s.qty||0);}
    if(s.date>=t90Str){salesIn90[s.itemName]=(salesIn90[s.itemName]||0)+(s.qty||0);}
  });

  var fastMoving=[], slowMoving=[], deadStock=[], expiryAlert=[];
  D.inventory.forEach(function(inv){
    var totStk=(inv.currentStock||0)+(inv.importedStock||0);
    var s30=salesIn30[inv.itemName]||0;
    var s90=salesIn90[inv.itemName]||0;
    if(totStk<=0) return;
    if(s30>=10) fastMoving.push({name:inv.itemName,sold30:s30,stock:totStk,unit:inv.unit});
    else if(s90===0&&totStk>0) deadStock.push({name:inv.itemName,stock:totStk,unit:inv.unit,val:totStk*inv.avgCost});
    else if(s30<3&&totStk>0) slowMoving.push({name:inv.itemName,sold30:s30,stock:totStk,unit:inv.unit});
    // Expiry alert
    if(inv.expiryDate){
      var expDate=new Date(inv.expiryDate);
      var daysLeft=Math.round((expDate-today2)/86400000);
      if(daysLeft<=30) expiryAlert.push({name:inv.itemName,days:daysLeft,expiry:inv.expiryDate,batch:inv.batchNo});
    }
  });

  // Expiry Alert
  if(expiryAlert.length){
    h+='<div style="background:#FFEBEE;border-left:4px solid #C62828;border-radius:8px;padding:10px;margin-bottom:8px">';
    h+='<div style="font-size:12px;font-weight:700;color:#C62828;margin-bottom:6px">⏰ Expiry Alert</div>';
    expiryAlert.forEach(function(e){
      h+='<div style="font-size:11px;color:#37474F;margin-bottom:3px">• <b>'+esc(e.name)+'</b>'+(e.batch?' [Batch:'+esc(e.batch)+']':'')+' — Expires: '+e.expiry+' ('+e.days+' days left)</div>';
    });
    h+='</div>';
  }

  // ABC Analysis card
  if(invSales.length&&abcTotSales>0){
    var aItems=invSales.filter(function(r){return r.abcClass==='A';});
    var bItems=invSales.filter(function(r){return r.abcClass==='B';});
    var cItems=invSales.filter(function(r){return r.abcClass==='C';});
    h+=card('📊 ABC Inventory Analysis',
      '<div style="font-size:11px;color:#546E7A;margin-bottom:8px">A = Top 70% of sales value | B = Next 20% | C = Bottom 10%</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px">'+
        '<div style="background:#E8F5E9;border-radius:8px;padding:8px;text-align:center"><div style="font-size:16px;font-weight:900;color:#2E7D32">A</div><div style="font-size:10px;color:#546E7A">'+aItems.length+' items</div><div style="font-size:10px;color:#2E7D32;font-weight:700">High priority</div></div>'+
        '<div style="background:#FFF3E0;border-radius:8px;padding:8px;text-align:center"><div style="font-size:16px;font-weight:900;color:#E65100">B</div><div style="font-size:10px;color:#546E7A">'+bItems.length+' items</div><div style="font-size:10px;color:#E65100;font-weight:700">Medium priority</div></div>'+
        '<div style="background:#FFEBEE;border-radius:8px;padding:8px;text-align:center"><div style="font-size:16px;font-weight:900;color:#C62828">C</div><div style="font-size:10px;color:#546E7A">'+cItems.length+' items</div><div style="font-size:10px;color:#C62828;font-weight:700">Review/reduce</div></div>'+
      '</div>'+
      tbl([
        {l:'Item',fn:function(r){return '<b>'+esc(r.inv.itemName)+'</b>';}},
        {l:'Class',fn:function(r){var cols={A:'#2E7D32',B:'#E65100',C:'#C62828'};return '<span style="font-weight:900;color:'+cols[r.abcClass]+'">'+r.abcClass+'</span>';}},
        {l:'Sales',r:1,fn:function(r){return fc(r.sales);}},
        {l:'%',r:1,fn:function(r){return r.salesPct+'%';}},
      ],invSales.filter(function(r){return r.sales>0;}))
    );
  }

  // Fast/Slow/Dead stock
  h+=card('🏃 Stock Movement Analysis',
    (fastMoving.length?'<div style="margin-bottom:8px"><div style="font-size:11px;font-weight:700;color:#2E7D32;margin-bottom:4px">🟢 Fast Moving (10+ sold in 30 days)</div>'+
      fastMoving.map(function(r){return '<div style="font-size:11px;color:#37474F;padding:3px 0;border-bottom:1px solid #F0F0F0">'+esc(r.name)+' — Sold: '+r.sold30+' '+esc(r.unit)+' | Stock: '+r.stock+'</div>';}).join('')+'</div>':'<div style="font-size:11px;color:#90A4AE;margin-bottom:8px">No fast moving items data yet</div>')+
    (slowMoving.length?'<div style="margin-bottom:8px"><div style="font-size:11px;font-weight:700;color:#E65100;margin-bottom:4px">🟡 Slow Moving (less than 3 sold in 30 days)</div>'+
      slowMoving.map(function(r){return '<div style="font-size:11px;color:#37474F;padding:3px 0;border-bottom:1px solid #F0F0F0">'+esc(r.name)+' — Sold: '+r.sold30+' | Stock: '+r.stock+' '+esc(r.unit)+'</div>';}).join('')+'</div>':'<div style="font-size:11px;color:#90A4AE;margin-bottom:8px">No slow moving items</div>')+
    (deadStock.length?'<div style="margin-bottom:8px"><div style="font-size:11px;font-weight:700;color:#C62828;margin-bottom:4px">🔴 Dead Stock (0 sales in 90 days)</div>'+
      deadStock.map(function(r){return '<div style="font-size:11px;color:#C62828;padding:3px 0;border-bottom:1px solid #F0F0F0">'+esc(r.name)+' — Stock: '+r.stock+' '+esc(r.unit)+' | Value locked: '+fc(r.val)+'</div>';}).join('')+'</div>':'<div style="font-size:11px;color:#2E7D32;margin-bottom:8px">✅ No dead stock</div>')+
    '<div style="font-size:9px;color:#90A4AE">Analysis based on last 30/90 days of sales data.</div>'
  );

  // Auto Reorder Suggestions
  var reorderNeeded=D.inventory.filter(function(inv){
    var totStk=(inv.currentStock||0)+(inv.importedStock||0);
    return inv.reorderLevel&&totStk<=inv.reorderLevel&&totStk>0;
  });
  var outOfStockItems=D.inventory.filter(function(inv){
    var totStk=(inv.currentStock||0)+(inv.importedStock||0);
    return totStk===0&&inv.avgCost>0;
  });
  if(reorderNeeded.length||outOfStockItems.length){
    h+=card('🛒 Auto Reorder Suggestions',
      (outOfStockItems.length?'<div style="margin-bottom:8px"><div style="font-size:11px;font-weight:700;color:#C62828;margin-bottom:4px">🚫 OUT OF STOCK — Order immediately:</div>'+
        outOfStockItems.map(function(inv){return '<div style="font-size:11px;color:#37474F;padding:4px 0">• <b>'+esc(inv.itemName)+'</b> — Suggested qty: '+Math.max(inv.reorderLevel*2,10)+' '+esc(inv.unit)+' | Avg cost: '+fc(inv.avgCost)+'/'+esc(inv.unit)+'</div>';}).join('')+'</div>':'')+
      (reorderNeeded.length?'<div><div style="font-size:11px;font-weight:700;color:#E65100;margin-bottom:4px">⚠️ Below Reorder Level — Order soon:</div>'+
        reorderNeeded.map(function(inv){
          var totStk=(inv.currentStock||0)+(inv.importedStock||0);
          var suggestQty=Math.max(inv.reorderLevel*2-totStk,inv.reorderLevel);
          return '<div style="font-size:11px;color:#37474F;padding:4px 0">• <b>'+esc(inv.itemName)+'</b> — Current: '+totStk+' | Reorder at: '+inv.reorderLevel+' | Suggested order: <b>'+suggestQty+' '+esc(inv.unit)+'</b> | Est. cost: '+fc(suggestQty*inv.avgCost)+'</div>';
        }).join('')+'</div>':'')+
      '<button onclick="go(\x27purchase\x27)" style="width:100%;padding:10px;background:#2E7D32;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px">🛒 Go to Purchase</button>'
    );
  }

  return h;
}

// find or create inventory item by name (case-insensitive)
function findOrCreateItem(name,unit){
  name=(name||'').trim();
  if(!name)return null;
  for(var i=0;i<D.inventory.length;i++){
    if(D.inventory[i].itemName.toLowerCase()===name.toLowerCase())return D.inventory[i];
  }
  var item={id:uid(),itemName:name,unit:unit||'No.',openingStock:0,currentStock:0,avgCost:0,importedStock:0,importedAvgCost:0,reorderLevel:0};
  D.inventory.push(item);
  return item;

function itemwiseSummary(records, amtKey, qtyKey){
  var map={};
  records.forEach(function(r){
    var key=r.itemName||'—';
    if(!map[key]) map[key]={qty:0,amt:0};
    map[key].qty += (+r[qtyKey]||0);
    map[key].amt += (+r[amtKey]||0);
  });
  var rows=Object.keys(map).sort();
  if(!rows.length) return '';
  var h='<table style="width:100%;font-size:12px;border-collapse:collapse">';
  h+='<thead><tr><th style="text-align:left;padding:4px 6px;background:#F5F5F5;border-bottom:1px solid #E0E0E0">Item</th><th style="text-align:right;padding:4px 6px;background:#F5F5F5;border-bottom:1px solid #E0E0E0">Total Qty</th><th style="text-align:right;padding:4px 6px;background:#F5F5F5;border-bottom:1px solid #E0E0E0">Total ₹</th></tr></thead><tbody>';
  var totQty=0,totAmt=0;
  rows.forEach(function(k){
    h+='<tr><td style="padding:4px 6px;border-bottom:1px solid #F0F0F0">'+esc(k)+'</td><td style="text-align:right;padding:4px 6px;border-bottom:1px solid #F0F0F0">'+fmt(map[k].qty)+'</td><td style="text-align:right;padding:4px 6px;border-bottom:1px solid #F0F0F0">'+fc(map[k].amt)+'</td></tr>';
    totQty+=map[k].qty; totAmt+=map[k].amt;
  });
  h+='<tr style="font-weight:700;background:#F5F5F5"><td style="padding:4px 6px">Total</td><td style="text-align:right;padding:4px 6px">'+fmt(totQty)+'</td><td style="text-align:right;padding:4px 6px">'+fc(totAmt)+'</td></tr>';

function addPur(){
  var s=gv('pu_s')||window._purSupplier||'',iid=gv('pu_i'),q=gvn('pu_q'),r=gvn('pu_r');
  if(!s){toast('Enter supplier name','e');return;}

  var mode=gv('pu_m'),date=gv('pu_d')||td();
  var advId = gv('pu_adv')||'';
  var amt=q*r;
  var adv=null;
  if(advId){
    var i2;for(i2=0;i2<(D.advances||[]).length;i2++) if(D.advances[i2].id===advId) adv=D.advances[i2];
    if(!adv){toast('Selected advance not found','e');return;}
    if(amt>(adv.amount||0)+0.005){toast('Purchase amount ('+fc(amt)+') exceeds the advance balance ('+fc(adv.amount)+'). Reduce the amount, or record the excess separately.','e');return;}
  } else {
    if(mode!=='credit' && !validateCCOD(mode)) return;
  }
  var item=null;
  if(iid==='__new__'){
    var nn=gv('pu_newname')||window._purNewName||'';
    if(!nn){toast('Enter new item name','e');return;}
    item=findOrCreateItem(nn,gv('pu_newunit'));
  }else{
    for(var i=0;i<D.inventory.length;i++)if(D.inventory[i].id===iid){item=D.inventory[i];break;}
  }
  if(!item)return;
  var isImported = document.getElementById('pu_import') ? document.getElementById('pu_import').checked : false;
  var checkMode = adv ? null : mode; // advance-settled purchases do not touch cash/bank
  confirmIfNegative(checkMode, amt, function(){

      var itq=(item.importedStock||0)+q, itv2=(item.importedStock||0)*(item.importedAvgCost||0)+amt;

    }
    var effMode = adv ? 'advance' : mode;
    var suppCode=getPartyCode(s,'supplier');
    D.purchases.push({id:uid(),date:date,supplierName:s,partyCode:suppCode,itemId:item.id,itemName:item.itemName,qty:q,rate:r,amount:amt,paymentMode:effMode,isImported:isImported,advanceId:adv?adv.id:undefined});
    if(adv){
      adv.amount = (+adv.amount||0) - amt;
      if(adv.amount<=0.005){
        D.advances = D.advances.filter(function(a){return a.id!==adv.id;});
      }
    } else if(mode==='credit'){
      addCreditor(s,amt,date,'Purchase: '+item.itemName);
    }else{
      postCB(mode,'payment',amt,s,'Purchase: '+item.itemName,date);
    }
    sv();window._purItem='__new__';window._purSupplier='';window._purNewName='';window._purImport=false;window._purDate=null;window._purQty=null;window._purRate=null;window._purMode=null;go('purchase');toast('Recorded! Stock updated.');
  });

// Draws 'q' units from an item's stock, indigenous first then imported.
// Returns {cogs: total cost of goods drawn, fromIndig: qty drawn from indigenous pool, fromImp: qty drawn from imported pool}
// and mutates item.currentStock/item.importedStock accordingly.
// Non-mutating preview of drawStock - used to compute COGS/breakdown before validation passes.
// Inverse of restoreStock: removes exactly fromIndig/fromImp units, reconstructing the
// pre-restore average cost via weighted-average subtraction. Used to roll back a
// restoreStock() call when an edit operation needs to abort after reversing.
function drawStockExact(item, fromIndig, fromImp, indigCostEach, impCostEach){
  if(fromIndig>0){
    var tq=item.currentStock-fromIndig;
    var tv=item.currentStock*item.avgCost - fromIndig*indigCostEach;
    item.currentStock=Math.max(0,tq); item.avgCost = item.currentStock>0 ? Math.max(0,tv)/item.currentStock : 0;
  }
  if(fromImp>0){
    var itq=(item.importedStock||0)-fromImp;
    var itv=(item.importedStock||0)*(item.importedAvgCost||0) - fromImp*impCostEach;
    item.importedStock=Math.max(0,itq); item.importedAvgCost = item.importedStock>0 ? Math.max(0,itv)/item.importedStock : 0;
  }
}
function drawStockPreview(item, q){
  var fromIndig = Math.min(q, item.currentStock);
  var fromImp = q - fromIndig;
  if(fromImp > (item.importedStock||0)) fromImp = item.importedStock||0;
  var cogs = fromIndig*item.avgCost + fromImp*(item.importedAvgCost||0);
  return {cogs:cogs, fromIndig:fromIndig, fromImp:fromImp};
}
function drawStock(item, q){
  var fromIndig = Math.min(q, item.currentStock);
  var fromImp = q - fromIndig;
  if(fromImp > (item.importedStock||0)) fromImp = item.importedStock||0; // shouldn't happen if total-stock check passed
  var cogs = fromIndig*item.avgCost + fromImp*(item.importedAvgCost||0);
  item.currentStock -= fromIndig;
  item.importedStock = (item.importedStock||0) - fromImp;
  return {cogs:cogs, fromIndig:fromIndig, fromImp:fromImp};
}
// Reverses a drawStock(): adds qty back to the pools it was drawn from, at the same
// per-unit cost it was drawn at (cogs/qty for that pool), via weighted-average add-back.
function restoreStock(item, fromIndig, fromImp, indigCostEach, impCostEach){
  if(fromIndig>0){
    var tq=item.currentStock+fromIndig, tv=item.currentStock*item.avgCost + fromIndig*indigCostEach;
    item.currentStock=tq; item.avgCost = tq>0 ? tv/tq : 0;
  }
  if(fromImp>0){
    var itq=(item.importedStock||0)+fromImp, itv=(item.importedStock||0)*(item.importedAvgCost||0) + fromImp*impCostEach;
    item.importedStock=itq; item.importedAvgCost = itq>0 ? itv/itq : 0;
  }
}

// Age-wise debtor analysis
function ageWiseDebtors() {
  var today = td();
  var dList = debtorBalances();
  if (!dList || dList.length === 0) return '';

  // Build age buckets using debtor transaction dates
  var buckets = {'0-30':[],'31-60':[],'61-90':[],'90+':[]};
  var bucketTotals = {'0-30':0,'31-60':0,'61-90':0,'90+':0};

  // Map debtor names to their earliest outstanding date
  var dateMap = {};
  D.debtors.forEach(function(d) {
    if (d.amount > 0 && d.date) {
      if (!dateMap[d.name] || d.date < dateMap[d.name]) dateMap[d.name] = d.date;
    }
  });

  dList.forEach(function(d) {
    if (d.balance <= 0) return;
    var date = dateMap[d.name] || today;
    var age = daysBetween(date, today);
    var bucket = age <= 30 ? '0-30' : age <= 60 ? '31-60' : age <= 90 ? '61-90' : '90+';
    buckets[bucket].push({name:d.name, balance:d.balance, age:age});
    bucketTotals[bucket] += d.balance;
  });

  var total = dList.reduce(function(s,d){return s+(d.balance>0?d.balance:0);},0);
  var hasAged = bucketTotals['61-90'] > 0 || bucketTotals['90+'] > 0;

  var h2 = '<div style="margin-top:12px">';
  h2 += '<div style="font-weight:700;font-size:13px;margin-bottom:8px;color:#37474F">Age-wise Debtor Analysis</div>';
  h2 += '<div style="overflow-x:auto"><table><thead><tr>'+
    '<th style="text-align:left">Age Bucket</th>'+
    '<th style="text-align:left">Debtors</th>'+
    '<th style="text-align:right">Amount</th>'+
    '<th style="text-align:right">% of Total</th>'+
    '</tr></thead><tbody>';

  var colors = {'0-30':'#2E7D32','31-60':'#F57F17','61-90':'#E65100','90+':'#C62828'};
  ['0-30','31-60','61-90','90+'].forEach(function(b) {
    var names = buckets[b].map(function(x){return x.name+'('+x.age+'d)';}).join(', ');
    var amt = bucketTotals[b];
    var pct = total > 0 ? (amt/total*100).toFixed(1) : '0.0';
    h2 += '<tr>'+
      '<td style="padding:5px 8px;font-weight:700;color:'+colors[b]+'">'+b+' days</td>'+
      '<td style="padding:5px 8px;font-size:11px;color:#546E7A">'+(names||'—')+'</td>'+
      '<td style="text-align:right;padding:5px 8px;color:'+colors[b]+';font-weight:'+(amt>0?'700':'400')+'">'+fc(amt)+'</td>'+
      '<td style="text-align:right;padding:5px 8px;color:#546E7A">'+pct+'%</td>'+
      '</tr>';
  });

  h2 += '<tr style="background:rgba(0,0,0,.06)"><td style="padding:5px 8px;font-weight:700">Total</td>'+
    '<td></td>'+
    '<td style="text-align:right;padding:5px 8px;font-weight:700">'+fc(total)+'</td>'+
    '<td style="text-align:right;padding:5px 8px;font-weight:700">100%</td></tr>';
  h2 += '</tbody></table></div>';

  if (hasAged) {
    h2 += '<div class="al alw" style="margin-top:8px">⚠️ Some debtors are overdue beyond 60 days. Follow up immediately — amounts outstanding over 90 days should be reviewed for recoverability and provisioning.</div>';
  } else {
    h2 += '<div class="al als" style="margin-top:8px">✅ All debtors are within 60 days. Receivables are in healthy condition.</div>';
  }
  h2 += '</div>';
  return h2;
}

// Build partner/director dropdown for Capital and Drawings
function partnerDropdown(id, label, includeAll){
  var partners = D.profile.partners||[];
  var constitution = D.profile.constitution||'Individual';
  var isMulti = constitution!=='' && constitution!=='Individual' && constitution!=='Sole Proprietorship';
  if(!isMulti || partners.length===0) return '';
  var roleLabel = (constitution==='Partnership'||constitution==='LLP')?'Partner':
                  (constitution==='Private Limited Company'||constitution==='Public Limited Company')?'Director':
                  (constitution==='Self Help Group (SHG)'||constitution==='Joint Liability Group (JLG)'||
                   constitution==='Producer Group / FPO'||constitution==='Cooperative Society')?'Member':
                  'Member';
  var opts = partners.map(function(pt){
    return {v:pt.id, l:pt.name+' — '+( pt.role||roleLabel)+(pt.share?' ('+pt.share+'%)':'')};
  });
  if(includeAll) opts.unshift({v:'all', l:'All '+roleLabel+'s (Equal / As per Share%)'});
  opts.unshift({v:'', l:'-- Select '+roleLabel+' --'});
  return sl(label||('Introduced By ('+roleLabel+')'), id, opts, '');
}
