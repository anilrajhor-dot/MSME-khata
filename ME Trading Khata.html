async function handleReconFile(ev){
  var f=ev.target.files[0];
  if(!f) return;
  var statusEl=document.getElementById('recon_status');
  statusEl.innerHTML='<div class="al ali">Processing...</div>';
  try{
    var rows;
    if(/\.xlsx?$/i.test(f.name)){
      if(typeof DecompressionStream==='undefined'){
        statusEl.innerHTML='<div class="al ald">Your browser does not support reading Excel files here. Please export the statement as CSV instead.</div>';
        return;
      }
      var buf = await f.arrayBuffer();
      rows = await parseXlsxArrayBuffer(buf);
    } else {
      var text = await f.text();
      rows = parseCSV(text);
    }
    var bankTxns = extractBankTxns(rows);
    if(bankTxns.length===0){
      statusEl.innerHTML='<div class="al ald">Could not detect transaction rows. Make sure the file has columns for Date and Debit/Credit (or Amount).</div>';
      return;
    }
    var dates=bankTxns.map(function(t){return t.date;});
    var fromDate=dates.reduce(function(a,b){return a<b?a:b;});
    var toDate=dates.reduce(function(a,b){return a>b?a:b;});
    var appTxns=getAppBankTxns(fromDate,toDate,window._reconAcct);
    var result=reconcile(bankTxns,appTxns);
    var interestEntries=findInterestEntries(bankTxns);
    var appInterest=appInterestInRange(fromDate,toDate);
    var bankInterestTotal=0; for(var i=0;i<interestEntries.length;i++)bankInterestTotal+=interestEntries[i].debit;

    window._reconResult={
      fromDate:fromDate, toDate:toDate, total:bankTxns.length,
      matched:result.matched.length, unmatchedBank:result.unmatchedBank, unmatchedApp:result.unmatchedApp,
      interestEntries:interestEntries, bankInterestTotal:bankInterestTotal, appInterest:appInterest
    };
    statusEl.innerHTML='<div class="al als">Processed '+bankTxns.length+' transactions ('+fromDate+' to '+toDate+').</div>';
    renderPage();
  }catch(e){
    statusEl.innerHTML='<div class="al ald">Error reading file: '+esc(e.message)+'</div>';
  }
}

  if(r.unmatchedApp.length){
    h += card('App Entries Not Found in Bank Statement ('+r.unmatchedApp.length+')',
      tbl([{l:'Date',k:'date'},{l:'Description',k:'desc'},{l:'Amount',r:1,fn:function(x){return fc(x.type==='receipt'?x.amount:-x.amount);},c:function(x){return x.type==='receipt'?'#2E7D32':'#C62828';}}],r.unmatchedApp)+
      '<div class="al ali">These exist in the app but were not found in the uploaded statement for this period - check if they used the correct date or were entered under the wrong mode (Cash vs Bank).</div>'
    );
  }

  return h;
}

// ===== FIXED ASSETS: WDV, depreciation, purchase, sale =====
// Remove a fixed asset entry entirely (for correcting mistakes - e.g. wrong payment mode,
// asset added twice, or test entry). This reverses the cost from D.otherAssets so the
// Balance Sheet stays tallied. Any depreciation already applied is also reversed.
// Use "Sell / Dispose" for actual disposals; use "Remove" only to fix data entry errors.
function removeFA(id, name){
  confirmDialog('Remove fixed asset "'+name+'"? This deletes the asset record and reverses its cost from the Balance Sheet. Use this only to correct a mistake - for an actual sale, use "Sell / Dispose Asset" instead. This cannot be undone.', function(){
    var idx=-1, i;
    for(i=0;i<D.fixedAssets.length;i++) if(D.fixedAssets[i].id===id){idx=i;break;}
    if(idx<0){toast('Asset not found','e');return;}
    var a = D.fixedAssets[idx];
    // Reverse cost from otherAssets (which holds gross cost of all FA)
    D.otherAssets = Math.max(0, (+D.otherAssets||0) - (+a.cost||0));
    // Remove from otherAssetsNotes if present
    if(D.otherAssetsNotes){
      D.otherAssetsNotes = D.otherAssetsNotes.filter(function(n){
        return !(n.amount===(+a.cost||0) && n.label.indexOf(a.name.trim())>=0);
      });
    }
    D.fixedAssets.splice(idx,1);
    sv(); renderPage();
    toast('Asset removed. Check your Balance Sheet and re-add the asset with the correct payment mode if needed.');
  });
}
// Remove an intangible asset entry (same logic as removeFA)
function removeIA(id, name){
  confirmDialog('Remove intangible asset "'+name+'"? This deletes the record and reverses its cost from the Balance Sheet. Use only to correct a mistake.', function(){
    var idx=-1, i;
    for(i=0;i<D.intangibleAssets.length;i++) if(D.intangibleAssets[i].id===id){idx=i;break;}
    if(idx<0){toast('Asset not found','e');return;}
    var a = D.intangibleAssets[idx];
    D.otherAssets = Math.max(0, (+D.otherAssets||0) - (+a.cost||0));
    if(D.otherAssetsNotes){
      D.otherAssetsNotes = D.otherAssetsNotes.filter(function(n){
        return !(n.amount===(+a.cost||0) && n.label.indexOf(a.name.trim())>=0);
      });
    }
    D.intangibleAssets.splice(idx,1);
    sv(); renderPage();
    toast('Intangible asset removed. Re-add with correct details if needed.');
  });
}
function faWDV(a){
  return Math.max(0, (+a.cost||0) - (+a.accumDep||0));
}
// Depreciation accrued since lastDepDate, pro-rated by days/365
function faPendingDep(a){
  var wdv = faWDV(a);
  if(wdv<=0) return 0;
  var days = daysBetween(a.lastDepDate||a.purchaseDate||td(), td());
  if(days<=0) return 0;
  var annualDep = wdv * ((+a.depRate||0)/100);
  return annualDep * (days/365);
}
function applyDepreciation(){
  var fas = D.fixedAssets || [];
  var total = 0;
  for(var i=0;i<fas.length;i++){
    var a=fas[i];
    if(a.disposed) continue;
    var dep = faPendingDep(a);
    if(dep>0.5){
      a.accumDep = (+a.accumDep||0) + dep;
      a.lastDepDate = td();
      total += dep;
    }
  }
  if(total<=0.5){ toast('No depreciation due','e'); return; }
  D.expenses.push({id:uid(),date:td(),category:'Depreciation',amount:total,remarks:'Depreciation on fixed assets',paymentMode:'none'});
  // Note: D.otherAssets is NOT reduced here. It holds the original gross cost of fixed/intangible
  // assets (as recorded via Trial Balance) plus any other non-current assets. Net Block is
  // computed dynamically as cost - accumDep via fixedAssetsNetTotal(), so reducing D.otherAssets
  // here would double-count the depreciation on the Balance Sheet.
  sv();
  renderPage();
  toast('Depreciation of '+fc(total)+' applied.');
}

// Returns the HTML for the "margin money" fields shown only when a split-loan payment mode is selected.
// Used both on initial render and for targeted in-place updates (without a full renderPage, which would
// wipe any other unsaved input values on the Fixed Asset purchase form).
function faSplitFieldsHtml(mode){
  if(mode.indexOf('splitloan:')!==0) return '';
  var marginOpts=[{v:'cash',l:'Cash'},{v:'bank',l:'Bank/UPI'}];
  ['cc','od'].forEach(function(type){
    var label = type==='cc' ? 'Cash Credit (CC)' : 'Overdraft (OD)';
    var matches = findCCODAccounts(type);
    if(matches.length===1){
      marginOpts.push({v:type,l:label+(matches[0].accountNumber?' (A/c '+matches[0].accountNumber+')':'')});
    } else if(matches.length>1){
      matches.forEach(function(m){
        marginOpts.push({v:type+':'+m.id,l:label+' - '+(m.accountNumber||m.bankName||'Account')+(m.accountNumber&&m.bankName?' ('+m.bankName+')':'')+' [O/S: '+fc(m.outstandingBalance||0)+']'});
      });
    }
  });
  var loanInput = inp('Amount Financed by Loan (₹)','fa_loanamt','number',0).replace('<input','<input oninput="updateFaMarginDisplay()"');
  return '<div style="font-size:11px;color:#546E7A;margin-bottom:6px">Enter how much of the total Cost will be financed by the loan (e.g. 75% of cost). The remaining amount (margin money) will be paid from the mode you select below.</div>'+
    g2(loanInput,sl('Margin Money Paid From','fa_marginmode',marginOpts,'cash'))+
    '<div id="fa_margin_display" style="font-size:13px;font-weight:700;color:#2E7D32;margin:6px 0 10px 0;padding:8px 10px;background:#E8F5E9;border-radius:8px">Margin Money (Cost \u2212 Loan Amount): '+fc(Math.max(0,(gvn('fa_cost')||0)-(gvn('fa_loanamt')||0)))+'</div>';
}
// Recalculates and displays the margin money (Cost - Amount Financed by Loan) without a full page re-render
function updateFaMarginDisplay(){

  if(!el) return;
  var cost = gvn('fa_cost')||0, loanAmt = gvn('fa_loanamt')||0;
  var margin = Math.max(0, cost-loanAmt);

}
// Called when the Fixed Asset "Payment Mode" dropdown changes - updates only the margin-money
// fields in place, preserving any text already entered in other fields on the form.
function updateFaSplitFields(){

function purchaseFA(){
  var name=gv('fa_name'), cat=gv('fa_cat'), cost=gvn('fa_cost'), rate=gvn('fa_rate'), date=gv('fa_date')||td(), mode=gv('fa_mode');
  if(!name){toast('Enter asset name','e');return;}
  if(!cost){toast('Enter cost','e');return;}
  // Validate split-loan inputs BEFORE making any changes to D, so a validation error never leaves
  // behind an orphaned asset with no corresponding liability/payment.
  var splitLoanId='', loanAmt2=0, marginMode='cash', marginAmt=0;
  if(mode.indexOf('splitloan:')===0){
    splitLoanId = mode.slice(10);
    loanAmt2 = gvn('fa_loanamt');
    marginMode = gv('fa_marginmode')||'cash';
    if(!loanAmt2 || loanAmt2<=0){toast('Enter the amount financed by the loan','e');return;}
    if(loanAmt2>cost){toast('Loan-financed amount cannot exceed the total cost','e');return;}
    marginAmt = cost - loanAmt2;
  }
  D.fixedAssets = D.fixedAssets || [];
  D.fixedAssets.push({id:uid(),name:name,category:cat,cost:cost,depRate:rate,purchaseDate:date,accumDep:0,lastDepDate:date,disposed:false});
  D.otherAssets = (+D.otherAssets||0) + cost;
  D.otherAssetsNotes = D.otherAssetsNotes || [];
  D.otherAssetsNotes.push({label:name+' ('+cat+')',amount:cost});
  if(mode==='credit'){
    var creditorName=gv('fa_creditor')||'Supplier';
    D.creditors.push({id:uid(),name:creditorName,amount:cost,date:date,ref:'Purchase: '+name});
  } else if(mode.indexOf('splitloan:')===0){
    // Part of the cost financed by a term loan drawdown, rest paid as margin money (cash/bank/cc/od)
    var splitLoan=null; for(var si=0;si<D.loans.length;si++) if(D.loans[si].id===splitLoanId) splitLoan=D.loans[si];
    if(splitLoan){
      splitLoan.outstandingBalance = (+splitLoan.outstandingBalance||0) + loanAmt2;
      if(splitLoan.outstandingBalance > 0.5) splitLoan.undrawn = false; // any drawdown removes it from the 'awaiting drawdown' list
      splitLoan.lastInterestDate = date;
    }
    if(marginAmt>0.5){
      postCB(marginMode,'payment',marginAmt,name,'Margin Money for Purchase of Fixed Asset: '+name,date);
    }
  } else if(mode.indexOf('loan:')===0){
    // Drawing down a sanctioned-but-undrawn term loan directly to pay for this asset
    var loanId = mode.slice(5);
    var loan=null; for(var i=0;i<D.loans.length;i++) if(D.loans[i].id===loanId) loan=D.loans[i];
    if(loan){
      loan.outstandingBalance = (+loan.outstandingBalance||0) + cost;
      if(loan.outstandingBalance > 0.5) loan.undrawn = false; // any drawdown removes it from the 'awaiting drawdown' list
      loan.lastInterestDate = date;
    }
  } else {
    postCB(mode,'payment',cost,name,'Purchase of Fixed Asset: '+name,date);
  }
  sv();
  window._faForm=null;
  window._faMode=null;
  renderPage();
  toast('Fixed Asset added!');
}

function saleFA(){
  var id=gv('fs_id'), val=gvn('fs_val'), date=gv('fs_date')||td(), mode=gv('fs_mode');
  if(!id){toast('Select an asset','e');return;}
  var a=null; for(var i=0;i<D.fixedAssets.length;i++) if(D.fixedAssets[i].id===id){a=D.fixedAssets[i];break;}
  if(!a){toast('Asset not found','e');return;}
  var wdv = faWDV(a);
  var profitLoss = val - wdv;
  a.disposed = true;
  a.saleValue = val;
  a.saleDate = date;
  a.wdvAtSale = wdv;
  // Remove asset's full gross cost from otherAssets (the asset, including its accumDep, is now disposed and excluded from fixedAssetsNetTotal())
  D.otherAssets = (+D.otherAssets||0) - (+a.cost||0);
  // Record profit/loss on sale as an expense (negative = income) or income category
  if(Math.abs(profitLoss)>0.5){
    if(profitLoss>0){
      D.expenses.push({id:uid(),date:date,category:'Profit on Sale of Asset (Income)',amount:-profitLoss,remarks:'Sale of '+a.name,paymentMode:'none'});
    } else {
      D.expenses.push({id:uid(),date:date,category:'Loss on Sale of Asset',amount:-profitLoss,remarks:'Sale of '+a.name,paymentMode:'none'});
    }
    if(D.expenseCategories.indexOf('Profit on Sale of Asset (Income)')<0) D.expenseCategories.push('Profit on Sale of Asset (Income)');
    if(D.expenseCategories.indexOf('Loss on Sale of Asset')<0) D.expenseCategories.push('Loss on Sale of Asset');
  }
  if(mode==='credit'){
    var debtorName=gv('fs_debtor')||'Customer';
    D.debtors.push({id:uid(),name:debtorName,amount:val,date:date,ref:'Sale: '+a.name});
  } else {
    if(val>0) postCB(mode,'receipt',val,a.name,'Sale of Fixed Asset: '+a.name,date);
  }
  sv();
  window._faForm=null;
  renderPage();
  toast('Asset sale recorded!');
}

// ===== INTANGIBLE ASSETS: book value, amortization =====
function intBookValue(a){
  return Math.max(0, (+a.cost||0) - (+a.accumAmort||0));
}
function intPendingAmort(a){
  var bv = intBookValue(a);
  if(bv<=0) return 0;
  if(!a.usefulLife || a.usefulLife<=0) return 0;
  var days = daysBetween(a.lastAmortDate||a.purchaseDate||td(), td());
  if(days<=0) return 0;
  var annualAmort = (+a.cost||0) / a.usefulLife;
  var pending = annualAmort * (days/365);
  return Math.min(pending, bv);
}
function applyAmortization(){
  var ias = D.intangibleAssets || [];
  var total = 0;
  for(var i=0;i<ias.length;i++){
    var a=ias[i];
    if(a.disposed) continue;
    var am = intPendingAmort(a);
    if(am>0.5){
      a.accumAmort = (+a.accumAmort||0) + am;
      a.lastAmortDate = td();
      total += am;
    }
  }
  if(total<=0.5){ toast('No amortization due','e'); return; }
  D.expenses.push({id:uid(),date:td(),category:'Amortization',amount:total,remarks:'Amortization of intangible assets',paymentMode:'none'});
  if(D.expenseCategories.indexOf('Amortization')<0) D.expenseCategories.push('Amortization');
  // Note: D.otherAssets is NOT reduced here - see comment in applyDepreciation().
  sv();
  renderPage();
  toast('Amortization of '+fc(total)+' applied.');
}

function addOtherAsset(){
  if(!requireTBPosted()) return;
  var name=gv('oa_name'), amt=gvn('oa_amt'), date=gv('oa_date')||td(), source=gv('oa_source');
  if(!name){toast('Enter a name for this item','e');return;}
  if(!amt){toast('Enter amount','e');return;}
  var faCost=(D.fixedAssets||[]).reduce(function(s,f){return s+(+f.cost||0);},0)+((D.intangibleAssets||[]).reduce(function(s,f){return s+(+f.cost||0);},0));
  var currentOtherNCA = Math.max(0,(+D.otherAssets||0)-faCost);
  if(!checkTBHeadMatch(['otherassets'], currentOtherNCA+amt, 'Other Assets')) return;
  D.otherAssetItems = D.otherAssetItems || [];
  D.otherAssetItems.push({id:uid(),name:name,amount:amt,date:date});
  D.otherAssets = (+D.otherAssets||0) + amt;
  D.otherAssetsNotes = D.otherAssetsNotes || [];
  D.otherAssetsNotes.push({label:name,amount:amt});
  if(source==='cash'||source==='bank'){
    postCB(source,'payment',amt,name,'Other Asset: '+name,date);
  } else if(source==='income'){
    D.expenses.push({id:uid(),date:date,category:'Other Income',amount:-amt,remarks:'Accrued income: '+name,paymentMode:'none'});
    if(D.expenseCategories.indexOf('Other Income')<0) D.expenseCategories.push('Other Income');
  }
  // source==='reclassify' -> no offsetting entry (already counted elsewhere)
  sv();
  window._oaiForm=null;
  renderPage();
  toast('Other Asset added!');
}
function removeOtherAsset(id){

    if(item){

// ===== EXCEL/CSV DATA TEMPLATE — embedded, downloadable from its own menu =====
// Pre-built, fully tested multi-sheet .xlsx (Trial Balance, Inventory, Fixed Assets,

function downloadBinaryFile(base64Data, filename, mimeType){
  try{
    var byteChars = atob(base64Data);
    var byteNumbers = new Array(byteChars.length);
    for(var i=0;i<byteChars.length;i++) byteNumbers[i] = byteChars.charCodeAt(i);
    var byteArray = new Uint8Array(byteNumbers);
    var blob = new Blob([byteArray], {type: mimeType});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    setTimeout(function(){ if(a.parentNode) document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
  }catch(e){
    toast('Could not start download: '+e.message+'. Try the CSV version instead, or use a different browser.','e');
    return;
  }
  // Show a guaranteed-visible confirmation/fallback note for mobile, since blob
  // downloads on iOS Safari sometimes complete silently with no visible banner.
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:10001;overflow-y:auto;padding:20px;text-align:center';
  overlay.innerHTML =
    '<div style="font-size:40px;margin-bottom:10px">📥</div>' +
    '<div style="font-size:16px;font-weight:700;color:#0D2137;margin-bottom:10px">Download started: '+esc(filename)+'</div>' +
    '<div style="font-size:13px;color:#546E7A;margin-bottom:20px;line-height:1.5">On iPhone: check the Share Sheet that appeared, or look in the Files app → Downloads. On Android: check your notification bar or Downloads folder. If nothing appeared, try the CSV version instead — it works on every browser.</div>' +
    '<button onclick="this.parentNode.remove()" style="padding:12px 28px;background:#1565C0;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">OK, Got It</button>';
  document.body.appendChild(overlay);
}

function downloadFullDataTemplateXlsx(){
  downloadBinaryFile(FULL_DATA_TEMPLATE_XLSX_B64, 'ME_Khata_Full_Data_Template.xlsx',
    'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');
}

function pgTemplate(){
  var h = '<div class="al ali"><div class="alt">📊 Data Templates — for Existing Businesses</div>';
  h += '<p>Download a ready-made template to bring in your existing business data: opening balances, stock items, fixed assets, loans, and partners/directors. Fill it in on a computer or phone spreadsheet app, then upload it from Data → Opening Trial Balance.</p></div>';

  h += card('⬇ Excel Template (.xlsx — recommended)',
    '<div style="font-size:12px;color:#546E7A;margin-bottom:10px">5 separate sheets (tabs): Trial Balance, Inventory, Fixed Assets, Loans, Partners. Best opened in Excel, Google Sheets, or a phone spreadsheet app that supports multiple sheets. Add or delete rows freely in each sheet to match your actual data.</div>' +
    btn('⬇ Download .xlsx Template', 'downloadFullDataTemplateXlsx()', '#2E7D32')
  );

  h += card('⬇ CSV Template (single-sheet, works everywhere)',
    '<div style="font-size:12px;color:#546E7A;margin-bottom:10px">All 5 sections in one plain-text file, separated by headers. Works on any device including very basic phones, but for multi-sheet upload (Inventory/Fixed Assets/Loans/Partners read separately) the .xlsx version above is required — this CSV version is best used as a reference, or for Trial Balance only via Data → Opening Trial Balance → "Upload Trial Balance Only".</div>' +
    btn('⬇ Download .csv Template', 'downloadFullDataTemplate()', '#546E7A')
  );

  h += card('How to Upload',
    '<div style="font-size:12px;color:#37474F;line-height:1.6">' +
    '1. Fill in the template with your own data (delete the example rows).<br>' +
    '2. Save the file (.xlsx stays .xlsx; CSV stays .csv).<br>' +
    '3. Go to <b>Data → Opening Trial Balance</b>.<br>' +
    '4. Use the green "Full Business Data Upload" section for .xlsx, or the section below it for CSV/Trial-Balance-only.<br>' +
    '5. After upload, check <b>Financials → Balance Sheet</b> to confirm Total Assets = Total Liabilities.' +
    '</div>'
  );

  return h;
}

function savePriorPeriod(){
  var expenseByCat = {};
  var totPriorExpCheck = 0;
  for(var i=0;i<D.expenseCategories.length;i++){
    var cat = D.expenseCategories[i];
    var id = 'pp_cat_'+cat.replace(/[^a-zA-Z0-9]/g,'_');
    var v = gvn(id);
    if(v){ expenseByCat[cat] = v; totPriorExpCheck += v; }
  }
  var ppSales = gvn('pp_sales'), ppCogs = gvn('pp_cogs');
  var enabledChoice = gv('pp_enabled');
  var hasData = (ppSales>0 || ppCogs>0 || totPriorExpCheck>0);
  // If the user entered actual figures, enable Prior Period automatically unless they explicitly chose "No".
  // This avoids the figures being saved but silently excluded from the Full Year P&L because the
  // Enable toggle (at the bottom of the form) was left at its default.
  var enabled = hasData ? (enabledChoice !== 'no') : (enabledChoice === 'yes');
  D.priorPeriod = {
    enabled: enabled,
    fromDate: gv('pp_from')||getFYStart(),
    toDate: gv('pp_to')||td(),
    sales: ppSales,
    cogs: ppCogs,
    expenseByCat: expenseByCat
  };
  sv();
  renderPage();
  toast(enabled ? 'Prior period figures saved and included in Full Year P&L!' : 'Prior period figures saved.');
}

// Combined "Full Year" figures (prior period + current YTD), for display/projection use only.
// Does NOT affect getF() / Balance Sheet.
function getFullYearFigures(){
  var f = getF();
  var pp = D.priorPeriod || {enabled:false};
  if(!pp.enabled) return {sales:f.ts, cogs:f.os+f.tp-f.cs, gp:f.gp, expenses:f.te, np:f.np, expenseByCat:null, hasPrior:false};

  var priorExpTotal=0;
  var combinedByCat = {};
  for(var i=0;i<D.expenseCategories.length;i++){
    var cat=D.expenseCategories[i];
    var priorAmt = (pp.expenseByCat && pp.expenseByCat[cat]) || 0;
    var currentAmt = 0;
    for(var j=0;j<D.expenses.length;j++) if(D.expenses[j].category===cat) currentAmt += D.expenses[j].amount;
    combinedByCat[cat] = priorAmt + currentAmt;
    priorExpTotal += priorAmt;
  }
  var sales = (pp.sales||0) + f.ts;
  var cogs = (pp.cogs||0) + (f.os+f.tp-f.cs);
  var gp = sales - cogs;
  var expenses = priorExpTotal + f.te;
  var np = gp - expenses;
  return {sales:sales, cogs:cogs, gp:gp, expenses:expenses, np:np, expenseByCat:combinedByCat, hasPrior:true, priorFrom:pp.fromDate, priorTo:pp.toDate};
}

var TB_HEAD_CODES = TB_HEADS.map(function(h){return h[0];});

// Parse uploaded rows (array of row-arrays, first row = header) into D.trialBalance entries
function importTBRows(rows){
  if(!rows || rows.length<2) return {ok:false, error:'File appears empty or has no data rows.'};
  var header = rows[0].map(function(h){return String(h||'').trim();});
  // Map expected column names to indices (case-insensitive, tolerant of extra/missing columns)
  var colIdx = {};
  TB_CSV_COLUMNS.forEach(function(col){
    for(var i=0;i<header.length;i++){
      if(header[i].toLowerCase().replace(/[^a-z0-9]/g,'')===col.toLowerCase().replace(/[^a-z0-9]/g,'')){ colIdx[col]=i; break; }
    }
  });
  if(colIdx['Head']===undefined) return {ok:false, error:'Could not find a "Head" column. Please use the downloaded template.'};

  var newRows=[]; var errors=[];
  for(var r=1;r<rows.length;r++){
    var row = rows[r];
    if(!row || row.length===0) continue;
    var headRaw = String(row[colIdx['Head']]||'').trim();
    if(!headRaw) continue;
    if(/^instructions/i.test(headRaw) || /^\d+\./.test(headRaw) || /^valid head codes/i.test(headRaw) || headRaw.indexOf(' = ')>=0) continue;
    var head = headRaw.toLowerCase();
    if(TB_HEAD_CODES.indexOf(head)<0){
      errors.push('Row '+(r+1)+': unrecognized Head "'+headRaw+'" - skipped.');
      continue;
    }
    var get = function(col){ return colIdx[col]!==undefined ? row[colIdx[col]] : ''; };
    var amount = parseAmount(get('Amount'));
    var name = String(get('Name')||'').trim();
    var qty = parseAmount(get('Qty'));
    var unit = String(get('Unit')||'').trim() || 'No.';
    var cost = parseAmount(get('CostPerUnit'));
    var category = String(get('Category')||'').trim();
    var ratePct = parseAmount(get('RatePct'));
    var lifeOrTenure = parseAmount(get('UsefulLifeOrTenure'));
    var dateVal = parseAnyDate(String(get('Date')||'')) || td();

    var newRow = {head:head, label:name, side:tbHeadSide(head), amount:amount};

    if(head==='stockitem'){
      newRow.qty=qty; newRow.cost=cost; newRow.unit=unit||'No.';
      newRow.amount = qty*cost;
    }
    if(head==='fixedassetitem'){
      newRow.category = category || 'Other';
      newRow.depRate = ratePct;
      newRow.purchaseDate = dateVal;
    }
    if(head==='intangibleitem'){
      newRow.category = category || 'Other';
      newRow.usefulLife = lifeOrTenure;
      newRow.purchaseDate = dateVal;
    }
    if(head==='loan'){
      newRow.loanType = category || 'Term Loan';
      newRow.depRate = ratePct; // interest rate
      newRow.usefulLife = lifeOrTenure; // tenure months
      newRow.purchaseDate = dateVal; // sanction date
    }
    newRows.push(newRow);
  }

  if(newRows.length===0) return {ok:false, error:'No valid rows found.'+(errors.length?(' '+errors.join(' ')):'')};

  return {ok:true, rows:newRows, errors:errors};
}


// ===== MULTI-SHEET XLSX PARSER (for full Business Data Import) =====
// Parses ALL named sheets in an .xlsx, returning {SheetName: [[row],[row],...]}
async function parseXlsxAllSheets(buf){
  if(typeof DecompressionStream==='undefined') throw new Error('XLSX_UNSUPPORTED');
  var entries = parseZipEntries(buf);

  // Read workbook.xml for sheet name -> rId mapping
  if(!entries['xl/workbook.xml']) throw new Error('NO_WORKBOOK_XML');
  var wbBytes = await extractZipEntry(buf, entries['xl/workbook.xml']);
  var wbXml = bytesToStr(wbBytes);
  var sheetTags = xmlGetTagText(wbXml, 'sheets')[0] || '';
  var sheetDefs = [];
  var sheetRe = /<sheet\b[^>]*\/>/g, m;
  while((m = sheetRe.exec(sheetTags))){
    var tag = m[0];
    var nameM = tag.match(/name="([^"]*)"/);
    var ridM = tag.match(/r:id="([^"]*)"/);
    if(nameM && ridM) sheetDefs.push({name:decodeXmlEntities(nameM[1]), rid:ridM[1]});
  }

  // Read rels for rId -> target file mapping
  var ridToFile = {};
  if(entries['xl/_rels/workbook.xml.rels']){
    var relBytes = await extractZipEntry(buf, entries['xl/_rels/workbook.xml.rels']);
    var relXml = bytesToStr(relBytes);
    var relRe = /<Relationship\b[^>]*\/>/g, rm;
    while((rm = relRe.exec(relXml))){
      var rtag = rm[0];
      var idM = rtag.match(/Id="([^"]*)"/);
      var targetM = rtag.match(/Target="([^"]*)"/);
      if(idM && targetM){
        var t = targetM[1].replace(/^\/?xl\//,'').replace(/^\//,'');
        if(t.indexOf('worksheets/')!==0 && t.indexOf('/')<0) t = 'worksheets/'+t;
        ridToFile[idM[1]] = 'xl/'+t;
      }
    }
  }

  var sharedStrings = [];
  if(entries['xl/sharedStrings.xml']){
    var ssBytes = await extractZipEntry(buf, entries['xl/sharedStrings.xml']);
    sharedStrings = parseSharedStrings(bytesToStr(ssBytes));
  }

  var result = {};
  for(var i=0;i<sheetDefs.length;i++){
    var sd = sheetDefs[i];
    var file = ridToFile[sd.rid];
    if(!file || !entries[file]) continue;
    var sBytes = await extractZipEntry(buf, entries[file]);
    var sXml = bytesToStr(sBytes);
    result[sd.name] = parseSheetXml(sXml, sharedStrings);
  }
  return result;
}

// ===== BUSINESS DATA IMPORT — Trial Balance + Inventory + Fixed Assets + Loans + Partners =====
// Reads any combination of these named sheets (case-insensitive, partial match):
//   "Trial Balance" / "TrialBalance" / "TB"
//   "Inventory" / "Stock"
//   "Fixed Assets" / "FixedAssets"
//   "Loans"
//   "Partners" / "Directors" / "Members"
// Any sheet not present is simply skipped — partial uploads are fine.
function findSheetByNames(sheets, candidates){
  var keys = Object.keys(sheets);
  for(var c=0;c<candidates.length;c++){
    var want = candidates[c].toLowerCase().replace(/[^a-z0-9]/g,'');
    for(var k=0;k<keys.length;k++){
      if(keys[k].toLowerCase().replace(/[^a-z0-9]/g,'')===want) return sheets[keys[k]];
    }
  }
  return null;
}
function rowsToObjects(rows){
  if(!rows || rows.length<2) return [];
  var header = rows[0].map(function(h){return String(h||'').trim();});
  var out = [];
  var hitInstructions = false;
  for(var r=1;r<rows.length;r++){
    var row = rows[r];
    if(!row || row.length===0 || !row.some(function(c){return String(c||'').trim()!=='';})) continue;
    var firstCell = String(row[0]||'').trim();
    // Stop reading data once we hit the instructions block (matches template format:
    // a line starting with "INSTRUCTIONS", or a numbered guidance line like "1. ...")
    if(/^instructions/i.test(firstCell)) { hitInstructions = true; continue; }
    if(hitInstructions) continue;
    if(/^\d+\.\s/.test(firstCell)) continue; // numbered instruction lines even before the header is hit
    var obj = {};
    for(var c=0;c<header.length;c++){ if(header[c]) obj[header[c]] = row[c]!==undefined ? row[c] : ''; }
    out.push(obj);
  }
  return out;
}
function importFullBusinessData(sheets){
  var summary = {tb:0, inventory:0, fixedAssets:0, loans:0, partners:0, errors:[]};

  // Check if non-TB sheets are present and TB is not yet posted
  var hasNonTBSheets = findSheetByNames(sheets,['Inventory','Stock','Stock Items']) ||
                       findSheetByNames(sheets,['Fixed Assets','FixedAssets','Assets']) ||
                       findSheetByNames(sheets,['Loans','Loan']) ||
                       findSheetByNames(sheets,['Partners','Directors','Members']);
  var hasTBSheet = findSheetByNames(sheets,['Trial Balance','TrialBalance','TB','Opening Balances']);
  if(hasNonTBSheets && !hasTBSheet && !D.tbPosted){
    alert('⚠️ Opening Trial Balance Not Posted\n\nYour file contains Inventory / Fixed Assets / Loans / Partners sheets but your Opening Trial Balance has not been posted yet.\n\nPlease either:\n1. Include a "Trial Balance" sheet in this file, OR\n2. Post your Opening Trial Balance first (Data → Opening Trial Balance → Post to Books)\n\nThis ensures your Balance Sheet stays in balance.');
    return summary;
  }

  // 1. Trial Balance (reuses existing importTBRows logic on the matched sheet's rows)
  var tbRows = findSheetByNames(sheets, ['Trial Balance','TrialBalance','TB','Opening Balances']);
  if(tbRows && tbRows.length>1){
    var tbResult = importTBRows(tbRows);
    if(tbResult.ok){
      D.trialBalance = tbResult.rows;
      summary.tb = tbResult.rows.length;
      if(tbResult.errors.length) summary.errors = summary.errors.concat(tbResult.errors.map(function(e){return 'Trial Balance: '+e;}));
    } else {
      summary.errors.push('Trial Balance: '+tbResult.error);
    }
  }

  // 2. Inventory (Items currently held — separate from Trial Balance stockitem rows,
  //    this sheet is for the live Inventory module so items show up in Sales/Purchase dropdowns)
  var invRows = findSheetByNames(sheets, ['Inventory','Stock','Stock Items']);
  if(invRows && invRows.length>1){
    var invObjs = rowsToObjects(invRows);
    invObjs.forEach(function(o){
      var name = String(o['ItemName']||o['Item Name']||o['Name']||'').trim();
      if(!name) return;
      var existing = D.inventory.find(function(i){return i.itemName.toLowerCase()===name.toLowerCase();});
      var stock = parseAmount(o['CurrentStock']||o['Current Stock']||o['Stock']||0);
      var cost = parseAmount(o['AvgCost']||o['Avg Cost']||o['Cost']||o['Rate']||0);
      var unit = String(o['Unit']||'No.').trim()||'No.';
      var reorder = parseAmount(o['ReorderLevel']||o['Reorder Level']||0);
      if(existing){
        existing.currentStock = stock; existing.avgCost = cost; existing.unit = unit; existing.reorderLevel = reorder;
      } else {
        D.inventory.push({id:uid(), itemName:name, unit:unit, openingStock:stock, currentStock:stock,
          avgCost:cost, importedStock:0, importedAvgCost:0, reorderLevel:reorder});
      }
      summary.inventory++;
    });
  }

  // 3. Fixed Assets (live Fixed Assets register, separate from TB opening entries —
  //    use this for assets you want to track with ongoing depreciation in the app)
  var faRows = findSheetByNames(sheets, ['Fixed Assets','FixedAssets','Assets']);
  if(faRows && faRows.length>1){
    var faObjs = rowsToObjects(faRows);
    // TB FA total — used to validate we don't exceed opening FA
    var tbFATotal = (D.trialBalance||[]).filter(function(r){return r.head==='fixedassetitem'||r.head==='fixedassets'||r.head==='intangibleitem';}).reduce(function(s,r){return s+(+r.amount||0);},0);
    faObjs.forEach(function(o){
      var name = String(o['Name']||o['Asset Name']||'').trim();
      if(!name) return;
      // Skip if already exists in fixedAssets (by name) to prevent duplicates
      var alreadyExists = (D.fixedAssets||[]).some(function(f){ return f.name.toLowerCase()===name.toLowerCase(); });
      if(alreadyExists){ summary.errors.push('FA skipped (already exists): '+name); return; }
      var faCost2 = parseAmount(o['Cost']||o['Amount']||0);
      // Validate: current FA total + new item must not exceed TB FA total (if TB posted)
      if(D.tbPosted && tbFATotal>0){
        var currentFATotal = (D.fixedAssets||[]).reduce(function(s,f){return s+(+f.cost||0);},0);
        if(currentFATotal + faCost2 > tbFATotal + 0.01){
          summary.errors.push('FA skipped (exceeds TB FA total of ₹'+tbFATotal.toLocaleString("en-IN")+'): '+name+' ₹'+faCost2.toLocaleString("en-IN"));
          return;
        }
      }
      D.fixedAssets.push({
        id:uid(), name:name, category:String(o['Category']||'Other').trim(),
        cost:faCost2,
        depRate:parseAmount(o['DepRate']||o['Dep Rate']||o['RatePct']||0),
        purchaseDate: parseAnyDate(String(o['PurchaseDate']||o['Purchase Date']||o['Date']||''))||td(),
        accumDep:0, lastDepDate: parseAnyDate(String(o['PurchaseDate']||o['Purchase Date']||o['Date']||''))||td(),
        disposed:false
      });
      // Keep D.otherAssets in sync so otherAssetsExclFA() stays correct
      D.otherAssets = (+D.otherAssets||0) + faCost2;
      D.otherAssetsNotes = D.otherAssetsNotes||[];
      D.otherAssetsNotes.push({label:name+' ('+String(o['Category']||'Other').trim()+')', amount:faCost2});
      summary.fixedAssets++;
    });
  }

  // 4. Loans (live Loans register, separate from TB opening loan entries —
  //    use this for loans you want to track with EMI/interest schedules going forward)
  var loanRows = findSheetByNames(sheets, ['Loans','Loan']);
  if(loanRows && loanRows.length>1){
    var loanObjs = rowsToObjects(loanRows);
    loanObjs.forEach(function(o){
      var bank = String(o['BankName']||o['Bank Name']||o['Lender']||'').trim();
      if(!bank) return;
      D.loans.push({
        id:uid(), bankName:bank, accountNumber:String(o['AccountNumber']||o['Account Number']||'').trim(),
        loanType:String(o['LoanType']||o['Loan Type']||'Term Loan').trim(),
        amount:parseAmount(o['Amount']||o['SanctionedAmount']||0),
        rate:parseAmount(o['Rate']||o['InterestRate']||o['RatePct']||0),
        tenure:parseAmount(o['Tenure']||o['TenureMonths']||0),
        sanctionDate: parseAnyDate(String(o['SanctionDate']||o['Sanction Date']||''))||td(),
        emi:0, outstandingBalance:parseAmount(o['OutstandingBalance']||o['Outstanding']||o['Amount']||0),
        sanctionedAmount:parseAmount(o['Amount']||o['SanctionedAmount']||0),
        undrawn:false, sanctionedLimit:parseAmount(o['SanctionedLimit']||0),
        lastInterestDate: parseAnyDate(String(o['SanctionDate']||o['Sanction Date']||''))||td(),
        payments:[]
      });
      summary.loans++;
    });
  }

  // 5. Partners / Directors / Members
  var partnerRows = findSheetByNames(sheets, ['Partners','Directors','Members','Office Bearers']);
  if(partnerRows && partnerRows.length>1){
    var partnerObjs = rowsToObjects(partnerRows);
    if(!D.profile.partners) D.profile.partners = [];
    partnerObjs.forEach(function(o){
      var name = String(o['Name']||o['Full Name']||'').trim();
      if(!name) return;
      D.profile.partners.push({
        id:uid(), name:name, role:String(o['Role']||'Partner').trim(),
        share:parseAmount(o['Share']||o['SharePct']||o['Share%']||0),
        pan:String(o['PAN']||'').trim().toUpperCase(),
        din:String(o['DIN']||o['DIN/Aadhar']||o['Aadhar']||'').trim()
      });
      summary.partners++;
    });
  }

  return summary;
}

async function handleFullDataUpload(ev){
  var f=ev.target.files[0];
  if(!f) return;
  var statusEl=document.getElementById('fulldata_upload_status');
  if(statusEl) statusEl.innerHTML='<div class="al ali">Processing...</div>';
  try{
    if(!/\.xlsx?$/i.test(f.name)){
      if(statusEl) statusEl.innerHTML='<div class="al ald">Please upload an .xlsx file (download the template below to get the correct format).</div>';
      return;
    }
    if(typeof DecompressionStream==='undefined'){
      if(statusEl) statusEl.innerHTML='<div class="al ald">Your browser cannot read Excel files here. Please update your browser/iOS version.</div>';
      return;
    }
    var buf = await f.arrayBuffer();
    var sheets = await parseXlsxAllSheets(buf);
    var sheetNames = Object.keys(sheets);
    if(sheetNames.length===0){
      if(statusEl) statusEl.innerHTML='<div class="al ald">No readable sheets found in this file.</div>';
      return;
    }
    var proceed = await confirmDialogAsync('This will import data from sheets: '+sheetNames.join(', ')+'. Trial Balance (if present) will REPLACE existing opening balances. Inventory/Fixed Assets/Loans/Partners will be ADDED to existing data. Continue?');
    if(!proceed){ if(statusEl) statusEl.innerHTML=''; return; }

    var summary = importFullBusinessData(sheets);

    // If Trial Balance rows were imported successfully, auto-post them now
    // so that opening balances are set and other sheets (FA, Inventory) balance correctly
    if(summary.tb && D.trialBalance && D.trialBalance.length>0 && !D.tbPosted){
      var tbTotals = {dr:0, cr:0};
      D.trialBalance.forEach(function(r){ if(r.side==='dr') tbTotals.dr+=(+r.amount||0); else tbTotals.cr+=(+r.amount||0); });
      if(Math.abs(tbTotals.dr - tbTotals.cr) < 0.01){
        postTBExecute();
        summary.tbAutoPosted = true;
      } else {
        summary.errors.push('Trial Balance does not tally (DR '+tbTotals.dr+' vs CR '+tbTotals.cr+') — please correct and post manually via Data → Opening Trial Balance.');
      }
    }

    sv();
    var msg = 'Import complete: ';
    var parts = [];
    if(summary.tb) parts.push(summary.tb+' Trial Balance row(s)'+(summary.tbAutoPosted?' (auto-posted ✅)':''));
    if(summary.inventory) parts.push(summary.inventory+' Inventory item(s)');
    if(summary.fixedAssets) parts.push(summary.fixedAssets+' Fixed Asset(s)');
    if(summary.loans) parts.push(summary.loans+' Loan(s)');
    if(summary.partners) parts.push(summary.partners+' Partner(s)/Director(s)');
    msg += parts.length ? parts.join(', ')+'.' : 'No matching sheets found — check sheet names match the template.';
    if(summary.errors.length) msg += ' '+summary.errors.length+' warning(s).';
    if(statusEl) statusEl.innerHTML='<div class="al '+(summary.errors.length?'alw':'als')+'">'+esc(msg)+(summary.errors.length?'<br>'+summary.errors.map(esc).join('<br>'):'')+'</div>';
    renderPage();
  }catch(e){
    if(statusEl) statusEl.innerHTML='<div class="al ald">Error reading file: '+esc(e.message)+'</div>';
  }
}

async function handleTBUpload(ev){
  var f=ev.target.files[0];
  if(!f) return;
  var statusEl=document.getElementById('tb_upload_status');
  if(statusEl) statusEl.innerHTML='<div class="al ali">Processing...</div>';
  try{
    var rows;
    if(/\\.xlsx?$/i.test(f.name)){
      if(typeof DecompressionStream==='undefined'){
        if(statusEl) statusEl.innerHTML='<div class="al ald">Your browser cannot read Excel files here. Please save as CSV and upload that instead.</div>';
        return;
      }
      var buf = await f.arrayBuffer();
      rows = await parseXlsxArrayBuffer(buf);
    } else {
      var text = await f.text();
      rows = parseCSV(text);
    }
    var result = importTBRows(rows);
    if(!result.ok){
      if(statusEl) statusEl.innerHTML='<div class="al ald">'+esc(result.error)+'</div>';
      return;
    }
    if(D.trialBalance && D.trialBalance.length>0){
      var proceed = await confirmDialogAsync('This will REPLACE your '+D.trialBalance.length+' existing Trial Balance row(s) with '+result.rows.length+' row(s) from the file. Continue?');
      if(!proceed){
        if(statusEl) statusEl.innerHTML='';
        return;
      }
    }
    D.trialBalance = result.rows;
    sv();
    var msg = 'Imported '+result.rows.length+' row(s).';
    if(result.errors.length) msg += ' '+result.errors.length+' row(s) skipped (see below).';
    if(statusEl) statusEl.innerHTML='<div class="al '+(result.errors.length?'alw':'als')+'">'+esc(msg)+(result.errors.length?'<br>'+result.errors.map(esc).join('<br>'):'')+'</div>';
    renderPage();
  }catch(e){
    if(statusEl) statusEl.innerHTML='<div class="al ald">Error reading file: '+esc(e.message)+'</div>';
  }
}

// ===== UNIVERSAL DOWNLOAD/SHARE HELPER (with file:// fallback for mobile) =====
function downloadOrShow(content, filename, mimeType){
  // Try the standard Blob download first (works on desktop browsers and some mobile browsers).
  var blobWorked = false;
  try{
    var bl = new Blob([content],{type:mimeType||'text/plain'});
    var url = URL.createObjectURL(bl);
    var a = document.createElement('a');
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click();
    setTimeout(function(){if(a.parentNode)document.body.removeChild(a);URL.revokeObjectURL(url);},100);
    blobWorked = true;
  }catch(e){}

  // Regardless of whether the above worked, ALSO show a guaranteed fallback:
  // a full-screen overlay with the content in a textarea for manual copy/save.
  // This is necessary because in many mobile in-app browsers, the Blob/download
  // click is silently ignored with no visible result.
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:10001;overflow-y:auto;padding:16px';

  var title = document.createElement('div');
  title.style.cssText = 'font-size:15px;font-weight:700;color:#0D2137;margin-bottom:6px';
  title.textContent = (blobWorked?'A download was attempted: ':'')+filename;

  var instructions = document.createElement('div');
  instructions.style.cssText = 'font-size:12px;color:#546E7A;margin-bottom:10px;line-height:1.4';
  instructions.textContent = (blobWorked
    ? 'If you did not see a "Downloaded" notification or cannot find the file, use the box below instead: tap "Select All", then "Copy", then paste it into a Note or new file named "'+filename+'" and save it (Files app, email to yourself, etc.).'
    : 'Tap "Select All" below, then "Copy". Paste this into a Note or a new file named "'+filename+'" and save it somewhere safe (Files app, email to yourself, etc.).');

  var ta = document.createElement('textarea');
  ta.readOnly = true;
  ta.value = content;
  ta.style.cssText = 'width:100%;height:55vh;font-family:monospace;font-size:11px;padding:8px;box-sizing:border-box;border:1px solid #BBDEFB;border-radius:8px;white-space:pre;resize:none';

  var btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:8px;justify-content:flex-end;margin-top:10px;flex-wrap:wrap';

  var selectBtn = document.createElement('button');
  selectBtn.textContent = 'Select All';
  selectBtn.style.cssText = 'padding:9px 14px;border-radius:8px;border:1px solid #BBDEFB;background:#fff;color:#1565C0;font-size:13px;cursor:pointer';
  selectBtn.onclick = function(){ ta.focus(); ta.select(); };

  var copyBtn = document.createElement('button');
  copyBtn.textContent = 'Copy';
  copyBtn.style.cssText = 'padding:9px 14px;border-radius:8px;border:none;background:#2E7D32;color:#fff;font-size:13px;font-weight:700;cursor:pointer';
  copyBtn.onclick = function(){
    ta.focus(); ta.select();
    try{
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(content);
        toast('Copied! Now paste it into a Note or file.');
      } else if(document.execCommand && document.execCommand('copy')){
        toast('Copied! Now paste it into a Note or file.');
      } else {
        toast('Tap inside the box, Select All, then use your keyboard\'s Copy option.','w');
      }
    }catch(e){
      toast('Tap inside the box, Select All, then use your keyboard\'s Copy option.','w');
    }
  };

  var closeBtn = document.createElement('button');
  closeBtn.textContent = 'Close';
  closeBtn.style.cssText = 'padding:9px 14px;border-radius:8px;border:1px solid #BBDEFB;background:#fff;color:#546E7A;font-size:13px;cursor:pointer';
  closeBtn.onclick = function(){ document.body.removeChild(overlay); };

  btnRow.appendChild(selectBtn);
  btnRow.appendChild(copyBtn);
  btnRow.appendChild(closeBtn);

  overlay.appendChild(title);
  overlay.appendChild(instructions);
  overlay.appendChild(ta);
  overlay.appendChild(btnRow);
  document.body.appendChild(overlay);
}

// ===== PIN PRIVACY SCREEN =====
// NOTE: This is a casual privacy screen, NOT real security/encryption.
// Data remains in plain localStorage; this only deters casual access (e.g. someone
// picking up the phone). A determined person with technical access can bypass it.
function simpleHash(str){
  var h1 = 0x811c9dc5, h2 = 0x1000193;
  for(var i=0;i<str.length;i++){
    var c = str.charCodeAt(i);
    h1 = (h1 ^ c) * 0x01000193; h1 = h1 >>> 0;
    h2 = (h2 + c) * 0x9e3779b1; h2 = h2 >>> 0;
  }
  return h1.toString(16)+h2.toString(16);
}

var _pinUnlocked = false;
var _pinEntry = '';

function isPinLockActive(){
  return D && D.security && D.security.pinEnabled && D.security.pinHash && !_pinUnlocked;
}

function pgPinLock(isSetup){
  var title = isSetup ? 'Set a PIN' : 'Enter PIN';
  var sub = isSetup
    ? 'Choose a 4-6 digit PIN to lock this app. This is a privacy screen only - it does not encrypt your data.'
    : 'Enter your PIN to continue.';
  var dots = '';
  for(var i=0;i<6;i++){
    dots += '<span style="display:inline-block;width:16px;height:16px;margin:0 4px;border-radius:50%;border:2px solid #1565C0;background:'+(i<_pinEntry.length?'#1565C0':'transparent')+'"></span>';
  }
  var keys = ['1','2','3','4','5','6','7','8','9','OK','0','BS'];
  var keypad = '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:18px auto">';
  keys.forEach(function(k){
    var label = k, action;
    if(k==='BS'){ label='⌫'; action='pinBackspace()'; }
    else if(k==='OK'){ label='OK'; action='pinDone()'; }
    else { action="pinPress('"+k+"')"; }
    keypad += '<button onclick="'+action+'" style="padding:16px;font-size:20px;border-radius:12px;border:1px solid #BBDEFB;background:#fff;cursor:pointer">'+label+'</button>';
  });
  keypad += '</div>';

  var errMsg = window._pinError ? '<div class="al ald" style="margin:10px auto;max-width:280px">'+esc(window._pinError)+'</div>' : '';
  var forgot = !isSetup ? '<div style="text-align:center;margin-top:14px"><button onclick="pinForgot()" style="background:none;border:none;color:#C62828;font-size:12px;text-decoration:underline;cursor:pointer">Forgot PIN?</button></div>' : '';

  return '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center">'+
    '<div style="font-size:40px;margin-bottom:8px">🔒</div>'+
    '<h2 style="margin:0 0 6px">'+title+'</h2>'+
    '<p style="font-size:12px;color:#546E7A;max-width:280px;margin:0 0 16px">'+sub+'</p>'+
    '<div>'+dots+'</div>'+
    errMsg+
    keypad+
    (isSetup ? '<div style="font-size:11px;color:#90A4AE;max-width:280px">Step '+(window._pinSetupStep===2?'2 of 2 - re-enter to confirm':'1 of 2')+'</div>' : '')+
    forgot+
    '</div>';
}

function pinPress(d){
  window._pinError='';
  if(_pinEntry.length<6) _pinEntry += d;
  renderPage();
}
function pinBackspace(){
  window._pinError='';
  _pinEntry = _pinEntry.slice(0,-1);
  renderPage();
}
function pinDone(){
  if(_pinEntry.length<4){ window._pinError='PIN must be at least 4 digits.'; renderPage(); return; }
  pinSubmit();
}
function pinSubmit(){
  if(window._showPinSetup){
    if(_pinEntry.length<4){ window._pinError='PIN must be at least 4 digits.'; renderPage(); return; }
    if(!window._pinSetupStep){
      window._pinSetupFirst = _pinEntry;
      _pinEntry='';
      window._pinSetupStep=2;
      renderPage();
      return;
    }
    if(_pinEntry !== window._pinSetupFirst){
      window._pinError='PINs did not match. Try again.';
      _pinEntry=''; window._pinSetupStep=null; window._pinSetupFirst=null;
      renderPage();
      return;
    }
    D.security = {pinEnabled:true, pinHash:simpleHash(_pinEntry)};
    sv();
    _pinUnlocked = true;
    _pinEntry=''; window._pinSetupStep=null; window._pinSetupFirst=null; window._pinError=''; window._showPinSetup=false;
    toast('PIN set!');
    renderPage();
    return;
  }
  if(simpleHash(_pinEntry)===D.security.pinHash){
    _pinUnlocked = true;
    _pinEntry=''; window._pinError='';
    renderPage();
  } else {
    window._pinError='Incorrect PIN. Try again.';
    _pinEntry='';
    renderPage();
  }
}
function pinForgot(){
  D.security = {pinEnabled:false, pinHash:''};
  sv();
  _pinUnlocked = true;
  _pinEntry=''; window._pinError='';
  toast('PIN removed.');
  renderPage();
}

function startPinSetup(){

function getKnownCustomers(){
  var seen={}, names=[];
  D.sales.forEach(function(s){
    if(s.customerName && !seen[s.customerName]){ seen[s.customerName]=true; names.push(s.customerName); }
  });
  return names.sort();
}

function loadCustomerSalesIntoCart(){
  var cust = window._billCustomer || getBillCustomerName();
  var date = window._billDate || gv('bc_date');
  if(!cust){ toast('Enter or select a customer name first','e'); return; }
  if(!date){ toast('Select a date first','e'); return; }
  var matches = D.sales.filter(function(s){ return s.customerName===cust && s.date===date && !s.billNo; });
  if(matches.length===0){ toast('No matching sales found for '+cust+' on '+date,'e'); return; }
  window._billCart = window._billCart || [];
  matches.forEach(function(s){
    var item=null; for(var i=0;i<D.inventory.length;i++) if(D.inventory[i].id===s.itemId){item=D.inventory[i];break;}
    window._billCart.push({
      itemId:s.itemId, itemName:s.itemName, unit:s.unit, qty:s.qty, price:s.sellingPrice, amount:s.totalAmount,
      avgCost:item?item.avgCost:0, fromSaleId:s.id
    });
  });
  toast('Loaded '+matches.length+' item(s) from existing sales.');
  renderPage();
}

function pgBillCart(){
  var cart = window._billCart || [];
  var iOpts=[{v:'',l:'-- Select Item --'}];
  for(var i=0;i<D.inventory.length;i++){
    var it=D.inventory[i];
    var inCart=0; (window._billCart||[]).forEach(function(c){if(c.itemId===it.id)inCart+=c.qty;});
    var avail = it.currentStock - inCart;
    iOpts.push({v:it.id,l:it.itemName+' ('+(avail>0?('Stock:'+fmt(avail)+' '+it.unit):'Out of stock')+')'});
  }

  var h = '<div style="margin-bottom:8px">'+btn('← Back to Sales','window._salMode=null;renderPage()','#546E7A')+'</div>';
  h += '<div class="al ali"><div class="alt">Create Bill (Multi-Item Invoice)</div><p>Add each item the customer is buying, then Generate Bill. This records the sale(s) and creates a printable/shareable invoice.</p></div>';

  var knownCustomers = getKnownCustomers();
  var custSel = window._billCustomerSel || '__new__';
  if(!window._billCustomerSel && window._billCustomer && knownCustomers.indexOf(window._billCustomer)>=0){
    custSel = window._billCustomer;
  }
  var custOpts=[{v:'__new__',l:'+ New / Type Customer Name'}];
  knownCustomers.forEach(function(n){ custOpts.push({v:n,l:n}); });

  var custFields = '<div class="fg"><label>Customer</label><select id="bc_custsel" onchange="onBillCustomerSelChange()" style="width:100%;padding:9px;border-radius:8px;border:1px solid #BBDEFB;font-size:13px;background:#fff;color:#0D2137">'+
    custOpts.map(function(o){return '<option value="'+esc(o.v)+'"'+(o.v===custSel?' selected':'')+'>'+esc(o.l)+'</option>';}).join('')+
    '</select></div>';
  if(custSel==='__new__'){
    custFields += inp('Customer Name','bc_cust','text',window._billCustomer||'');
  }

  h += card('Customer & Items',
    custFields+
    inp('Bill Date','bc_date','date',window._billDate||td())+
    btn('📥 Load Items from Sales on this Date','loadCustomerSalesIntoCart()','#546E7A')+
    '<div style="font-size:11px;color:#90A4AE;margin-top:6px">If you already recorded this customer\'s sale(s) for this date, tap above to pull those items into the bill automatically - instead of re-entering them below.</div>'
  );

  // Add item row
  var selId = window._billItem || '';
  var selItem=null; for(i=0;i<D.inventory.length;i++) if(D.inventory[i].id===selId) selItem=D.inventory[i];
  h += card('Add Item to Bill',
    sl('Item','bc_item',iOpts,selId)+
    g2(inp('Quantity','bc_qty','number',window._billQty||''),inp('Price per Unit (₹)','bc_price','number',selItem?selItem.sellingPrice||'':(window._billPrice||'')))+
    btn('+ Add to Bill','addToBillCart()','#2E7D32')
  );

  // Cart table
  if(cart.length){
    var total=0;
    var hasLoadedItems=false, hasNewItems=false;
    var rows = cart.map(function(c,idx){
      total += c.amount;
      if(c.fromSaleId) hasLoadedItems=true; else hasNewItems=true;
      var tag = c.fromSaleId ? ' <span style="font-size:10px;color:#2E7D32">(from existing sale)</span>' : '';
      return '<tr><td style="padding:6px 4px">'+esc(c.itemName)+tag+'</td><td style="padding:6px 4px;text-align:right">'+fmt(c.qty)+' '+esc(c.unit)+'</td><td style="padding:6px 4px;text-align:right">'+fc(c.price)+'</td><td style="padding:6px 4px;text-align:right">'+fc(c.amount)+'</td><td style="padding:6px 4px;text-align:center"><button onclick="removeFromBillCart('+idx+')" style="background:none;border:none;color:#C62828;font-weight:700;cursor:pointer">✕</button></td></tr>';
    }).join('');
    h += card('Bill Items',
      '<table style="width:100%;font-size:12px;border-collapse:collapse">'+
      '<tr style="font-weight:700;color:#546E7A;border-bottom:1px solid #ECEFF1"><td style="padding:6px 4px">Item</td><td style="padding:6px 4px;text-align:right">Qty</td><td style="padding:6px 4px;text-align:right">Rate</td><td style="padding:6px 4px;text-align:right">Amount</td><td></td></tr>'+
      rows+
      '<tr style="font-weight:700;border-top:2px solid #1565C0"><td colspan="3" style="padding:8px 4px">TOTAL</td><td style="padding:8px 4px;text-align:right">'+fc(total)+'</td><td></td></tr>'+
      '</table>'
    );

    var paymentNote = '';
    if(hasLoadedItems && !hasNewItems){
      paymentNote = '<div class="al ali">All items above were already recorded as sales (their cash/credit postings are unchanged). Payment Mode below is not needed - just tap Generate Bill to create the invoice.</div>';
    } else if(hasLoadedItems && hasNewItems){
      paymentNote = '<div class="al ali">Payment Mode below applies only to the NEW item(s) added; items marked "(from existing sale)" keep their original payment recording.</div>';
    }
    h += card('Payment',
      paymentNote+
      sl('Payment Mode','bc_mode',[{v:'cash',l:'Cash'},{v:'bank',l:'Bank/UPI'},{v:'credit',l:'Credit (add to Debtor balance)'}],window._billMode||'cash')+
      btn('🧾 Generate Bill','generateBill()','#1565C0')+' '+
      btn('Clear Cart','clearBillCart()','#C62828')
    );
  } else {
    h += '<div class="al ali">No items added yet.</div>';
  }

  return h;
}

// Get the currently chosen bill customer name, whether from the dropdown (existing customer) or the new-customer text field
function getBillCustomerName(){
  var sel = gv('bc_custsel');
  if(sel && sel!=='__new__') return sel;
  return gv('bc_cust');
}
function onBillCustomerSelChange(){
  var sel = gv('bc_custsel');
  window._billCustomerSel = sel;
  if(sel!=='__new__') window._billCustomer = sel;
  else window._billCustomer = '';
  renderPage();
}
function addToBillCart(){
  var iid=gv('bc_item'), qty=gvn('bc_qty'), price=gvn('bc_price');
  window._billCustomer = getBillCustomerName();
  window._billCustomerSel = gv('bc_custsel') || window._billCustomerSel;
  window._billDate = gv('bc_date');
  if(!iid){toast('Select an item','e');return;}
  if(!qty||!price){toast('Enter quantity and price','e');return;}
  var item=null; for(var i=0;i<D.inventory.length;i++) if(D.inventory[i].id===iid){item=D.inventory[i];break;}
  if(!item) return;
  if(qty>item.currentStock){toast('Insufficient stock! Available: '+fmt(item.currentStock),'e');return;}
  window._billCart = window._billCart || [];
  // check available stock considering items already in cart for same item
  var alreadyInCart=0;
  window._billCart.forEach(function(c){ if(c.itemId===iid) alreadyInCart += c.qty; });
  if(qty+alreadyInCart>item.currentStock){toast('Insufficient stock for total quantity! Available: '+fmt(item.currentStock),'e');return;}
  window._billCart.push({itemId:iid, itemName:item.itemName, unit:item.unit, qty:qty, price:price, amount:qty*price, avgCost:item.avgCost});
  window._billItem=''; window._billQty=''; window._billPrice='';
  renderPage();
}
function removeFromBillCart(idx){
  window._billCart.splice(idx,1);
  renderPage();
}
function clearBillCart(){
  confirmDialog('Clear all items from this bill?', function(){
    window._billCart=[];
    renderPage();
  });
}

function generateBill(){
  var cart = window._billCart||[];
  if(cart.length===0){toast('Add at least one item','e');return;}
  var cust = window._billCustomer || getBillCustomerName();
  if(!cust){toast('Enter customer name','e');return;}
  var date = window._billDate || gv('bc_date') || td();
  var mode = gv('bc_mode');

  var billNo = 'INV-' + String(D.nextBillNo).padStart(4,'0');
  D.nextBillNo++;

  var total=0;
  var items=[];
  var newSaleTotal=0, newSaleMode=mode;
  cart.forEach(function(c){
    var item=null; for(var i=0;i<D.inventory.length;i++) if(D.inventory[i].id===c.itemId){item=D.inventory[i];break;}
    var tot=c.amount;
    total += tot;
    items.push({itemName:c.itemName, unit:c.unit, qty:c.qty, price:c.price, amount:tot});

    if(c.fromSaleId){
      // This item was loaded from an EXISTING sale entry - just tag it with the bill number,
      // do not re-record stock/cash movements (already posted when that sale was made).
      var existing=null; for(var j=0;j<D.sales.length;j++) if(D.sales[j].id===c.fromSaleId){existing=D.sales[j];break;}
      if(existing) existing.billNo = billNo;
    } else {
      // New item being sold now - record as a normal sale
      if(!item) return;
      var cogs=c.qty*item.avgCost, gp=tot-cogs, pct=+(tot>0?((gp/tot)*100).toFixed(1):0);
      D.sales.push({id:uid(),date:date,customerName:cust,itemId:c.itemId,itemName:item.itemName,unit:item.unit,qty:c.qty,sellingPrice:c.price,totalAmount:tot,cogs:cogs,grossProfit:gp,profitPct:pct,paymentMode:mode,billNo:billNo});
      item.currentStock -= c.qty;
      newSaleTotal += tot;
    }
  });

  // Only post NEW cash/debtor movements for items that were not already recorded as sales
  if(newSaleTotal>0){
    if(newSaleMode==='credit'){
      addDebtor(cust, newSaleTotal, date, 'Bill '+billNo);
    } else {
      postCB(newSaleMode, 'receipt', newSaleTotal, cust, 'Bill '+billNo, date);
    }
  }

  // Auto-read GST rate from inventory item
  var billGstRate = 0;
  if(gstEnabled()){
    var billGstOverride = gvn('bill_gst');
    if(billGstOverride!==undefined && billGstOverride!==null && document.getElementById('bill_gst')){
      billGstRate = billGstOverride;
    } else {
      // Try to read from first item in cart
      if(window._billCart && window._billCart.length>0){
        var firstItem=null;
        for(var bi=0;bi<D.inventory.length;bi++){
          if(D.inventory[bi].id===window._billCart[0].itemId){firstItem=D.inventory[bi];break;}
        }
        if(firstItem && firstItem.gstRate!==undefined) billGstRate=firstItem.gstRate;
        else { var lu=lookupHSN(window._billCart[0].itemName); if(lu) billGstRate=+lu[1]; }
      }
    }
  }
  var billGstType = (D.gst&&D.gst.supplyType)||'intra';
  var bill = {id:uid(), billNo:billNo, date:date, customerName:cust, items:items, totalAmount:total, paymentMode:mode, gstRate:billGstRate, gstType:billGstType};
  D.bills.push(bill);

  window._billCart=[]; window._billCustomer=''; window._billCustomerSel=''; window._billDate=''; window._billItem=''; window._billQty=''; window._billPrice='';
  sv();
  toast('Bill '+billNo+' generated!');
  showBillInvoice(bill.id);
}

function billPaymentLabel(mode){
  if(mode==='cash') return 'Cash';
  if(mode==='bank') return 'Bank / UPI';
  if(mode==='credit') return 'Credit';

function billShareText(bill){
  var p = D.profile;
  var lines=['Invoice '+bill.billNo+' - '+(p.businessName||''),'Date: '+bill.date,'Bill To: '+bill.customerName,''];
  bill.items.forEach(function(it){ lines.push(it.itemName+' x '+fmt(it.qty)+' '+it.unit+' @ '+fc(it.price)+' = '+fc(it.amount)); });
  if(bill.gstRate&&bill.gstRate>0){
    var gstAmt=Math.round(bill.totalAmount*bill.gstRate/100);
    lines.push('GST ('+bill.gstRate+'%): '+fc(gstAmt));
    lines.push('Grand Total: '+fc(bill.totalAmount+gstAmt));
  } else {
    lines.push('TOTAL: '+fc(bill.totalAmount));
  }
  return lines.join('\n');
}
function shareBillWhatsApp(billId){
  var bill=null; for(var i=0;i<D.bills.length;i++) if(D.bills[i].id===billId){bill=D.bills[i];break;}
  if(!bill)return;
  var url = 'https://wa.me/?text='+encodeURIComponent(billShareText(bill));
  var win = window.open(url,'_blank');
  if(!win) toast('Could not open WhatsApp - please allow pop-ups, or copy the bill details manually.','e');
}
function shareBillEmail(billId){
  var bill=null; for(var i=0;i<D.bills.length;i++) if(D.bills[i].id===billId){bill=D.bills[i];break;}
  if(!bill)return;
  var url = 'mailto:?subject='+encodeURIComponent('Invoice '+bill.billNo)+'&body='+encodeURIComponent(billShareText(bill));
  window.location.href = url;
}
function copyBillText(billId){
  var bill=null; for(var i=0;i<D.bills.length;i++) if(D.bills[i].id===billId){bill=D.bills[i];break;}
  if(!bill)return;
  var text = billShareText(bill);
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text);
      toast('Bill details copied! Paste into WhatsApp, SMS, or email.');
    } else {
      // Fallback: use a temporary textarea + execCommand
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position='fixed'; ta.style.left='-9999px';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      var ok = document.execCommand && document.execCommand('copy');
      document.body.removeChild(ta);
      if(ok) toast('Bill details copied! Paste into WhatsApp, SMS, or email.');
      else toast('Could not copy automatically. Please select and copy the invoice text manually.','w');
    }
  }catch(e){
    toast('Could not copy automatically. Please select and copy the invoice text manually.','w');
  }
}

    msg.textContent = message;
    var btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:flex;gap:10px;justify-content:flex-end';
    var cancelBtn = document.createElement('button');
    cancelBtn.textContent = 'Cancel';
    cancelBtn.style.cssText = 'padding:9px 16px;border-radius:8px;border:1px solid #BBDEFB;background:#fff;color:#546E7A;font-size:13px;cursor:pointer';
    var okBtn = document.createElement('button');
    okBtn.textContent = 'OK';

    cancelBtn.onclick = function(){ document.body.removeChild(overlay); resolve(false); };
    okBtn.onclick = function(){ document.body.removeChild(overlay); resolve(true); };
    btnRow.appendChild(cancelBtn);
    btnRow.appendChild(okBtn);
    box.appendChild(msg);
    box.appendChild(btnRow);
    overlay.appendChild(box);
    document.body.appendChild(overlay);
  });
}
function promptDialog(message, defaultValue, onSubmit){
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px';

  msg.textContent = message;
  var input = document.createElement('input');

  input.style.cssText = 'width:100%;padding:9px;border-radius:8px;border:1px solid #BBDEFB;font-size:13px;box-sizing:border-box;margin-bottom:14px';
  var btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:10px;justify-content:flex-end';
  var cancelBtn = document.createElement('button');
  cancelBtn.textContent = 'Cancel';
  cancelBtn.style.cssText = 'padding:9px 16px;border-radius:8px;border:1px solid #BBDEFB;background:#fff;color:#546E7A;font-size:13px;cursor:pointer';
  var okBtn = document.createElement('button');
  okBtn.textContent = 'OK';
  okBtn.style.cssText = 'padding:9px 16px;border-radius:8px;border:none;background:#1565C0;color:#fff;font-size:13px;font-weight:700;cursor:pointer';
  cancelBtn.onclick = function(){ document.body.removeChild(overlay); };
  okBtn.onclick = function(){ var val=input.value; document.body.removeChild(overlay); onSubmit(val); };
  btnRow.appendChild(cancelBtn);
  btnRow.appendChild(okBtn);
