  box.appendChild(input);
  box.appendChild(btnRow);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  input.focus();
}

// ===== BANK LOAN ASSESSMENT MODULE =====
// Calculates WC limit eligibility using Turnover Method (Nayak) and Cash Flow Method (Tandon / Operating Cycle)
// Computes DSCR, projected P&L and Balance Sheet for 2 years
// Works with live data from D (the app's data object)

function pgLoanAssess() {
  var tab = window._latab || 'inputs';
  var h = '<div class="tabs">';
  h += '<button class="'+(tab==='inputs'?'act':'')+'" onclick="window._latab=\'inputs\';renderPage()">Loan Details</button>';
  h += '<button class="'+(tab==='projections'?'act':'')+'" onclick="window._latab=\'projections\';renderPage()">Projections</button>';
  h += '<button class="'+(tab==='wclimit'?'act':'')+'" onclick="window._latab=\'wclimit\';renderPage()">WC Limit</button>';
  h += '<button class="'+(tab==='dscr'?'act':'')+'" onclick="window._latab=\'dscr\';renderPage()">DSCR</button>';
  h += '<button class="'+(tab==='bepirr'?'act':'')+'" onclick="window._latab=\'bepirr\';renderPage()">BEP / IRR</button>';
  h += '<button class="'+(tab==='projcfs'?'act':'')+'" onclick="window._latab=\'projcfs\';renderPage()">Proj. Cash Flow</button>';
  h += '</div>';

  // Load saved assumptions or defaults
  var la = D.loanAssessment || {};
  var ccLimit   = +(la.ccLimit   || 0);
  var tlAmount  = +(la.tlAmount  || 0);
  var ccRate    = +(la.ccRate    || 8);
  var tlRate    = +(la.tlRate    || 9);
  var tlTenure  = +(la.tlTenure  || 36);
  var salesGrowth = +(la.salesGrowth || 20);
  var stockDays   = +(la.stockDays   || 30);
  var debtorDays  = +(la.debtorDays  || 30);
  var creditorDays= +(la.creditorDays|| 30);
  var expGrowth   = +(la.expGrowth   || 10);
  var marginPctTurnover = la.marginPctTurnover !== undefined ? +la.marginPctTurnover : 25;
  var marginPctTandon   = la.marginPctTandon   !== undefined ? +la.marginPctTandon   : 25;
  var useManual   = la.useManual   || false;
  var manualSales = +(la.manualSales || 0);
  var manualCogsP = la.manualCogsP !== undefined ? +la.manualCogsP : 70;
  var manualExp   = +(la.manualExp   || 0);

  if (tab === 'inputs') {
    // --- Unit Type Toggle ---
    h += card('Unit Type',
      '<div style="font-size:12px;color:#546E7A;margin-bottom:8px">Select whether this is an existing running business (uses your actual recorded data) or a new unit (you enter projected figures manually).</div>'+
      '<div style="display:flex;gap:8px;margin-bottom:10px">'+
        '<button onclick="toggleLAManual(false)" style="flex:1;padding:10px;border-radius:8px;border:2px solid '+(useManual?'#BBDEFB':'#1565C0')+';background:'+(useManual?'#fff':'#E3F2FD')+';color:'+(useManual?'#546E7A':'#1565C0')+';font-weight:700;font-size:13px;cursor:pointer">🏢 Existing Unit<br><span style="font-size:10px;font-weight:400">Uses your recorded data</span></button>'+
        '<button onclick="toggleLAManual(true)"  style="flex:1;padding:10px;border-radius:8px;border:2px solid '+(useManual?'#1565C0':'#BBDEFB')+';background:'+(useManual?'#E3F2FD':'#fff')+';color:'+(useManual?'#1565C0':'#546E7A')+';font-weight:700;font-size:13px;cursor:pointer">🆕 New Unit<br><span style="font-size:10px;font-weight:400">Enter projected figures</span></button>'+
      '</div>'+
      (useManual
        ? '<div class="al ali">You are in <b>New Unit</b> mode. Enter your projected Year 0 figures below — these will be used as the base for all calculations instead of actual recorded data.</div>'
        : '<div class="al als">You are in <b>Existing Unit</b> mode. Actual recorded Sales, Purchases and Expenses are used automatically as the base.</div>')
    );

    // --- Manual Figures Card (New Unit only) ---
    if (useManual) {
      var base0 = getLABase();
      var hasActual = base0.sales > 0;
      h += card('Projected Year 0 Figures (New Unit)',
        '<div style="font-size:11px;color:#546E7A;margin-bottom:8px">Enter your best estimate of annual figures for the first full year of operation. These are used as the base for Year 1 and Year 2 projections.</div>'+
        inp('Projected Annual Sales (₹)','la_ms','number',manualSales||0)+
        g2(inp('COGS as % of Sales','la_mcp','number',manualCogsP||70),
           inp('Total Annual Expenses (₹)','la_me','number',manualExp||0))+
        '<div style="font-size:11px;color:#546E7A;margin-bottom:6px">COGS % — typical ranges: Trading 60-75%, Manufacturing 50-70%, Service 20-40%</div>'+
        (manualSales > 0
          ? '<div style="background:#F0F4FF;border-radius:8px;padding:10px;margin-bottom:8px">'+
            '<div style="font-size:11px;font-weight:700;color:#546E7A;margin-bottom:4px">Preview (as entered)</div>'+
            fsr('Projected Sales', manualSales)+
            fsr('COGS ('+manualCogsP+'% of Sales)', Math.round(manualSales*manualCogsP/100), 0, 1)+
            fsr('Gross Profit', Math.round(manualSales*(1-manualCogsP/100)), 1)+
            fsr('Operating Expenses', manualExp, 0, 1)+
            fsr('Net Profit (before loan interest)', Math.round(manualSales*(1-manualCogsP/100))-manualExp, 1, 0, 1)+
            '</div>'
          : '')+
        btn('💾 Save Projected Figures','saveLoanAssess()','#2E7D32')
      );
    }

    // --- Loan Details ---
    h += card('Proposed Loan',
      g2(inp('CC / WC Limit Required (₹)','la_cc','number',ccLimit||0),
         inp('Term Loan Required (₹)','la_tl','number',tlAmount||0))+
      g2(inp('CC Interest Rate % p.a.','la_ccr','number',ccRate),
         inp('TL Interest Rate % p.a.','la_tlr','number',tlRate))+
      g2(inp('TL Tenure (months)','la_tlt','number',tlTenure),
         inp('Expected Sales Growth % p.a.','la_sg','number',salesGrowth))+
      g2(inp('Expense Growth % p.a.','la_eg','number',expGrowth),'')+
      btn('💾 Save & Calculate','saveLoanAssess()','#2E7D32')
    );

    // --- Base Figures Display ---
    var base = useManual
      ? {sales:manualSales, cogs:Math.round(manualSales*manualCogsP/100), gp:Math.round(manualSales*(1-manualCogsP/100)), exp:manualExp, np:Math.round(manualSales*(1-manualCogsP/100))-manualExp}
      : getLABase();
    var baseLabel = useManual ? 'New Unit: Projected Year 0 Figures (as entered)' : 'Existing Unit: Current Year Base (Annualized from '+base.days+' days of data)';
    var baseNote  = useManual
      ? (manualSales > 0 ? '<div class="al als">Projected figures entered. Proceed to Projections tab.</div>' : '<div class="al alw">Enter your projected figures in the card above first.</div>')
      : (base.sales > 0 ? '<div class="al als">Actual data found and annualized. Proceed to Projections tab.</div>' : '<div class="al alw">No transactions recorded yet. Switch to New Unit mode above and enter projected figures.</div>');
    h += card(baseLabel,
      baseNote+
      fsr('Sales', base.sales)+
      fsr('COGS', base.cogs, 0, 1)+
      fsr('Gross Profit', base.gp, 1)+
      '<div class="fsr"><span>GP %</span><span>'+(base.sales>0?(base.gp/base.sales*100).toFixed(1):0)+'%</span></div>'+
      fsr('Operating Expenses', base.exp, 0, 1)+
      fsr('Net Profit (before loan interest)', base.np, 1, 0, 1)
    );
    return h;
  }

  var base = useManual && manualSales > 0
    ? {sales:manualSales, cogs:Math.round(manualSales*manualCogsP/100), gp:Math.round(manualSales*(1-manualCogsP/100)), exp:manualExp, np:Math.round(manualSales*(1-manualCogsP/100))-manualExp, days:365, isManual:true}
    : getLABase();
  var la2 = getLAProjections(base, ccLimit, tlAmount, ccRate, tlRate, tlTenure, salesGrowth, expGrowth, stockDays, debtorDays, creditorDays);

  if (tab === 'projections') {
    h += card('Projected P&L Account',
      '<div style="overflow-x:auto"><table><thead><tr>'+
      '<th style="text-align:left">Particulars</th>'+
      '<th style="text-align:right">Year 0<br><small>'+(base.isManual?'Manual Estimate':'Annualized Actual')+'</small></th>'+
      '<th style="text-align:right">Year 1<br><small>(Projected)</small></th>'+
      '<th style="text-align:right">Year 2<br><small>(Projected)</small></th>'+
      '</tr></thead><tbody>'+
      laRow('Sales', base.sales, la2.s1, la2.s2, true)+
      laRow('Less: Cost of Goods Sold', base.cogs, la2.c1, la2.c2, false, true)+
      laRow('Gross Profit', base.gp, la2.g1, la2.g2, true)+
      '<tr><td style="padding:4px 8px;font-size:10px;color:#546E7A">GP %</td>'+
      '<td style="text-align:right;padding:4px 8px;font-size:10px;color:#546E7A">'+(base.sales>0?(base.gp/base.sales*100).toFixed(1):0)+'%</td>'+
      '<td style="text-align:right;padding:4px 8px;font-size:10px;color:#546E7A">'+(la2.s1>0?(la2.g1/la2.s1*100).toFixed(1):0)+'%</td>'+
      '<td style="text-align:right;padding:4px 8px;font-size:10px;color:#546E7A">'+(la2.s2>0?(la2.g2/la2.s2*100).toFixed(1):0)+'%</td></tr>'+
      laRow('Less: Operating Expenses', base.exp, la2.e1, la2.e2, false, true)+
      laRow('EBITDA', base.np, la2.ebit1, la2.ebit2, true)+
      laRow('Less: CC Interest', 0, la2.ccInt1, la2.ccInt2, false, true)+
      laRow('Less: TL Interest', 0, la2.tlInt1, la2.tlInt2, false, true)+
      laRow('NET PROFIT', base.np, la2.np1, la2.np2, true, false, true)+
      '<tr><td style="padding:4px 8px;font-size:10px;color:#546E7A">NP %</td>'+
      '<td style="text-align:right;padding:4px 8px;font-size:10px;color:#546E7A">'+(base.sales>0?(base.np/base.sales*100).toFixed(1):0)+'%</td>'+
      '<td style="text-align:right;padding:4px 8px;font-size:10px;color:#546E7A">'+(la2.s1>0?(la2.np1/la2.s1*100).toFixed(1):0)+'%</td>'+
      '<td style="text-align:right;padding:4px 8px;font-size:10px;color:#546E7A">'+(la2.s2>0?(la2.np2/la2.s2*100).toFixed(1):0)+'%</td></tr>'+
      '</tbody></table></div>'+
      '<div style="text-align:right;margin-top:8px">'+btn('🖨 Print','window.print()','#546E7A')+'</div>'
    );
    return h;
  }

  if (tab === 'wclimit') {
    if(la2.s1 <= 0){
      h += card('WC Limit — Data Required',
        '<div class="al alw">To calculate WC limits, please first:</div>'+
        '<ol style="font-size:13px;line-height:2;padding-left:20px">'+
        '<li>Go to <b>Loan Details</b> tab and enter the CC/WC limit you need and Sales Growth %</li>'+
        '<li>For a new business, toggle to <b>New Unit</b> mode and enter projected sales</li>'+
        '<li>Tap <b>Save & Calculate</b></li>'+
        '<li>Come back to this tab and enter holding periods (Stock/Debtor/Creditor days) and tap Recalc</li>'+
        '</ol>'
      );
      return h;
    }
    // METHOD 1: TURNOVER (Nayak Committee)
    // WC Required = 25% of projected sales; margin % editable
    var wcTurnover = la2.s1 * 0.25;
    var marginAmtTurnover = marginPctTurnover > 0 ? wcTurnover * marginPctTurnover / 100 : 0;
    var wcBankTurnover = wcTurnover - marginAmtTurnover;

    // METHOD 2: TANDON COMMITTEE (Operating Cycle)
    // Use entered values; if blank (0), show placeholder in UI but still compute with 0
    var effStock    = stockDays   > 0 ? stockDays   : 0;
    var effDebtor   = debtorDays  > 0 ? debtorDays  : 0;
    var effCreditor = creditorDays> 0 ? creditorDays: 0;
    var stockReq    = la2.c1 * effStock    / 365;
    var debtorReq   = la2.s1 * effDebtor  / 365;
    var creditorReq = la2.c1 * effCreditor / 365;
    var wcGap       = stockReq + debtorReq - creditorReq;
    var marginAmtTandon = marginPctTandon > 0 ? wcGap * marginPctTandon / 100 : 0;
    var wcBankCF    = wcGap - marginAmtTandon;

    var proposed = ccLimit;

    // -- METHOD 1 CARD with editable margin --
    h += card('Method 1: Turnover Method (Nayak Committee)',
      '<div class="al ali" style="margin-bottom:8px">WC Required = 25% of Projected Annual Sales. Margin % is editable — typically 25% (large borrowers) or 10% (small/MSME borrowers). Leave margin as 0 to see gross WC requirement.</div>'+
      '<div class="fsr"><span>Projected Sales (Year 1)</span><span style="font-weight:700">'+fc(la2.s1)+'</span></div>'+
      '<div class="fsr"><span>WC Required (25% of Sales)</span><span>'+fc(wcTurnover)+'</span></div>'+
      '<div style="padding:8px;background:#F0F4FF;border-radius:8px;margin:6px 0">'+
        '<div style="font-size:11px;color:#546E7A;margin-bottom:4px">Borrower Margin % (enter 0 to leave blank)</div>'+
        '<div style="display:flex;align-items:center;gap:8px">'+
          '<input type="number" id="wc_mpt" value="'+marginPctTurnover+'" placeholder="e.g. 25 or 10" inputmode="decimal" style="width:90px;padding:8px;border-radius:8px;border:1px solid #BBDEFB;font-size:13px">'+
          '<span style="font-size:13px">% of WC Required</span>'+
          '<button onclick="updateWCLive()" style="padding:6px 12px;border-radius:7px;border:none;background:#1565C0;color:#fff;font-size:12px;font-weight:700;cursor:pointer">Recalc</button>'+
        '</div>'+
      '</div>'+
      '<div id="wc_turnover_result">'+
        (marginPctTurnover > 0
          ? fsr('Less: Borrower Margin ('+marginPctTurnover+'%)', marginAmtTurnover, 0, 1)
          : '<div class="fsr" style="color:#546E7A;padding-left:18px"><span>Borrower Margin</span><span>— (to be filled)</span></div>')+
        fsr('➤ Bank Finance (WC - Margin)', wcBankTurnover, 1, 0, 1, '#1565C0')+
      '</div>'
    );

    // -- METHOD 2 CARD with editable holding periods and margin --
    var opCycle = stockDays + debtorDays - creditorDays;
    h += card('Method 2: Cash Flow Method (Tandon / Operating Cycle)',
      '<div class="al ali" style="margin-bottom:8px">Fill in actual holding periods below. WC Gap = Stock + Debtors − Creditors. Bank finances WC Gap minus borrower margin.</div>'+
      '<div style="padding:8px;background:#F0F4FF;border-radius:8px;margin-bottom:8px">'+
        '<div style="font-size:11px;font-weight:700;color:#546E7A;margin-bottom:6px">Holding Periods (days) — fill as per actual business</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">'+
          '<div><div style="font-size:10px;color:#546E7A">Raw Material / Stock</div>'+
            '<input type="number" id="wc_sd" value="'+(stockDays||'')+'" placeholder="e.g. 30" inputmode="decimal" style="width:100%;padding:8px;border-radius:8px;border:1px solid #BBDEFB;font-size:13px"></div>'+
          '<div><div style="font-size:10px;color:#546E7A">Debtors Collection</div>'+
            '<input type="number" id="wc_dd" value="'+(debtorDays||'')+'" placeholder="e.g. 30" inputmode="decimal" style="width:100%;padding:8px;border-radius:8px;border:1px solid #BBDEFB;font-size:13px"></div>'+
          '<div><div style="font-size:10px;color:#546E7A">Creditors Payment</div>'+
            '<input type="number" id="wc_cd" value="'+(creditorDays||'')+'" placeholder="e.g. 30" inputmode="decimal" style="width:100%;padding:8px;border-radius:8px;border:1px solid #BBDEFB;font-size:13px"></div>'+
        '</div>'+
        '<div style="font-size:11px;color:#546E7A;margin-bottom:4px;margin-top:8px">Borrower Margin % (enter 0 to leave blank)</div>'+
        '<div style="display:flex;align-items:center;gap:8px">'+
          '<input type="number" id="wc_mpc" value="'+marginPctTandon+'" placeholder="e.g. 25 or 10" inputmode="decimal" style="width:90px;padding:8px;border-radius:8px;border:1px solid #BBDEFB;font-size:13px">'+
          '<span style="font-size:13px">% of WC Gap</span>'+
          '<button onclick="updateWCLive()" style="padding:6px 12px;border-radius:7px;border:none;background:#1565C0;color:#fff;font-size:12px;font-weight:700;cursor:pointer">Recalc</button>'+
        '</div>'+
      '</div>'+
      '<div id="wc_tandon_result">'+
        '<div class="fsr"><span>Operating Cycle</span><span style="font-weight:700">'+(effStock+effDebtor-effCreditor > 0 ? (effStock+effDebtor-effCreditor)+' days' : '0 days (fill holding periods above)')+'</span></div>'+
        fsr('Stock Required ('+(effStock||'?')+' days of COGS)', stockReq)+
        fsr('Debtors Required ('+(effDebtor||'?')+' days of Sales)', debtorReq)+
        '<div class="fsr"><span style="padding-left:18px">Less: Creditors ('+(effCreditor||'?')+' days)</span><span>'+fc(creditorReq)+'</span></div>'+
        fsr('Working Capital Gap', wcGap, 1)+
        (marginPctTandon > 0
          ? fsr('Less: Borrower Margin ('+marginPctTandon+'%)', marginAmtTandon, 0, 1)
          : '<div class="fsr" style="color:#546E7A;padding-left:18px"><span>Borrower Margin</span><span>— (enter % above)</span></div>')+
        (wcBankCF > 0 ? fsr('➤ Bank Finance (Tandon Method)', wcBankCF, 1, 0, 1, '#1565C0') : '<div class="al ali">Fill holding periods above and tap Recalc to see eligible limit.</div>')+
      '</div>'+
      btn('💾 Save These Inputs','saveWCInputs()','#2E7D32')
    );

    // ===== INTELLIGENT COMPARISON & REASONS =====
    var bestTurnover = wcBankTurnover > 0 ? wcBankTurnover : la2.s1 * 0.25;
    var bestTandon   = wcBankCF > 0 ? wcBankCF : 0;
    // Eligible = higher of the two methods (banker's practice: take the more favourable)
    var eligible = Math.max(bestTurnover, bestTandon > 0 ? bestTandon : 0);

    // Comparison summary
    h += card('Comparison & Assessment',
      fsr('Projected Sales Year 1', la2.s1, 1)+
      fsr('Turnover Method — Eligible', bestTurnover, 1, 0, 0, '#1565C0')+
      (bestTandon > 0 ? fsr('Tandon Method — Eligible', bestTandon, 1, 0, 0, '#5B5BD6') : '')+
      fsr('Higher of Two Methods (Eligible Limit)', eligible, 1, 0, 1, '#2E7D32')+
      fsr('Demanded / Proposed Limit', proposed > 0 ? proposed : 0, 1, 0, 0, proposed > eligible ? '#C62828' : '#546E7A')
    );

    // ===== REASONS ENGINE =====
    if (proposed > 0) {
      var reasons = [];
      var overUnder = proposed - eligible;
      var overPct   = eligible > 0 ? (overUnder / eligible * 100) : 0;

      if (Math.abs(overUnder) < eligible * 0.05) {
        // Within 5% — broadly matching
        reasons.push({type:'als', title:'✅ Limit Demand Matches Assessment',
          body:'The demanded limit of '+fc(proposed)+' is broadly in line with the eligible limit of '+fc(eligible)+' computed by the Turnover/Tandon methods. The bank is likely to sanction this limit subject to satisfactory conduct, stock statements, and book debts position.'});
      } else if (overUnder > 0) {
        // Demanded MORE than eligible
        reasons.push({type:'ald', title:'⚠️ Demanded Limit Exceeds Calculated Eligibility by '+fc(overUnder)+' ('+overPct.toFixed(0)+'%)',
          body:'The borrower has demanded '+fc(proposed)+' against an assessed eligibility of '+fc(eligible)+'. The bank will likely raise the following concerns:'});

        var pts = [];
        if (overPct > 100) pts.push('The demand is more than double the assessed eligibility — this is a significant deviation and will require strong justification.');
        if (base.isManual) pts.push('Since this is a new/projected unit, actual track record is not available. Banks apply higher caution for new units and may restrict the limit to the assessed figure initially, with enhancement after 1–2 years of satisfactory operations.');
        if (la2.s1 > 0 && proposed > la2.s1 * 0.30) pts.push('WC limit exceeds 30% of projected sales ('+fc(la2.s1 * 0.30)+'). Banks typically cap WC at 25–30% of sales under turnover method.');
        if (stockDays > 60) pts.push('High stock holding period ('+stockDays+' days) is claimed. Bank may verify actual stock movement and may restrict holding to industry norms (30–45 days for trading).');
        if (debtorDays > 60) pts.push('Debtor collection period of '+debtorDays+' days is high. Bank will scrutinize book debt quality and may apply a lower debtor holding norm.');
        if (marginPctTurnover < 15 || marginPctTandon < 15) pts.push('Margin brought by borrower is low ('+Math.min(marginPctTurnover, marginPctTandon)+'%). Increasing own margin to 25% will improve the eligible bank finance and demonstrate borrower commitment.');
        pts.push('Suggest the borrower justify the excess demand with: actual debtors/creditors statements, stock position certificate, and purchase/sales orders in hand.');
        pts.push('Bank may initially sanction '+fc(eligible)+' and review enhancement after 6–12 months of satisfactory operations and submission of QIS/stock statements.');

        var ptHtml = pts.map(function(p){ return '<li style="margin-bottom:5px">'+esc(p)+'</li>'; }).join('');
        reasons.push({type:'alw', title:'Banker Observations & Recommendations', body:'<ul style="margin:6px 0 0 16px;padding:0">'+ptHtml+'</ul>'});

      } else {
        // Demanded LESS than eligible
        var underPct = Math.abs(overPct);
        reasons.push({type:'als', title:'✅ Demanded Limit is Conservative — Eligible up to '+fc(eligible),
          body:'The borrower has demanded only '+fc(proposed)+' against an assessed eligibility of '+fc(eligible)+'. This is a prudent demand and the bank is likely to sanction the full demanded amount.'});

        var pts2 = [];
        pts2.push('Lower demand reflects borrower conservative approach — this is viewed positively by banks.');

    }
    var emiAnnual = la2.emi * 12;

      '<tr><td style="padding:5px 8px;color:#546E7A">TL Annual EMI</td><td style="text-align:right;padding:5px 8px;color:#546E7A">'+fc(emiAnnual)+'</td><td style="text-align:right;padding:5px 8px;color:#546E7A">'+fc(emiAnnual)+'</td></tr>'+

    if(ccLimit > 0) dscrReasons.push({type:'ali', title:'CC Interest Obligation', body:'Annual CC interest estimated at '+fc(la2.ccInt1)+' (Year 1) assuming full utilization at '+ccRate+'% p.a. Actual interest depends on drawing level — keeping drawings within actual need reduces interest cost.'});

    dscrReasons.forEach(function(r){

  }

  if (tab === 'bepirr') {
    // Check if projections are available
    if(la2.s1 <= 0){
      h += card('BEP / IRR — Data Required',
        '<div class="al alw">To calculate Break Even Point and IRR, please first:</div>'+
        '<ol style="font-size:13px;line-height:2;padding-left:20px">'+
        '<li>Go to <b>Loan Details</b> tab and enter CC/TL amounts and Sales Growth %</li>'+

        '<li>Tap <b>Save & Calculate</b></li>'+
        '<li>Come back to this tab</li>'+
        '</ol>'
      );
      return h;
    }
    // ── BEP & IRR ──
    var bepSales = la2.s1, bepCogs = la2.c1, bepExp = la2.e1;
    var bepInt = la2.ccInt1 + la2.tlInt1;
    // Fixed Costs = Expenses + Interest (these do not vary with sales)
    var fixedCosts = bepExp + bepInt;
    // Variable Costs = COGS (varies with sales)
    var vcRatio = bepSales > 0 ? bepCogs / bepSales : 0;
    // Contribution = Sales - Variable Costs; P/V Ratio = Contribution/Sales
    var pvRatio = 1 - vcRatio;
    // BEP (Sales value) = Fixed Costs / P/V Ratio
    var bepValue = pvRatio > 0 ? Math.round(fixedCosts / pvRatio) : 0;
    var bepPct = bepSales > 0 ? (bepValue / bepSales * 100) : 0;
    var marginOfSafety = bepSales - bepValue;
    var mosPct = bepSales > 0 ? (marginOfSafety / bepSales * 100) : 0;

    h += card('Break Even Point (BEP) — Year 1',
      '<div class="al ali" style="margin-bottom:8px">BEP is the sales level at which the business makes neither profit nor loss. Sales above BEP = profit zone. Calculated as: Fixed Costs ÷ P/V Ratio (Contribution/Sales).</div>'+
      '<div style="overflow-x:auto"><table><thead><tr>'+
      '<th style="text-align:left">Particulars</th><th style="text-align:right">Amount</th></tr></thead><tbody>'+
      '<tr><td style="padding:5px 8px">Projected Sales (Year 1)</td><td style="text-align:right;padding:5px 8px">'+fc(bepSales)+'</td></tr>'+
      '<tr><td style="padding:5px 8px;color:#546E7A;padding-left:18px">Less: Variable Costs (COGS)</td><td style="text-align:right;padding:5px 8px;color:#546E7A">'+fc(bepCogs)+'</td></tr>'+
      '<tr style="background:rgba(0,0,0,.04)"><td style="padding:5px 8px;font-weight:700">Contribution</td><td style="text-align:right;padding:5px 8px;font-weight:700">'+fc(bepSales-bepCogs)+'</td></tr>'+
      '<tr><td style="padding:5px 8px;color:#546E7A">P/V Ratio (Contribution ÷ Sales)</td><td style="text-align:right;padding:5px 8px;color:#546E7A">'+(pvRatio*100).toFixed(1)+'%</td></tr>'+
      '<tr><td style="padding:5px 8px;font-weight:700">Fixed Costs (Expenses + Interest)</td><td style="text-align:right;padding:5px 8px;font-weight:700">'+fc(fixedCosts)+'</td></tr>'+
      '<tr><td style="padding:5px 8px;color:#546E7A;padding-left:18px">  Operating Expenses</td><td style="text-align:right;padding:5px 8px;color:#546E7A">'+fc(bepExp)+'</td></tr>'+
      '<tr><td style="padding:5px 8px;color:#546E7A;padding-left:18px">  Loan Interest</td><td style="text-align:right;padding:5px 8px;color:#546E7A">'+fc(bepInt)+'</td></tr>'+
      '</tbody></table></div>'+
      '<div class="kg" style="margin-top:12px">'+
      '<div class="ki"><div class="kl">BEP (Sales Value)</div><div class="kv" style="color:#C62828">'+fc(bepValue)+'</div></div>'+
      '<div class="ki"><div class="kl">BEP as % of Projected Sales</div><div class="kv" style="color:'+(bepPct<70?'#2E7D32':'#C62828')+'">'+bepPct.toFixed(1)+'%</div></div>'+
      '<div class="ki"><div class="kl">Margin of Safety</div><div class="kv" style="color:#2E7D32">'+fc(marginOfSafety)+'</div></div>'+
      '<div class="ki"><div class="kl">Margin of Safety %</div><div class="kv" style="color:#2E7D32">'+mosPct.toFixed(1)+'%</div></div>'+
      '</div>'+
      '<div class="al '+(bepPct < 70 ? 'als' : bepPct < 90 ? 'alw' : 'ald')+'" style="margin-top:8px">'+
      (bepPct < 70
        ? '✅ BEP is '+bepPct.toFixed(0)+'% of projected sales — good margin of safety. Even if sales fall, the business can still cover costs.'
        : bepPct < 90
          ? '⚠️ BEP is '+bepPct.toFixed(0)+'% of sales. Limited margin of safety — business needs to achieve close to projected sales to remain profitable.'
          : '❌ BEP exceeds 90% of projected sales. Very little margin of safety. Reduce fixed costs or improve contribution margin before submitting loan proposal.')+
      '</div>'
    );

    // ── IRR ──
    // Investment = Own Capital + Total Loan
    var totalCapital = (+(D.capital&&D.capital.initialCapital)||0) + (+(D.capital&&D.capital.additionalCapital)||0);
    var totalLoan = tlAmount + ccLimit;
    var totalInvestment = totalCapital + totalLoan;
    // Cash flows: Year 0 = -totalInvestment, Year 1 = NP+Dep+Interest (EBITDA), Year 2 = same, terminal = ~3x Y2
    var cf0 = -totalInvestment;
    var cf1 = la2.ebit1;   // EBITDA Year 1
    var cf2 = la2.ebit2;   // EBITDA Year 2
    var cf3 = la2.ebit2 * 1.2; // Year 3 estimate (20% growth)

    // IRR via Newton-Raphson
    function npv(rate, cfs) {
      return cfs.reduce(function(acc, cf, t) { return acc + cf / Math.pow(1+rate, t); }, 0);
    }
    function calcIRR(cfs) {
      var rate = 0.2;
      for(var i=0;i<100;i++){
        var n = npv(rate, cfs);
        var dn = cfs.reduce(function(acc,cf,t){ return t>0 ? acc - t*cf/Math.pow(1+rate,t+1) : acc; }, 0);
        if(Math.abs(dn) < 1e-10) break;
        var newRate = rate - n/dn;
        if(newRate < -0.99) newRate = -0.99;
        rate = newRate;
        if(Math.abs(n) < 0.01) break;
      }
      return isNaN(rate) ? null : rate;
    }
    var cfs = [cf0, cf1, cf2, cf3];
    var irr = totalInvestment > 0 && cf1 > 0 ? calcIRR(cfs) : null;
    var irrPct = irr !== null ? irr * 100 : null;
    var npvAt12 = totalInvestment > 0 ? Math.round(npv(0.12, cfs)) : 0; // NPV at 12% hurdle rate

    h += card('Internal Rate of Return (IRR)',

      '<tr><td style="padding:5px 8px">Year 1</td><td style="text-align:right;padding:5px 8px;color:#2E7D32">+'+fc(cf1)+'</td><td style="padding:5px 8px 5px 12px;font-size:11px;color:#546E7A">EBITDA (NP + Interest)</td></tr>'+
      '<tr><td style="padding:5px 8px">Year 2</td><td style="text-align:right;padding:5px 8px;color:#2E7D32">+'+fc(cf2)+'</td><td style="padding:5px 8px 5px 12px;font-size:11px;color:#546E7A">EBITDA Year 2</td></tr>'+
      '<tr><td style="padding:5px 8px">Year 3</td><td style="text-align:right;padding:5px 8px;color:#2E7D32">+'+fc(cf3)+'</td><td style="padding:5px 8px 5px 12px;font-size:11px;color:#546E7A">Estimated (20% growth on Yr 2)</td></tr>'+
      '</tbody></table></div>'+
      '<div class="kg" style="margin-top:12px">'+
      '<div class="ki"><div class="kl">Total Investment</div><div class="kv">'+fc(totalInvestment)+'</div></div>'+
      '<div class="ki"><div class="kl">IRR</div><div class="kv" style="color:'+(irrPct!==null?(irrPct>12?'#2E7D32':irrPct>8?'#E65100':'#C62828'):'#546E7A')+';font-size:20px;font-weight:700">'+(irrPct!==null?irrPct.toFixed(1)+'%':'N/A')+'</div></div>'+
      '<div class="ki"><div class="kl">NPV @ 12% Hurdle Rate</div><div class="kv" style="color:'+(npvAt12>=0?'#2E7D32':'#C62828')+'">'+fc(npvAt12)+'</div></div>'+
      '<div class="ki"><div class="kl">Cost of Borrowing</div><div class="kv" style="color:#546E7A">~'+(ccRate||9).toFixed(1)+'% p.a.</div></div>'+
      '</div>'+
      (irrPct !== null
        ? '<div class="al '+(irrPct>12?'als':irrPct>8?'alw':'ald')+'" style="margin-top:8px">'+
          (irrPct > 12
            ? '✅ IRR of '+irrPct.toFixed(1)+'% exceeds the 12% hurdle rate. The investment generates good returns and can service the loan comfortably.'
            : irrPct > 8
              ? '⚠️ IRR of '+irrPct.toFixed(1)+'% is moderate. Returns are adequate but improve sales or margins for a stronger proposal.'
              : '❌ IRR of '+irrPct.toFixed(1)+'% is below acceptable levels. Revise projections — increase sales, reduce costs, or reduce loan amount.')+
          '</div>'
        : '<div class="al alw" style="margin-top:8px">Unable to compute IRR — ensure loan amounts and projections are entered in Loan Details tab.</div>')+
      '<div style="text-align:right;margin-top:8px">'+btn('🖨 Print BEP / IRR','window.print()','#546E7A')+'</div>'
    );
    return h;
  }

  if (tab === 'projcfs') {
    if(la2.s1 <= 0){
      h += card('Projected Cash Flow — Data Required',
        '<div class="al alw">Enter loan details and projected sales in <b>Loan Details</b> tab first, then tap Save & Calculate.</div>'
      );
      return h;
    }

    // ── YEAR 1 & YEAR 2 PROJECTED CFS (Indirect Method) ──
    var dep = 0; // depreciation on existing assets (accumDep) + TL-funded new assets
    (D.fixedAssets||[]).forEach(function(a){ dep += (+a.accumDep||0); });
    // Approximate dep on TL-funded new assets (assume 10% on TL amount)
    var newFADep = tlAmount > 0 ? Math.round(tlAmount * 0.10) : 0;

    // Working capital changes using holding period assumptions
    // Year 1
    var wc_stock_y1  = la2.c1 * stockDays / 365;
    var wc_debtor_y1 = la2.s1 * debtorDays / 365;
    var wc_cred_y1   = la2.c1 * creditorDays / 365;
    var wc_gap_y1    = wc_stock_y1 + wc_debtor_y1 - wc_cred_y1;
    // Opening WC = current actual balances
    var g = getFGrouped();
    var open_wc = (g.sundryDebtors||0) + (g.closStock||0) - (g.sundryCreditors||0);
    var delta_wc_y1 = -(wc_gap_y1 - open_wc); // increase in WC = outflow

    // Year 2
    var wc_stock_y2  = la2.c2 * stockDays / 365;
    var wc_debtor_y2 = la2.s2 * debtorDays / 365;
    var wc_cred_y2   = la2.c2 * creditorDays / 365;
    var wc_gap_y2    = wc_stock_y2 + wc_debtor_y2 - wc_cred_y2;
    var delta_wc_y2  = -(wc_gap_y2 - wc_gap_y1);

    // Operating CF
    var cf_op_y1 = la2.np1 + dep + newFADep - delta_wc_y1;
    var cf_op_y2 = la2.np2 + dep + newFADep - delta_wc_y2;

    // Investing CF (TL used for fixed asset purchase = outflow in Year 1)
    var cf_inv_y1 = tlAmount > 0 ? -tlAmount : 0;
    var cf_inv_y2 = 0;

    // Financing CF
    // Year 1: new CC + new TL inflows, EMI principal outflow
    var tl_prin_y1 = Math.max(0, Math.round(la2.emi * 12 - la2.tlInt1));
    var cf_fin_y1  = ccLimit + tlAmount - tl_prin_y1;
    // Year 2: only EMI principal outflow (no new loans)
    var tl_prin_y2 = Math.max(0, Math.round(la2.emi * 12 - la2.tlInt2));
    var cf_fin_y2  = -tl_prin_y2;

    // Net change
    var net_y1 = cf_op_y1 + cf_inv_y1 + cf_fin_y1;
    var net_y2 = cf_op_y2 + cf_inv_y2 + cf_fin_y2;

    // Opening cash (current actual)
    var open_cash = (g.cash||0) + (g.bank||0);

    tbl += '<tr style="background:rgba(0,0,0,.03)"><td style="padding:4px 8px 4px 28px;font-size:10px;color:#546E7A">Increase in Debtors/Stock</td>'+
           '<td style="text-align:right;padding:4px 8px;font-size:10px;color:#546E7A">'+fc(wc_gap_y1)+'</td>'+
           '<td style="text-align:right;padding:4px 8px;font-size:10px;color:#546E7A">'+fc(wc_gap_y2)+'</td></tr>';
    tbl += cfRow('A.  Net Cash from Operating Activities', cf_op_y1, cf_op_y2, true, false, true);

    tbl += cfRow('B.  Net Cash from Investing Activities', cf_inv_y1, cf_inv_y2, true, false, true);

    tbl += cfRow('New Term Loan Received', tlAmount, 0, false, true);
    tbl += cfRow('TL Principal Repayment (EMI)', -tl_prin_y1, -tl_prin_y2, false, true);
    tbl += cfRow('C.  Net Cash from Financing Activities', cf_fin_y1, cf_fin_y2, true, false, true);

    // Reconciliation
    tbl += cfSection('RECONCILIATION');
    tbl += cfRow('Net Change in Cash (A+B+C)', net_y1, net_y2, true);
    tbl += cfRow('Opening Cash & Bank Balance', open_cash, close_y1, false, true);
    tbl += cfRow('Closing Cash & Bank Balance', close_y1, close_y2, true, false, true);

    tbl += '</tbody></table></div>';

    h += card('Projected Cash Flow Statement (Indirect Method)', tbl+
      '<div class="al ali" style="margin-top:8px;font-size:11px">'+
      '<b>Assumptions used:</b> Stock '+stockDays+' days | Debtors '+debtorDays+' days | Creditors '+creditorDays+' days | '+
      'Dep on new assets: '+fc(newFADep)+'/yr | TL EMI principal: ₹'+fc(tl_prin_y1)+'/yr (Y1), ₹'+fc(tl_prin_y2)+'/yr (Y2).<br>'+
      'Positive = cash inflow &nbsp;|&nbsp; (Negative) = cash outflow.</div>'+
      '<div style="text-align:right;margin-top:8px">'+btn('🖨 Print Projected CFS','window.print()','#546E7A')+'</div>'
    );
    return h;
  }

  return h;
}

// Get annualized base figures from actual data
function getLABase() {
  var la = D.loanAssessment || {};
  // New unit mode: return manual figures directly (no annualization needed)
  if(la.useManual && (+la.manualSales||0) > 0) {
    var ms = +la.manualSales||0, mcp = la.manualCogsP !== undefined ? +la.manualCogsP : 70, me = +la.manualExp||0;
    var mc = Math.round(ms*mcp/100), mg = ms-mc, mn = mg-me;
    return {sales:ms, cogs:mc, gp:mg, exp:me, np:mn, days:365, isManual:true};
  }
  var f = getF();
  var pp = D.priorPeriod || {};
  // Current period actuals
  var curSales = f.ts, curCogs = f.os + f.tp - f.cs, curExp = f.te;
  // Prior period
  var priorSales = (pp.enabled && pp.sales) ? pp.sales : 0;
  var priorCogs  = (pp.enabled && pp.cogs)  ? pp.cogs  : 0;
  var priorExp   = 0;
  if(pp.enabled && pp.expenseByCat) {
    for(var k in pp.expenseByCat) priorExp += (+pp.expenseByCat[k]||0);
  }
  // Estimate days: find earliest transaction date
  var dates = [];
  D.sales.forEach(function(s){if(s.date)dates.push(s.date);});
  D.purchases.forEach(function(p){if(p.date)dates.push(p.date);});
  D.expenses.forEach(function(e){if(e.date)dates.push(e.date);});
  var earliest = dates.length ? dates.reduce(function(a,b){return a<b?a:b;}) : td();
  var curDays = Math.max(1, daysBetween(earliest, td()));
  // Prior period days
  var priorDays = 0;
  if(pp.enabled && pp.fromDate && pp.toDate) {
    priorDays = Math.max(0, daysBetween(pp.fromDate, pp.toDate));
  }
  var totalDays = curDays + priorDays;
  var totalSales = curSales + priorSales;
  var totalCogs  = curCogs  + priorCogs;
  var totalExp   = curExp   + priorExp;
  // Annualize
  var factor = totalDays > 0 ? 365/totalDays : 1;
  var sales = Math.round(totalSales * factor);
  var cogs  = Math.round(totalCogs  * factor);
  var gp    = sales - cogs;
  var exp   = Math.round(totalExp   * factor);
  var np    = gp - exp;
  return {sales:sales, cogs:cogs, gp:gp, exp:exp, np:np, days:totalDays};
}

// Compute projections from base + assumptions
function getLAProjections(base, ccLimit, tlAmount, ccRate, tlRate, tlTenure, salesGrowth, expGrowth, stockDays, debtorDays, creditorDays) {
  var cogsRatio = base.sales > 0 ? base.cogs/base.sales : 0.7;
  // Year 1
  var s1 = Math.round(base.sales * (1 + salesGrowth/100));
  var c1 = Math.round(s1 * cogsRatio);
  var g1 = s1 - c1;
  var e1 = Math.round(base.exp * (1 + expGrowth/100));
  var ebit1 = g1 - e1;
  var ccInt1 = ccLimit > 0 ? Math.round(ccLimit * ccRate/100) : 0;
  var tlInt1 = tlAmount > 0 ? Math.round(tlAmount * tlRate/100) : 0;
  var np1 = ebit1 - ccInt1 - tlInt1;
  // EMI
  var emi = tlAmount > 0 && tlTenure > 0 ? calcEMI(tlAmount, tlRate, tlTenure) : 0;
  // Year 2
  var tlPrinY1 = Math.max(0, emi*12 - tlInt1);
  var tlObY2 = Math.max(0, tlAmount - tlPrinY1);
  var s2 = Math.round(s1 * (1 + salesGrowth/100));
  var c2 = Math.round(s2 * cogsRatio);
  var g2 = s2 - c2;
  var e2 = Math.round(e1 * (1 + expGrowth/100));
  var ebit2 = g2 - e2;
  var ccInt2 = ccLimit > 0 ? Math.round(ccLimit * ccRate/100) : 0;
  var tlInt2 = tlObY2 > 0 ? Math.round(tlObY2 * tlRate/100) : 0;
  var np2 = ebit2 - ccInt2 - tlInt2;
  return {s1:s1,c1:c1,g1:g1,e1:e1,ebit1:ebit1,ccInt1:ccInt1,tlInt1:tlInt1,np1:np1,
          s2:s2,c2:c2,g2:g2,e2:e2,ebit2:ebit2,ccInt2:ccInt2,tlInt2:tlInt2,np2:np2,
          emi:emi, tlObY2:tlObY2};
}

function pgReminders(){
  var creditDays = +(D.settings&&D.settings.creditDays)||30;
  var h = '';

  h += card('Reminder Settings',
    '<div style="font-size:11px;color:#546E7A;margin-bottom:8px">Set the global credit period. Any debtor whose outstanding amount is older than this many days will appear in the overdue list.</div>'+
    g2(inp('Credit Period (days)','rem_days','number',creditDays),'')+
      '<div style="font-size:11px;color:#546E7A;margin-bottom:8px">Set credit period for debtor/creditor overdue alerts.</div>'+
      btn('💾 Save Credit Period','saveReminderSettings()','#2E7D32')+
      '<div style="margin-top:8px">'+btn('💰 Profit Margin Settings',"go('margin')",'#1565C0')+'</div>'
  );

  // Build overdue list
  var today = td();
  var dList = debtorBalances();
  var overdue = [], upcoming = [];
  // Per-party: find earliest unpaid sale date (most overdue entry)
  // Due date = sale/purchase date + creditDays
  // Overdue if: today > (transaction date + creditDays)
  var earliestDateMap = {}, latestDateMap = {};
  D.debtors.forEach(function(d){
    if(d.amount>0&&d.date){
      if(!earliestDateMap[d.name]||d.date<earliestDateMap[d.name]) earliestDateMap[d.name]=d.date;
      if(!latestDateMap[d.name]||d.date>latestDateMap[d.name]) latestDateMap[d.name]=d.date;
    }
  });
  // Also check credit sales for their transaction date
  (D.sales||[]).forEach(function(s){
    if(s.paymentMode==='credit'&&s.date){
      var nm=s.customerName||s.customer||'';
      if(!nm) return;
      if(!earliestDateMap[nm]||s.date<earliestDateMap[nm]) earliestDateMap[nm]=s.date;
      if(!latestDateMap[nm]||s.date>latestDateMap[nm]) latestDateMap[nm]=s.date;
    }
  });

  dList.forEach(function(d){
    if(d.balance<=0) return;
    // Use EARLIEST transaction date - that is the oldest unpaid amount (most overdue)
    var txDate = earliestDateMap[d.name]||today;
    var latDate = latestDateMap[d.name]||txDate;
    var age  = daysBetween(txDate, today);
    var dueDate = new Date(txDate);
    dueDate.setDate(dueDate.getDate()+creditDays);
    var dueDateStr = dueDate.toISOString().slice(0,10);
    var daysOverdue = daysBetween(dueDateStr, today); // days past due date
    var isOverdue = today > dueDateStr;
    if(isOverdue) overdue.push({name:d.name,balance:d.balance,date:txDate,latDate:latDate,age:age,daysOverdue:daysOverdue,dueDateStr:dueDateStr});
    else{
      var daysLeft=daysBetween(today,dueDateStr);
      upcoming.push({name:d.name,balance:d.balance,date:txDate,latDate:latDate,age:age,daysLeft:daysLeft,dueDateStr:dueDateStr});
    }
  });

  // Sort by most overdue first
  overdue.sort(function(a,b){return b.daysOverdue-a.daysOverdue;});

  if(overdue.length===0&&upcoming.length===0){
    h+=card('Debtor Status','<div class="al als">✅ No outstanding debtors at this time.</div>');
    return h;
  }

  if(overdue.length>0){
    h+=card('⚠️ Overdue Debtors ('+overdue.length+')',
      '<div class="al alw" style="margin-bottom:10px">These customers have not paid within the '+creditDays+'-day credit period. Tap the share button to send a payment reminder.</div>'+
      overdue.map(function(d){
        var msg = buildReminderMsg(d);
        var waUrl = 'https://wa.me/?text='+encodeURIComponent(msg);
        return '<div style="border:1px solid #FFCCBC;border-radius:10px;padding:12px;margin-bottom:10px;background:#FFF3E0">'+
          '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
            '<div>'+
              '<div style="font-weight:700;font-size:14px">'+esc(d.name)+
            (D.partyCodes&&D.partyCodes['partyid:'+d.name.trim().toLowerCase()]?
              ' <span style="font-size:11px;background:#E3F2FD;color:#1565C0;border-radius:4px;padding:2px 6px;font-weight:700">'+esc(D.partyCodes['partyid:'+d.name.trim().toLowerCase()])+'</span>':'')+
          '</div>'+
              '<div style="color:#C62828;font-size:13px;font-weight:700">'+fc(d.balance)+' due</div>'+
              '<div style="font-size:11px;color:#546E7A">Outstanding since '+esc(d.date)+' &bull; <span style="color:#C62828;font-weight:700">'+d.daysOverdue+' days overdue</span></div>'+
            '</div>'+
          '</div>'+
          '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">'+
            '<a href="'+waUrl+'" target="_blank" style="padding:8px 14px;border-radius:7px;background:#25D366;color:#fff;font-size:12px;font-weight:700;text-decoration:none">📲 WhatsApp</a>'+
            '<button onclick="copyReminderMsg('+JSON.stringify(d.name)+','+JSON.stringify(d)+')\" style="padding:8px 14px;border-radius:7px;background:#1565C0;color:#fff;font-size:12px;font-weight:700;border:none;cursor:pointer">📋 Copy</button>'+
            '<a href="mailto:?subject=Payment+Reminder&body='+encodeURIComponent(msg)+'" style="padding:8px 14px;border-radius:7px;background:#546E7A;color:#fff;font-size:12px;font-weight:700;text-decoration:none">✉️ Email</a>'+
          '</div>'+
        '</div>';
      }).join('')
    );
  }

  if(upcoming.length>0){
    h+=card('✅ Within Credit Period ('+upcoming.length+')',
      upcoming.map(function(d){
        return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F0F0F0">'+
          '<div><div style="font-weight:700">'+esc(d.name)+'</div>'+
          '<div style="font-size:11px;color:#546E7A">'+fc(d.balance)+' &bull; '+d.daysLeft+' days left</div></div>'+
          '<span style="font-size:18px">✅</span>'+
          '</div>';
      }).join('')
    );
  }
  return h;
}

function buildReminderMsg(d){
  var p = D.profile||{};
  var biz = p.businessName||'Our Store';
  var pid=D.partyCodes&&D.partyCodes['partyid:'+d.name.trim().toLowerCase()]?D.partyCodes['partyid:'+d.name.trim().toLowerCase()]:'';
  var lines=[
    '🔔 *Payment Reminder*',
    '',
    'Dear *'+d.name+(pid?' ('+pid+')':''+'*,'),
    '',
    'This is a gentle reminder that your payment of *'+fc(d.balance)+'* to *'+biz+'* is overdue by *'+d.daysOverdue+' days*.',
    '',
    '📅 Outstanding since: '+d.date,
    '💰 Amount Due: *'+fc(d.balance)+'*',
    '',
    'Kindly arrange payment at the earliest. If you have already paid, please ignore this message.',
    '',
    'For queries, contact: '+esc(p.mobile||''),
    '',
    'Thank you,',
    biz
  ];
  return lines.join('\n');
}

function copyReminderMsg(name, d){
  var msg = buildReminderMsg(d);
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(msg).then(function(){ toast('Reminder copied! Paste in WhatsApp/SMS.'); });
  } else {
    var ta=document.createElement('textarea'); ta.value=msg;
    ta.style.position='fixed'; ta.style.left='-9999px';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('Reminder copied! Paste in WhatsApp/SMS.');
  }
}

function autoFillAllHSN(){
  if(!D.inventory) return;
  var filled=0, notFound=[];
  D.inventory.forEach(function(item){
    if(!item.hsnCode){
      var lookup=lookupHSNFull(item.itemName);
      if(lookup){
        item.hsnCode=lookup[0];
        item.gstRate=+lookup[1];
        filled++;
      } else {
        notFound.push(item.itemName);
      }
    }
  });
  sv(); renderPage();
  var msg='HSN/GST filled for '+filled+' item(s).';
  if(notFound.length) msg+=' Not found: '+notFound.slice(0,5).join(', ')+(notFound.length>5?' and '+(notFound.length-5)+' more':'')+'  — update these manually in HSN/SAC Master.';
  toast(msg, filled>0?'s':'w');
}

function enableGST(){
  if(!D.gst) D.gst={};
  D.gst.enabled=true; D.gst.type='regular'; D.gst.defaultRate=18; D.gst.supplyType='intra';
  sv(); renderPage(); toast('GST module enabled!');
}
function disableGST(){
  confirmDialog('Disable GST module? GST data will be preserved but GST fields will be hidden from bills.',function(){
    if(D.gst) D.gst.enabled=false;
    sv(); renderPage(); toast('GST module disabled.');
  });
}
function saveGSTSetup(){
  if(!D.gst) D.gst={enabled:true};
  D.gst.gstin      = gv('gst_gstin')||'';
  D.gst.type       = gv('gst_type')||'regular';
  D.gst.stateCode  = gv('gst_state')||'';
  D.gst.defaultRate= gvn('gst_defrate')||18;
  D.gst.supplyType = gv('gst_supply')||'intra';
  sv(); renderPage(); toast('GST settings saved!');
}

function computeGSTSummary(){
  var outputGST=0,cgst=0,sgst=0,igst=0,itc=0,taxableValue=0;
  D.sales.forEach(function(s){
    if(s.gstRate&&s.gstRate>0){
      var tax=Math.round(s.totalAmount*s.gstRate/100);
      taxableValue+=s.totalAmount;
      outputGST+=tax;
      if(s.gstType==='inter'){igst+=tax;}else{cgst+=tax/2;sgst+=tax/2;}
    }
  });
  D.purchases.forEach(function(p){
    if(p.gstRate&&p.gstRate>0) itc+=Math.round(p.amount*p.gstRate/100);
  });
  return {outputGST:Math.round(outputGST),cgst:Math.round(cgst),sgst:Math.round(sgst),igst:Math.round(igst),itc:Math.round(itc),taxableValue:Math.round(taxableValue)};
}

function computeGSTR1(){
  var byRate={};
  D.sales.forEach(function(s){
    if(!s.gstRate||s.gstRate<=0) return;
    var r=s.gstRate; if(!byRate[r]) byRate[r]={rate:r,taxable:0,cgst:0,sgst:0,igst:0};
    var tax=Math.round(s.totalAmount*r/100);
    byRate[r].taxable+=s.totalAmount;
    if(s.gstType==='inter') byRate[r].igst+=tax;
    else {byRate[r].cgst+=tax/2; byRate[r].sgst+=tax/2;}
  });
  var result=[];
  for(var rk in byRate) result.push(byRate[rk]);
  result.sort(function(a,b){return a.rate-b.rate;});
  return result;
}

// ===== PARTY CODE SYSTEM =====
// Each unique buyer/supplier gets a short unique code (CUST-XXXXX or SUPP-XXXXX)
// This helps distinguish two parties with the same name
// Stored in D.partyCodes = { "Ramesh:customer": "CUST-A1B2C", "Ramesh:supplier": "SUPP-D3E4F" }

function getPartyCode(name, type) {
  // type = 'customer' or 'supplier'
  if (!name) return '';
  if (!D.partyCodes) D.partyCodes = {};
  var key = name.trim().toLowerCase() + ':' + type;
  if (!D.partyCodes[key]) {
    var prefix = type === 'customer' ? 'CUST' : 'SUPP';
    D.partyCodes[key] = prefix + '-' + Math.random().toString(36).toUpperCase().slice(2,7);
    sv();
  }
  return D.partyCodes[key];
}

function partyCodeBadge(code) {
  if (!code) return '';
  return '<span style="font-size:9px;background:#E3F2FD;color:#1565C0;border-radius:4px;padding:1px 5px;font-weight:700;letter-spacing:0.5px;margin-left:4px">'+esc(code)+'</span>';
}

function pgPartyCodes() {
  var h = '';
  var pc = D.partyCodes || {};
  var customers = [], suppliers = [];
  for (var k in pc) {
    var parts = k.split(':');
    var name = parts[0], type = parts[1];
    if (type === 'customer') customers.push({name:name, code:pc[k]});
    else suppliers.push({name:name, code:pc[k]});
  }
  customers.sort(function(a,b){return a.name.localeCompare(b.name);});
  suppliers.sort(function(a,b){return a.name.localeCompare(b.name);});

  h += card('Party Code Directory',
    '<div class="al ali" style="margin-bottom:8px">Every buyer and supplier gets a unique Party Code automatically when first recorded. Use this code to distinguish parties with the same name in your registers and receipts.</div>'+
    '<div style="font-weight:700;font-size:12px;color:#1565C0;margin:8px 0 4px">Customers / Buyers</div>'+
    (customers.length ? customers.map(function(c){
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #F0F0F0">'+
        '<div style="font-size:13px;text-transform:capitalize">'+esc(c.name)+'</div>'+
        partyCodeBadge(c.code)+
      '</div>';
    }).join('') : '<div class="al ali">No customers recorded yet.</div>')+
    '<div style="font-weight:700;font-size:12px;color:#C62828;margin:12px 0 4px">Suppliers</div>'+
    (suppliers.length ? suppliers.map(function(s){
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #F0F0F0">'+
        '<div style="font-size:13px;text-transform:capitalize">'+esc(s.name)+'</div>'+
        partyCodeBadge(s.code)+
      '</div>';
    }).join('') : '<div class="al ali">No suppliers recorded yet.</div>')
  );

  h += card('How to Use',
    '<div style="font-size:12px;line-height:1.8;color:#37474F">'+
    '<b>Problem:</b> Two customers named "Ramesh" — how to tell them apart?<br>'+

    '<b>In Sales register:</b> Code shown next to customer name<br>'+
    '<b>In Purchase register:</b> Code shown next to supplier name<br>'+

    '<b>In Payment Reminders:</b> Code shown with debtor name for easy identification'+

  );
  return h;
}

// ===================================================================
// ACTUAL CASH FLOW STATEMENT (Indirect Method) — reads live data
// ===================================================================
function pgCFS() {
  var f = getF();
  var g = getFGrouped();

  // ── NET PROFIT ──
  var netProfit = f.np;

  // ── DEPRECIATION (accumulated dep charged this period) ──
  var depreciation = 0;
  (D.fixedAssets||[]).forEach(function(a){ depreciation += (+a.accumDep||0); });
  (D.intangibleAssets||[]).forEach(function(a){ depreciation += (+a.accumAmort||0); });

  // ── WORKING CAPITAL CHANGES ──
  // Opening values from Trial Balance (preferred) or opening object
  var openDebtors   = 0;
  var openCreditors = 0;
  var openStock     = +D.opening.stock || 0;

  // Check TB for opening debtors/creditors
  var hasTBDeb = false, hasTBCrd = false;
  (D.trialBalance||[]).forEach(function(r){
    if(r.head==='debtor'||r.head==='debtors'||r.head==='sundrydebtors'){
      openDebtors += (+r.amount||0); hasTBDeb = true;
    }
    if(r.head==='creditor'||r.head==='creditors'||r.head==='sundrycreditors'){
      openCreditors += (+r.amount||0); hasTBCrd = true;
    }
    if(r.head==='stock'||r.head==='closingstock'||r.head==='openingstock'){
      openStock += (+r.amount||0);
    }
  });
  // Fall back to opening object if not in TB
  if(!hasTBDeb) openDebtors   = +D.opening.debtors   || 0;
  if(!hasTBCrd) openCreditors = +D.opening.creditors  || 0;

  // Current values — use getF() directly for accuracy
  var closDebtors   = f.dr || 0;   // sundry debtors net balance
  var closStock     = f.cs || 0;   // closing stock
  var closCreditors = f.cr || 0;   // sundry creditors net balance

  // Expense creditors (accrued expenses payable)
  var expPayable = f.expPayable || 0;
  var openExpPayable = 0; // opening expense payable from TB
  (D.trialBalance||[]).forEach(function(r){
    if(r.head==='exppayable'||r.head==='accruedexp'||r.head==='outstandingexp'){
      openExpPayable += (+r.amount||0);
    }
  });

  // Advances paid (current assets)
  var advances = 0;
  (D.advances||[]).forEach(function(a){ if(a.type==='paid') advances += (+a.amount||0); });
  var openAdvances = 0;
  (D.trialBalance||[]).forEach(function(r){
    if(r.head==='advance'||r.head==='advancepaid') openAdvances += (+r.amount||0);
  });

  // Changes (increase in assets = negative cash; increase in liabilities = positive cash)
  var chgDebtors   = -(closDebtors   - openDebtors);    // increase in debtors = outflow
  var chgStock     = -(closStock     - openStock);       // increase in stock = outflow
  var chgAdvances  = -(advances      - openAdvances);    // advances paid = outflow
  var chgCreditors = +(closCreditors - openCreditors);   // increase in creditors = inflow
  var chgExpPayable= +(expPayable    - openExpPayable);  // increase in exp payable = inflow

  var cfOperating = netProfit + depreciation
                    + chgDebtors + chgStock + chgAdvances + chgCreditors + chgExpPayable;

  // ── INVESTING ACTIVITIES ──
  // Fixed asset purchases (outflow) — from otherAssets minus opening FA
  var openFA = 0;
  (D.trialBalance||[]).forEach(function(r){
    if(r.head==='fixedassetitem'||r.head==='fa'||r.head==='fa2') openFA += (+r.amount||0);
  });
  // Closing FA = gross cost of all current fixed assets
  var closFA = (D.fixedAssets||[]).reduce(function(s,a){return s+(+a.cost||0);},0);
  // Also include intangible assets
  closFA += (D.intangibleAssets||[]).reduce(function(s,a){return s+(+a.cost||0);},0);
  var faPurchases = -(closFA - openFA);  // new FA purchased this period = outflow
  // Add disposal proceeds already handled below
  // Asset disposal proceeds (inflow from disposed assets)
  var disposalProceeds = 0;
  (D.fixedAssets||[]).forEach(function(a){
    if(a.disposed && a.salePrice) disposalProceeds += (+a.salePrice||0);
  });
  var cfInvesting = faPurchases + disposalProceeds;

  // ── FINANCING ACTIVITIES ──
  // Opening loans — split TL and CC/OD
  var openLoans = 0; var openCcOd = 0;
  (D.trialBalance||[]).forEach(function(r){
    if(r.head==='loan') openLoans += (+r.amount||0);
  });
  // Current loans outstanding — split TL and CC/OD
  var closLoans = 0; var closCcOd = 0;
  (D.loans||[]).forEach(function(l){
    if(l.undrawn) return;
    if(isCcOdLoan&&isCcOdLoan(l)) closCcOd += (+l.outstandingBalance||0);
    else closLoans += (+l.outstandingBalance||0);
  });
  // Capital introduced (additional capital only — opening capital is in TB)
  // SINGLE SOURCE OF TRUTH: sum all cashBook entries tagged as Capital (this covers
  // BOTH entries created via the Capital page's saveCap() flow AND any manual
  // Cash/Bank entries the user typed directly with "Capital" in the description -
  // both produce identical cashBook entries, so summing cashBook avoids any
  // double counting or silent gaps regardless of how the entry was created.
  var capitalIntroduced = 0;
  (D.cashBook||[]).forEach(function(e){
    var desc = (e.description||'').toLowerCase();
    if(desc.indexOf('capital introduced')>=0 || desc.indexOf('capital reduced')>=0){
      if(e.type==='receipt') capitalIntroduced += (+e.amount||0);
      else if(e.type==='payment') capitalIntroduced -= (+e.amount||0);
    }
  });
  // Fallback for older data that never went through cashBook at all (e.g. capital
  // entered only in D.capital fields with Cash/Bank mode 'none' or pre-dating this logic)
  // BUT: if TB is posted, opening capital came from TB (not this period) — do NOT include it
  if(capitalIntroduced===0 && !D.tbPosted){
    capitalIntroduced = (+D.capital.initialCapital||0) + (+D.capital.additionalCapital||0);
  }
  // For TB-posted businesses: only count additional capital added AFTER TB posting
  // which would have CashBook entries with 'Capital Introduced' description
  // Drawings
  var drawings = 0;
  (D.drawings||[]).forEach(function(d){ drawings += (+d.amount||0); });
  // Loan receipts (net new borrowing = closing - opening loans)
  var netLoanChange = closLoans - openLoans;

  var netCcOdChange = closCcOd - openCcOd; // CC/OD net drawn is cash inflow
  var cfFinancing = netLoanChange + netCcOdChange + capitalIntroduced - drawings;

  // Opening and closing cash+bank
  // For NEW business (no Trial Balance posted): opening cash = 0
  // because Capital + Loan receipts in Financing Activities ARE the opening balance
  // For EXISTING business (TB posted): opening cash from Trial Balance
  var openCash = 0;
  if(D.tbPosted && D.trialBalance && D.trialBalance.length>0){
    // Existing business — opening cash+bank from Trial Balance
    (D.trialBalance||[]).forEach(function(r){
      if(r.head==='cash'&&r.side==='dr') openCash += (+r.amount||0);
      if(r.head==='bank'&&r.side==='dr') openCash += (+r.amount||0);
    });
  }
  // Use getBalances() directly — pure cash+bank only (CC/OD excluded)
  var balances = getBalances();
  var closCash = (balances.cb||0) + (balances.bb||0);
  var netChange = cfOperating + cfInvesting + cfFinancing;

  // ── RENDER ──
  var h = '';

  // Helper row for CFS
  function cRow(label, amount, bold, indent, isTotal) {
    var color = amount >= 0 ? '#2E7D32' : '#C62828';
    var bg = isTotal ? 'background:rgba(21,101,192,.08);' : bold ? 'background:rgba(0,0,0,.03);' : '';
    var pl = indent ? 'padding-left:20px;' : '';
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;'+bg+'border-bottom:1px solid #F0F0F0">'+
      '<span style="font-size:'+(bold?'12':'11')+'px;font-weight:'+(bold||isTotal?'700':'400')+';'+pl+'color:'+(bold||isTotal?'#1A237E':'#37474F')+'">'+esc(label)+'</span>'+
      '<span style="font-size:'+(bold?'12':'11')+'px;font-weight:'+(bold||isTotal?'700':'400')+';color:'+(isTotal?'#1565C0':bold?color:'#546E7A')+'">'+
        (amount===0?'—':fc(Math.abs(amount))+' '+(amount<0?'(-)':''))+'</span>'+
      '</div>';
  }
  function cSection(title, color) {
    return '<div style="font-weight:700;font-size:12px;padding:8px 8px 4px;background:'+color+';color:#fff;margin-top:8px;border-radius:6px 6px 0 0">'+esc(title)+'</div>';
  }

  h += '<div class="al ali" style="margin-bottom:8px">Cash Flow Statement using the <b>Indirect Method</b> — starts with Net Profit and adjusts for non-cash items and working capital changes. All figures auto-read from your recorded transactions.</div>';

  // Section A
  h += cSection('A.  CASH FLOWS FROM OPERATING ACTIVITIES', '#1565C0');
  h += '<div style="border:1px solid #BBDEFB;border-top:none;border-radius:0 0 6px 6px;margin-bottom:4px">';
  h += cRow('Net Profit (after all expenses)', netProfit, true);
  h += '<div style="padding:4px 8px;font-size:10px;color:#546E7A;font-weight:700">Add back non-cash items:</div>';
  h += cRow('Add: Depreciation & Amortization', depreciation, false, true);
  h += '<div style="padding:4px 8px;font-size:10px;color:#546E7A;font-weight:700">Working Capital Changes:</div>';
  h += cRow('Change in Debtors / Receivables'+(chgDebtors>=0?' (decreased — inflow)':' (increased — outflow)'), chgDebtors, false, true);
  h += cRow('Change in Stock / Inventory'+(chgStock>=0?' (decreased — inflow)':' (increased — outflow)'), chgStock, false, true);
  h += cRow('Change in Advances Paid'+(chgAdvances>=0?' (recovered — inflow)':' (paid — outflow)'), chgAdvances, false, true);
  h += cRow('Change in Creditors / Payables'+(chgCreditors>=0?' (increased — inflow)':' (decreased — outflow)'), chgCreditors, false, true);
  if(chgExpPayable!==0) h += cRow('Change in Expenses Payable'+(chgExpPayable>=0?' (increased — inflow)':' (decreased — outflow)'), chgExpPayable, false, true);
  h += cRow('A.  Net Cash from Operating Activities', cfOperating, true, false, true);
  h += '</div>';

  // Section B
  h += cSection('B.  CASH FLOWS FROM INVESTING ACTIVITIES', '#2E7060');
  h += '<div style="border:1px solid #C8E6C9;border-top:none;border-radius:0 0 6px 6px;margin-bottom:4px">';
  h += cRow('Purchase of Fixed Assets (Capital Expenditure)', faPurchases, false, true);
  h += cRow('Proceeds from Disposal of Assets', disposalProceeds, false, true);
  h += cRow('B.  Net Cash from Investing Activities', cfInvesting, true, false, true);
  h += '</div>';

  // Section C
  h += cSection('C.  CASH FLOWS FROM FINANCING ACTIVITIES', '#6A1428');
  h += '<div style="border:1px solid #F8BBD0;border-top:none;border-radius:0 0 6px 6px;margin-bottom:4px">';
  h += cRow('Capital Introduced by Owner', capitalIntroduced, false, true);
  h += cRow('Net Change in Loans (New Borrowings - Repayments)', netLoanChange, false, true);
  h += cRow('Drawings by Owner', -drawings, false, true);
  h += cRow('C.  Net Cash from Financing Activities', cfFinancing, true, false, true);
  h += '</div>';

  // Reconciliation
  h += '<div style="border:2px solid #1565C0;border-radius:8px;margin-top:12px;overflow:hidden">';
  h += '<div style="background:#E3F2FD;padding:6px 8px;font-weight:700;font-size:12px;color:#1565C0">RECONCILIATION</div>';
  h += cRow('Net Increase / (Decrease) in Cash  (A + B + C)', netChange, true, false, true);
  h += cRow('Add: Opening Cash & Bank Balance', openCash, false, true);
  h += cRow('Closing Cash & Bank Balance', closCash, true, false, true);
  // Tally check
  var tally = Math.abs(netChange + openCash - closCash) < 2;
  h += '<div style="padding:8px;background:'+(tally?'#E8F5E9':'#FFEBEE')+';text-align:center;font-weight:700;font-size:12px;color:'+(tally?'#2E7D32':'#C62828')+'">'+
    (tally ? '✅ Cash Flow Statement tallies with Balance Sheet!' :
             '⚠️ Difference of ₹'+fc(Math.abs(netChange+openCash-closCash))+' — check opening balances in Trial Balance')+
  '</div>';
  h += '</div>';

  // Notes
  h += '<div class="al ali" style="margin-top:12px;font-size:11px">'+
    '<b>Note:</b> Depreciation shown is accumulated dep recorded so far. '+
    'For full-year depreciation, run the Depreciation function in Capital/Loans → Fixed Assets. '+
    'Capital Introduced includes both Initial and Additional Capital entered in this period.</div>';

  h += '<div style="text-align:right;margin-top:8px">'+btn('🖨 Print Cash Flow Statement','window.print()','#546E7A')+'</div>';

  return card('Cash Flow Statement (Indirect Method) — Current Period', h);
}

// Look up HSN and GST rate by item name (fuzzy match)
function lookupHSN(itemName) {
  if(!itemName) return null;
  var name = itemName.trim().toLowerCase();
  // Exact match first
  if(HSN_MASTER[name]) return HSN_MASTER[name];
  // Partial match - check if any key is contained in item name or vice versa
  var keys = Object.keys(HSN_MASTER);
  for(var i=0; i<keys.length; i++){
    if(name.indexOf(keys[i])>=0 || keys[i].indexOf(name)>=0){
      return HSN_MASTER[keys[i]];
    }
  }
  return null;
}

// Get GST info badge for display
function gstBadge(item) {
  if(!gstEnabled()) return '';
  var hsn = item.hsnCode || (lookupHSN(item.itemName)||[])[0] || '';
  var rate = item.gstRate !== undefined ? item.gstRate : (lookupHSN(item.itemName)? +(lookupHSN(item.itemName)[1]) : '?');
  if(!hsn && rate==='?') return '';
  return '<span style="font-size:9px;background:#E8F5E9;color:#2E7D32;border-radius:4px;padding:1px 5px;margin-left:4px;font-weight:700">'+
    (hsn?'HSN:'+hsn+' ':'')+rate+'%</span>';
}



// ===================================================================
// CUSTOM HSN MASTER — user can add/edit items not in built-in master
// Stored in D.customHSN = { 'item_name_lower': [hsn, rate, desc] }
// ===================================================================

function getCustomHSN(itemName) {
  if(!itemName || !D.customHSN) return null;
  var key = itemName.trim().toLowerCase();
  return D.customHSN[key] || null;
}

function lookupHSNFull(itemName) {
  // First check custom master (user-defined overrides built-in)
  var custom = getCustomHSN(itemName);
  if(custom) return custom;
  // Then check built-in master
  return lookupHSN(itemName);
}

function saveCustomHSN(itemName, hsnCode, gstRate, desc) {
  if(!D.customHSN) D.customHSN = {};
  var key = itemName.trim().toLowerCase();
  D.customHSN[key] = [hsnCode, String(gstRate), desc||itemName];
  // Also update the inventory item if it exists
  (D.inventory||[]).forEach(function(item){
    if(item.itemName.trim().toLowerCase() === key){
      item.hsnCode = hsnCode;
      item.gstRate  = +gstRate;
    }
  });
  sv();
}

    if(hEl) hEl.value=lookup[0];
    if(rEl) rEl.value=lookup[1];
    if(dEl) dEl.value=lookup[2];
    toast('Found in built-in master: HSN '+lookup[0]+' @ '+lookup[1]+'%');
  } else {
    toast('Not in built-in master — enter HSN code manually or search at cbic.gov.in','w');
  }
}

function saveCustomHSNFromForm(){
  var name=gv('hsn_item'), hsn=gv('hsn_code'), rate=gvn('hsn_rate'), desc=gv('hsn_desc')||name;
  if(!name){toast('Enter item name','e');return;}
  if(!hsn){toast('Enter HSN/SAC code','e');return;}
  saveCustomHSN(name, hsn, rate, desc);
  window._hsnPrefill='';
  renderPage();
  toast('HSN saved for '+name+' ('+hsn+' @ '+rate+'%)');
}

function deleteCustomHSN(key){
  confirmDialog('Remove custom HSN for "'+key+'"?', function(){
    if(D.customHSN) delete D.customHSN[key];
    sv(); renderPage(); toast('Removed');
  });
}

function searchHSNMaster(){
  window._hsnSearch = gv('hsn_sq')||'';
  renderPage();
}

function applyHSNSearch(btn){
  var name=btn.getAttribute('data-name')||'';
  var hsn=btn.getAttribute('data-hsn')||'';
  var rate=+(btn.getAttribute('data-rate')||0);
  var desc=btn.getAttribute('data-desc')||name;
  applyHSNToItem(name,hsn,rate,desc);
}
function applyHSNToItem(itemName, hsn, rate, desc){
  // Find the inventory item and update
  var found = false;
  (D.inventory||[]).forEach(function(item){
    if(item.itemName.trim().toLowerCase() === itemName.trim().toLowerCase()){
      item.hsnCode = hsn;
      item.gstRate  = +rate;
      found = true;
    }
  });
  saveCustomHSN(itemName, hsn, rate, desc);
  renderPage();
  toast('HSN '+hsn+' @ '+rate+'% applied'+(found?' to inventory item':''));
}

// ── TAX COMPUTATION HELPERS ──
function computeGrossIncome(it) {
  var f = getF();
  var businessProfit = it.useManual ? (+(it.manualProfit||0)) :
    Math.round(f.np * 365 / Math.max(1, (function(){
      var dates=[];
      D.sales.forEach(function(s){if(s.date)dates.push(s.date);});
      D.expenses.forEach(function(e){if(e.date)dates.push(e.date);});
      var earliest=dates.length?dates.reduce(function(a,b){return a<b?a:b;}):td();
      return Math.max(1,daysBetween(earliest,td()));
    })()));
  var section = it.section || 'regular';
  var presumptive = 0;
  if(section==='44ad'){
    // 8% of turnover (or 6% if digital) — use annualized sales
    var annSales = Math.round(f.ts * 365 / Math.max(1, (function(){
      var dates=[];D.sales.forEach(function(s){if(s.date)dates.push(s.date);});
      var earliest=dates.length?dates.reduce(function(a,b){return a<b?a:b;}):td();
      return Math.max(1,daysBetween(earliest,td()));
    })()));
    presumptive = Math.round(annSales * 0.08);
    businessProfit = 0; // use presumptive instead
  } else if(section==='44ada'){
    var annSales2 = Math.round(f.ts * 365 / Math.max(1,(function(){
      var dates=[];D.sales.forEach(function(s){if(s.date)dates.push(s.date);});
      var earliest=dates.length?dates.reduce(function(a,b){return a<b?a:b;}):td();
      return Math.max(1,daysBetween(earliest,td()));
    })()));
    presumptive = Math.round(annSales2 * 0.50);
    businessProfit = 0;
  }
  var salary = +(it.salaryIncome||0);
  var stdDed = salary > 0 ? Math.min(+(it.d_std||75000), 75000) : 0;
  var salaryNet = Math.max(0, salary - stdDed);
  var other  = +(it.otherIncome||0);
  var agri   = +(it.agriIncome||0);   // exempt
  var cg     = +(it.capitalGains||0); // STCG at 15%/20%
  var business = businessProfit + presumptive;
  var total  = business + salaryNet + other + cg; // agri exempt
  return {business:businessProfit, presumptive:presumptive, salary:salaryNet,
          other:other, agri:agri, cg:cg, total:total};
}

function computePresumptiveTax(it) {
  var section = it.section||'regular';
  if(section==='regular') return {applicable:false};
  var f=getF();
  var annSales=Math.round(f.ts*365/Math.max(1,(function(){
    var dates=[];D.sales.forEach(function(s){if(s.date)dates.push(s.date);});
    var earliest=dates.length?dates.reduce(function(a,b){return a<b?a:b;}):td();
    return Math.max(1,daysBetween(earliest,td()));
  })()));
  if(section==='44ad'){
    var deemed=Math.round(annSales*0.08);
    return {applicable:true,turnover:annSales,deemed:deemed,
      note:'Sec 44AD: Annualized turnover ₹'+fc(annSales)+' × 8% = Deemed Profit ₹'+fc(deemed)+'. No separate expense deduction allowed.'};
  } else {
    var deemed2=Math.round(annSales*0.50);
    return {applicable:true,turnover:annSales,deemed:deemed2,
      note:'Sec 44ADA: Gross receipts ₹'+fc(annSales)+' × 50% = Deemed Profit ₹'+fc(deemed2)+'.'};
  }
}

function getTaxConfigForAY(ay){
  // Falls back to the latest available year if the selected AY has no
  // config yet (e.g. user picked a future year before Budget rates are added).
  if(TAX_CONFIG[ay]) return TAX_CONFIG[ay];
  var years = Object.keys(TAX_CONFIG).sort();
  return TAX_CONFIG[years[years.length-1]];
}

function calcSlabTax(income, slabs) {
  var tax=0, prev=0, breakdown=[];
  slabs.forEach(function(s){
    var upper = s.upper===null ? income : Math.min(income, s.upper);
    var amount = Math.max(0, upper - prev);
    var t = Math.round(amount * s.rate / 100);
    breakdown.push({label:s.label, amount:amount, rate:s.rate, tax:t});
    tax += t;
    prev = s.upper===null ? income : s.upper;
    if(prev >= income) return;
  });
  return {tax:tax, breakdown:breakdown};
}

function applyRebateSurcharCess(baseTax, taxableIncome, regime, ay) {
  var cfg = getTaxConfigForAY(ay || (D.incomeTax && D.incomeTax.ay) || '2025-26');
  var rebate = 0;
  var rb = regime==='new' ? cfg.rebateNew : cfg.rebateOld;
  if(taxableIncome <= rb.limit) rebate = Math.min(baseTax, rb.max);
  var afterRebate = Math.max(0, baseTax - rebate);
  var surcharge = 0;
  if(taxableIncome > 5000000 && taxableIncome <= 10000000) surcharge = Math.round(afterRebate*0.10);
  else if(taxableIncome > 10000000 && taxableIncome <= 20000000) surcharge = Math.round(afterRebate*0.15);
  else if(taxableIncome > 20000000 && taxableIncome <= 50000000) surcharge = Math.round(afterRebate*0.25);
  else if(taxableIncome > 50000000) surcharge = Math.round(afterRebate*(regime==='new'?0.25:0.37));
  var cess = Math.round((afterRebate+surcharge)*cfg.cessRate);
  return {rebate:rebate, surcharge:surcharge, cess:cess, total:afterRebate+surcharge+cess};
}

function computeOldRegimeTax(it) {
  var gi = computeGrossIncome(it);
  var gender = it.gender||'male';
  var ay = (it && it.ay) || '2025-26';
  var cfg = getTaxConfigForAY(ay);
  var dc = cfg.deductionCaps;
  // 80C deductions
  var d80c = Math.min(dc.d80c_total,
    (+(it.d_lic||0))+(+(it.d_ppf||0))+(+(it.d_nsc||0))+(+(it.d_tuition||0))+(+(it.d_hlprin||0))+(+(it.d_nps80c||0)));
  var deductions = d80c +
    (dc.d80d!=null ? Math.min(+(it.d_80d||0),dc.d80d) : (+(it.d_80d||0))) +
    (dc.d80dd!=null ? Math.min(+(it.d_80dd||0),dc.d80dd) : (+(it.d_80dd||0))) +
    (+(it.d_80g||0)) +
    (dc.d80tta!=null ? Math.min(+(it.d_80tta||0),dc.d80tta) : (+(it.d_80tta||0))) +
    (+(it.d_80e||0))+
    (dc.d_hli!=null ? Math.min(+(it.d_hli||0),dc.d_hli) : (+(it.d_hli||0))) +
    (dc.d_nps!=null ? Math.min(+(it.d_nps||0),dc.d_nps) : (+(it.d_nps||0))) +
    (+(it.d_hra||0))+
    (+(it.d_other||0));
  var gti = gi.total;
  var taxableIncome = Math.max(0, gti - deductions);
  taxableIncome = Math.round(taxableIncome / 100) * 100; // round to nearest 100

  // Old regime slabs by gender/age, from config
  var slabDefs = cfg.oldRegimeSlabs[gender] || cfg.oldRegimeSlabs.male;
  var baseLimit = slabDefs[0].upper;
  var slabs = slabDefs.map(function(s, idx){
    var lbl;
    if(idx===0) lbl = 'Up to '+fc(s.upper)+(gender==='senior'||gender==='supersenior' ? ' (Exempt for '+gender+')' : ' (Basic Exemption)');
    else if(s.upper===null) lbl = 'Above '+fc(slabDefs[idx-1].upper);
    else lbl = fc(slabDefs[idx-1].upper+1)+' to '+fc(s.upper);
    return {label:lbl, upper:s.upper, rate:s.rate};
  });

  var res = calcSlabTax(taxableIncome, slabs);
  var extra = applyRebateSurcharCess(res.tax, taxableIncome, 'old', ay);
  return {gti:gti, deductions:deductions, taxableIncome:taxableIncome,
          baseTax:res.tax, slabs:res.breakdown,
          rebate:extra.rebate, surcharge:extra.surcharge, cess:extra.cess, total:extra.total,
          ayLabel:cfg.label};
}

function computeNewRegimeTax(it) {
  var gi = computeGrossIncome(it);
  var gti = gi.total;
  var ay = (it && it.ay) || '2025-26';
  var cfg = getTaxConfigForAY(ay);
  var slabs = cfg.newRegimeSlabs;
  var taxableIncome = Math.max(0, Math.round(gti/100)*100);
  var res = calcSlabTax(taxableIncome, slabs);
  var extra = applyRebateSurcharCess(res.tax, taxableIncome, 'new', ay);
  return {gti:gti, deductions:0, taxableIncome:taxableIncome,
          baseTax:res.tax, slabs:res.breakdown,
          rebate:extra.rebate, surcharge:extra.surcharge, cess:extra.cess, total:extra.total,
          ayLabel:cfg.label};
}

function wizSetStage(s){ _wiz.data.stage=s; showWizStep(0); }
function wizSetConstitution(c){ _wiz.data.constitution=c; showWizStep(1); }
function wizSetBtype(b){ _wiz.data.btype=b; showWizStep(1); }
function wizSetCapitalMode(m){ _wiz.data.capitalMode=m; showWizStep(2); }

function wizSaveProfile(){
  var name = document.getElementById('wiz_bname') ? document.getElementById('wiz_bname').value : _wiz.data.name;
  var owner = document.getElementById('wiz_owner') ? document.getElementById('wiz_owner').value : _wiz.data.owner;
  var mobile = document.getElementById('wiz_mobile') ? document.getElementById('wiz_mobile').value : _wiz.data.mobile;
  if(!name||!name.trim()){toast('Business name डालें','e');return;}
  if(!owner||!owner.trim()){toast('Owner name डालें','e');return;}
  if(!mobile||mobile.length<10){toast('Valid 10-digit mobile डालें','e');return;}
  _wiz.data.name=name.trim();
  _wiz.data.owner=owner.trim();
  _wiz.data.mobile=mobile.trim();
  // Save to D.profile immediately
  D.profile.businessName=_wiz.data.name;
  D.profile.ownerName=_wiz.data.owner;
  D.profile.mobile=_wiz.data.mobile;
  D.profile.constitution=_wiz.data.constitution;
  D.profile.businessType=_wiz.data.btype;
  D.profile.businessStage=_wiz.data.stage;
  sv();
  showWizStep(2);
}

function wizSaveCapital(){
  var cap = document.getElementById('wiz_capital') ? +document.getElementById('wiz_capital').value : _wiz.data.capital;
  if(!cap||cap<=0){toast('Capital amount डालें','e');return;}
  _wiz.data.capital=cap;
  var cash=0, bank=0;
  if(_wiz.data.capitalMode==='cash'){ cash=cap; bank=0; }
  else if(_wiz.data.capitalMode==='bank'){ cash=0; bank=cap; }
  else {
    cash = document.getElementById('wiz_cash') ? +document.getElementById('wiz_cash').value : _wiz.data.cash;
    bank = document.getElementById('wiz_bank') ? +document.getElementById('wiz_bank').value : _wiz.data.bank;
    if((cash+bank)!==cap){ toast('Cash + Bank = ₹'+cap.toLocaleString('en-IN')+' होना चाहिए','e'); return; }
  }
  _wiz.data.cash=cash; _wiz.data.bank=bank;
  D.capital.initialCapital=cap;
  D.capital.additionalCapital=0;
  D.opening.cash=cash; D.opening.bank=bank; D.opening.capital=cap;
  sv();
  showWizStep(3);
}
