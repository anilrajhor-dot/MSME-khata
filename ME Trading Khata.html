function addAdvance(){
  var date=gv('adv_d')||td(), amt=gvn('adv_a'), typeSel=gv('adv_type'), party=gv('adv_party')||'', mode=gv('adv_mode')||'cash', notes=gv('adv_notes')||'';
  if(!amt || amt<=0){toast('Enter the advance amount','e');return;}
  if(!party){toast('Enter the party name','e');return;}
  var type, category;
  if(typeSel==='paid_supplier'){ type='paid'; category='supplier'; }
  else if(typeSel==='paid_expense'){ type='paid'; category='expense'; }
  else { type='received'; category='customer'; }
  if(mode==='credit'){toast('Advances must be paid/received via Cash, Bank, UPI, CC or OD - not Credit','e');return;}
  if(!validateCCOD(mode)) return;

  var desc = (type==='paid'?'Advance Paid to ':'Advance Received from ')+party+(notes?' - '+notes:'');
  if(type==='paid'){
    postCB(mode,'payment',amt,party,desc,date);
  } else {
    postCB(mode,'receipt',amt,party,desc,date);
  }
  D.advances = D.advances || [];
  var refCode = 'ADV-'+Date.now().toString(36).toUpperCase().slice(-5);
  D.advances.push({id:uid(),date:date,type:type,category:category,party:party,amount:amt,mode:mode,notes:notes,refCode:refCode});
  sv();window._advMode=null;renderPage();
  toast('Advance recorded.');
}
function deleteAdvance(id){
  confirmDialog('Delete this advance? This reverses the original cash/bank entry. If any part of it was already adjusted, that adjustment record will also be removed - make sure this matches your records.', function(){
    var idx=-1,i;for(i=0;i<D.advances.length;i++)if(D.advances[i].id===id){idx=i;break;}
    if(idx<0)return;
    var adv=D.advances[idx];
    var desc = (adv.type==='paid'?'Advance Paid to ':'Advance Received from ')+adv.party+(adv.notes?' - '+adv.notes:'');
    if(adv.type==='paid'){
      reverseCB(adv.mode,'payment',adv.amount,desc);
    } else {
      reverseCB(adv.mode,'receipt',adv.amount,desc);
    }
    D.advances.splice(idx,1);
    sv();renderPage();toast('Advance deleted, balance reversed.');
  });
}
function addTransfer(){
  var date=gv('tr_d')||td(), amt=gvn('tr_a'), from=gv('tr_from'), to=gv('tr_to'), ds=gv('tr_ds')||'';
  if(!amt || amt<=0){toast('Enter the transfer amount','e');return;}
  if(from===to){toast('From and To accounts must be different','e');return;}
  var desc = 'Transfer'+(ds?' - '+ds:'')+' ('+modeLabel(from)+' \u2192 '+modeLabel(to)+')';
  postCB(from,'payment',amt,'',desc,date);
  postCB(to,'receipt',amt,'',desc,date);
  sv();renderPage();toast('Transfer recorded - '+fc(amt)+' moved.');
}
// Human-readable label for a cash/bank mode value, used in transfer descriptions
function modeLabel(mode){
  if(mode==='cash') return 'Cash';
  if(mode && mode.indexOf('bank:')===0){
    var accId=mode.slice(5);
    for(var i=0;i<(D.bankAccounts||[]).length;i++) if(D.bankAccounts[i].id===accId) return D.bankAccounts[i].name;
    return 'Bank';
  }
  return mode;
}
function addCB(){
  var a=gvn('cb_a'),ds=gv('cb_ds'),m=gv('cb_m');

  var cbMode, bankAccountId;
  if(m.indexOf('bank:')===0){ cbMode='bank'; bankAccountId=m.slice(5); } else { cbMode='cash'; }

  if(cbMode==='bank') entry.bankAccountId=bankAccountId;
  D.cashBook.push(entry);
  sv();go('cashbank');toast('Added!');
}

function calcEMI2(){var p=gvn('em_p'),r=gvn('em_r'),n=gvn('em_t');if(!p||!n)return;var e=calcEMI(p,r,n),tot=e*n;var el=document.getElementById('emi_res');if(el)el.innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;margin-top:8px"><div style="background:#E8F5E9;border-radius:8px;padding:9px"><div style="font-size:10px;color:#546E7A">Monthly EMI</div><div style="font-size:16px;font-weight:800;color:#2E7D32">'+fc(e)+'</div></div><div style="background:#FFEBEE;border-radius:8px;padding:9px"><div style="font-size:10px;color:#546E7A">Total Interest</div><div style="font-size:16px;font-weight:800;color:#C62828">'+fc(tot-p)+'</div></div><div style="background:#E8EAF6;border-radius:8px;padding:9px"><div style="font-size:10px;color:#546E7A">Total Payment</div><div style="font-size:16px;font-weight:800;color:#5C6BC0">'+fc(tot)+'</div></div></div>';}
function genSched(){calcEMI2();var p=gvn('em_p'),r=gvn('em_r'),n=gvn('em_t'),pm=gvn('em_pm'),pa=gvn('em_pa'),m=r/1200,em2=m?p*m*Math.pow(1+m,n)/(Math.pow(1+m,n)-1):p/n,bal=p,rows=[],mo;for(mo=1;mo<=n;mo++){var it=bal*m,pr=em2-it,ex=0;if(mo===pm&&pa>0)ex=Math.min(pa,bal-pr);bal=Math.max(0,bal-pr-ex);rows.push({m:mo,em:em2,it:it,pr:pr,ex:ex,bal:bal});if(bal<=0)break;}var sc2=document.getElementById('emi_sc');if(sc2)sc2.innerHTML=tbl([{l:'#',fn:function(r){return r.m;}},{l:'EMI',r:1,fn:function(r){return fc(r.em);}},{l:'Principal',r:1,fn:function(r){return fc(r.pr);}},{l:'Interest',r:1,fn:function(r){return fc(r.it);}},{l:'Balance',r:1,fn:function(r){return fc(r.bal);}}],rows);}

      '<div class="al '+(Math.abs(diff)<1?'als':'ald')+'" style="margin-top:11px"><div class="alt">'+(Math.abs(diff)<1?'✓ Balance Sheet Tallies!':'⚠ Balance Sheet Does NOT Tally')+'</div>'+
      (Math.abs(diff)<1?'':'<p>Difference: '+fc(Math.abs(diff))+' — '+(diff>0?'Liabilities are higher. Check if Opening Balances are entered correctly, or if Additional Capital / Loan disbursement was posted to Cash/Bank.':'Assets are higher. Check Opening Balances entry.')+'</p>')+
      '</div>'
    );
    if(D.opening.takenOn){
      h+='<div class="al ali">Opening Balances as on '+D.opening.takenOn+': Cash '+fc(D.opening.cash||0)+', Bank '+fc(D.opening.bank||0)+', Stock '+fc(D.opening.stock||0)+', Capital '+fc(D.opening.capital||0)+', Debtors '+fc(D.opening.debtors||0)+', Creditors '+fc(D.opening.creditors||0)+'</div>';
    }else{
      h+='<div class="al alw">No Opening Balances set. If you had Cash, Bank, Stock, Debtors, Creditors or Capital before starting this app, go to Data → Opening Balances to enter them — otherwise the Balance Sheet may not tally.</div>';
    }
  }
  return h;
}
// ===== ANALYTICS =====
function pgAna(){
  var f=getF(),i,tl=f.ltl,ca=f.cs+f.cb+f.bb+f.dr;
  var gp=f.ts>0?((f.gp/f.ts)*100).toFixed(1):0,np=f.ts>0?((f.np/f.ts)*100).toFixed(1):0;
  var de=f.cap>0?(tl/f.cap).toFixed(2):'--',cr=f.cr>0?(ca/f.cr).toFixed(2):'--',wc=ca-f.cr;
  var kpis=[['GP %',gp+'%',+gp>=20?'#2E7D32':'#E65100'],['NP %',np+'%',+np>=10?'#2E7D32':'#C62828'],['D/E Ratio',de,+de>2?'#C62828':'#2E7D32'],['Curr Ratio',cr,+cr>=1.5?'#2E7D32':'#E65100'],['Wkg Capital',fc(wc),wc>=0?'#2E7D32':'#C62828'],['ROCE',f.cap>0?((f.np/f.cap)*100).toFixed(1)+'%':'--',+f.np>0?'#2E7D32':'#C62828']];
  var h=card('Key Indicators','<div class="kg">'+kpis.map(function(k){return'<div class="ki"><div class="kl">'+k[0]+'</div><div class="kv" style="color:'+k[2]+'">'+k[1]+'</div></div>';}).join('')+'</div>');
  var j,ct=[];for(i=0;i<D.expenseCategories.length;i++){var cv=0;for(j=0;j<D.expenses.length;j++)if(D.expenses[j].category===D.expenseCategories[i])cv+=D.expenses[j].amount;if(cv>0)ct.push({l:D.expenseCategories[i].slice(0,6),v:cv});}
  if(ct.length)h+=card('Expense Breakdown',bar(ct,'#C62828',55));
  var im={};for(i=0;i<D.sales.length;i++){var sk=D.sales[i].itemName;im[sk]=(im[sk]||0)+D.sales[i].totalAmount;}
  var ta2=[];for(sk in im)ta2.push({l:sk.slice(0,8),v:im[sk]});ta2.sort(function(a,b){return b.v-a.v;});
  if(ta2.length)h+=card('Top Items by Sales',bar(ta2.slice(0,5),'#2E7D32',55));

  // Sales Analysis: breakdown of total sales by Cash/Bank, Credit, and Export
  var st=f.salesByType||{cash:0,credit:0,export:0};
  if(f.ts>0){
    var pct=function(v){return f.ts>0?((v/f.ts)*100).toFixed(1):'0.0';};
    var rows='';
    if(st.cash>0) rows+=fsr('Cash/Bank Sales',st.cash,0,1)+'<div style="font-size:10px;color:#90A4AE;padding:0 8px 4px 16px">'+pct(st.cash)+'% of total sales</div>';
    if(st.credit>0) rows+=fsr('Credit Sales',st.credit,0,1)+'<div style="font-size:10px;color:#90A4AE;padding:0 8px 4px 16px">'+pct(st.credit)+'% of total sales</div>';
    if(st.export>0) rows+=fsr('Export Sales',st.export,0,1)+'<div style="font-size:10px;color:#90A4AE;padding:0 8px 4px 16px">'+pct(st.export)+'% of total sales</div>';
    rows+=fsr('TOTAL SALES',f.ts,1,0,1);
    h+=card('Sales Analysis (Cash / Credit / Export)',rows);
    var salesBars=[];
    if(st.cash>0) salesBars.push({l:'Cash/Bank',v:st.cash});
    if(st.credit>0) salesBars.push({l:'Credit',v:st.credit});
    if(st.export>0) salesBars.push({l:'Export',v:st.export});
    if(salesBars.length>1) h+=card('Sales Mix',bar(salesBars,'#5B5BD6',55));
  }

  // Purchase Analysis: breakdown of total purchases by Indigenous / Imported
  var pt=f.purchasesByType||{indigenous:0,imported:0};
  if(f.tp>0){
    var pctp=function(v){return f.tp>0?((v/f.tp)*100).toFixed(1):'0.0';};
    var prows='';
    if(pt.indigenous>0) prows+=fsr('Indigenous Purchases',pt.indigenous,0,1)+'<div style="font-size:10px;color:#90A4AE;padding:0 8px 4px 16px">'+pctp(pt.indigenous)+'% of total purchases</div>';
    if(pt.imported>0) prows+=fsr('Imported Purchases',pt.imported,0,1)+'<div style="font-size:10px;color:#90A4AE;padding:0 8px 4px 16px">'+pctp(pt.imported)+'% of total purchases</div>';
    prows+=fsr('TOTAL PURCHASES',f.tp,1,0,1);
    h+=card('Purchase Analysis (Indigenous / Imported)',prows);
    var purchaseBars=[];
    if(pt.indigenous>0) purchaseBars.push({l:'Indigenous',v:pt.indigenous});
    if(pt.imported>0) purchaseBars.push({l:'Imported',v:pt.imported});
    if(purchaseBars.length>1) h+=card('Purchase Mix',bar(purchaseBars,'#E65100',55));
  }

  // ── ITEM-WISE PROFIT ANALYSIS (with expense apportionment) ──
  (function(){
    if(!D.sales || D.sales.length===0) return;
    // Build item map: sales, COGS, qty
    var items={};
    D.sales.forEach(function(s){
      var k=s.itemName||'Unknown';
      if(!items[k]) items[k]={name:k,sales:0,cogs:0,qty:0,txns:0};
      items[k].sales += (s.totalAmount||0);
      items[k].cogs  += (s.cogs||0);
      items[k].qty   += (s.qty||0);
      items[k].txns  += 1;
    });
    var itemList=[];
    for(var k in items) itemList.push(items[k]);
    if(itemList.length===0) return;
    itemList.sort(function(a,b){return b.sales-a.sales;});

    var totalSales = itemList.reduce(function(s,it){return s+it.sales;},0);
    var totalExp   = f.te||0;

    // Apportion expenses by sales value proportion
    itemList.forEach(function(it){
      it.gm       = it.sales - it.cogs;
      it.gmPct    = it.sales>0 ? (it.gm/it.sales*100) : 0;
      it.expShare = totalSales>0 ? (it.sales/totalSales)*totalExp : 0;
      it.np       = it.gm - it.expShare;
      it.npPct    = it.sales>0 ? (it.np/it.sales*100) : 0;
      it.npPerUnit= it.qty>0 ? it.np/it.qty : 0;
    });

    // Table rows
    var rows='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">';
    rows+='<tr style="background:#1565C0;color:#fff">';
    rows+='<th style="padding:6px 4px;text-align:left">Item</th>';
    rows+='<th style="padding:6px 4px;text-align:right">Sales</th>';
    rows+='<th style="padding:6px 4px;text-align:right">COGS</th>';
    rows+='<th style="padding:6px 4px;text-align:right">Gross Margin</th>';
    rows+='<th style="padding:6px 4px;text-align:right">GM%</th>';
    rows+='<th style="padding:6px 4px;text-align:right">Exp (Apptd)</th>';
    rows+='<th style="padding:6px 4px;text-align:right;font-weight:800">Net Profit</th>';
    rows+='<th style="padding:6px 4px;text-align:right">NP%</th>';
    rows+='<th style="padding:6px 4px;text-align:right">NP/Unit</th>';
    rows+='</tr>';

    itemList.forEach(function(it,idx){
      var bg=idx%2===0?'#F9FAFB':'#fff';
      var npColor=it.np>=0?'#2E7D32':'#C62828';
      var gmColor=it.gmPct>=20?'#2E7D32':'#E65100';
      rows+='<tr style="background:'+bg+'">';
      rows+='<td style="padding:5px 4px;font-weight:600;color:#1565C0">'+esc(it.name)+'<br><span style="font-size:9px;color:#90A4AE">'+it.txns+' txn'+(it.txns>1?'s':'')+' · '+fmt(it.qty)+' units</span></td>';
      rows+='<td style="padding:5px 4px;text-align:right">'+fc(it.sales)+'</td>';
      rows+='<td style="padding:5px 4px;text-align:right">'+fc(it.cogs)+'</td>';
      rows+='<td style="padding:5px 4px;text-align:right;color:'+gmColor+';font-weight:700">'+fc(it.gm)+'</td>';
      rows+='<td style="padding:5px 4px;text-align:right;color:'+gmColor+'">'+it.gmPct.toFixed(1)+'%</td>';
      rows+='<td style="padding:5px 4px;text-align:right;color:#E65100">'+fc(Math.round(it.expShare))+'</td>';
      rows+='<td style="padding:5px 4px;text-align:right;color:'+npColor+';font-weight:800">'+fc(Math.round(it.np))+'</td>';
      rows+='<td style="padding:5px 4px;text-align:right;color:'+npColor+';font-weight:700">'+it.npPct.toFixed(1)+'%</td>';
      rows+='<td style="padding:5px 4px;text-align:right;color:'+npColor+'">'+fc(Math.round(it.npPerUnit))+'</td>';
      rows+='</tr>';
    });

    // Totals row
    var totGM=itemList.reduce(function(s,it){return s+it.gm;},0);
    var totNP=itemList.reduce(function(s,it){return s+it.np;},0);
    rows+='<tr style="background:#E3F2FD;font-weight:800">';
    rows+='<td style="padding:5px 4px">TOTAL</td>';
    rows+='<td style="padding:5px 4px;text-align:right">'+fc(totalSales)+'</td>';
    rows+='<td style="padding:5px 4px;text-align:right">'+fc(itemList.reduce(function(s,it){return s+it.cogs;},0))+'</td>';
    rows+='<td style="padding:5px 4px;text-align:right;color:#2E7D32">'+fc(totGM)+'</td>';
    rows+='<td style="padding:5px 4px;text-align:right;color:#2E7D32">'+(totalSales>0?(totGM/totalSales*100).toFixed(1):0)+'%</td>';
    rows+='<td style="padding:5px 4px;text-align:right;color:#E65100">'+fc(Math.round(totalExp))+'</td>';
    rows+='<td style="padding:5px 4px;text-align:right;color:'+(totNP>=0?'#2E7D32':'#C62828')+'">'+fc(Math.round(totNP))+'</td>';
    rows+='<td style="padding:5px 4px;text-align:right;color:'+(totNP>=0?'#2E7D32':'#C62828')+'">'+(totalSales>0?(totNP/totalSales*100).toFixed(1):0)+'%</td>';
    rows+='<td style="padding:5px 4px;text-align:right">—</td>';
    rows+='</tr>';
    rows+='</table></div>';

    // Insights
    var best=itemList[0], worst=itemList[itemList.length-1];
    var profitable=itemList.filter(function(it){return it.np>0;});
    var insight='<div style="margin-top:10px;font-size:11px;color:#37474F;line-height:1.7">';
    insight+='<b>📌 Method:</b> Other expenses (₹'+fc(Math.round(totalExp))+') apportioned by sales value proportion.<br>';
    if(itemList.length>1){
      insight+='🏆 <b>Most Profitable:</b> '+esc(best.name)+' — NP ₹'+fc(Math.round(best.np))+' ('+best.npPct.toFixed(1)+'%)<br>';
      if(worst.np<0) insight+='⚠️ <b>Loss-making:</b> '+esc(worst.name)+' — Loss ₹'+fc(Math.round(Math.abs(worst.np)))+'<br>';
      insight+='✅ <b>'+profitable.length+' of '+itemList.length+' items</b> are profitable after expense apportionment.<br>';
    }
    insight+='<span style="font-size:10px;color:#90A4AE">To improve NP%: increase selling price, reduce COGS, or reduce overheads.</span>';
    insight+='</div>';

    h+=card('📦 Item-wise Profit Analysis (After Expense Apportionment)', rows+insight);
  })();

  return h;
}

function importFromData(jsonText){
  try{
    // Clean the text — remove BOM, invisible chars, trim whitespace
    // Clean text — remove BOM and find JSON boundaries
    var clean=jsonText.trim();
    if(clean.charCodeAt(0)===65279) clean=clean.slice(1);
    var jsonStart=clean.indexOf('{');
    var jsonEnd=clean.lastIndexOf('}');
    if(jsonStart>=0&&jsonEnd>jsonStart) clean=clean.slice(jsonStart,jsonEnd+1);
    var parsed = JSON.parse(clean);
    D = migrateData(parsed);
    // Auto-fix BS if it doesn't tally
    var _f2=getF();
    var _bs2=getBS();
    var _bsDiff=Math.abs(_bs2.totalAssets-_bs2.totalLiab);
    if(_bsDiff>100){
      // Recalculate opening bank to make BS tally
      var _ts=_f2.ts||0,_tp=0,_te=_f2.te||0,_cs=_f2.cs||0,_draw=0,_loans=0,_drs=_f2.dr||0,_fa=0,_adv=0,_cred=_f2.cr||0;
      D.purchases.forEach(function(p){_tp+=p.amount||0;});
      D.drawings.forEach(function(d){_draw+=d.amount||0;});
      D.loans.forEach(function(l){_loans+=l.outstandingBalance||0;});
      D.fixedAssets.forEach(function(a){_fa+=(a.cost||0)-(a.accumDep||0);});
      D.advances.forEach(function(a){_adv+=a.amount||0;});
      var _p1=D.capital.initialCapital||0,_p2=D.capital.additionalCapital||0;
      var _netCap=_p1+_p2-_draw+(_ts-D.opening.stock-_tp+_cs-_te);
      var _totalLiab=_netCap+_loans+_cred;
      var _reqCB=_totalLiab-_fa-_cs-_drs-_adv;
      var _sp=D.sales.filter(function(s){return s.paymentMode!=='credit';}).reduce(function(t,s){return t+(s.totalAmount||0);},0);
      var _reqOp=_reqCB-_sp+_tp+_te+_draw+_adv;
      var _corrBank=Math.max(0,Math.round(_reqOp-(D.opening.cash||0)));
      D.opening.bank=_corrBank;
    }
    sv();
    var _bs3=getBS();
    var _finalDiff=Math.abs(_bs3.totalAssets-_bs3.totalLiab);
    renderPage();
    if(_finalDiff<10){
      toast('✅ Imported successfully! Balance Sheet tallies.');
    } else {
      toast('✅ Imported! BS diff: '+fc(Math.round(_finalDiff))+' — check opening entries','w');
    }
    return true;
  }catch(err){
    toast('Import failed: '+err.message+' — Make sure you copied the complete JSON file','e');
    return false;
  }
}

function triggerFileImport(){
  // Create fresh input element each time — more reliable on iOS Safari PWA
  var inp=document.getElementById('json_file_inp');
  if(!inp){
    inp=document.createElement('input');
    inp.type='file';
    inp.id='json_file_inp';
    inp.accept='.json,application/json,text/plain';
    inp.style.cssText='display:none;position:absolute;left:-9999px';
    inp.onchange=function(e){impDat(e);};
    document.body.appendChild(inp);
  }
  inp.value=''; // Reset so same file can be selected again
  inp.click();
}

function impDat(e){
  var f2=e.target.files[0];
  if(!f2){toast('No file selected','e');return;}
  if(f2.size>10*1024*1024){toast('File too large (max 10MB)','e');return;}
  toast('Reading file: '+f2.name+' ('+Math.round(f2.size/1024)+'KB)...');
  var r2=new FileReader();
  r2.onload=function(ev){
    var result=ev.target.result;
    if(!result||result.length<10){toast('File appears empty','e');return;}
    importFromData(result);
  };
  r2.onerror=function(){toast('Could not read file. Try Paste Backup method.','e');};
  r2.readAsText(f2,'UTF-8');
}

function tbTotalsHtml(){

    totalsHtml += '<div class="al ali">Add items to see tally status.</div>';

    totalsHtml += '<div class="al als"><div class="alt">Trial Balance Tallies!</div><p>Debit = Credit. You can now post these to the books.</p></div>';

function addTBRow(){
  if(!D.trialBalance) D.trialBalance=[];
  D.trialBalance.push({head:'cash',label:'',side:'dr',amount:0});
  sv(); renderPage();
}
function delTBRow(i){
  D.trialBalance.splice(i,1);
  sv(); renderPage();
}
// field: 1=head, 2=amount, 3=label
function tbUpdate(i,field,val){
  var row = D.trialBalance[i];
  if(!row) return;
  if(field===1){
    row.head = val;
    row.side = tbHeadSide(val);
    if(val==='stockitem'){
      if(row.qty===undefined)row.qty=0;
      if(row.cost===undefined)row.cost=0;
      if(!row.unit)row.unit='No.';
      row.amount = (+row.qty||0)*(+row.cost||0);
    }
    sv(); renderPage();
  } else if(field===2){
    row.amount = (val==='') ? 0 : (+val);
    sv();
    updateTBTotals();
  } else if(field===3){
    row.label = val;
    sv();
  } else if(field===4){
    row.qty = (val==='') ? 0 : (+val);
    row.amount = (+row.qty||0)*(+row.cost||0);
    sv();
    var amtEl=document.getElementById('tb_amt_'+i);
    if(amtEl) amtEl.value = row.amount || '';
    updateTBTotals();
  } else if(field===5){
    row.cost = (val==='') ? 0 : (+val);
    row.amount = (+row.qty||0)*(+row.cost||0);
    sv();
    var amtEl2=document.getElementById('tb_amt_'+i);
    if(amtEl2) amtEl2.value = row.amount || '';
    updateTBTotals();
  } else if(field===6){
    row.unit = val;
    sv();
  } else if(field===7){
    if(row.head==='loan') row.loanType = val;
    else row.category = val;
    sv();
  } else if(field===8){
    if(row.head==='intangibleitem') row.usefulLife = (val==='') ? 0 : (+val);
    else row.depRate = (val==='') ? 0 : (+val);
    sv();
  } else if(field===9){
    if(row.head==='loan') row.usefulLife = (val==='') ? 0 : (+val); // tenure (months)
    else row.purchaseDate = val;
    sv();
  } else if(field===10){
    row.purchaseDate = val; // loan sanction date
    sv();
  } else if(field===11){
    row.sanctionedLimit = (val==='') ? 0 : (+val);
    sv();
  }
}

function postTB(){
  var tb = D.trialBalance || [];
  var totDr=0, totCr=0, i;
  for(i=0;i<tb.length;i++){
    if(tb[i].side==='dr') totDr += (+tb[i].amount||0);
    else totCr += (+tb[i].amount||0);
  }
  if(Math.abs(totDr-totCr) >= 0.01){ toast('Trial Balance does not tally','e'); return; }
  if(tb.length===0){ toast('Add at least one item','e'); return; }
  confirmDialog('Post Trial Balance to books? Opening balances will be set. Use Reset to undo if needed.', function(){ postTBExecute(); });
}
function postTBExecute(){
  var tb = D.trialBalance || [];
  var i;
  var open = {cash:0,bank:0,stock:0,debtors:0,creditors:0,capital:0,takenOn:td()};
  D.otherAssetsNotes = D.otherAssetsNotes || [];
  D.otherLiabNotes = D.otherLiabNotes || [];

  for(i=0;i<tb.length;i++){
    var r = tb[i], amt = +r.amount||0;
    if(amt<=0) continue;
    if(r.head==='cash'){ open.cash += amt; }
    else if(r.head==='bank'){ open.bank += amt; }
    else if(r.head==='stock'){
      open.stock += amt;
      if(D.inventory.length===0){
        D.inventory.push({id:uid(),itemName:'Opening Stock (General)',unit:'Lot',openingStock:1,currentStock:1,avgCost:amt,reorderLevel:0,fromTB:true});
      }
    }
    else if(r.head==='stockitem'){
      open.stock += amt;
      var qty=(+r.qty||0), cost=(+r.cost||0);
      if(qty>0){
        var existing=findOrCreateItem(r.label||'Item',r.unit||'No.');
        var wasNew = (existing.currentStock===0 && existing.avgCost===0 && existing.openingStock===0);
        existing.currentStock = (existing.currentStock||0) + qty;
        existing.avgCost = cost;
        existing.openingStock = (existing.openingStock||0) + qty;
        if(!existing.unit || existing.unit==='No.')existing.unit = r.unit||existing.unit;
        if(wasNew) existing.fromTB = true;
      }
    }
    else if(r.head==='debtors'){
      open.debtors += amt;
      D.debtors.push({id:uid(),name:r.label||'Customer',amount:amt,date:td(),ref:'Opening Trial Balance'});
    }
    else if(r.head==='fixedassets'){
      D.otherAssets = (+D.otherAssets||0) + amt;
      if(r.label) D.otherAssetsNotes.push({label:r.label,amount:amt});
      else D.otherAssetsNotes.push({label:tbHeadLabel(r.head),amount:amt});
    }
    else if(r.head==='fixedassetitem'){
      D.fixedAssets = D.fixedAssets || [];
      D.fixedAssets.push({
        id:uid(), name:r.label||'Asset', category:r.category||'Other',
        cost:amt, depRate:(+r.depRate||0), purchaseDate:r.purchaseDate||td(),
        accumDep:0, lastDepDate:r.purchaseDate||td(), disposed:false, fromTB:true
      });
      D.otherAssets = (+D.otherAssets||0) + amt;
      D.otherAssetsNotes.push({label:(r.label||'Asset')+' ('+(r.category||'')+')',amount:amt});
    }
    else if(r.head==='intangibleitem'){
      D.intangibleAssets = D.intangibleAssets || [];
      D.intangibleAssets.push({
        id:uid(), name:r.label||'Asset', category:r.category||'Other',
        cost:amt, usefulLife:(+r.usefulLife||0), purchaseDate:r.purchaseDate||td(),
        accumAmort:0, lastAmortDate:r.purchaseDate||td(), disposed:false, fromTB:true
      });
      D.otherAssets = (+D.otherAssets||0) + amt;
      D.otherAssetsNotes.push({label:(r.label||'Asset')+' ('+(r.category||'')+')',amount:amt});
    }
    else if(r.head==='otherassets'){
      D.otherAssets = (+D.otherAssets||0) + amt;
      var oaLabel = r.label || tbHeadLabel(r.head);
      D.otherAssetsNotes.push({label:oaLabel,amount:amt});
      D.otherAssetItems = D.otherAssetItems || [];
      D.otherAssetItems.push({id:uid(),name:oaLabel,amount:amt,date:r.purchaseDate||td(),fromTB:true});
    }
    else if(r.head==='capital'){ open.capital += amt; }
    else if(r.head==='loan'){
      var lType=r.loanType||'Term Loan', lRate=(+r.depRate||0), lTenure=(+r.usefulLife||0), lDate=r.purchaseDate||td();
      var isCcOdTB = (lType==='Cash Credit (CC)' || lType==='Overdraft (OD)');
      var lEmi = (!isCcOdTB && lRate>0 && lTenure>0) ? calcEMI(amt,lRate,lTenure) : 0;
      D.loans.push({id:uid(),bankName:r.label||'Existing Loan',loanType:lType,amount:amt,rate:lRate,tenure:isCcOdTB?0:lTenure,sanctionDate:lDate,emi:lEmi,outstandingBalance:amt,sanctionedLimit:isCcOdTB?(+r.sanctionedLimit||0):0,lastInterestDate:lDate,payments:[],fromTB:true});
    }
    else if(r.head==='creditors'){
      open.creditors += amt;
      D.creditors.push({id:uid(),name:r.label||'Supplier',amount:amt,date:td(),ref:'Opening Trial Balance'});
    }
    else if(r.head==='otherliab'){
      D.otherLiab = (+D.otherLiab||0) + amt;
      var olLabel = r.label || tbHeadLabel(r.head);
      D.otherLiabNotes.push({label:olLabel,amount:amt});
      D.otherLiabItems = D.otherLiabItems || [];
      D.otherLiabItems.push({id:uid(),name:olLabel,amount:amt,date:r.purchaseDate||td(),fromTB:true});
    }
  }

  D.opening = open;
  D.tbPosted = true;
  D.tbPostedOn = td();
  sv();
  go('dashboard');
  toast('Trial Balance posted! Balance Sheet updated.');
}

function resetTB(){
  confirmDialog('Edit Trial Balance? This un-posts your Trial Balance so you can correct it: it removes the opening debtors, creditors, loans, fixed assets, and inventory items that were auto-created from it, and clears opening balances. Your Trial Balance ROWS themselves are kept exactly as entered, so you can edit and re-post. Manual entries you made afterward (sales, purchases, expenses etc.) are not affected. If a Trial Balance item was added to an existing inventory item, only the added quantity/value will be reversed.', function(){
    D.debtors = D.debtors.filter(function(x){ return x.ref!=='Opening Trial Balance'; });
    D.creditors = D.creditors.filter(function(x){ return x.ref!=='Opening Trial Balance'; });
    D.loans = D.loans.filter(function(l){ return !l.fromTB; });
    D.fixedAssets = (D.fixedAssets||[]).filter(function(a){ return !a.fromTB; });
    D.intangibleAssets = (D.intangibleAssets||[]).filter(function(a){ return !a.fromTB; });
    D.otherAssetItems = (D.otherAssetItems||[]).filter(function(a){ return !a.fromTB; });
    D.otherLiabItems = (D.otherLiabItems||[]).filter(function(a){ return !a.fromTB; });
    var tb = D.trialBalance || [];
    for(var i=0;i<tb.length;i++){
      var r=tb[i];
      if(r.head==='stockitem' && (+r.qty||0)>0){
        var nm=(r.label||'Item').trim().toLowerCase();
        for(var j=0;j<D.inventory.length;j++){
          if(D.inventory[j].itemName.toLowerCase()===nm){
            D.inventory[j].currentStock=Math.max(0,(D.inventory[j].currentStock||0)-(+r.qty||0));
            D.inventory[j].openingStock=Math.max(0,(D.inventory[j].openingStock||0)-(+r.qty||0));
          }
        }
      }
    }
    D.inventory = D.inventory.filter(function(it){
      return !(it.fromTB && it.currentStock<=0);
    });
    D.opening = {cash:0,bank:0,stock:0,debtors:0,creditors:0,capital:0,takenOn:null};
    D.otherAssets = 0;
    D.otherLiab = 0;
    D.otherAssetsNotes = [];
    D.otherLiabNotes = [];
    D.tbPosted = false;
    D.tbPostedOn = null;
    sv();
    renderPage();
    toast('Trial Balance unposted - edit your rows below and tap Post to Books when ready.');
  });
}

function deleteCashBookEntry(id){

  // Reverse any linked effects: if this was a capital entry tied to a partner, reverse that too

// ---- helpers to reverse cash/bank or debtor/creditor effects ----
// Reverses the cash-book / CC/OD effect of a previous postCB() call.
// For cc/od modes, paymentMode must be passed via the 'mode' param so we know which loan to adjust.
function reverseCB(mode,type,amount,desc){
  var isCcOd = mode && (mode==='cc'||mode==='od'||mode.indexOf('cc:')===0||mode.indexOf('od:')===0);
  if(isCcOd){
    var acct = ccodAccountForMode(mode);
    if(!acct) return false;
    if(type==='payment'){
      acct.outstandingBalance = Math.max(0,(+acct.outstandingBalance||0) - amount);
    } else {
      acct.outstandingBalance = (+acct.outstandingBalance||0) + amount;
    }
    sv();
    return true;
  }
  return removeCashBookEntry(type,amount,desc);
}
function removeCashBookEntry(type,amount,desc){
  for(var i=D.cashBook.length-1;i>=0;i--){
    var x=D.cashBook[i];
    if(x.type===type && Math.abs(x.amount-amount)<0.005 && x.description===desc){
      D.cashBook.splice(i,1);return true;
    }
  }
  return false;
}
function removeDebtorByRef(ref,amount){
  for(var i=D.debtors.length-1;i>=0;i--){
    if(D.debtors[i].ref===ref && Math.abs(D.debtors[i].amount-amount)<0.005){D.debtors.splice(i,1);return true;}
  }
  return false;
}
function removeCreditorByRef(ref,amount){
  for(var i=D.creditors.length-1;i>=0;i--){
    if(D.creditors[i].ref===ref && Math.abs(D.creditors[i].amount-amount)<0.005){D.creditors.splice(i,1);return true;}
  }
  return false;
}

// ===== SALES =====
// Reverses an advance settlement: if the advance record still exists (partial settlement),
// adds the amount back to it. If it was fully consumed and removed, re-creates it.
// originalRecord: the sale/purchase/expense record being deleted, used to recover
// party/date/notes if the advance needs to be re-created.
function restoreAdvance(advanceId, amount, type, category, party, originalRecord){
  if(!advanceId) return;
  for(var i=0;i<(D.advances||[]).length;i++){
    if(D.advances[i].id===advanceId){
      D.advances[i].amount = (+D.advances[i].amount||0) + amount;
      return;
    }
  }
  // Advance was fully consumed and removed - re-create it
  D.advances = D.advances || [];
  D.advances.push({
    id:advanceId, date:(originalRecord&&originalRecord.date)||td(), type:type, category:category,
    party:party||(originalRecord&&(originalRecord.customerName||originalRecord.supplierName||originalRecord.remarks))||'Restored Advance',
    amount:amount, mode:'cash', notes:'Restored after deleting linked entry'
  });
}
function deleteSale(id){
  confirmDialog('Delete this sale? Stock and balances will be reversed.', function(){
    var idx=-1,i;for(i=0;i<D.sales.length;i++)if(D.sales[i].id===id){idx=i;break;}
    if(idx<0)return;
    var s=D.sales[idx];
    var item=null;for(i=0;i<D.inventory.length;i++)if(D.inventory[i].id===s.itemId)item=D.inventory[i];
    if(item){
      if(s.fromIndig===undefined){
        // legacy sale record (pre-import-tracking): restore entirely to indigenous pool
        var rate = s.qty>0 ? (s.cogs||0)/s.qty : item.avgCost;
        restoreStock(item, s.qty, 0, rate, 0);
      } else {
        restoreStock(item, s.fromIndig||0, s.fromImp||0, s.indigCostEach||0, s.impCostEach||0);
      }
    }
    if(s.paymentMode==='credit')removeDebtorByRef('Sale: '+s.itemName,s.totalAmount);
    else if(s.paymentMode==='advance'){
      restoreAdvance(s.advanceId,s.totalAmount,'received','customer',s.customerName,s);
    }
    else reverseCB(s.paymentMode,'receipt',s.totalAmount,'Sale: '+s.itemName);
    D.sales.splice(idx,1);
    sv();renderPage();toast('Sale deleted, stock and balance reversed.');
  });
}

function saveEditSale(id){
  var idx=-1,i;for(i=0;i<D.sales.length;i++)if(D.sales[i].id===id){idx=i;break;}
  if(idx<0)return;
  var old=D.sales[idx];
  var newMode=gv('es_m');
  if(newMode!=='credit' && !validateCCOD(newMode)) return;
  var oldItem=null;for(i=0;i<D.inventory.length;i++)if(D.inventory[i].id===old.itemId)oldItem=D.inventory[i];
  var oldFromIndig, oldFromImp, oldIndigCost, oldImpCost;
  if(old.fromIndig===undefined){
    oldFromIndig = old.qty; oldFromImp = 0;
    oldIndigCost = old.qty>0 ? (old.cogs||0)/old.qty : (oldItem?oldItem.avgCost:0);
    oldImpCost = 0;
  } else {
    oldFromIndig = old.fromIndig||0; oldFromImp = old.fromImp||0;
    oldIndigCost = old.indigCostEach||0; oldImpCost = old.impCostEach||0;
  }
  if(oldItem) restoreStock(oldItem, oldFromIndig, oldFromImp, oldIndigCost, oldImpCost);
  if(old.paymentMode==='credit')removeDebtorByRef('Sale: '+old.itemName,old.totalAmount);
  else if(old.paymentMode==='advance')restoreAdvance(old.advanceId,old.totalAmount,'received','customer',old.customerName,old);
  else reverseCB(old.paymentMode,'receipt',old.totalAmount,'Sale: '+old.itemName);

  var iid=gv('es_i'),q=gvn('es_q'),p=gvn('es_p'),c2=gv('es_c'),date=gv('es_d')||td(),mode=gv('es_m');
  var item=null;for(i=0;i<D.inventory.length;i++)if(D.inventory[i].id===iid)item=D.inventory[i];
  if(!item||!c2||!q||!p){
    // restore old state since we reversed it
    if(oldItem) drawStockExact(oldItem, oldFromIndig, oldFromImp, oldIndigCost, oldImpCost);
    if(old.paymentMode==='credit')addDebtor(old.customerName,old.totalAmount,old.date,'Sale: '+old.itemName);
    else if(old.paymentMode==='advance'){
      for(var ai=0;ai<(D.advances||[]).length;ai++) if(D.advances[ai].id===old.advanceId) D.advances[ai].amount = (+D.advances[ai].amount||0) - old.totalAmount;
    }
    else postCB(old.paymentMode,'receipt',old.totalAmount,old.customerName,'Sale: '+old.itemName,old.date);
    toast('Fill all fields','e');return;
  }
  var newTotalAvail = item.currentStock + (item.importedStock||0);
  if(q>newTotalAvail){
    if(oldItem) drawStockExact(oldItem, oldFromIndig, oldFromImp, oldIndigCost, oldImpCost);
    if(old.paymentMode==='credit')addDebtor(old.customerName,old.totalAmount,old.date,'Sale: '+old.itemName);
    else if(old.paymentMode==='advance'){
      for(var ai2=0;ai2<(D.advances||[]).length;ai2++) if(D.advances[ai2].id===old.advanceId) D.advances[ai2].amount = (+D.advances[ai2].amount||0) - old.totalAmount;
    }
    else postCB(old.paymentMode,'receipt',old.totalAmount,old.customerName,'Sale: '+old.itemName,old.date);
    toast('Insufficient stock for edited quantity','e');return;
  }
  var draw=drawStockPreview(item,q);
  var tot=q*p,cogs=draw.cogs,gp=tot-cogs,pct=+(tot>0?((gp/tot)*100).toFixed(1):0);
  D.sales[idx]={id:id,date:date,customerName:c2,itemId:iid,itemName:item.itemName,unit:item.unit,qty:q,sellingPrice:p,totalAmount:tot,cogs:cogs,grossProfit:gp,profitPct:pct,paymentMode:mode,fromIndig:draw.fromIndig,fromImp:draw.fromImp,indigCostEach:item.avgCost,impCostEach:item.importedAvgCost||0};
  drawStock(item,q);
  if(mode==='credit')addDebtor(c2,tot,date,'Sale: '+item.itemName);
  else postCB(mode,'receipt',tot,c2,'Sale: '+item.itemName,date);
  sv();cancelEdit();toast('Sale updated!');
}

// ===== PURCHASE =====
function deletePurchase(id){
  confirmDialog('Delete this purchase? Stock and balances will be reversed (average cost may shift).', function(){
    var idx=-1,i;for(i=0;i<D.purchases.length;i++)if(D.purchases[i].id===id){idx=i;break;}
    if(idx<0)return;
    var p=D.purchases[idx];
    var item=null;for(i=0;i<D.inventory.length;i++)if(D.inventory[i].id===p.itemId)item=D.inventory[i];
    if(item){
      if(p.isImported){
        var itotalVal=(item.importedStock||0)*(item.importedAvgCost||0) - p.amount;
        var inewQty=(item.importedStock||0) - p.qty;
        item.importedStock=Math.max(0,inewQty);
        item.importedAvgCost=item.importedStock>0?Math.max(0,itotalVal)/item.importedStock:0;
      } else {
        var totalVal=item.currentStock*item.avgCost - p.amount;
        var newQty=item.currentStock - p.qty;
        item.currentStock=Math.max(0,newQty);
        item.avgCost=item.currentStock>0?Math.max(0,totalVal)/item.currentStock:0;
      }
    }
    if(p.paymentMode==='credit')removeCreditorByRef('Purchase: '+p.itemName,p.amount);
    else if(p.paymentMode==='advance'){
      restoreAdvance(p.advanceId,p.amount,'paid','supplier',p.supplierName,p);
    }
    else reverseCB(p.paymentMode,'payment',p.amount,'Purchase: '+p.itemName);
    D.purchases.splice(idx,1);
    sv();renderPage();toast('Purchase deleted, stock and balance reversed.');
  });
}

  }
  if(old.paymentMode==='credit')removeCreditorByRef('Purchase: '+old.itemName,old.amount);
  else if(old.paymentMode==='advance')restoreAdvance(old.advanceId,old.amount,'paid','supplier',old.supplierName,old);
  else reverseCB(old.paymentMode,'payment',old.amount,'Purchase: '+old.itemName);

  var iid=gv('ep_i'),q=gvn('ep_q'),r=gvn('ep_r'),s2=gv('ep_s'),date=gv('ep_d')||td(),mode=gv('ep_m');
  var item=null;for(i=0;i<D.inventory.length;i++)if(D.inventory[i].id===iid)item=D.inventory[i];
  if(!item||!s2||!q||!r){
    if(oldItem){oldItem.currentStock=savedStock;oldItem.avgCost=savedCost;oldItem.importedStock=savedImpStock;oldItem.importedAvgCost=savedImpCost;}
    if(old.paymentMode==='credit')addCreditor(old.supplierName,old.amount,old.date,'Purchase: '+old.itemName);
    else if(old.paymentMode==='advance'){
      for(var api=0;api<(D.advances||[]).length;api++) if(D.advances[api].id===old.advanceId) D.advances[api].amount = (+D.advances[api].amount||0) - old.amount;
    }
    else postCB(old.paymentMode,'payment',old.amount,old.supplierName,'Purchase: '+old.itemName,old.date);
    toast('Fill all fields','e');return;
  }
  var isImported = document.getElementById('ep_import') ? document.getElementById('ep_import').checked : false;
  var amt=q*r;
  if(isImported){
    var ntq=(item.importedStock||0)+q, ntv=(item.importedStock||0)*(item.importedAvgCost||0)+amt;
    item.importedStock=ntq;item.importedAvgCost=ntq>0?ntv/ntq:r;
  } else {
    var tq=item.currentStock+q,tv2=item.currentStock*item.avgCost+amt;
    item.currentStock=tq;item.avgCost=tq>0?tv2/tq:r;
  }
  D.purchases[idx]={id:id,date:date,supplierName:s2,itemId:item.id,itemName:item.itemName,qty:q,rate:r,amount:amt,paymentMode:mode,isImported:isImported};
  if(mode==='credit')addCreditor(s2,amt,date,'Purchase: '+item.itemName);
  else postCB(mode,'payment',amt,s2,'Purchase: '+item.itemName,date);
  sv();cancelEdit();toast('Purchase updated!');
}

// ===== PROJECTIONS MODULE =====
function projDefaults(){
  return {
    salesGrowthY1:10, salesGrowthY2:10,
    cashSalesPct:50,
    rmDays1:30, rmDays2:30,
    sipDays1:0, sipDays2:0,
    fgDays1:15, fgDays2:15,
    debtorDays1:30, debtorDays2:30,
    creditorDays1:30, creditorDays2:30,
    newLoanY1:0, newLoanRateY1:0, newLoanTenureY1:0,
    newLoanY2:0, newLoanRateY2:0, newLoanTenureY2:0,
    faAddY1:0, faAddRateY1:15,
    faAddY2:0, faAddRateY2:15
  };
}
function getProjAssumptions(){
  if(!D.projAssumptions) D.projAssumptions = projDefaults();
  var pa = D.projAssumptions, def = projDefaults();
  for(var k in def) if(pa[k]===undefined) pa[k]=def[k];
  return pa;
}

// Determine FY start (April 1) based on earliest transaction or opening.takenOn
function getFYStart(){
  var dates=[];
  D.sales.forEach(function(s){if(s.date)dates.push(s.date);});
  D.purchases.forEach(function(p){if(p.date)dates.push(p.date);});
  D.expenses.forEach(function(e){if(e.date)dates.push(e.date);});
  if(D.opening && D.opening.takenOn) dates.push(D.opening.takenOn);
  var earliest = dates.length ? dates.reduce(function(a,b){return a<b?a:b;}) : td();
  var y = +earliest.slice(0,4), m = +earliest.slice(5,7);
  // FY in India: Apr-Mar. If month >= 4 (Apr-Dec), FY starts that year; else previous year.
  var fyStartYear = (m>=4) ? y : y-1;
  return fyStartYear+'-04-01';
}
function getFYEnd(fyStart){
  var y = +fyStart.slice(0,4);
  return (y+1)+'-03-31';
}

// Sum a numeric field from an array within [fromDate, toDate] inclusive
function sumInRange(arr, dateField, valField, fromDate, toDate){
  var t=0;
  for(var i=0;i<arr.length;i++){
    var d=arr[i][dateField];
    if(d && d>=fromDate && d<=toDate) t += (+arr[i][valField]||0);
  }
  return t;
}

// Annualize: figure out how many days of actuals we have in the current FY, and scale to 365
function annualizationFactor(){
  var fyStart = getFYStart(), today = td();
  var earliestActual = getEarliestActualDate();
  var basisDate = (earliestActual && earliestActual > fyStart) ? earliestActual : fyStart;
  var daysElapsed = daysBetween(basisDate, today);
  if(daysElapsed<=0) daysElapsed=1;
  if(daysElapsed>365) daysElapsed=365;
  return {fyStart:fyStart, basisDate:basisDate, daysElapsed:daysElapsed, factor: 365/daysElapsed, fullYear: daysElapsed>=350};
}

function getEarliestActualDate(){
  var dates=[];
  D.sales.forEach(function(s){if(s.date)dates.push(s.date);});
  D.purchases.forEach(function(p){if(p.date)dates.push(p.date);});
  D.expenses.forEach(function(e){if(e.date)dates.push(e.date);});
  D.cashBook.forEach(function(c){if(c.date && c.type!=='opening')dates.push(c.date);});
  return dates.length ? dates.reduce(function(a,b){return a<b?a:b;}) : null;
}

// Build "Year 0" (current year, annualized) base figures
function getYear0Base(){
  var az = annualizationFactor();
  var fyStart = az.fyStart, today = td();

  var salesActual = sumInRange(D.sales,'date','totalAmount',fyStart,today);
  var cogsActual = sumInRange(D.sales,'date','cogs',fyStart,today);
  var purchasesActual = sumInRange(D.purchases,'date','amount',fyStart,today);
  var expensesActual = 0;
  D.expenses.forEach(function(e){ if(e.date && e.date>=fyStart && e.date<=today && e.category!=='Depreciation' && e.category!=='Interest Payment') expensesActual += (+e.amount||0); });
  var interestActual = 0;
  D.expenses.forEach(function(e){ if(e.date && e.date>=fyStart && e.date<=today && e.category==='Interest Payment') interestActual += (+e.amount||0); });
  var depActual = 0;
  D.expenses.forEach(function(e){ if(e.date && e.date>=fyStart && e.date<=today && e.category==='Depreciation') depActual += (+e.amount||0); });

  // Cash vs credit sales split (actual)
  var cashSales=0, creditSales=0;
  D.sales.forEach(function(s){
    if(s.date && s.date>=fyStart && s.date<=today){
      if(s.paymentMode==='credit') creditSales += s.totalAmount;
      else cashSales += s.totalAmount;
    }
  });
  var cashSalesPctActual = salesActual>0 ? (cashSales/salesActual*100) : 50;

  var f = az.factor;
  return {
    fyStart: fyStart,
    daysElapsed: az.daysElapsed,
    fullYear: az.fullYear,
    sales: salesActual * f,
    cogs: cogsActual * f,
    purchases: purchasesActual * f,
    expenses: expensesActual * f,
    interest: interestActual * f,
    depreciation: depActual * f,
    cashSalesPctActual: cashSalesPctActual,
    // current balance sheet figures (point-in-time, NOT annualized)
    cash: getBalances().cb,
    bank: getBalances().bb,
    debtors: totalDebtors(),
    creditors: totalCreditors()+totalExpensesPayable(),
    advToSuppliers: (function(){var t=0;(D.advances||[]).forEach(function(a){if(a.type==='paid'&&a.category==='supplier')t+=(+a.amount||0);});return t;})(),
    advPrepaidExp: (function(){var t=0;(D.advances||[]).forEach(function(a){if(a.type==='paid'&&a.category==='expense')t+=(+a.amount||0);});return t;})(),
    advFromCustomers: (function(){var t=0;(D.advances||[]).forEach(function(a){if(a.type==='received')t+=(+a.amount||0);});return t;})(),
    stock: (function(){var t=0;for(var i=0;i<D.inventory.length;i++)t+=D.inventory[i].currentStock*D.inventory[i].avgCost+(D.inventory[i].importedStock||0)*(D.inventory[i].importedAvgCost||0);return t;})(),
    loanOutstanding: (function(){var t=0;for(var i=0;i<D.loans.length;i++)t+=(+D.loans[i].outstandingBalance||0);return t;})(),
    stBorrowings: (function(){var t=0;for(var i=0;i<D.loans.length;i++)if(isCcOdLoan(D.loans[i]))t+=(+D.loans[i].outstandingBalance||0);return t;})(),
    termLoans: (function(){var t=0;for(var i=0;i<D.loans.length;i++)if(!isCcOdLoan(D.loans[i]))t+=(+D.loans[i].outstandingBalance||0);return t;})(),
    capital: (function(){var ff=getF();return ff.cap+ff.np;})(),
    otherAssets: (function(){
      var faCost=0; (D.fixedAssets||[]).forEach(function(a){ faCost+=(+a.cost||0); });
      var iaCost=0; (D.intangibleAssets||[]).forEach(function(a){ iaCost+=(+a.cost||0); });
      return Math.max(0, (+D.otherAssets||0) - faCost - iaCost);
    })(),
    otherLiab: (+D.otherLiab||0),
    fixedAssetsNet: (function(){
      var net=0;
      (D.fixedAssets||[]).forEach(function(a){ if(!a.disposed) net += (+a.cost||0) - (+a.accumDep||0); });
      (D.intangibleAssets||[]).forEach(function(a){ if(!a.disposed) net += (+a.cost||0) - (+a.accumAmort||0); });
      return net;
    })()
  };
}

// Project Year N (1 or 2) figures given Year N-1 figures and assumptions
function projectYear(prevYear, yearNum, pa){
  var growth = (yearNum===1?pa.salesGrowthY1:pa.salesGrowthY2)/100;
  var rmDays = (yearNum===1?pa.rmDays1:pa.rmDays2);
  var sipDays = (yearNum===1?pa.sipDays1:pa.sipDays2);
  var fgDays = (yearNum===1?pa.fgDays1:pa.fgDays2);
  var debtorDays = (yearNum===1?pa.debtorDays1:pa.debtorDays2);
  var creditorDays = (yearNum===1?pa.creditorDays1:pa.creditorDays2);
  var newLoan = (yearNum===1?pa.newLoanY1:pa.newLoanY2);
  var newLoanRate = (yearNum===1?pa.newLoanRateY1:pa.newLoanRateY2);
  var newLoanTenure = (yearNum===1?pa.newLoanTenureY1:pa.newLoanTenureY2);
  var faAdd = (yearNum===1?pa.faAddY1:pa.faAddY2);
  var faAddRate = (yearNum===1?pa.faAddRateY1:pa.faAddRateY2);

  var sales = prevYear.sales * (1+growth);
  // maintain same COGS ratio and expense ratio as Year0 base (prevYear for Y2 carries ratio forward via Y1's own ratio)
  var cogsRatio = prevYear.sales>0 ? prevYear.cogs/prevYear.sales : 0.7;
  var expRatio = prevYear.sales>0 ? prevYear.expenses/prevYear.sales : 0.15;
  var cogs = sales * cogsRatio;
  var purchases = cogs; // simplification: purchases = COGS for trading (no opening/closing stock movement double count; stock handled separately via holding days)
  var expenses = sales * expRatio;
  var grossProfit = sales - cogs;

  // Fixed Assets roll-forward
  var openingFA = prevYear.fixedAssetsNet;
  var avgFAForDep = openingFA + faAdd/2;
  var depreciation = avgFAForDep * (faAddRate/100); // simplified single blended rate using new-asset rate as proxy
  if(openingFA<=0 && faAdd<=0) depreciation = 0;
  var closingFA = openingFA + faAdd - depreciation;

  // Loans roll-forward (principal repayment estimated via amortization of ALL loans incl. new)
  var loanInfo = computeLoanRepaymentForYear(prevYear, yearNum, newLoan, newLoanRate, newLoanTenure);
  var interest = loanInfo.interest;
  var principalRepaid = loanInfo.principalRepaid;
  var closingLoan = Math.max(0, prevYear.loanOutstanding + newLoan - principalRepaid);
  // CC/OD (short-term borrowings) is a revolving facility - carries forward unchanged; term loans absorb new borrowing/repayment
  var closingSTB = prevYear.stBorrowings||0;
  var closingTermLoans = Math.max(0, closingLoan - closingSTB);

  var netProfit = grossProfit - expenses - depreciation - interest;

  // Working capital
  var rmStock = cogs * rmDays/365;
  var sipStock = cogs * sipDays/365;
  var fgStock = cogs * fgDays/365;
  var stock = rmStock + sipStock + fgStock;
  var creditSalesRatio = pa.cashSalesPct!==undefined ? (1-pa.cashSalesPct/100) : 0.5;
  var creditSales = sales * creditSalesRatio;
  var debtors = creditSales * debtorDays/365;
  var creditors = purchases * creditorDays/365;

  // Cash Flow (indirect)
  var deltaStock = stock - prevYear.stock;
  var deltaDebtors = debtors - prevYear.debtors;
  var deltaCreditors = creditors - prevYear.creditors;
  var cfOperating = netProfit + depreciation - deltaStock - deltaDebtors + deltaCreditors;
  var cfInvesting = -faAdd;
  var cfFinancing = newLoan - principalRepaid;
  var netCashFlow = cfOperating + cfInvesting + cfFinancing;

  var openingCashBank = prevYear.cash + prevYear.bank;
  var closingCashBank = openingCashBank + netCashFlow;

  var capital = prevYear.capital + netProfit; // retained profit added to capital/reserves

  return {
    sales:sales, cogs:cogs, purchases:purchases, expenses:expenses, grossProfit:grossProfit,
    depreciation:depreciation, interest:interest, netProfit:netProfit,
    fixedAssetsNet:closingFA, faAdditions:faAdd,
    loanOutstanding:closingLoan, newLoan:newLoan, principalRepaid:principalRepaid,
    stBorrowings:closingSTB, termLoans:closingTermLoans,
    rmStock:rmStock, sipStock:sipStock, fgStock:fgStock, stock:stock,
    debtors:debtors, creditors:creditors,
    cfOperating:cfOperating, cfInvesting:cfInvesting, cfFinancing:cfFinancing, netCashFlow:netCashFlow,
    cash: closingCashBank, bank:0, // combined into 'cash' for simplicity in projections
    capital:capital,
    otherAssets: prevYear.otherAssets, otherLiab: prevYear.otherLiab,
    advToSuppliers: prevYear.advToSuppliers||0, advPrepaidExp: prevYear.advPrepaidExp||0, advFromCustomers: prevYear.advFromCustomers||0,
    creditSalesRatio: creditSalesRatio
  };
}

// Loan repayment estimate for a projection year using simple WDV-style amortization across all loans
function computeLoanRepaymentForYear(prevYear, yearNum, newLoan, newLoanRate, newLoanTenure){
  var totalInterest=0, totalPrincipal=0;
  // Existing loans: use their actual EMI/rate from D.loans, amortize month by month within this FY
  var fyStartOffset = yearNum; // year 1 = next FY after current, year 2 = FY after that
  for(var i=0;i<D.loans.length;i++){
    var l=D.loans[i];
    var bal=(+l.outstandingBalance||0);
    var rate=(+l.rate||0)/1200;
    var emi=(+l.emi||0);
    if(bal<=0 || emi<=0) continue;
    // simulate forward through prior years first to get balance at start of this year
    for(var skip=0; skip<(yearNum-1); skip++){
      for(var m=0;m<12 && bal>0;m++){
        var intr=bal*rate, prin=Math.min(bal, Math.max(0,emi-intr));
        bal -= prin;
      }
    }
    // now simulate this year
    for(var m2=0;m2<12 && bal>0;m2++){
      var intr2=bal*rate, prin2=Math.min(bal, Math.max(0,emi-intr2));
      totalInterest += intr2;
      totalPrincipal += prin2;
      bal -= prin2;
    }
  }
  // New loan for this year (if yearNum matches when it is taken - both Y1 and Y2 loans start in their respective year)
  if(newLoan>0 && newLoanRate>=0 && newLoanTenure>0){
    var nbal=newLoan, nrate=newLoanRate/1200;
    var nemi=calcEMI(newLoan,newLoanRate,newLoanTenure);
    for(var m3=0;m3<12 && nbal>0;m3++){
      var nintr=nbal*nrate, nprin=Math.min(nbal,Math.max(0,nemi-nintr));
      totalInterest += nintr;
      totalPrincipal += nprin;
      nbal -= nprin;
    }
  }
  return {interest:totalInterest, principalRepaid:totalPrincipal};
}

// Top-level: compute Year0 (annualized current), Year1, Year2
function computeProjections(){
  var pa = getProjAssumptions();
  var y0 = getYear0Base();
  var y1 = projectYear(y0, 1, pa);
  var y2 = projectYear(y1, 2, pa);
  return {y0:y0, y1:y1, y2:y2, pa:pa};
}

// Verify tally: Assets = Liabilities for a projected year
function projTally(year){
  var assets = year.cash + (year.bank||0) + year.stock + year.debtors + year.fixedAssetsNet + year.otherAssets;
  var liab = year.capital + year.loanOutstanding + year.creditors + year.otherLiab;
  return {assets:assets, liab:liab, diff:liab-assets};
}

// ===== PROJECTIONS PAGE =====
function pgProj(){
  var tab = window._projtab || 'assumptions';
  var h = '<div class="tabs">';
  h += '<button class="'+(tab==='assumptions'?'act':'')+'" onclick="window._projtab=\'assumptions\';renderPage()">Assumptions</button>';
  h += '<button class="'+(tab==='pnl'?'act':'')+'" onclick="window._projtab=\'pnl\';renderPage()">P&amp;L</button>';
  h += '<button class="'+(tab==='bs'?'act':'')+'" onclick="window._projtab=\'bs\';renderPage()">Balance Sheet</button>';
  h += '<button class="'+(tab==='cfs'?'act':'')+'" onclick="window._projtab=\'cfs\';renderPage()">Cash Flow</button>';
  h += '</div>';

  var az = annualizationFactor();
  var basisNote = az.fullYear
    ? '<div class="al als">Using full-year actuals (FY '+az.fyStart.slice(0,4)+'-'+(+az.fyStart.slice(0,4)+1).toString().slice(2)+') as Year 0 base.</div>'
    : '<div class="al alw">Only '+az.daysElapsed+' days of data available (since '+az.basisDate+'). Figures are annualized (×'+az.factor.toFixed(2)+') to estimate a full-year Year 0 base. Projections improve as more actual data accumulates.</div>';

  if(tab==='assumptions'){
    h += basisNote;
    h += earliestDateDiagnostic();
    h += pgProjAssumptions();
  } else {
    var proj = computeProjections();
    if(tab==='pnl') h += pgProjPNL(proj);
    else if(tab==='bs') h += pgProjBS(proj);
    else if(tab==='cfs') h += pgProjCFS(proj);
  }
  return h;
}

function earliestDateDiagnostic(){
  var az = annualizationFactor();
  if(az.fullYear) return '';
  // Find what record(s) match the basis date, for transparency
  var matches=[];
  D.sales.forEach(function(s){if(s.date===az.basisDate)matches.push('Sale: '+s.customerName+' - '+s.itemName);});
  D.purchases.forEach(function(p){if(p.date===az.basisDate)matches.push('Purchase: '+p.supplierName+' - '+p.itemName);});
  D.expenses.forEach(function(e){if(e.date===az.basisDate)matches.push('Expense: '+e.category);});
  D.cashBook.forEach(function(c){if(c.date===az.basisDate && c.type!=='opening')matches.push('Cash/Bank: '+(c.description||c.type)+(c.party?' ('+c.party+')':''));});
  if(matches.length===0) return '';
  return '<div class="al ali" style="font-size:11px"><b>Earliest entry on '+esc(az.basisDate)+':</b><br>'+matches.map(esc).join('<br>')+'<br><br>If this date is incorrect (e.g. a test entry, or a loan/capital date that should be later), edit or delete that entry and this basis date will update automatically.</div>';
}

function pgProjPNL(proj){
  var az = annualizationFactor();
  var fyY = +az.fyStart.slice(0,4);
  var lbl0='FY '+fyY+'-'+((fyY+1).toString().slice(2))+' (Current, Annualized)';
  var lbl1='FY '+(fyY+1)+'-'+((fyY+2).toString().slice(2));
  var lbl2='FY '+(fyY+2)+'-'+((fyY+3).toString().slice(2));

  function row(label,k,bold){
    return '<tr><td style="text-align:left;'+(bold?'font-weight:700':'')+'">'+esc(label)+'</td>'+
      '<td style="text-align:right;'+(bold?'font-weight:700':'')+'">'+fc(proj.y0[k])+'</td>'+
      '<td style="text-align:right;'+(bold?'font-weight:700':'')+'">'+fc(proj.y1[k])+'</td>'+
      '<td style="text-align:right;'+(bold?'font-weight:700':'')+'">'+fc(proj.y2[k])+'</td></tr>';
  }
  var h = '<div style="overflow-x:auto"><table><thead><tr><th style="text-align:left">Particulars</th><th style="text-align:right">'+lbl0+'</th><th style="text-align:right">'+lbl1+'</th><th style="text-align:right">'+lbl2+'</th></tr></thead><tbody>';
  h += row('Sales','sales',1);
  h += row('Less: COGS','cogs');
  h += '<tr style="background:rgba(0,0,0,.04)">'+
    '<td style="text-align:left;font-weight:700">Gross Profit</td>'+
    '<td style="text-align:right;font-weight:700">'+fc(proj.y0.sales-proj.y0.cogs)+'</td>'+
    '<td style="text-align:right;font-weight:700">'+fc(proj.y1.grossProfit)+'</td>'+
    '<td style="text-align:right;font-weight:700">'+fc(proj.y2.grossProfit)+'</td></tr>';
  h += row('Less: Operating Expenses','expenses');
  h += row('Less: Depreciation','depreciation');
  h += row('Less: Interest','interest');
  h += '<tr style="background:rgba(46,125,50,.08)">'+
    '<td style="text-align:left;font-weight:700">NET PROFIT</td>'+
    '<td style="text-align:right;font-weight:700;color:#2E7D32">'+fc(proj.y0.sales-proj.y0.cogs-proj.y0.expenses-proj.y0.depreciation-proj.y0.interest)+'</td>'+
    '<td style="text-align:right;font-weight:700;color:#2E7D32">'+fc(proj.y1.netProfit)+'</td>'+
    '<td style="text-align:right;font-weight:700;color:#2E7D32">'+fc(proj.y2.netProfit)+'</td></tr>';
  h += '</tbody></table></div>';

  var npMargin0=proj.y0.sales>0?((proj.y0.sales-proj.y0.cogs-proj.y0.expenses-proj.y0.depreciation-proj.y0.interest)/proj.y0.sales*100):0;
  var npMargin1=proj.y1.sales>0?(proj.y1.netProfit/proj.y1.sales*100):0;
  var npMargin2=proj.y2.sales>0?(proj.y2.netProfit/proj.y2.sales*100):0;
  h += '<div class="al ali" style="margin-top:10px">Net Profit Margin: '+npMargin0.toFixed(1)+'% → '+npMargin1.toFixed(1)+'% → '+npMargin2.toFixed(1)+'%</div>';
  if(!az.fullYear){
    h += '<div class="al ali">Note: the "'+ (function(){var fyY=+az.fyStart.slice(0,4);return 'FY '+fyY+'-'+((fyY+1).toString().slice(2));})() +' (Current, Annualized)" column shows actual figures scaled up to a full year for trend comparison. The Balance Sheet shows your real, current (non-annualized) position for Year 0.</div>';
  }

  return card('Projected Profit &amp; Loss Account',h);
}

function pgProjBS(proj){
  var az = annualizationFactor();
  var fyY = +az.fyStart.slice(0,4);
  var lbl0='FY '+fyY+'-'+((fyY+1).toString().slice(2))+' (Current)';
  var lbl1='FY '+(fyY+1)+'-'+((fyY+2).toString().slice(2));
  var lbl2='FY '+(fyY+2)+'-'+((fyY+3).toString().slice(2));

  var y0=proj.y0, y1=proj.y1, y2=proj.y2;
  var y0cash=y0.cash+y0.bank;

  function frow(label,v0,v1,v2,bold,col,ind,tot){
    var c0=col?' style="color:'+col+'"':'', c1=c0, c2=c0;
    var pad = ind?'padding-left:18px':'';
    var bg = tot?'background:rgba(0,0,0,.04)':'';
    return '<tr style="'+bg+'"><td style="text-align:left;'+pad+';'+(bold?'font-weight:700':'')+'">'+esc(label)+'</td>'+
      '<td style="text-align:right;'+(bold?'font-weight:700':'')+'"'+c0+'>'+fc(v0)+'</td>'+
      '<td style="text-align:right;'+(bold?'font-weight:700':'')+'"'+c1+'>'+fc(v1)+'</td>'+
      '<td style="text-align:right;'+(bold?'font-weight:700':'')+'"'+c2+'>'+fc(v2)+'</td></tr>';
  }
  var head='<tr><th style="text-align:left">Particulars</th><th style="text-align:right">'+lbl0+'</th><th style="text-align:right">'+lbl1+'</th><th style="text-align:right">'+lbl2+'</th></tr>';

  // Owned funds = capital (which already includes retained profit in this model)
  var ownedFunds0=y0.capital, ownedFunds1=y1.capital, ownedFunds2=y2.capital;
  var termLoans0=y0.termLoans, termLoans1=y1.termLoans, termLoans2=y2.termLoans;
  var stb0=y0.stBorrowings, stb1=y1.stBorrowings, stb2=y2.stBorrowings;
  var currLiab0=y0.creditors+stb0+y0.otherLiab+(y0.advFromCustomers||0);
  var currLiab1=y1.creditors+stb1+y1.otherLiab+(y1.advFromCustomers||0);
  var currLiab2=y2.creditors+stb2+y2.otherLiab+(y2.advFromCustomers||0);
  var totLiab0=ownedFunds0+termLoans0+currLiab0;
  var totLiab1=ownedFunds1+termLoans1+currLiab1;
  var totLiab2=ownedFunds2+termLoans2+currLiab2;

  var liabH='<div style="overflow-x:auto"><table><thead>'+head+'</thead><tbody>';
  liabH+=frow('A. Owned Funds (Capital &amp; Reserves)',ownedFunds0,ownedFunds1,ownedFunds2,1,null,0,1);
  liabH+=frow('B. Term Liabilities',termLoans0,termLoans1,termLoans2,1,null,0,1);
  liabH+=frow('Sundry Creditors &amp; Expenses Payable',y0.creditors,y1.creditors,y2.creditors,0,null,1);
  if((y0.advFromCustomers||0)>0||(y1.advFromCustomers||0)>0||(y2.advFromCustomers||0)>0) liabH+=frow('Advances from Customers',y0.advFromCustomers||0,y1.advFromCustomers||0,y2.advFromCustomers||0,0,null,1);
  if(stb0>0||stb1>0||stb2>0) liabH+=frow('Short-Term Borrowings (CC/OD)',stb0,stb1,stb2,0,null,1);
  if(y0.otherLiab>0||y1.otherLiab>0||y2.otherLiab>0) liabH+=frow('Other Liabilities',y0.otherLiab,y1.otherLiab,y2.otherLiab,0,null,1);
  liabH+=frow('C. Current Liabilities',currLiab0,currLiab1,currLiab2,1,null,0,1);
  liabH+=frow('TOTAL (A+B+C)',totLiab0,totLiab1,totLiab2,1,null,0,1);
  liabH+='</tbody></table></div>';

  var currAsset0=y0.stock+y0.debtors+y0cash+(y0.advToSuppliers||0)+(y0.advPrepaidExp||0);
  var currAsset1=y1.stock+y1.debtors+y1.cash+(y1.advToSuppliers||0)+(y1.advPrepaidExp||0);
  var currAsset2=y2.stock+y2.debtors+y2.cash+(y2.advToSuppliers||0)+(y2.advPrepaidExp||0);
  var totAsset0=y0.fixedAssetsNet+currAsset0+y0.otherAssets;
  var totAsset1=y1.fixedAssetsNet+currAsset1+y1.otherAssets;
  var totAsset2=y2.fixedAssetsNet+currAsset2+y2.otherAssets;

  var assetH='<div style="overflow-x:auto"><table><thead>'+head+'</thead><tbody>';
  assetH+=frow('D. Fixed Assets (Net Block)',y0.fixedAssetsNet,y1.fixedAssetsNet,y2.fixedAssetsNet,1,null,0,1);
  assetH+=frow('Closing Stock',y0.stock,y1.stock,y2.stock,0,null,1);
  assetH+=frow('Sundry Debtors',y0.debtors,y1.debtors,y2.debtors,0,'#C62828',1);
  if((y0.advToSuppliers||0)>0||(y1.advToSuppliers||0)>0||(y2.advToSuppliers||0)>0) assetH+=frow('Advances to Suppliers',y0.advToSuppliers||0,y1.advToSuppliers||0,y2.advToSuppliers||0,0,null,1);
  if((y0.advPrepaidExp||0)>0||(y1.advPrepaidExp||0)>0||(y2.advPrepaidExp||0)>0) assetH+=frow('Prepaid Expenses',y0.advPrepaidExp||0,y1.advPrepaidExp||0,y2.advPrepaidExp||0,0,null,1);
  assetH+=frow('Cash &amp; Bank',y0cash,y1.cash,y2.cash,0,null,1);
  assetH+=frow('E. Current Assets',currAsset0,currAsset1,currAsset2,1,null,0,1);
  if(y0.otherAssets>0||y1.otherAssets>0||y2.otherAssets>0) assetH+=frow('F. Other Non-Current Assets',y0.otherAssets,y1.otherAssets,y2.otherAssets,1,null,0,1);
  var hasF = (y0.otherAssets>0||y1.otherAssets>0||y2.otherAssets>0);
  assetH+=frow('TOTAL (D+E'+(hasF?'+F':'')+')',totAsset0,totAsset1,totAsset2,1,null,0,1);
  assetH+='</tbody></table></div>';

  var nwc0=currAsset0-currLiab0, nwc1=currAsset1-currLiab1, nwc2=currAsset2-currLiab2;
  var nwcH='<div style="overflow-x:auto"><table><thead>'+head+'</thead><tbody>'+
    frow('Net Working Capital (E − C)',nwc0,nwc1,nwc2,1)+
    '</tbody></table></div>';

  var diff1=totLiab1-totAsset1, diff2=totLiab2-totAsset2;
  var tallyMsg = (Math.abs(diff1)<1 && Math.abs(diff2)<1)
    ? '<div class="al als">✓ Balance Sheet Tallies for both projected years!</div>'
    : '<div class="al ald">⚠ Difference: FY1='+fc(Math.abs(diff1))+', FY2='+fc(Math.abs(diff2))+'</div>';

  return card('Projected Balance Sheet',
    '<div style="font-weight:700;font-size:12px;color:#1565C0;margin-bottom:6px">LIABILITIES</div>'+liabH+
    '<div style="font-weight:700;font-size:12px;color:#5B5BD6;margin:14px 0 6px">ASSETS</div>'+assetH+
    '<div style="font-weight:700;font-size:12px;color:#2E7D32;margin:14px 0 6px">NET WORKING CAPITAL</div>'+nwcH+
    tallyMsg
  );
}

function pgProjCFS(proj){
  var az = annualizationFactor();
  var fyY = +az.fyStart.slice(0,4);
  var lbl1='FY '+(fyY+1)+'-'+((fyY+2).toString().slice(2));
  var lbl2='FY '+(fyY+2)+'-'+((fyY+3).toString().slice(2));

  var y0cash=proj.y0.cash+proj.y0.bank;

  function crow(label,v1,v2,bold){
    return '<tr><td style="text-align:left;'+(bold?'font-weight:700':'')+'">'+esc(label)+'</td>'+
      '<td style="text-align:right;'+(bold?'font-weight:700':'')+'">'+fc(v1)+'</td>'+
      '<td style="text-align:right;'+(bold?'font-weight:700':'')+'">'+fc(v2)+'</td></tr>';
  }
  var head='<tr><th style="text-align:left">Particulars</th><th style="text-align:right">'+lbl1+'</th><th style="text-align:right">'+lbl2+'</th></tr>';
  var h='<div style="overflow-x:auto"><table><thead>'+head+'</thead><tbody>';
  h+=crow('Net Profit',proj.y1.netProfit,proj.y2.netProfit);
  h+=crow('Add: Depreciation',proj.y1.depreciation,proj.y2.depreciation);
  h+=crow('(Inc)/Dec in Stock',-(proj.y1.stock-proj.y0.stock),-(proj.y2.stock-proj.y1.stock));
  h+=crow('(Inc)/Dec in Debtors',-(proj.y1.debtors-proj.y0.debtors),-(proj.y2.debtors-proj.y1.debtors));
  h+=crow('Inc/(Dec) in Creditors',(proj.y1.creditors-proj.y0.creditors),(proj.y2.creditors-proj.y1.creditors));
  h+='<tr style="background:rgba(0,0,0,.04)">'+crow('A. Cash from Operations',proj.y1.cfOperating,proj.y2.cfOperating,1).replace('<tr>','').replace('</tr>','')+'</tr>';
  h+=crow('Purchase of Fixed Assets',-proj.y1.faAdditions,-proj.y2.faAdditions);
  h+='<tr style="background:rgba(0,0,0,.04)">'+crow('B. Cash from Investing',proj.y1.cfInvesting,proj.y2.cfInvesting,1).replace('<tr>','').replace('</tr>','')+'</tr>';
  h+=crow('New Loan Taken',proj.y1.newLoan,proj.y2.newLoan);
  h+=crow('Loan Principal Repaid',-proj.y1.principalRepaid,-proj.y2.principalRepaid);
  h+='<tr style="background:rgba(0,0,0,.04)">'+crow('C. Cash from Financing',proj.y1.cfFinancing,proj.y2.cfFinancing,1).replace('<tr>','').replace('</tr>','')+'</tr>';
  h+='<tr style="background:rgba(46,125,50,.08)">'+crow('Net Change in Cash (A+B+C)',proj.y1.netCashFlow,proj.y2.netCashFlow,1).replace('<tr>','').replace('</tr>','')+'</tr>';
  h+=crow('Opening Cash & Bank',y0cash,proj.y1.cash);
  h+='<tr style="background:rgba(91,91,214,.08)">'+crow('Closing Cash & Bank',proj.y1.cash,proj.y2.cash,1).replace('<tr>','').replace('</tr>','')+'</tr>';
  h+='</tbody></table></div>';

  return card('Projected Cash Flow Statement (Indirect Method)',h);
}

// ===== MINIMAL XLSX PARSER (no external libraries) =====
// Reads first worksheet of an .xlsx file (ZIP+XML format) into array of row-arrays.
// Requires DecompressionStream('deflate-raw') support (Safari 16.4+, Chrome 80+).

async function inflateRaw(bytes){
  if(typeof DecompressionStream==='undefined') return null;
  var ds = new DecompressionStream('deflate-raw');
  var writer = ds.writable.getWriter();
  writer.write(bytes);
  writer.close();
  var chunks=[]; var reader = ds.readable.getReader();
  while(true){
    var res = await reader.read();
    if(res.done) break;
    chunks.push(res.value);
  }
  var total=0; for(var i=0;i<chunks.length;i++) total+=chunks[i].length;
  var out=new Uint8Array(total); var off=0;
  for(i=0;i<chunks.length;i++){ out.set(chunks[i],off); off+=chunks[i].length; }
  return out;
}

// Parse ZIP central directory to find file entries
function parseZipEntries(buf){
  var view = new DataView(buf);
  var entries = {};
  // Find End of Central Directory (EOCD): signature 0x06054b50
  var eocdSig=0x06054b50, pos=-1;
  for(var i=buf.byteLength-22; i>=0; i--){
    if(view.getUint32(i,true)===eocdSig){ pos=i; break; }
  }
  if(pos<0) return entries;
  var cdOffset = view.getUint32(pos+16,true);
  var cdCount = view.getUint16(pos+10,true);
  var p = cdOffset;
  for(var n=0;n<cdCount;n++){
    var sig = view.getUint32(p,true);
    if(sig!==0x02014b50) break;
    var compMethod = view.getUint16(p+10,true);
    var compSize = view.getUint32(p+20,true);
    var uncompSize = view.getUint32(p+24,true);
    var nameLen = view.getUint16(p+28,true);
    var extraLen = view.getUint16(p+30,true);
    var commentLen = view.getUint16(p+32,true);
    var localHeaderOffset = view.getUint32(p+42,true);
    var name = '';
    for(var c=0;c<nameLen;c++) name += String.fromCharCode(view.getUint8(p+46+c));
    entries[name] = {compMethod:compMethod, compSize:compSize, uncompSize:uncompSize, localHeaderOffset:localHeaderOffset};
    p += 46 + nameLen + extraLen + commentLen;
  }
  return entries;
}

async function extractZipEntry(buf, entry){
  var view = new DataView(buf);
  var p = entry.localHeaderOffset;
  var sig = view.getUint32(p,true);
  if(sig!==0x04034b50) return null;
  var nameLen = view.getUint16(p+26,true);
  var extraLen = view.getUint16(p+28,true);
  var dataStart = p + 30 + nameLen + extraLen;
  var compBytes = new Uint8Array(buf, dataStart, entry.compSize);
  if(entry.compMethod===0) return compBytes; // stored, no compression
  if(entry.compMethod===8) return await inflateRaw(compBytes); // deflate
  return null;
}

function xmlGetTagText(xmlStr, tag){
  // simple regex-based extraction (avoids DOMParser dependency issues with namespaces in some envs)
  var out=[];
  var re = new RegExp('<'+tag+'[^>]*>([\\s\\S]*?)</'+tag+'>','g');
  var m;
  while((m=re.exec(xmlStr))) out.push(m[1]);
  return out;
}

// Parse sharedStrings.xml -> array of strings
function parseSharedStrings(xml){
  if(!xml) return [];
  var siBlocks = xmlGetTagText(xml,'si');
  return siBlocks.map(function(si){
    // si may contain multiple <t> (rich text runs) - concatenate
    var ts = xmlGetTagText(si,'t');
    if(ts.length===0){
      // fallback: direct t inside si without wrapper match (single run)
      var m = si.match(/<t[^>]*>([\s\S]*?)<\/t>/);
      return m ? decodeXmlEntities(m[1]) : '';
    }
    return ts.map(decodeXmlEntities).join('');
  });
}
function decodeXmlEntities(s){
  return s.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&apos;/g,"'").replace(/&amp;/g,'&');
}

// Parse sheet XML -> array of row-arrays (cell values as strings/numbers)
function parseSheetXml(xml, sharedStrings){
  var rows = [];
  var rowBlocks = xmlGetTagText(xml,'row');
  for(var r=0;r<rowBlocks.length;r++){
    var rowXml = rowBlocks[r];
    var cellMatches = rowXml.match(/<c[^>]*\/>|<c[^>]*>[\s\S]*?<\/c>/g) || [];
    var rowArr = [];
    var colIdx = 0;
    for(var ci=0;ci<cellMatches.length;ci++){
      var cellXml = cellMatches[ci];
      var refMatch = cellXml.match(/r="([A-Z]+)(\d+)"/);
      var targetCol = colIdx;
      if(refMatch){
        targetCol = colLetterToIndex(refMatch[1]);
      }
      while(rowArr.length < targetCol) rowArr.push('');
      var typeMatch = cellXml.match(/t="([^"]*)"/);
      var type = typeMatch ? typeMatch[1] : 'n';
      var vMatch = cellXml.match(/<v>([\s\S]*?)<\/v>/);
      var val = vMatch ? vMatch[1] : '';
      if(type==='s'){
        var idx = parseInt(val,10);
        val = sharedStrings[idx]!==undefined ? sharedStrings[idx] : '';
      } else if(type==='str' || type==='inlineStr'){
        // inline string - might be in <is><t>...</t></is>
        var isMatch = cellXml.match(/<is>[\s\S]*?<t[^>]*>([\s\S]*?)<\/t>[\s\S]*?<\/is>/);
        if(isMatch) val = decodeXmlEntities(isMatch[1]);
        else val = decodeXmlEntities(val);
      } else {
        val = decodeXmlEntities(val);
      }
      rowArr.push(val);
      colIdx = targetCol+1;
    }
    rows.push(rowArr);
  }
  return rows;
}
function colLetterToIndex(letters){
  var n=0;
  for(var i=0;i<letters.length;i++) n = n*26 + (letters.charCodeAt(i)-64);
  return n-1;
}

// Top-level: parse an XLSX ArrayBuffer -> array of row-arrays (first sheet)
async function parseXlsxArrayBuffer(buf){
  if(typeof DecompressionStream==='undefined'){
    throw new Error('XLSX_UNSUPPORTED');
  }
  var entries = parseZipEntries(buf);
  // find first worksheet - typically xl/worksheets/sheet1.xml
  var sheetName = null;
  for(var name in entries){
    if(/^xl\/worksheets\/sheet1\.xml$/.test(name)){ sheetName=name; break; }
  }
  if(!sheetName){
    for(var name2 in entries){ if(/^xl\/worksheets\/.*\.xml$/.test(name2)){ sheetName=name2; break; } }
  }
  if(!sheetName) throw new Error('NO_SHEET_FOUND');

  var sheetBytes = await extractZipEntry(buf, entries[sheetName]);
  var sheetXml = bytesToStr(sheetBytes);

  var sharedStrings = [];
  if(entries['xl/sharedStrings.xml']){
    var ssBytes = await extractZipEntry(buf, entries['xl/sharedStrings.xml']);
    sharedStrings = parseSharedStrings(bytesToStr(ssBytes));
  }
  return parseSheetXml(sheetXml, sharedStrings);
}
function bytesToStr(bytes){
  if(!bytes) return '';
  var s='';
  for(var i=0;i<bytes.length;i++) s+=String.fromCharCode(bytes[i]);
  return decodeUTF8(s);
}
function decodeUTF8(binStr){
  try{ return decodeURIComponent(escape(binStr)); }catch(e){ return binStr; }
}

// ===== BANK RECONCILIATION MODULE =====

// Excel serial date -> YYYY-MM-DD
function excelSerialToDate(serial){
  var n = +serial;
  if(isNaN(n) || n<1 || n>2958465) return null;
  var ms = Math.round((n - 25569) * 86400 * 1000); // 25569 = days between 1899-12-30 and 1970-01-01
  var d = new Date(ms);
  if(isNaN(d.getTime())) return null;
  var y=d.getUTCFullYear(), m=d.getUTCMonth()+1, day=d.getUTCDate();
  return y+'-'+(m<10?'0'+m:m)+'-'+(day<10?'0'+day:day);
}
// Try to parse a date string in common formats -> YYYY-MM-DD
function parseAnyDate(s){
  s = (s||'').trim();
  if(!s) return null;
  // pure number -> Excel serial
  if(/^\d+(\.\d+)?$/.test(s)) return excelSerialToDate(s);
  // YYYY-MM-DD
  var m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return m[1]+'-'+m[2]+'-'+m[3];
  // DD-MM-YYYY or DD/MM/YYYY
  m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
  if(m){
    var dd=m[1].padStart(2,'0'), mm=m[2].padStart(2,'0'), yy=m[3];
    return yy+'-'+mm+'-'+dd;
  }
  // DD-MMM-YYYY (e.g. 01-Apr-2025)
  m = s.match(/^(\d{1,2})[\/\-]([A-Za-z]{3})[\/\-](\d{4})/);
  if(m){
    var MON={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
    var mon=MON[m[2].slice(0,1).toUpperCase()+m[2].slice(1,3).toLowerCase()];
    if(mon) return m[3]+'-'+mon+'-'+m[1].padStart(2,'0');
  }
  return null;
}
function parseAmount(s){
  if(s===null||s===undefined||s==='') return 0;
  var t = String(s).replace(/[,₹\s]/g,'').replace(/^(Rs\.?|INR|₹)/i,'').replace(/^\((.*)\)$/,'-$1');
  var n = parseFloat(t);
  return isNaN(n)?0:n;
}

// ===== CSV PARSER =====
function parseCSV(text){
  var rows=[]; var row=[]; var field=''; var inQuotes=false;
  for(var i=0;i<text.length;i++){
    var ch=text[i];
    if(inQuotes){
      if(ch==='"'){
        if(text[i+1]==='"'){ field+='"'; i++; } else { inQuotes=false; }
      } else field+=ch;
    } else {
      if(ch==='"') inQuotes=true;
      else if(ch===','){ row.push(field); field=''; }
      else if(ch==='\n'||ch==='\r'){
        if(ch==='\r' && text[i+1]==='\n') i++;
        row.push(field); field='';
        if(row.length>1 || row[0]!=='') rows.push(row);
        row=[];
      } else field+=ch;
    }
  }
  if(field!=='' || row.length>0){ row.push(field); rows.push(row); }
  return rows;
}

// ===== COLUMN AUTO-DETECTION =====
// Given header row + sample rows, guess which columns are Date/Description/Debit/Credit/Amount/Balance
function detectColumns(rows){
  if(!rows||rows.length<1) return null;
  var header = rows[0].map(function(h){return String(h||'').toLowerCase().trim();});
  var map = {date:-1, desc:-1, debit:-1, credit:-1, amount:-1, balance:-1};
  for(var i=0;i<header.length;i++){
    var h=header[i];
    if(map.date<0 && /date|txn date|value date|posting/.test(h)) map.date=i;
    else if(map.debit<0 && /debit|withdrawal|dr\b/.test(h)) map.debit=i;
    else if(map.credit<0 && /credit|deposit|cr\b/.test(h)) map.credit=i;
    else if(map.balance<0 && /balance|closing/.test(h)) map.balance=i;
    else if(map.amount<0 && /^amount$|amt/.test(h)) map.amount=i;
    else if(map.desc<0 && /description|narration|particular|details|remarks/.test(h)) map.desc=i;
  }
  // fallback: if no description column found, use the longest-text column
  if(map.desc<0 && rows.length>1){
    var bestLen=0, bestIdx=-1;
    for(var c=0;c<header.length;c++){
      if(c===map.date||c===map.debit||c===map.credit||c===map.amount||c===map.balance) continue;
      var sampleLen = String(rows[1][c]||'').length;
      if(sampleLen>bestLen){ bestLen=sampleLen; bestIdx=c; }
    }
    map.desc=bestIdx;
  }
  return map;
}

// ===== EXTRACT TRANSACTIONS FROM PARSED ROWS =====
// Returns array of {date, desc, debit, credit, balance, raw}
function extractBankTxns(rows){
  if(!rows||rows.length<2) return [];
  // find header row: first row where detectColumns finds at least date+ (debit or credit or amount)
  var headerIdx=-1, colMap=null;
  for(var i=0;i<Math.min(rows.length,10);i++){
    var cm = detectColumns([rows[i]].concat(rows.slice(i+1,i+2)));
    if(cm.date>=0 && (cm.debit>=0||cm.credit>=0||cm.amount>=0)){
      headerIdx=i; colMap=cm; break;
    }
  }
  if(headerIdx<0) return [];
  var out=[];
  for(var r=headerIdx+1;r<rows.length;r++){
    var row=rows[r];
    if(!row || row.length===0) continue;
    var dateRaw = colMap.date>=0 ? row[colMap.date] : '';
    var date = parseAnyDate(dateRaw);
    if(!date) continue;
    var desc = colMap.desc>=0 ? String(row[colMap.desc]||'').trim() : '';
    var debit = colMap.debit>=0 ? parseAmount(row[colMap.debit]) : 0;
    var credit = colMap.credit>=0 ? parseAmount(row[colMap.credit]) : 0;
    if(colMap.amount>=0 && !debit && !credit){
      var amt = parseAmount(row[colMap.amount]);
      if(amt<0) debit=-amt; else credit=amt;
    }
    var balance = colMap.balance>=0 ? parseAmount(row[colMap.balance]) : null;
    if(!debit && !credit) continue;
    out.push({date:date, desc:desc, debit:debit, credit:credit, balance:balance});
  }
  return out;
}

// ===== MATCHING ALGORITHM =====
// Build list of app-side cash/bank transactions (bank mode only) within date range
function getAppBankTxns(fromDate,toDate,accountId){
  var out=[];
  var defaultAcc = (D.bankAccounts && D.bankAccounts[0]) ? D.bankAccounts[0].id : 'acc1';
  for(var i=0;i<D.cashBook.length;i++){
    var x=D.cashBook[i];
    if(x.mode!=='bank') continue;
    if(accountId && (x.bankAccountId||defaultAcc)!==accountId) continue;
    if(fromDate && x.date<fromDate) continue;
    if(toDate && x.date>toDate) continue;
    out.push({id:x.id,date:x.date,desc:x.description||x.party||'',amount:x.amount,type:x.type});
  }
  return out;
}

// Match bank txns to app txns: same amount (within 0.5), date within +-3 days
function reconcile(bankTxns, appTxns){
  var matched=[]; var unmatchedBank=[]; var usedApp={};
  for(var i=0;i<bankTxns.length;i++){
    var bt=bankTxns[i];
    var bankAmt = bt.credit>0?bt.credit:-bt.debit; // +ve=receipt, -ve=payment
    var bestMatch=null, bestDiff=Infinity;
    for(var j=0;j<appTxns.length;j++){
      if(usedApp[j]) continue;
      var at=appTxns[j];
      var appAmt = at.type==='receipt'?at.amount:-at.amount;
      if(Math.abs(appAmt-bankAmt)>0.5) continue;
      var dayDiff=Math.abs(daysBetween(at.date,bt.date));
      if(dayDiff>3) continue;
      if(dayDiff<bestDiff){ bestDiff=dayDiff; bestMatch=j; }
    }
    if(bestMatch!==null){
      usedApp[bestMatch]=true;
      matched.push({bank:bt, app:appTxns[bestMatch], dayDiff:bestDiff});
    } else {
      unmatchedBank.push(bt);
    }
  }
  var unmatchedApp=[];
  for(var k=0;k<appTxns.length;k++) if(!usedApp[k]) unmatchedApp.push(appTxns[k]);

  // For unmatched bank entries, suggest closest unmatched app entries (by amount, any date)
  for(i=0;i<unmatchedBank.length;i++){
    var bt2=unmatchedBank[i];
    var bankAmt2 = bt2.credit>0?bt2.credit:-bt2.debit;
    var suggestions=[];
    for(k=0;k<unmatchedApp.length;k++){
      var at2=unmatchedApp[k];
      var appAmt2 = at2.type==='receipt'?at2.amount:-at2.amount;
      var amtDiff=Math.abs(appAmt2-bankAmt2);
      if(amtDiff<=Math.max(1,Math.abs(bankAmt2)*0.02)){ // within 2% or 1 rupee
        suggestions.push({app:at2, dayDiff:Math.abs(daysBetween(at2.date,bt2.date)), amtDiff:amtDiff});
      }
    }
    suggestions.sort(function(a,b){return a.dayDiff-b.dayDiff;});
    bt2.suggestions = suggestions.slice(0,3);
  }
  return {matched:matched, unmatchedBank:unmatchedBank, unmatchedApp:unmatchedApp};
}

// ===== INTEREST DETECTION =====
function findInterestEntries(bankTxns){
  var out=[];
  for(var i=0;i<bankTxns.length;i++){
    var d2=bankTxns[i].desc.toLowerCase();
    if(/interest|int\.?\s*debit|int chgd|int charged/.test(d2) && bankTxns[i].debit>0){
      out.push(bankTxns[i]);
    }
  }
  return out;
}
// App's calculated interest for loans within date range (from D.expenses category Interest Payment)
function appInterestInRange(fromDate,toDate){
  var t=0;
  for(var i=0;i<D.expenses.length;i++){
    var e=D.expenses[i];
    if(e.category==='Interest Payment' && e.date>=fromDate && e.date<=toDate) t+=(+e.amount||0);
  }
  return t;
}

      accts.map(function(a){return '<option value="'+esc(a.id)+'"'+(a.id===selAcc?' selected':'')+'>'+esc(a.name)+'</option>';}).join('')+

    );
  }
