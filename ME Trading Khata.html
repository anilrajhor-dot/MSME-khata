function checkStartupAlerts(){
  var alerts=[],today=td();
  var creditDays=+(D.settings&&D.settings.creditDays)||30;

  // Debtors
  var dMap={};
  (D.debtors||[]).forEach(function(d){
    if(d.amount>0&&d.date){
      // Use EARLIEST date — most overdue entry
      if(!dMap[d.name]||d.date<dMap[d.name]) dMap[d.name]=d.date;
    }
  });
  (D.sales||[]).forEach(function(s){
    if(s.paymentMode==='credit'&&s.date){
      var nm=s.customerName||s.customer||'';
      if(nm&&(!dMap[nm]||s.date<dMap[nm])) dMap[nm]=s.date;
    }
  });
  debtorBalances().forEach(function(d){
    if(d.balance<=0) return;
    var txDate=dMap[d.name]||today;
    var dueDate=new Date(txDate);dueDate.setDate(dueDate.getDate()+creditDays);
    var dueDateStr=dueDate.toISOString().slice(0,10);
    var isOverdue=today>dueDateStr;
    var daysOvd=isOverdue?daysBetween(dueDateStr,today):0;
    var daysLeft=isOverdue?0:daysBetween(today,dueDateStr);
    if(isOverdue) alerts.push({urg:0,icon:'🔴',title:'Debtor Overdue: '+d.name,msg:fc(d.balance)+' overdue by '+daysOvd+' days | Due was: '+dueDateStr,action:"go('reminders')",btn:'Send Reminder'});
    else if(daysLeft<=3) alerts.push({urg:1,icon:'🟡',title:'Payment Due Soon: '+d.name,msg:fc(d.balance)+' due on '+dueDateStr+' ('+daysLeft+' days left)',action:"go('reminders')",btn:'View'});
  });

  // Creditors
  var cMap={};
  (D.creditors||[]).forEach(function(c){
    if(c.amount>0&&c.date){
      // Use EARLIEST purchase date — most overdue entry
      if(!cMap[c.name]||c.date<cMap[c.name]) cMap[c.name]=c.date;
    }
  });
  (D.purchases||[]).forEach(function(p){
    if(p.paymentMode==='credit'&&p.date){
      var nm=p.supplierName||p.supplier||'';
      if(nm&&(!cMap[nm]||p.date<cMap[nm])) cMap[nm]=p.date;
    }
  });
  creditorBalances().forEach(function(c){
    if(c.balance<=0) return;
    var txDate=cMap[c.name];if(!txDate)return;
    var dueDate=new Date(txDate);dueDate.setDate(dueDate.getDate()+creditDays);
    var dueDateStr=dueDate.toISOString().slice(0,10);
    var isOverdue=today>dueDateStr;
    var daysOvd=isOverdue?daysBetween(dueDateStr,today):0;
    var daysLeft=isOverdue?0:daysBetween(today,dueDateStr);
    if(isOverdue) alerts.push({urg:0,icon:'🔴',title:'Pay Creditor: '+c.name,msg:fc(c.balance)+' overdue by '+daysOvd+' days | Due was: '+dueDateStr,action:"go('reminders')",btn:'View'});
    else if(daysLeft<=3) alerts.push({urg:1,icon:'🟡',title:'Creditor Due Soon: '+c.name,msg:fc(c.balance)+' due on '+dueDateStr+' ('+daysLeft+' days left)',action:"go('reminders')",btn:'View'});
  });

  // Loans EMI & Interest — per Anil Sharma guidelines:
  // EMI instalment: must be paid within 30 days of scheduled EMI date
  // Interest: must be paid within 30 days from the date it accrues (monthly)
  (D.loans||[]).forEach(function(l){
    if(!l.outstandingBalance||l.outstandingBalance<=0) return;
    var loanType=l.loanType||'';
    var lender=l.lender||l.bankName||'Bank';
    var isCC=loanType.indexOf('CC')>=0||loanType.indexOf('Cash Credit')>=0||loanType.indexOf('Overdraft')>=0;

    if(!isCC){
      // ── TERM LOAN / MFI EMI ALERT ──
      // EMI schedule date = sanction date + n months (fixed day of month)
      // Find most recent EMI payment
      var pays=(l.payments||[]).filter(function(p){return p.principal>0||p.total>0;});
      var sanctDt=new Date(l.sanctionDate||l.lastInterestDate||today);
      var emiDay=sanctDt.getDate(); // EMI due on this day every month
      var emiAmt=l.emi||0;

      // Find next scheduled EMI date after last payment
      var lastPayDt=pays.length>0
        ? new Date(pays.reduce(function(a,b){return a.date>b.date?a:b;}).date)
        : new Date(l.sanctionDate||today);

      // Next scheduled EMI = last payment date + 1 month, on same day
      var schedDt=new Date(lastPayDt);
      schedDt.setMonth(schedDt.getMonth()+1);
      schedDt.setDate(emiDay);
      var schedStr=schedDt.toISOString().slice(0,10);

      // Grace period = 30 days from scheduled date
      var graceDt=new Date(schedDt);
      graceDt.setDate(graceDt.getDate()+30);
      var graceStr=graceDt.toISOString().slice(0,10);

      var daysSinceSched=daysBetween(schedStr,today);
      var daysToSched=schedStr>today?daysBetween(today,schedStr):0;
      var daysToGrace=graceStr>today?daysBetween(today,graceStr):0;
      var isOverSched=today>=schedStr; // EMI date has passed
      var isOverGrace=today>graceStr;  // 30-day grace also passed = OVERDUE

      if(emiAmt>0){
        if(isOverGrace){
          alerts.push({urg:0,icon:'🏦',title:'EMI OVERDUE: '+lender,
            msg:'EMI ₹'+fc(emiAmt)+' was due '+schedStr+'. Grace period (30 days) expired '+daysToGrace+' days ago. Pay immediately! O/S: '+fc(l.outstandingBalance),
            action:"go('capital')",btn:'Pay Now'});
        } else if(isOverSched){
          alerts.push({urg:1,icon:'🏦',title:'EMI Due — Pay within Grace: '+lender,
            msg:'EMI ₹'+fc(emiAmt)+' due '+schedStr+'. '+daysToGrace+' days grace period remaining. Pay before '+graceStr,
            action:"go('capital')",btn:'Pay Now'});
        } else if(daysToSched<=7){
          alerts.push({urg:1,icon:'🏦',title:'EMI Due Soon: '+lender,
            msg:'EMI ₹'+fc(emiAmt)+' due on '+schedStr+' ('+daysToSched+' days). Pay on time to avoid penalty.',
            action:"go('capital')",btn:'View Loan'});
        }
      }

      // ── INTEREST ALERT (for interest-only or CC accounts) ──
      // Interest accrues monthly — must be paid within 30 days
      if(l.rate>0&&!emiAmt){
        var lastIntDt=new Date(l.lastInterestDate||l.sanctionDate||today);
        var nextIntDt=new Date(lastIntDt);
        nextIntDt.setMonth(nextIntDt.getMonth()+1);
        var intGraceDt=new Date(nextIntDt);
        intGraceDt.setDate(intGraceDt.getDate()+30);
        var intGraceStr=intGraceDt.toISOString().slice(0,10);
        var nextIntStr=nextIntDt.toISOString().slice(0,10);
        var monthlyInt=Math.round(l.outstandingBalance*l.rate/100/12);
        var daysToIntGrace=intGraceStr>today?daysBetween(today,intGraceStr):0;
        if(today>intGraceStr){
          alerts.push({urg:0,icon:'🏦',title:'Interest Overdue: '+lender,
            msg:'Monthly interest ~₹'+fc(monthlyInt)+' not recorded since '+nextIntStr+'. 30-day grace expired. O/S: '+fc(l.outstandingBalance),
            action:"go('capital')",btn:'Pay Now'});
        } else if(today>=nextIntStr){
          alerts.push({urg:1,icon:'🏦',title:'Interest Due — '+lender,
            msg:'Monthly interest ~₹'+fc(monthlyInt)+' due from '+nextIntStr+'. '+daysToIntGrace+' days grace left (by '+intGraceStr+')',
            action:"go('capital')",btn:'Record Payment'});
        }
      }
    }
  });

  // CC Limit
  (D.loans||[]).forEach(function(l){
    var t=l.loanType||'';
    if(t.indexOf('CC')<0&&t.indexOf('Cash Credit')<0&&t.indexOf('Overdraft')<0) return;
    var limit=l.sanctionedAmount||0,used=l.outstandingBalance||0;
    if(limit>0&&used>limit) alerts.push({urg:0,icon:'🚨',title:'CC Limit EXCEEDED: '+l.lender,msg:'Used '+fc(used)+' vs limit '+fc(limit)+'. Over by '+fc(used-limit)+'. Regularise immediately!',action:"go('capital')",btn:'View CC'});
    else if(limit>0&&used>limit*0.9) alerts.push({urg:1,icon:'⚠️',title:'CC Near Limit: '+l.lender,msg:'Used '+Math.round(used/limit*100)+'% of '+fc(limit)+'. Only '+fc(limit-used)+' available.',action:"go('capital')",btn:'View CC'});
  });

  if(!alerts.length) return;
  alerts.sort(function(a,b){return a.urg-b.urg;});
  var colors=['#B71C1C','#E65100'],bgs=['#FFEBEE','#FFF3E0'];
  var body=alerts.map(function(a){
    var col=colors[Math.min(a.urg,1)],bg=bgs[Math.min(a.urg,1)];
    return '<div style="background:'+bg+';border-left:4px solid '+col+';border-radius:8px;padding:10px 12px;margin-bottom:8px">'+
      '<div style="font-weight:700;font-size:13px;color:'+col+'">'+a.icon+' '+esc(a.title)+'</div>'+
      '<div style="font-size:12px;color:#37474F;margin:3px 0 6px">'+esc(a.msg)+'</div>'+
      '<button onclick="'+a.action+';closeStartupPopup()" style="padding:5px 12px;border-radius:6px;background:'+col+';color:#fff;border:none;font-size:11px;font-weight:700;cursor:pointer">'+esc(a.btn)+'</button>'+
    '</div>';
  }).join('');

  var d=document.createElement('div');
  d.id='startup_popup';
  d.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box';
  d.innerHTML='<div style="background:#fff;border-radius:16px;width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.3)">'+
    '<div style="background:#1565C0;color:#fff;padding:14px 18px;border-radius:16px 16px 0 0;display:flex;justify-content:space-between;align-items:center">'+
      '<div><div style="font-weight:800;font-size:15px">⚠️ '+alerts.length+' Alert'+(alerts.length>1?'s':'')+' — Action Required</div>'+
      '<div style="font-size:11px;opacity:.8">Tap action button or dismiss</div></div>'+
      '<button onclick="closeStartupPopup()" style="background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:20px;font-weight:700;border-radius:8px;padding:2px 10px;cursor:pointer">✕</button>'+
    '</div>'+
    '<div style="overflow-y:auto;padding:14px">'+body+'</div>'+
    '<div style="padding:12px;border-top:1px solid #eee">'+
      '<button onclick="closeStartupPopup()" style="width:100%;padding:11px;border-radius:8px;background:#546E7A;color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer">✓ Dismiss — I will act on these today</button>'+
    '</div>'+
  '</div>';
  document.body.appendChild(d);
}
